<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTP — Sistema Operacional de Garagem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #020817;
    --surface:   #0F172A;
    --surface2:  #0A0F1E;
    --border:    #1E293B;
    --border2:   #0F1929;
    --text:      #F1F5F9;
    --text2:     #94A3B8;
    --text3:     #475569;
    --text4:     #334155;
    --blue:      #2563EB;
    --blue-dark: #1D4ED8;
    --green:     #00C48C;
    --amber:     #F59E0B;
    --red:       #EF4444;
    --purple:    #8B5CF6;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ─────────────────────────────── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .login-glow {
    position: absolute;
    top: 20%; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, #1D4ED810 0%, transparent 65%);
    pointer-events: none;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 380px;
    box-shadow: 0 30px 80px #00000090;
    position: relative;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-icon {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 56px; height: 56px;
    background: #1E3A5F;
    border-radius: 16px;
    font-size: 26px;
    margin-bottom: 14px;
    border: 1px solid #2563EB30;
    box-shadow: 0 0 30px #2563EB20;
  }

  .login-title {
    font-size: 22px; font-weight: 800;
    color: var(--text); letter-spacing: -0.5px;
  }

  .login-sub {
    color: var(--text3); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: 4px;
  }

  .field-label {
    display: block;
    color: var(--text3); font-size: 11px;
    font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }

  .field-input, .field-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text); font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
    appearance: none;
  }

  .field-input:focus, .field-select:focus {
    border-color: var(--blue);
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #1D4ED8, #2563EB);
    color: #fff; border: none;
    border-radius: 12px; padding: 13px;
    font-size: 14px; font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    color: var(--text4); font-size: 11px;
  }

  /* ── APP SHELL ──────────────────────────── */
  #app-shell { display: none; min-height: 100vh; flex-direction: column; }
  #app-shell.visible { display: flex; }

  /* Topbar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 56px;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky; top: 0; z-index: 200;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex; align-items: center; gap: 12px;
  }

  .topbar-logo {
    font-size: 20px;
  }

  .topbar-brand {
    font-weight: 800; font-size: 15px; color: var(--text);
    letter-spacing: -0.3px;
  }

  .topbar-brand span {
    font-weight: 400; color: var(--text3);
  }

  .topbar-divider {
    width: 1px; height: 20px; background: var(--border);
  }

  .topbar-location {
    color: var(--text3); font-size: 12px;
  }

  .topbar-right {
    display: flex; align-items: center; gap: 12px;
  }

  .topbar-role {
    color: var(--text3); font-size: 12px;
  }

  .avatar {
    background: #1E293B; border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); font-size: 13px; font-weight: 700;
    border: 1px solid var(--border);
  }

  .btn-sair {
    background: none;
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 6px; padding: 5px 12px;
    font-size: 11px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }

  .btn-sair:hover { border-color: var(--red); color: var(--red); }

  /* Layout */
  .app-body {
    display: flex; flex: 1; min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 210px;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    padding: 16px 10px;
    display: flex; flex-direction: column;
    position: sticky; top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .nav-btn {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    background: none;
    border: 1px solid transparent;
    border-radius: 9px; padding: 10px 12px;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px; font-weight: 400;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 3px;
    text-align: left;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--border2); color: var(--text2); }

  .nav-btn.active {
    background: var(--border);
    border-color: #1D4ED830;
    color: var(--text);
    font-weight: 600;
  }

  .nav-icon { font-size: 16px; }

  .sidebar-turno {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .turno-label {
    color: var(--text4); font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 8px;
  }

  .turno-btns { display: flex; gap: 6px; }

  .turno-btn {
    flex: 1;
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 7px; padding: 7px 4px;
    font-size: 11px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }

  .turno-btn.active-dia {
    background: #F59E0B18;
    border-color: #F59E0B40;
    color: var(--amber);
  }

  .turno-btn.active-noite {
    background: #3B82F618;
    border-color: #3B82F640;
    color: #3B82F6;
  }

  /* Main */
  .main-content {
    flex: 1; padding: 28px;
    overflow-y: auto;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── COMPONENTS ─────────────────────────── */

  .section-title {
    display: flex; align-items: center; gap: 10px;
    margin: 24px 0 14px;
  }

  .section-title:first-child { margin-top: 0; }

  .section-title-icon { font-size: 17px; }

  .section-title-text {
    color: var(--text3); font-size: 11px;
    font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase;
  }

  .section-title-line {
    flex: 1; height: 1px; background: var(--border);
  }

  /* Badge */
  .badge {
    border-radius: 6px; padding: 2px 10px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    white-space: nowrap;
    border-width: 1px; border-style: solid;
  }

  .badge-disponivel  { color: #00C48C; background: #00C48C18; border-color: #00C48C40; }
  .badge-em_linha    { color: #3B82F6; background: #3B82F618; border-color: #3B82F640; }
  .badge-manutencao  { color: #F59E0B; background: #F59E0B18; border-color: #F59E0B40; }
  .badge-ag_peca     { color: #EF4444; background: #EF444418; border-color: #EF444440; }
  .badge-sinistro    { color: #8B5CF6; background: #8B5CF618; border-color: #8B5CF640; }
  .badge-ok          { color: #00C48C; background: #00C48C18; border-color: #00C48C40; }
  .badge-nok         { color: #EF4444; background: #EF444418; border-color: #EF444440; }
  .badge-fechada     { color: #00C48C; background: #00C48C18; border-color: #00C48C40; }
  .badge-pendente    { color: #EF4444; background: #EF444418; border-color: #EF444440; }
  .badge-andamento   { color: #F59E0B; background: #F59E0B18; border-color: #F59E0B40; }

  /* KPI Grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 10px; margin-bottom: 4px;
  }

  .kpi-card {
    background: var(--surface);
    border-radius: 11px; padding: 14px 16px;
    border: 1px solid var(--border);
    border-left-width: 3px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .kpi-card.ok  { border-left-color: var(--green); }
  .kpi-card.nok { border-left-color: var(--red); }
  .kpi-card.neu { border-left-color: #475569; }

  .kpi-label {
    color: var(--text3); font-size: 10px;
    font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .kpi-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px; font-weight: 600;
    color: var(--text);
    display: flex; align-items: baseline; gap: 4px;
  }

  .kpi-unit { font-size: 12px; color: var(--text4); font-weight: 400; }

  .kpi-status {
    font-size: 11px; font-weight: 600;
  }

  .kpi-status.ok  { color: var(--green); }
  .kpi-status.nok { color: var(--red); }

  /* Painel header */
  .painel-header {
    background: linear-gradient(135deg, var(--surface), #1A2540);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 24px;
    margin-bottom: 22px;
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 16px;
  }

  .painel-header-left h2 {
    color: var(--text2); font-size: 11px;
    font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 4px;
  }

  .painel-header-left h1 {
    color: var(--text); font-size: 20px; font-weight: 700;
    letter-spacing: -0.3px; text-transform: capitalize;
  }

  .painel-header-left p {
    color: var(--text3); font-size: 12px; margin-top: 4px;
  }

  .frota-counters {
    display: flex; gap: 10px;
  }

  .frota-counter {
    background: transparent;
    border-radius: 10px; padding: 10px 16px;
    text-align: center; border-width: 1px; border-style: solid;
  }

  .frota-counter-val {
    font-family: 'DM Mono', monospace;
    font-size: 24px; font-weight: 700;
    display: block;
  }

  .frota-counter-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.5px; opacity: 0.8;
  }

  /* Frota cards */
  .frota-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 9px;
  }

  .frota-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px; padding: 13px 15px;
    display: flex; justify-content: space-between;
    align-items: center;
    transition: border-color 0.2s;
  }

  .frota-card:hover { border-color: #2563EB40; }

  .frota-prefixo {
    font-family: 'DM Mono', monospace;
    font-size: 16px; font-weight: 600; color: var(--text);
  }

  .frota-modelo { color: var(--text3); font-size: 11px; margin-top: 2px; }
  .frota-km { color: var(--text4); font-size: 10px; margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* OS cards */
  .os-list { display: flex; flex-direction: column; gap: 8px; }

  .os-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px; padding: 14px 18px;
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 10px;
  }

  .os-left { display: flex; gap: 14px; align-items: center; }
  .os-prefixo { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text); }
  .os-mecanico { color: var(--text3); font-size: 12px; }
  .os-desc { color: var(--text2); font-size: 13px; }
  .os-right { display: flex; gap: 10px; align-items: center; }
  .os-custo { color: var(--amber); font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }

  /* Filtros */
  .filtros { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

  .filtro-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 8px; padding: 6px 14px;
    font-size: 12px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .filtro-btn:hover { color: var(--text); }
  .filtro-btn.active {
    background: var(--blue-dark);
    border-color: var(--blue);
    color: #fff;
  }

  /* Relatórios */
  .relatorios-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
    gap: 10px;
  }

  .rel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
    display: flex; gap: 14px; align-items: flex-start;
    cursor: pointer; transition: all 0.18s;
  }

  .rel-card:hover {
    border-color: #2563EB60;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px #00000040;
  }

  .rel-icon-wrap {
    background: var(--border);
    border-radius: 9px; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .rel-cod { color: var(--text3); font-size: 10px; font-weight: 700; letter-spacing: 1px; }
  .rel-nome { color: var(--text); font-size: 13px; font-weight: 600; margin-top: 3px; line-height: 1.35; }
  .rel-meta { color: var(--text4); font-size: 11px; margin-top: 6px; }

  /* Diretoria */
  .dir-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }

  .dir-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
  }

  .dir-card-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 16px;
  }

  .dir-card-title { color: var(--text); font-size: 16px; font-weight: 700; }
  .dir-card-sub { color: var(--text3); font-size: 12px; margin-top: 2px; }

  .dir-kpis {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }

  .dir-kpi {
    background: var(--bg);
    border-radius: 9px; padding: 10px 12px;
    border-left: 3px solid var(--border);
  }

  .dir-kpi.ok  { border-left-color: var(--green); }
  .dir-kpi.nok { border-left-color: var(--red); }

  .dir-kpi-label { color: var(--text3); font-size: 10px; letter-spacing: 0.5px; }

  .dir-kpi-val {
    font-family: 'DM Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--text); margin-top: 2px;
  }

  /* Info banner */
  .info-banner {
    border-radius: 10px; padding: 14px 18px;
    margin-top: 16px; font-size: 12px;
    border-width: 1px; border-style: solid;
  }

  .info-banner.blue  { background: var(--surface); border-color: #1D4ED830; color: #3B82F6; }
  .info-banner.amber { background: var(--surface); border-color: #F59E0B30; color: var(--amber); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main-content { padding: 16px; }
    .dir-grid { grid-template-columns: 1fr; }
    .frota-counters { gap: 6px; }
    .frota-counter { padding: 8px 10px; }
    .frota-counter-val { font-size: 18px; }
    .topbar-role { display: none; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">🚌</div>
      <div class="login-title">JTP Transportes</div>
      <div class="login-sub">Sistema Operacional de Garagem</div>
    </div>

    <label class="field-label">E-mail</label>
    <input class="field-input" id="inp-email" type="email" placeholder="seu@email.com">

    <label class="field-label">Senha</label>
    <input class="field-input" id="inp-senha" type="password" placeholder="••••••••">

    <label class="field-label">Cargo</label>
    <select class="field-select" id="inp-cargo" onchange="toggleGaragem()">
      <option value="gerente_garagem">Gerente de Garagem</option>
      <option value="pcm">PCM</option>
      <option value="almoxarifado">Almoxarifado</option>
      <option value="lider_operacional">Líder Operacional</option>
      <option value="lider_suprimentos">Líder de Suprimentos</option>
      <option value="operacoes_seguras">Operações Seguras</option>
      <option value="lider_oficina">Líder de Oficina</option>
      <option value="diretoria">Diretoria</option>
    </select>

    <div id="garagem-field">
      <label class="field-label">Garagem</label>
      <select class="field-select" id="inp-garagem">
        <option value="pvh">Garagem Porto Velho — RO</option>
        <option value="bpa">Garagem Bragança Paulista — SP</option>
      </select>
    </div>

    <div id="login-erro" style="color:#EF4444;font-size:12px;text-align:center;margin-bottom:8px;display:none;">
      Preencha e-mail e senha para continuar.
    </div>

    <button class="btn-login" onclick="doLogin()">Entrar no Sistema</button>
    <div class="login-footer">🔒 Acesso restrito — Grupo JTP</div>
  </div>
</div>

<!-- ══ APP SHELL ═══════════════════════════════════ -->
<div id="app-shell">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🚌</span>
      <div class="topbar-brand">JTP <span>Operacional</span></div>
      <div class="topbar-divider"></div>
      <span class="topbar-location" id="tb-location">📍 —</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-role" id="tb-role">—</span>
      <div class="avatar" id="tb-avatar">?</div>
      <button class="btn-sair" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <!-- Body -->
  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <button class="nav-btn active" data-tela="painel" onclick="navTo('painel', this)">
        <span class="nav-icon">🏠</span> Painel do Dia
      </button>
      <button class="nav-btn" data-tela="frota" onclick="navTo('frota', this)">
        <span class="nav-icon">🚌</span> Frota
      </button>
      <button class="nav-btn" data-tela="indicadores" onclick="navTo('indicadores', this)">
        <span class="nav-icon">📊</span> Indicadores
      </button>
      <button class="nav-btn" data-tela="relatorios" onclick="navTo('relatorios', this)">
        <span class="nav-icon">📋</span> Relatórios
      </button>
      <button class="nav-btn" data-tela="manutencao" onclick="navTo('manutencao', this)">
        <span class="nav-icon">🔧</span> Manutenção
      </button>
      <button class="nav-btn" data-tela="almoxarifado" onclick="navTo('almoxarifado', this)">
        <span class="nav-icon">📦</span> Almoxarifado
      </button>
      <button class="nav-btn diretoria-only" data-tela="diretoria" onclick="navTo('diretoria', this)" style="display:none">
        <span class="nav-icon">🏢</span> Diretoria
      </button>

      <div class="sidebar-turno">
        <div class="turno-label">Turno Ativo</div>
        <div class="turno-btns">
          <button class="turno-btn active-dia" id="btn-dia" onclick="setTurno('dia')">☀️ Dia</button>
          <button class="turno-btn" id="btn-noite" onclick="setTurno('noite')">🌙 Noite</button>
        </div>
      </div>
    </div>

    <!-- Main -->

function badge(status) {
  const [label, cls] = STATUS_BADGE[status] || [status, ''];

function kpiCard(label, val, meta, unit='%', inverso=false, dec=1) {
  const num = parseFloat(val);
  let st = 'neu';
  let stLabel = '';
  if (meta !== undefined) {
    st = inverso ? (num <= meta ? 'ok' : 'nok') : (num >= meta ? 'ok' : 'nok');
    stLabel = `<div class="kpi-status ${st}">${st==='ok'?'✓ OK':'✗ NOK'} — Meta: ${meta}${unit}</div>`;
  }
  const display = typeof val === 'number' ? val.toFixed(dec) : val ?? '—';
  return `
    <div class="kpi-card ${st}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${display}<span class="kpi-unit">${unit}</span></div>
      ${stLabel}
    </div>`;
}

function secTitle(icon, text) {

    <span class="section-title-text">${text}</span>

}

function navTo(tela, el) {
  state.tela = tela;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  const mc = document.getElementById('main-content');
  mc.style.animation = 'none';
  mc.offsetHeight;
  mc.style.animation = '';
  mc.innerHTML = RENDERS[tela] ? RENDERS[tela]() : '<p>Em breve</p>';
}

function setFiltroFrota(f) {
  state.filtroFrota = f;
  navTo('frota', document.querySelector('[data-tela="frota"]'));
}

function setTurno(t) {
  state.turno = t;
  document.getElementById('btn-dia').className = 'turno-btn' + (t==='dia'?' active-dia':'');
  document.getElementById('btn-noite').className = 'turno-btn' + (t==='noite'?' active-noite':'');
  if (state.tela === 'painel') navTo('painel', null);
}

function toggleGaragem() {
  const cargo = document.getElementById('inp-cargo').value;
  document.getElementById('garagem-field').style.display = cargo === 'diretoria' ? 'none' : 'block';
}

function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const cargo = document.getElementById('inp-cargo').value;
  const garagem = document.getElementById('inp-garagem')?.value || 'all';

  if (!email || !senha) {
    document.getElementById('login-erro').style.display = 'block';
    return;
  }

  state.user = {
    nome: email.split('@')[0],
    email, cargo, garagem_id: garagem,
    garagem_nome: GARAGENS[garagem] || 'Todas as Garagens',
  };

  // Update topbar
  document.getElementById('tb-location').textContent =
    cargo === 'diretoria' ? '🏢 Todas as Garagens' : `📍 ${GARAGENS[garagem]}`;
  document.getElementById('tb-role').textContent = CARGOS[cargo];
  document.getElementById('tb-avatar').textContent = state.user.nome[0].toUpperCase();

  // Show diretoria menu if needed
  document.querySelectorAll('.diretoria-only').forEach(el => {
    el.style.display = cargo === 'diretoria' ? 'flex' : 'none';
  });

  // Switch screens
  document.getElementById('login-screen').style.display = 'none';
  const shell = document.getElementById('app-shell');
  shell.classList.add('visible');

  // Render initial screen
  navTo('painel', document.querySelector('[data-tela="painel"]'));
}

function doLogout() {
  state.user = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('inp-email').value = '';
  document.getElementById('inp-senha').value = '';
  document.getElementById('login-erro').style.display = 'none';
}

// Enter key login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});
</script>
</body>
</html>
