<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F1E">
<title>JTP Operacional</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="JTP">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0F1E;--surface:#111827;--surface2:#1A2236;--border:#1E2D45;--border2:#1A2535;
  --blue:#2563EB;--green:#00C48C;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;
  --text:#F1F5F9;--text2:#CBD5E1;--text3:#64748B;--text4:#334155;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 8px)}
#navbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;z-index:200}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#1D4ED8,#2563EB);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px #2563EB30}
.fi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none}
.fi:focus{border-color:var(--blue)}
.btn-p{width:100%;background:linear-gradient(135deg,#1D4ED8,#2563EB);border:none;border-radius:12px;padding:16px;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-p:active{opacity:.85}
/* NAV */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:8px 4px;font-family:inherit}
.nav-btn.active{color:var(--blue)}
.nav-ic{font-size:22px}.nav-lb{font-size:10px;font-weight:700;letter-spacing:.5px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin:0 14px 10px}
.vcard{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin:0 14px 8px;transition:border-color .15s;cursor:pointer}
.vcard.done{border-color:#00C48C40;background:#00C48C05}
.vcard.nok{border-color:#EF444440;background:#EF444405}
.prefixo{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.vcard-sub{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.btn-ck{width:50px;height:50px;border-radius:12px;border:2px solid var(--border);background:transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-ck.ok{border-color:var(--green);background:#00C48C18}
.btn-ck.nok{border-color:var(--red);background:#EF444418}
/* OS CARD */
.os-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:14px;padding:13px 15px;margin:0 14px 8px;cursor:pointer}
.os-card.corretiva{border-left-color:var(--red)}.os-card.preventiva_pesada{border-left-color:var(--purple)}
.os-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.os-pre{font-family:'DM Mono',monospace;font-size:21px;font-weight:700;color:var(--blue)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid}
/* SHEET */
.sheet-ov{position:fixed;inset:0;background:#00000088;z-index:300;display:none;align-items:flex-end}
.sheet-ov.open{display:flex}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(var(--safe-bot) + 16px)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:12px auto}
.sheet-ttl{font-size:17px;font-weight:800;padding:4px 20px 14px;border-bottom:1px solid var(--border)}
.sheet-body{padding:16px 20px}
/* CHECKLIST */
.ck-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border2)}
.ck-row:last-child{border:none}
.ck-txt{flex:1;font-size:12px;line-height:1.4}
.ck-b{width:38px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.ck-b.von{border-color:var(--blue);background:#2563EB18;color:var(--blue)}
.ck-b.ton{border-color:var(--green);background:#00C48C18;color:var(--green)}
.ck-b.na{border-color:var(--text4);background:#47556918;color:var(--text4)}
/* UTILS */
.sl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:14px 14px 8px}
.empty{text-align:center;padding:52px 24px;color:var(--text3)}
.empty-ic{font-size:48px;margin-bottom:12px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 16px);right:18px;width:56px;height:56px;border-radius:18px;background:var(--blue);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px #2563EB50;display:flex;align-items:center;justify-content:center;z-index:90}
.fab:active{transform:scale(.92)}
.prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-f{height:100%;border-radius:99px;transition:width .3s}
.fi2{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.fi2:focus{border-color:var(--blue)}
.fl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.kpi2{background:var(--surface2);border-radius:12px;padding:12px;text-align:center}
.kpi2-v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.kpi2-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-top:2px}
#toast{position:fixed;top:calc(var(--safe-top)+60px);left:50%;transform:translateX(-50%) translateY(-20px);background:#1E293B;border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:14px;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-logo">🚌</div>
  <div style="text-align:center"><div style="font-size:26px;font-weight:800">JTP Operacional</div><div style="font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Acesso ao Sistema</div></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px"><label class="fl">Matrícula ou E-mail</label><input class="fi" id="le" type="text" inputmode="text" autocomplete="username" placeholder="Ex: 4521 ou seu@email.com"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px"><label class="fl">Senha</label><input class="fi" id="ls" type="password" autocomplete="current-password" placeholder="••••••"></div>
  <div id="lerr" style="color:var(--red);font-size:13px;text-align:center;min-height:20px"></div>
  <button class="btn-p" onclick="doLogin()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">🚌</span>
      <div><div style="font-size:14px;font-weight:800" id="tbn">—</div><div style="font-size:10px;color:var(--text3)" id="tbc">—</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:11px;color:var(--text3)" id="tbg">—</div>
      <button id="btn-instalar" onclick="instalarApp()" style="display:none;background:var(--blue);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;align-items:center;gap:4px">📲 Instalar</button>
      <button onclick="doLogout()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text3);font-size:11px;font-family:inherit;cursor:pointer">Sair</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="navbar"></div>
</div>

<!-- SHEET -->
<div class="sheet-ov" id="shov" onclick="closeSheet(event)">
  <div class="sheet" id="sh">
    <div class="sheet-handle"></div>
    <div class="sheet-ttl" id="shttl"></div>
    <div class="sheet-body" id="shbody"></div>
  </div>
</div>

<script>
// Verificar se Supabase carregou
if(typeof supabase === 'undefined'){
  document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;background:#0F172A;color:#F1F5F9"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Sem conexão</div><div style="font-size:14px;color:#94A3B8;margin-bottom:24px">Verifique sua internet e tente novamente.</div><button onclick="location.reload()" style="background:#2563EB;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer">🔄 Tentar Novamente</button></div>';
  throw new Error('Supabase não carregou');
}
const {createClient}=supabase;
const sb=createClient('https://jboclubugfxmurvhcxgr.supabase.co','sb_publishable_hasmgR_BbXcJC6Xko6DzaA_N7kl7rNT');
const S={user:null,perfil:null,garagens:[],tela:'home',turno:'dia'};
function hoje(){return new Date().toISOString().split('T')[0]}
function getGid(){return S.perfil?.garagem_id||S.garagens?.[0]?.id}
function cargo(){return S.perfil?.cargo}
const CARGOS={diretoria:'Diretoria',gerente_garagem:'Gerente',lider_pcm:'Líder PCM',assistente_pcm:'Ass. PCM',almoxarifado:'Almoxarifado',lider_operacional:'L. Operacional',lider_suprimentos:'L. Suprimentos',operacoes_seguras:'Op. Seguras',lider_oficina:'L. Oficina',lider_patio:'L. Pátio',lavador:'Lavador',manobrista:'Manobrista',frentista:'Frentista',plantao:'Plantão'};
function toast(msg,tipo='ok',dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(tipo==='err'?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='',dur);}
function render(html){document.getElementById('content').innerHTML=html}
function setTela(t){S.tela=t;buildNav();render('<div class="loading"><div class="sp"></div></div>');TELAS[t]&&TELAS[t]()}
function openSheet(ttl,html){document.getElementById('shttl').textContent=ttl;document.getElementById('shbody').innerHTML=html;document.getElementById('shov').classList.add('open')}
function closeSheet(e){if(e===true||e.target===document.getElementById('shov'))document.getElementById('shov').classList.remove('open')}

// LOGIN
async function doLogin(){
  const input=document.getElementById('le').value.trim();
  const senha=document.getElementById('ls').value;
  const err=document.getElementById('lerr');
  if(!input||!senha){err.textContent='Preencha matrícula/e-mail e senha.';return}
  err.textContent='Entrando...';

  // Resolve e-mail — pode ser matrícula ou e-mail direto
  let email=input;
  if(!input.includes('@')){
    // É matrícula — busca o e-mail correspondente
    const{data:perfil}=await sb.from('perfis').select('email').eq('matricula',input).single();
    if(!perfil?.email){
      err.textContent='Matrícula não encontrada. Verifique com o administrador.';
      return;
    }
    email=perfil.email;
  }

  const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){err.textContent='Matrícula/e-mail ou senha incorretos.';return}
  err.textContent='';
  S.user=data.user;await init();
}
async function init(){
  try{
  const[{data:p},{data:g}]=await Promise.all([
    sb.from('perfis').select('*').eq('id',S.user.id).single(),
    sb.from('garagens').select('*').order('nome'),
  ]);
  S.perfil=p;S.garagens=g||[];
  const gar=S.garagens.find(x=>x.id===p?.garagem_id);
  document.getElementById('tbn').textContent=p?.nome?.split(' ')[0]||'—';
  document.getElementById('tbc').textContent=CARGOS[p?.cargo]||p?.cargo||'—';
  document.getElementById('tbg').textContent=(gar?.nome||'—').replace('JTP ','').replace('Garagem ','').split('—')[0].trim();
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  setTela(TELA_INICIO[cargo()]||'home');
  }catch(err){
    console.error('Init error:',err);
    const lerr=document.getElementById('lerr');
    if(lerr) lerr.textContent='Erro: '+err.message;
    // Garantir que o login aparece mesmo com erro
    const loginEl=document.getElementById('login');
    const appEl=document.getElementById('app');
    if(loginEl) loginEl.style.display='flex';
    if(appEl) appEl.style.display='none';
    // Toast de erro visível
    setTimeout(()=>toast('Erro ao carregar perfil. Tente novamente.','err'),500);
  }
}
async function doLogout(){await sb.auth.signOut();location.reload()}

// NAVBAR
const TELA_INICIO={lavador:'lavagem',lider_patio:'patio',lider_oficina:'oficina',lider_pcm:'oficina',assistente_pcm:'oficina',manobrista:'patio_man',frentista:'abastecimento',plantao:'recolha'};
const NAV={
  lavador:[{id:'lavagem',ic:'🚿',lb:'Lavagem'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_patio:[{id:'patio',ic:'✅',lb:'Validar'},{id:'soltura',ic:'📋',lb:'Soltura'},{id:'abastecimento',ic:'⛽',lb:'Abastec.'},{id:'lav_pesada',ic:'🚿',lb:'Lavagem'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_operacional:[{id:'patio_man',ic:'🚗',lb:'Pátio'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_oficina:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_pcm:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'checklist_equip',ic:'📋',lb:'3.4'},{id:'prev26',ic:'💰',lb:'2.6'},{id:'home',ic:'🏠',lb:'Início'}],
  assistente_pcm:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'checklist_equip',ic:'📋',lb:'3.4'},{id:'prev26',ic:'💰',lb:'2.6'},{id:'home',ic:'🏠',lb:'Início'}],
  manobrista:[{id:'patio_man',ic:'🚗',lb:'Pátio'},{id:'home',ic:'🏠',lb:'Início'}],
  frentista:[{id:'abastecimento',ic:'⛽',lb:'Abastecer'},{id:'home',ic:'🏠',lb:'Início'}],
  plantao:[{id:'recolha',ic:'🔑',lb:'Recolha'},{id:'home',ic:'🏠',lb:'Início'}],
};
const NAV_DEF=[{id:'home',ic:'🏠',lb:'Início'}];
function buildNav(){
  const itens=NAV[cargo()]||NAV_DEF;
  document.getElementById('navbar').innerHTML=itens.map(n=>`<button class="nav-btn${S.tela===n.id?' active':''}" onclick="setTela('${n.id}')"><span class="nav-ic">${n.ic}</span><span class="nav-lb">${n.lb}</span></button>`).join('');
}

// ── HOME ─────────────────────────────────────────────────
async function telaHome(){
  const gid=getGid();const agora=new Date();const data=hoje();
  const[{data:fr},{data:oc},{data:sol},{data:lav}]=await Promise.all([
    sb.from('frota').select('status').eq('garagem_id',gid),
    sb.from('ocorrencias_22').select('id').eq('garagem_id',gid).neq('status','liberado'),
    sb.from('soltura_2_10').select('saiu').eq('garagem_id',gid).eq('data',data),
    sb.from('checklist_lavagem').select('status').eq('garagem_id',gid).eq('data',data),
  ]);
  const tot=(fr||[]).length,ind=(oc||[]).length;
  const pctD=tot>0?(((tot-ind)/tot)*100).toFixed(0):100;
  const saiu=(sol||[]).filter(r=>r.saiu===true).length,sTot=(sol||[]).length;
  const pctS=sTot>0?((saiu/sTot)*100).toFixed(0):null;
  const lavE=(lav||[]).filter(l=>l.status==='executado').length,lavT=(lav||[]).length;
  render(`
    <div class="sl">📊 Painel do Dia</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px;margin-bottom:8px">
      <div class="kpi2"><div class="kpi2-v" style="color:${parseFloat(pctD)>=95?'var(--green)':'var(--red)'}">${pctD}%</div><div class="kpi2-l">Disponível</div></div>
      <div class="kpi2"><div class="kpi2-v" style="color:${ind>0?'var(--red)':'var(--green)'}">${ind}</div><div class="kpi2-l">Em Manut.</div></div>
      <div class="kpi2"><div class="kpi2-v" style="color:${pctS&&parseFloat(pctS)>=99?'var(--green)':'var(--amber)'}">${pctS?pctS+'%':'—'}</div><div class="kpi2-l">Soltura</div></div>
      <div class="kpi2"><div class="kpi2-v" style="color:${lavE===lavT&&lavT>0?'var(--green)':'var(--blue)'}">${lavT>0?lavE+'/'+lavT:'—'}</div><div class="kpi2-l">Lavagem</div></div>
    </div>
    <div class="card">
      <div style="font-size:12px;color:var(--text3)">${agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Manaus'})} · ${agora.toLocaleDateString('pt-BR',{weekday:'long',timeZone:'America/Manaus'})}</div>
    <div class="card">
      <div style="font-size:12px;color:var(--text3)">${agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Manaus'})} · ${agora.toLocaleDateString('pt-BR',{weekday:'long',timeZone:'America/Manaus'})}</div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button onclick="S.turno='dia';telaHome()" style="flex:1;padding:8px;border-radius:8px;border:1px solid ${S.turno==='dia'?'var(--blue)':'var(--border)'};background:${S.turno==='dia'?'#2563EB18':'transparent'};color:${S.turno==='dia'?'var(--blue)':'var(--text3)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">☀️ Dia</button>
        <button onclick="S.turno='noite';telaHome()" style="flex:1;padding:8px;border-radius:8px;border:1px solid ${S.turno==='noite'?'var(--blue)':'var(--border)'};background:${S.turno==='noite'?'#2563EB18':'transparent'};color:${S.turno==='noite'?'var(--blue)':'var(--text3)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">🌙 Noite</button>
      </div>
    </div>
    <div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px">
      <button onclick="abrirRelatorioManual()" style="width:100%;padding:13px;border-radius:12px;border:1px solid #2563EB40;background:#2563EB10;color:var(--blue);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        📄 Relatório Recolha & Abastecimento
      </button>
      <button onclick="abrirRelatorioSoltura()" style="width:100%;padding:13px;border-radius:12px;border:1px solid #8B5CF640;background:#8B5CF610;color:#8B5CF6;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        🚌 Relatório de Soltura
      </button>
    </div>`);
}

// ── LAVAGEM (Lavador) ─────────────────────────────────────
const CK_LAV_M={
  simples:['Varrer interior','Secar carroceria','Limpar vidros externos','Pano no cockpit','Limpar balaustre'],
  pesada:['Varrer interior','Secar carroceria','Limpar vidros externos','Pano no cockpit','Limpar balaustre','Lavar chassis','Vidros internos','Teto interno'],
};
// Checklist de VISTORIA PESADA (Líder Pátio após lavagem pesada)
const CK_VISTORIA_PESADA=[
  'Carroceria sem resíduos de sabão',
  'Chassis limpo (sem barro/graxa)',
  'Rodas e pneus limpos',
  'Para-brisas e vidros externos limpos',
  'Vidros internos limpos',
  'Teto interno sem poeira',
  'Cockpit e painel limpos',
  'Balaustre e corrimão limpos',

let _sid='',_sdata=hoje(),_sLista=[],_sDatas=[],_sloFiltro='';

function selFiltroSoltura(tipo){
  // Ciclo: nenhum → pendentes → OK → nenhum
  // Primeiro toque mostra PENDENTES (não recolhidos / não abastecidos)
  if(_sloFiltro==='no'+tipo) _sloFiltro=tipo;         // norec → rec
  else if(_sloFiltro===tipo) _sloFiltro='';            // rec → ''
  else _sloFiltro='no'+tipo;                           // '' → norec

  // Limpar busca de texto
  const bs=document.getElementById('busca-sol');
  if(bs) bs.value='';

  // Atualizar visual dos painéis SEM re-renderizar a tela toda
  _atualizarPaineisFiltro();

  // Aplicar filtro nos cards já renderizados
  filtrarSoltura('');
}

function _atualizarPaineisFiltro(){
  const pr=document.getElementById('painel-rec');
  const pa=document.getElementById('painel-ab');
  const nRec=window._recMap?.size||0;
  const nAb=window._abMap?.size||0;
  const tot=_sLista?.length||0;

  if(pr){
    const ativo=_sloFiltro==='rec';
    const ativoNeg=_sloFiltro==='norec';
    pr.style.background=ativo?'#00C48C18':ativoNeg?'#EF444418':'#EF444412';
    pr.style.border='2px solid '+(ativo?'#00C48C60':ativoNeg?'#EF444460':nRec>0?'#00C48C40':'#EF444430');
    const label=pr.querySelector('div:last-child');
    if(label){
      label.textContent=ativo?'✅ mostrando recolhidos':ativoNeg?'❌ mostrando pendentes':'toque para filtrar';
      label.style.color=ativo?'var(--green)':ativoNeg?'var(--red)':'var(--text4)';
    }
  }
  if(pa){
    const ativo=_sloFiltro==='ab';
    const ativoNeg=_sloFiltro==='noab';
    pa.style.background=ativo?'#00C48C18':ativoNeg?'#EF444418':'#EF444412';
    pa.style.border='2px solid '+(ativo?'#00C48C60':ativoNeg?'#EF444460':nAb>0?'#00C48C40':'#EF444430');
    const label=pa.querySelector('div:last-child');
    if(label){
      label.textContent=ativo?'✅ mostrando abastecidos':ativoNeg?'❌ mostrando pendentes':'toque para filtrar';
      label.style.color=ativo?'var(--green)':ativoNeg?'var(--red)':'var(--text4)';
    }
  }
}

async function telaSoltura(dataFiltro=null){
  const gid=getGid();
  if(dataFiltro){_sdata=dataFiltro;_sloFiltro='';}
  else if(!_sdata) _sdata=hoje();

  // Busca datas disponíveis na escala (últimos 3 dias + próximos 3)
  const base=new Date();
  const datas=[];
  for(let i=-2;i<=3;i++){
    const d=new Date(base);d.setDate(d.getDate()+i);
    datas.push(d.toISOString().split('T')[0]);
  }
  const{data:datasDisp}=await sb.from('soltura_2_10')
    .select('data').eq('garagem_id',gid).in('data',datas);
  const datasComEscala=[...new Set((datasDisp||[]).map(r=>r.data))].sort();

  // Se a data atual não tem escala, usa hoje
  if(datasComEscala.length&&!datasComEscala.includes(_sdata)){
    _sdata=datasComEscala.includes(hoje())?hoje():datasComEscala[datasComEscala.length-1];
  }

  const{data:lista}=await sb.from('soltura_2_10').select('*')
    .eq('garagem_id',gid).eq('data',_sdata).order('horario_programado');

  // Busca recolhas e abastecimentos — direto da soltura_2_10 (campo recolhido)
  // e da tabela de abastecimento
  let recSet=new Set(), abSet=new Set();
  let recHoraMap=new Map(), abHoraMap=new Map();
  // Indicadores: lê recolhido/abastecido direto dos campos da soltura
  (lista||[]).forEach(r=>{
    if(r.recolhido===true){
      recSet.add(r.prefixo);
      if(r.recolhido_em){
        try{recHoraMap.set(r.prefixo,new Date(r.recolhido_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));}catch(e){}
      }
    }
    if(r.abastecido===true){
      abSet.add(r.prefixo);
      if(r.abastecido_em){
        try{abHoraMap.set(r.prefixo,new Date(r.abastecido_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));}catch(e){}
      }
    }
  });
  // Fallback abastecimento: lê tanto da data selecionada quanto do dia anterior
  // (frentista abastece hoje à noite para a escala de amanhã)
  try{
    const dAnterior=new Date(_sdata+'T12:00:00');dAnterior.setDate(dAnterior.getDate()-1);
    const dAnteriorStr=dAnterior.toISOString().split('T')[0];
    const{data:a}=await sb.from('abastecimento_checklist').select('prefixo,horario,data')
      .eq('garagem_id',gid).in('data',[_sdata,dAnteriorStr]);
    if(a){a.forEach(x=>{abSet.add(x.prefixo);if(x.horario&&!abHoraMap.has(x.prefixo))abHoraMap.set(x.prefixo,x.horario);});}
  }catch(e){}
  window._recMap=recSet;
  window._abMap=abSet;
  window._recHoraMap=recHoraMap;
  window._abHoraMap=abHoraMap;

  _sLista=lista||[];
  _sDatas=datasComEscala;
  renderSoltura(_sLista,'',datasComEscala);

  // Atualiza automaticamente a cada 30s (zona do manobrista aparece em tempo real)
  clearInterval(window._solturaTimer);
  window._solturaTimer=setInterval(async()=>{
    if(S.tela!=='soltura') return clearInterval(window._solturaTimer);
    const{data:atualizado}=await sb.from('soltura_2_10').select('*')
      .eq('garagem_id',gid).eq('data',_sdata).order('horario_programado');
    if(atualizado){
      _sLista=atualizado;
      const busca=document.getElementById('busca-sol')?.value||'';
      filtrarSoltura(busca);
    }
  },30000);
}

    const pb=b.saiu===true?2:b.saiu===false?1:0;
    if(pa!==pb) return pa-pb;
    return (a.horario_programado||'').localeCompare(b.horario_programado||'');
  });
  const filtrada=busca
    ?ordenada.filter(r=>r.prefixo?.includes(busca.toUpperCase())||r.horario_programado?.includes(busca)||r.motorista?.toLowerCase().includes(busca.toLowerCase()))

    const recOk=window._recMap?.has(r.prefixo);
    const abOk=window._abMap?.has(r.prefixo);

    const abHora=window._abHoraMap?.get(r.prefixo);
    return`<div class="vcard ${d?'done':n?'nok':''}" onclick="abrirSol('${r.id}','${r.prefixo}','${r.horario_programado||''}','${r.linha||''}','${r.motorista||''}')">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="prefixo">${r.prefixo}</div>
          ${r.prefixo_reserva?`<span style="font-size:9px;color:var(--amber);font-weight:700;border:1px solid #F59E0B40;background:#F59E0B18;border-radius:4px;padding:1px 5px">🔄 ${r.prefixo_reserva}</span>`:''}
          ${reserva&&!r.prefixo_reserva?`<span style="font-size:9px;color:var(--purple);font-weight:700;border:1px solid #8B5CF640;background:#8B5CF618;border-radius:4px;padding:1px 5px">RESERVA</span>`:''}
          ${zonaObj?`<span style="font-size:9px;font-weight:700;border:1px solid ${zonaObj.cor}40;background:${zonaObj.cor}18;color:${zonaObj.cor};border-radius:4px;padding:1px 6px">${zonaObj.nome}</span>`:
          `<span style="font-size:9px;color:var(--red);font-weight:700;border:1px solid #EF444430;background:#EF444410;border-radius:4px;padding:1px 6px">Sem zona</span>`}
        </div>
        <div class="vcard-sub">${r.horario_programado||'—'} · ${r.linha||'—'}</div>
        <div class="vcard-sub" style="display:flex;gap:8px;flex-wrap:wrap">
          ${r.motorista_fim&&r.motorista_fim!==r.motorista
            ? `<span style="color:var(--text4)">${r.motorista?.split(' ').slice(0,2).join(' ')||'—'}</span><span style="color:var(--amber)">→ ${r.motorista_fim.split(' ').slice(0,2).join(' ')} <span style="font-size:9px;background:#F59E0B18;border:1px solid #F59E0B40;border-radius:3px;padding:0 3px">${r.motivo_troca||'Troca'}</span></span>`

// Navegação de data — recalcula dinamicamente
function navData(dir){
  const base = new Date(_sdata+'T12:00:00');
  if(dir===0){ _sdata=hoje(); }
  else { base.setDate(base.getDate()+dir); _sdata=base.toISOString().split('T')[0]; }
  telaSoltura(_sdata);
}

// Busca sem re-renderizar tudo — só atualiza os cards
function filtrarSoltura(busca){
  const lista=_sLista||[];
  // Pendentes primeiro, validados no final
  const ordenada=[...lista].sort((a,b)=>{
    const pa=a.saiu===true?2:a.saiu===false?1:0;
    const pb=b.saiu===true?2:b.saiu===false?1:0;
    if(pa!==pb) return pa-pb;
    return (a.horario_programado||'').localeCompare(b.horario_programado||'');
  });
  const filtrada=busca
    ?ordenada.filter(r=>r.prefixo?.includes(busca.toUpperCase())||r.horario_programado?.includes(busca)||r.motorista?.toLowerCase().includes(busca.toLowerCase()))
    :_sloFiltro==='rec'   ?ordenada.filter(r=> window._recMap?.has(r.prefixo))
    :_sloFiltro==='norec' ?ordenada.filter(r=>!window._recMap?.has(r.prefixo))
    :_sloFiltro==='ab'    ?ordenada.filter(r=> window._abMap?.has(r.prefixo))
    :_sloFiltro==='noab'  ?ordenada.filter(r=>!window._abMap?.has(r.prefixo))
    :ordenada;

  const TIPO_C={simples:'#3B82F6',pesada:'#10B981'};
  const cards=filtrada.map(r=>{
    const d=r.saiu===true,n=r.saiu===false;
    const reserva=r.observacao?.startsWith('Reserva:');
    const zonaObj=r.zona_patio?ZONAS.find(z=>z.z===r.zona_patio):null;
    return`<div class="vcard ${d?'done':n?'nok':''}" onclick="abrirSol('${r.id}','${r.prefixo}','${r.horario_programado||''}','${r.linha||''}','${(r.motorista||'').replace(/'/g,'')}')">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="prefixo">${r.prefixo}</div>
          ${reserva?`<span style="font-size:9px;color:var(--purple);font-weight:700;border:1px solid #8B5CF640;background:#8B5CF618;border-radius:4px;padding:1px 5px">RESERVA</span>`:''}
          ${zonaObj?`<span style="font-size:9px;font-weight:700;border:1px solid ${zonaObj.cor}40;background:${zonaObj.cor}18;color:${zonaObj.cor};border-radius:4px;padding:1px 6px">${zonaObj.nome}</span>`:''}
        </div>
        <div class="vcard-sub">${r.horario_programado||'—'} · ${r.linha||'—'}</div>
        <div class="vcard-sub" style="display:flex;gap:8px">
          <span>${r.motorista?.split(' ').slice(0,2).join(' ')||'—'}${d&&r.horario_real?' · ✅'+r.horario_real:''}</span>
          ${r.manobrista?`<span style="color:var(--text4)">🚗 ${r.manobrista.split(' ')[0]}</span>`:''}
        </div>
      </div>
      <div class="btn-ck ${d?'ok':n?'nok':''}">${d?'✅':n?'❌':'○'}</div>
    </div>`;
  }).join('');

  const el=document.getElementById('cards-sol');
  const ct=document.getElementById('sl-count');
  if(el) el.innerHTML=cards||'<div style="padding:20px;text-align:center;color:var(--text3)">Nenhum resultado</div>';
  if(ct) ct.textContent=filtrada.length+(busca?' resultado(s)':' veículo(s)');
}

async function confirmarTrocaMotorista(motoristaAnterior){
  const solId=window._trocaMotId;
  const prefixo=window._trocaMot_prefixo;
  const novoMotorista=document.getElementById('tm-matricula')?.value?.trim();
  const motivo=document.getElementById('tm-motivo')?.value||'Outro';

  if(!novoMotorista){toast('Informe a matrícula ou nome do motorista','err');return;}

  // Grava o motivo e novo motorista — mantém motorista original no campo principal
  // motorista_fim = quem efetivamente saiu (o substituto)
  // motorista = quem estava escalado originalmente (não altera)
  const obs=`Troca motorista (${motivo}): ${motoristaAnterior||'—'} → ${novoMotorista}`;
  await sb.from('soltura_2_10').update({
    motorista_fim: novoMotorista,   // substituto que saiu de fato
    motivo_troca: motivo,           // falta / atraso / acidente / outro
    observacao: obs,
    // motorista (original) NÃO é alterado — fica registrado quem era o escalado
  }).eq('id',solId);

  closeSheet(true);
  toast(`👤 Troca registrada: ${novoMotorista} (${motivo})`);
  telaSoltura();
}

async function confirmarFechamento(){
  const btn=document.querySelector('#shbody button[onclick="confirmarFechamento()"]');
  if(btn){btn.textContent='Salvando...';btn.disabled=true;}

  const obs=document.getElementById('obs-turno')?.value?.trim();
  const saiu=_sLista.filter(r=>r.saiu===true).length;
  const pct=_sLista.length?Math.round(saiu/_sLista.length*100):0;
  const gid=getGid();

  // Tenta gravar — responsavel_id opcional para evitar FK error
  const payload={
    garagem_id:gid,
    turno:S.turno||'dia',
    data:_sdata,
    responsavel_nome:S.perfil?.nome||'—',
    status_geral:pct>=99?'ok':pct>=90?'parcial':'nok',
    op_soltura:saiu,
    op_obs:obs||null,
  };

  // Tenta com responsavel_id primeiro
  let{error}=await sb.from('fechamento_turno_garagem').insert({...payload,responsavel_id:S.perfil?.id});
  // Se falhar por FK, tenta sem
  if(error?.message?.includes('responsavel_id')||error?.message?.includes('foreign key')){
    const r2=await sb.from('fechamento_turno_garagem').insert(payload);

  if(error){
    toast('Erro: '+error.message,'err');
    if(btn){btn.textContent='⚠️ Tentar Novamente';btn.disabled=false;}
    return;
  }

  closeSheet(true);
  toast('✅ Turno fechado!');
  telaSoltura(_sdata);
}

async function confirmarFechamentoAbastecimento(){
  const gid=getGid();
  // Pega a data do campo editável no sheet
  const dataGravar=document.getElementById('fa-data')?.value||hoje();
  const obs=document.getElementById('obs-abast')?.value?.trim()||null;

  // Bloquear botão — busca pelo id
  const btn=document.getElementById('btn-fechar-ab');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  try{
    const{data:abast,error:errBusca}=await sb.from('abastecimento_checklist')
      .select('*').eq('garagem_id',gid).eq('data',dataGravar);
    if(errBusca) throw errBusca;

    const lista=abast||[];
    const totLitros=lista.reduce((s,a)=>s+(parseFloat(a.litros)||0),0);
    const totArla=lista.filter(a=>a.arla).reduce((s,a)=>s+(parseFloat(a.arla_litros)||0),0);

    const{error}=await sb.from('fechamento_abastecimento').insert({
      garagem_id:gid,
      data:dataGravar,
      total_veiculos:lista.length,
      total_litros:totLitros,
      total_arla:totArla||null,
      total_frota:_abFrotaLista.length||null,
      pct_frota:_abFrotaLista.length?Math.round((lista.length/_abFrotaLista.length)*100):null,
      responsavel_nome:S.perfil?.nome||null,
      responsavel_id:S.perfil?.id||null,
      observacao:obs,
      detalhes:lista,
    });
    if(error) throw error;

    // Limpa todos os registros de hoje após arquivar
    // Deleta pelos IDs exatos que foram arquivados — mais seguro que filtro de data
    const ids=lista.map(a=>a.id).filter(Boolean);
    if(ids.length){
      const{error:errDel}=await sb.from('abastecimento_checklist')
        .delete().in('id',ids);
      if(errDel) throw new Error('Arquivado mas erro ao limpar: '+errDel.message);
    }

    closeSheet(true);
    toast(`✅ Arquivado! ${lista.length} veículos · ${totLitros.toLocaleString('pt-BR',{minimumFractionDigits:1})}L — Gerando relatório...`);

    // Gerar e enviar relatório de fechamento (recolha + abastecimento)
    await gerarRelatorioFechamento(gid, dataGravar, lista);
    telaAbastecimento();
  }catch(e){
    toast('❌ '+e.message,'err');
    if(btn){btn.disabled=false;btn.textContent='💾 Arquivar Turno de Abastecimento';}
  }
}

async function telaOficina(){
  const gid=getGid();
  const{data:ocs}=await sb.from('ocorrencias_22').select('*').eq('garagem_id',gid).neq('status','liberado').order('hora_entrada',{ascending:true});

    return}
  const agora=new Date();
  const SC={em_manutencao:{c:'var(--amber)',l:'Manutenção'},aguardando_peca:{c:'var(--red)',l:'Ag. Peça'},aguardando_aprovacao:{c:'var(--purple)',l:'Ag. Aprovação'}};
  const cards=ocs.map(o=>{
    const st=SC[o.status]||{c:'var(--text3)',l:o.status};

        ${o.mecanico?`<span>👤 ${o.mecanico.split(' ')[0]}</span>`:''}
        ${venc?'<span style="color:var(--red)">🔴 Vencida</span>':''}

  }).join('');
  render(`<div class="sl">${ocs.length} OS em aberto</div>${cards}`);

    document.getElementById('content').insertAdjacentHTML('beforeend','<button class="fab" onclick="abrirNovaOS()">＋</button>');

        }).join('')}

  render(`

function filtrarCarrosPatio(busca){

  lista.forEach(el=>{
    const prefixo=el.dataset.prefixo||'';
    el.style.display=prefixo.includes(busca.toUpperCase())||!busca?'flex':'none';

  // Também atualiza o hidden input se digitou direto
  const inp=document.getElementById('mp-prefixo');
  if(inp&&busca.length>=4) inp.value=busca.toUpperCase();
}

// ── RECOLHA (Plantão / Porteiro) ──────────────────────────
// ══════════════════════════════════════════════════════════
// RECOLHA (Plantão) — usa escala do próximo dia como referência
// ══════════════════════════════════════════════════════════
let _rcData=hoje(), _rcEscalaData='', _rcEscalaLista=[];

async function telaRecolha(dataFiltro=null){
  const gid=getGid();
  if(dataFiltro) _rcData=dataFiltro;

  setMain('<div class="loading"><div class="sp"></div></div>');

  // Plantão: exibe a próxima escala disponível (D+1 ou a mais próxima futura)
  // Grava flag recolhido na soltura da data selecionada
  const hojeStr=hoje();

  // Busca datas com escala disponíveis (hoje + próximos 7 dias)
  const datasAlvoRc=[];
  for(let i=0;i<=7;i++){const d=new Date();d.setDate(d.getDate()+i);datasAlvoRc.push(d.toISOString().split('T')[0]);}
  const{data:escalasDispRc}=await sb.from('soltura_2_10').select('data')
    .eq('garagem_id',gid).in('data',datasAlvoRc);
  const datasComEscalaRc=[...new Set((escalasDispRc||[]).map(r=>r.data))].sort();

  // Seleciona D+1 por padrão, ou a próxima disponível
  if(!_rcEscalaData||!datasComEscalaRc.includes(_rcEscalaData)){
    const proxFutRc=datasComEscalaRc.find(d=>d>hojeStr)||datasComEscalaRc[0]||datasAlvoRc[1];
    _rcEscalaData=proxFutRc;
  }
  window._rcSolturaData=_rcEscalaData;

  // Chips de navegação para o plantão
  const _chipsRc=datasComEscalaRc.map(d=>{
    const ativo=d===_rcEscalaData;
    const dFmt=new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
    const diff=Math.round((new Date(d+'T12:00:00')-new Date(hojeStr+'T12:00:00'))/(86400000));
    const lbl=diff===0?'Hoje':diff===1?'D+1':diff>1?'D+'+diff:'D'+diff;
    return`<button onclick="_rcEscalaData='${d}';window._rcSolturaData='${d}';telaRecolha()" style="flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid ${ativo?'#8B5CF6':'var(--border)'};background:${ativo?'#8B5CF618':'transparent'};color:${ativo?'#8B5CF6':'var(--text3)'};font-size:11px;font-weight:${ativo?'700':'500'};font-family:inherit;cursor:pointer;white-space:nowrap">${lbl} · ${dFmt}</button>`;
  }).join('');

  // Busca escala da data selecionada
  const{data:escala}=await sb.from('soltura_2_10').select('prefixo,linha,motorista,motorista_fim,horario_programado,horario_fim')
    .eq('garagem_id',gid).eq('data',_rcEscalaData).order('horario_programado');
  let recolhas=[];
  try{
    const{data:r}=await sb.from('recolha_checklist').select('*')
      .eq('garagem_id',gid).eq('data_recolha',_rcEscalaData).order('created_at',{ascending:false});
    if(r) recolhas=r;
  }catch(e){}
  _rcEscalaLista=escala||[];

  // Mapa de recolhas por prefixo
  const recMap={};(recolhas||[]).forEach(r=>{recMap[r.prefixo]=r;});
  // Mapa de abastecimento por prefixo
  let abastMap={};
  try{
    const{data:abast}=await sb.from('abastecimento_checklist').select('prefixo,litros,arla').eq('garagem_id',gid).eq('data',_rcEscalaData);
    if(abast) abast.forEach(a=>{abastMap[a.prefixo]=a;});
  }catch(e){}

  const tot=Object.keys(recMap).length;
  const totEscala=_rcEscalaLista.length;
  const pct=totEscala>0?Math.round((tot/totEscala)*100):0;

  // Chips de seleção de escala referência
  const chipsEscala=_chipsRc||'';

  // Lista de carros da escala — ordenada por horario_fim (último a voltar primeiro)
  const escalaSorted=[..._rcEscalaLista].sort((a,b)=>{
    const hA=a.horario_fim||a.horario_programado||'00:00';

        </div>

      </div>

      <div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}"></div></div>
      <div style="margin-top:5px;font-size:11px;color:var(--text3)">

function filtrarRecolha(busca){
  const lista=_rcEscalaLista||[];
  const filtrada=busca?lista.filter(r=>r.prefixo?.includes(busca.toUpperCase())||r.linha?.toLowerCase().includes(busca.toLowerCase())||r.motorista?.toLowerCase().includes(busca.toLowerCase())):lista;
  // Só atualiza o contador — a lista é static após render
  const sl=document.getElementById('sl-recolha');
  if(sl) sl.textContent=filtrada.length+' veículo(s)';
  // Filtra os cards
  document.querySelectorAll('#cards-recolha .vcard').forEach((el,i)=>{
    const prefixo=el.querySelector('.prefixo')?.textContent||'';
    const sub=el.querySelectorAll('.vcard-sub');
    const linha=sub[0]?.textContent||'';
    const mot=sub[1]?.textContent||'';
    const show=!busca||prefixo.includes(busca.toUpperCase())||linha.toLowerCase().includes(busca.toLowerCase())||mot.toLowerCase().includes(busca.toLowerCase());
    el.style.display=show?'flex':'none';
  });
}

async function salvarRecolha(linhaRef='',motoristaRef='',horarioRef=''){
  const prefixo=document.getElementById('rc-prefixo')?.value?.trim().toUpperCase();
  const km=parseInt(document.getElementById('rc-km')?.value||'0')||null;
  const externo=document.getElementById('rc-ext')?.value||'ok';
  const interno=document.getElementById('rc-int')?.value||'ok';
  const obs=document.getElementById('rc-obs')?.value?.trim()||null;
  const gid=getGid();

  if(!prefixo){toast('Informe o prefixo','err');return;}

  const agora=new Date();
  const horarioReal=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const status=externo==='avaria'||interno==='avaria'?'avaria':'recebido';
  // Usa sempre _rcEscalaData como referência — data da escala que está sendo visualizada
  // Isso garante consistência quando vários plantonistas usam o app ao mesmo tempo
  const dataGravar=_rcEscalaData||hoje();

  // Busca veiculo_id
  let veiId=null;
  try{
    const{data:vei}=await sb.from('frota').select('id').eq('garagem_id',gid).eq('prefixo',prefixo).maybeSingle();
    veiId=vei?.id||null;
  }catch(e){}

  // Insere na recolha_checklist
  const{error}=await sb.from('recolha_checklist').insert({
    garagem_id:gid,
    prefixo,
    veiculo_id:veiId,
    data_recolha:dataGravar,
    horario_real:horarioReal,
    horario_previsto:horarioRef||null,
    motorista:motoristaRef||null,
    linha:linhaRef||null,
    km_hodometro:km||null,
    visual_externo:externo,
    visual_interno:interno,
    observacao:obs||null,
    status,
    plantao_nome:S.perfil?.nome||null,
    plantao_id:S.perfil?.id||null,
  });

  if(error){toast('Erro: '+error.message,'err');return;}

  // Marca frota disponível se OK
  if(status==='recebido'&&veiId){
    await sb.from('frota').update({status:'disponivel'}).eq('id',veiId);
  }

  // Marca recolhido na soltura_2_10 da data da escala selecionada
  if(dataGravar&&status==='recebido'){
    await sb.from('soltura_2_10').update({
      recolhido:true,
      recolhido_em:agora.toISOString(),
      recolhido_por:S.perfil?.nome,
      km_recolha:km||null,
    }).eq('garagem_id',gid).eq('prefixo',prefixo).eq('data',dataGravar);
  }

  closeSheet(true);
  toast(status==='recebido'?`✅ ${prefixo} recolhido!`:`⚠️ ${prefixo} com avaria`);
  telaRecolha();
}

let _abFrotaLista=[], _abBuscaAtiva='';

async function telaAbastecimento(){
  const gid=getGid();
  setMain('<div class="loading"><div class="sp"></div></div>');

  // Frentista: lista TODA a frota — sem escala, sem chips de data
  const hojeStrAb=hoje();

  // Busca toda a frota da garagem
  let frotaRaw=[];
  try{
    const{data:f1}=await sb.from('frota').select('prefixo,modelo,tipo,status')
      .eq('garagem_id',gid).order('prefixo');
    if(f1?.length) frotaRaw=f1;
  }catch(e){}

  // Fallback: se frota vazia, monta lista a partir da soltura_2_10 (últimos 30 dias)
  if(!frotaRaw.length){
    try{
      const d30=new Date();d30.setDate(d30.getDate()-30);
      const d30str=d30.toISOString().split('T')[0];
      const{data:sol}=await sb.from('soltura_2_10').select('prefixo')
        .eq('garagem_id',gid).gte('data',d30str);
      const prefixosUnicos=[...new Set((sol||[]).map(s=>s.prefixo))].sort();
      frotaRaw=prefixosUnicos.map(p=>({prefixo:p,modelo:'',tipo:''}));
    }catch(e){}
  }
  _abFrotaLista=frotaRaw;

  // Abastecimentos já feitos: busca hoje E ontem (turno noturno cruza a meia-noite)
  let abastMap={};
  try{
    const ontem=new Date();ontem.setDate(ontem.getDate()-1);
    const ontemStr=ontem.toISOString().split('T')[0];
    const{data:abast}=await sb.from('abastecimento_checklist').select('*')
      .eq('garagem_id',gid).in('data',[hojeStrAb,ontemStr]).order('created_at',{ascending:false});
    // abastMap: último por prefixo (mais recente prevalece)
    if(abast) abast.forEach(a=>{if(!abastMap[a.prefixo])abastMap[a.prefixo]=a;});
  }catch(e){}

  const tot=Object.keys(abastMap).length;
  const totFrota=_abFrotaLista.length;
  const pct=totFrota>0?Math.round((tot/totFrota)*100):0;
  const dataFmt=new Date(hojeStrAb+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'});

  const cards=_abFrotaLista.map(e=>{
    const ab=abastMap[e.prefixo];
    return`<div class="vcard ${ab?'done':''}" onclick="abrirAbastecimento('${e.prefixo}','')">
      <div style="flex:1">
        <div class="prefixo" style="color:${ab?'var(--green)':'var(--text)'}">${e.prefixo}</div>
        ${(e.modelo||e.tipo)?`<div class="vcard-sub" style="color:var(--text3)">${e.modelo||e.tipo}</div>`:``}
        ${ab?`<div class="vcard-sub" style="color:var(--green)">⛽ ${ab.litros}L${ab.arla_litros?' · ARLA '+ab.arla_litros+'L':''}${ab.km_hodometro?' · 📍'+ab.km_hodometro.toLocaleString()+'km':''}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="min-width:72px;height:22px;border-radius:5px;border:2px solid ${ab?'var(--green)':'var(--red)'};background:${ab?'#00C48C18':'#EF444410'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${ab?'var(--green)':'var(--red)'}">Abastec.</div>
        <span style="font-size:8px;font-weight:700;color:${ab?'var(--green)':'var(--red)'}">${ab?ab.horario||'✓':'—'}</span>
      </div>
    </div>`;
  }).join('');

  render(`
    <div style="padding:14px 14px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-weight:800;font-size:17px">⛽ Abastecimento</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Toda a frota · ${dataFmt}</div>
        </div>
        <button onclick="telaAbastecimento()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer">🔄</button>
      </div>
      <div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--text3);margin-bottom:10px">
        <span>⛽ ${tot} abastecidos hoje</span><span>${pct}%</span>
      </div>
      <div style="position:relative">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>
        <input type="text" placeholder="Buscar prefixo..." oninput="filtrarAbastecimento(this.value)"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 10px 10px 32px;color:var(--text);font-size:13px;font-family:inherit;outline:none">
      </div>
    </div>
    <div class="sl" id="sl-abast">${totFrota} veículo(s) · ${tot} abastecidos hoje</div>
    ${tot>0&&['lider_patio','supervisor','lider_oficina','coordenador'].includes(cargo())?`<div style="padding:14px 14px 0">
      <button onclick="fecharTurnoAbastecimento()" style="width:100%;padding:14px;border-radius:12px;border:1px solid ${pct>=99?'#00C48C40':'#2563EB40'};background:${pct>=99?'#00C48C18':'#2563EB18'};color:${pct>=99?'var(--green)':'var(--blue)'};font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">
        ${pct>=99?'✅ Fechar & Arquivar Abastecimento':'💾 Salvar & Arquivar ('+tot+' abastecidos)'}
      </button>
    </div>`:''}
    ${tot>0&&!['lider_patio','supervisor','lider_oficina','coordenador'].includes(cargo())?`<div style="padding:0 14px"><div style="font-size:11px;color:var(--text3);background:var(--surface2);border-radius:8px;padding:8px 10px;text-align:center">⏳ Arquivamento pelo Líder de Pátio</div></div>`:''}
    <div id="cards-abast">${cards}</div>
  `);
  document.getElementById('content').insertAdjacentHTML('beforeend',
    `<button class="fab" onclick="abrirAbastecimento('','')">＋</button>`);
}

async function salvarAbastecimento(){
  // Coleta campos
  const prefixo=(document.getElementById('ab-prefixo')?.value||'').trim().toUpperCase();
  const litrosRaw=document.getElementById('ab-litros')?.value||'';
  const kmRaw=document.getElementById('ab-km')?.value||'';
  const arlaVal=document.getElementById('ab-arla')?.value||'nao';
  const arlaLitrosRaw=document.getElementById('ab-arla-litros')?.value||'';

  const litros=litrosRaw?parseFloat(litrosRaw):null;
  const km=kmRaw?parseInt(kmRaw):null;
  const arla=arlaVal==='sim';
  const arlaLitros=arla&&arlaLitrosRaw?parseFloat(arlaLitrosRaw):null;

  const gid=getGid();

  // Validações com feedback claro
  if(!gid){toast('❌ Erro: garagem não identificada','err');return;}
  if(!prefixo){toast('❌ Informe o prefixo do veículo','err');return;}
  if(!litros||litros<=0){toast('❌ Informe os litros abastecidos','err');return;}

  // Bloquear duplo clique
  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  const agora=new Date();
  const horario=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const dataGravar=hoje();

  // Busca veiculo_id (não bloqueia se não achar)
  let veiId=null;
  try{
    const{data:vei}=await sb.from('frota').select('id')
      .eq('garagem_id',gid).eq('prefixo',prefixo).maybeSingle();
    veiId=vei?.id||null;
  }catch(e){}

  // Insere na tabela
  const{error}=await sb.from('abastecimento_checklist').insert({
    garagem_id:gid,
    prefixo,
    veiculo_id:veiId,
    data:dataGravar,
    litros,
    arla,
    arla_litros:arlaLitros,
    km_hodometro:km,
    frentista_nome:S.perfil?.nome||null,
    frentista_id:S.perfil?.id||null,
    horario,
  });

  if(error){
    toast('❌ '+error.message,'err');
    console.error('[abastecimento]',error);
    if(btn){btn.disabled=false;btn.textContent='⛽ Confirmar Abastecimento';}
    return;
  }

  // Tenta marcar flag abastecido na soltura_2_10 —
  // Turno noturno: abastecimento do dia 14 abastece carros que saem no dia 15.
  // Buscamos a escala MAIS PRÓXIMA: hoje ou amanhã (janela de 2 dias).
  try{
    const d0=hoje(); // hoje
    const d1=new Date();d1.setDate(d1.getDate()+1);
    const d1str=d1.toISOString().split('T')[0]; // amanhã
    const datasAlvo=[d0,d1str];
    const{data:proxSoltura}=await sb.from('soltura_2_10').select('data')
      .eq('garagem_id',gid).eq('prefixo',prefixo).in('data',datasAlvo)
      .order('data').limit(1);
    if(proxSoltura?.[0]?.data){
      await sb.from('soltura_2_10').update({
        abastecido:true,
        abastecido_em:agora.toISOString(),
        abastecido_por:S.perfil?.nome,
      }).eq('garagem_id',gid).eq('prefixo',prefixo).eq('data',proxSoltura[0].data);
    }
  }catch(e){console.warn('[soltura flag abastecido]',e);}

  closeSheet(true);
  toast(`✅ ${prefixo} — ${litros}L${arla&&arlaLitros?' + ARLA '+arlaLitros+'L':''}${km?' · '+km.toLocaleString()+'km':''}`);
  telaAbastecimento();
}

  const{data:escalados}=await sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).eq('data',_sdata);
  const prefEsc=new Set((escalados||[]).map(e=>e.prefixo));
  const disponiveis=(frota||[]).filter(v=>!prefEsc.has(v.prefixo)&&v.prefixo!==prefixoAtual);

  openSheet(`🔄 Trocar ${prefixoAtual}`,`
    <div style="margin-bottom:10px;font-size:12px;color:var(--text3)">Substituindo: <strong style="color:var(--text);font-family:'DM Mono',monospace">${prefixoAtual}</strong></div>
    <div style="margin-bottom:10px">
      <label class="fl">Motivo da troca</label>
      <textarea id="troca-motivo" rows="2" placeholder="Ex: Manutenção preventiva, veículo reservado..."
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;margin-top:4px"></textarea>
    </div>
    <div style="position:relative;margin-bottom:8px">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>
      <input type="text" placeholder="Buscar reserva..." oninput="filtrarTrocaPrevia(this.value)"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 10px 10px 32px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;outline:none;text-transform:uppercase" oninput="this.value=this.value.toUpperCase();filtrarTrocaPrevia(this.value)">
    </div>
    <div id="lista-troca" style="max-height:45vh;overflow-y:auto">
      ${disponiveis.map(v=>`
        <div onclick="confirmarTrocaPrevia('${solId}','${v.prefixo}','${prefixoAtual}')" data-prefixo="${v.prefixo}"
          style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer">
          <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:16px;color:var(--blue)">${v.prefixo}</div>
          <div style="flex:1;font-size:12px;color:var(--text3)">${v.modelo||'—'}</div>
          <span style="font-size:10px;color:var(--green);font-weight:700">DISPONÍVEL</span>
        </div>`).join('')||'<div style="text-align:center;color:var(--text3);padding:20px">Nenhum carro disponível</div>'}
    </div>
  `);
  window._trocaDisponiveis=disponiveis;
}

function filtrarTrocaPrevia(busca){
  document.querySelectorAll('#lista-troca [data-prefixo]').forEach(el=>{
    el.style.display=!busca||el.dataset.prefixo.includes(busca.toUpperCase())?'flex':'none';
  });
}

async function confirmarTrocaPrevia(solId, novoPrefixo, prefixoOriginal){
  const motivo=document.getElementById('troca-motivo')?.value?.trim()||'Troca prévia';
  const{error}=await sb.from('soltura_2_10').update({
    prefixo:novoPrefixo,
    observacao:`Reserva: ${novoPrefixo} | Original: ${prefixoOriginal} | ${motivo}`,
  }).eq('id',solId);
  if(error){toast('Erro: '+error.message,'err');return;}
  closeSheet(true);
  toast(`🔄 ${prefixoOriginal} → ${novoPrefixo} (troca prévia)`);
  telaSoltura(_sdata);
}


// Seleciona opção nos botões de visual
function selOpt(fieldId, val, btn, cor){
  document.getElementById(fieldId).value=val;

  grupo.forEach(b=>{b.style.background='transparent';b.style.borderColor='var(--border)';b.style.color='var(--text3)';});

// Busca dados da escala ao digitar prefixo
let _rcTimer=null;
async function buscarEscalaRecolha(prefixo){
  if(prefixo.length<4) return;
  clearTimeout(_rcTimer);
  _rcTimer=setTimeout(async()=>{
    const gid=getGid();
    const{data:esc}=await sb.from('soltura_2_10').select('*')
      .eq('garagem_id',gid).eq('prefixo',prefixo).eq('data',hoje())
      .order('horario_programado',{ascending:false}).limit(1);
    const info=document.getElementById('rc-escala-info');
    const body=document.getElementById('rc-escala-body');
    if(!info||!body) return;
    if(esc?.length){
      const e=esc[0];
      info.style.display='block';
      body.innerHTML=`
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <span>🚌 ${e.linha||'—'}</span>
          <span>👤 ${e.motorista?.split(' ').slice(0,2).join(' ')||'—'}</span>
          <span>⏱ Prev. fim: ${e.horario_fim||e.horario_programado||'—'}</span>
          ${e.saiu===true?`<span style="color:var(--green)">✅ Saiu às ${e.horario_real||'—'}</span>`:''}
        </div>`;
      // Pré-preenche dados da escala
      window._rcEscala={motorista:e.motorista,linha:e.linha,horario_previsto:e.horario_fim||e.horario_programado};
    } else {
      info.style.display='block';
      body.innerHTML='<span style="color:var(--text4)">Não encontrado na escala de hoje</span>';
      window._rcEscala=null;
    }
  },600);
}

// Fluxo: Líder monta plano → Lavador confirma → Líder vistoria

let _lpData=(()=>{try{return sessionStorage.getItem('jtp_lpData')||hoje();}catch(e){return hoje();}})();
function setLpData(d){_lpData=d;try{sessionStorage.setItem('jtp_lpData',d);}catch(e){}}

async function telaLavPesada(){
  const gid=getGid();
  const data=_lpData;
  
  // Carregar plano do dia + frota (com ultima_lavagem) + preventivas do dia
  // Filtra cancelado/arquivado diretamente na query — não depende de filtro JS
  const[{data:plano},{data:frota},{data:prevHoje}]=await Promise.all([
    sb.from('checklist_lavagem').select('*').eq('garagem_id',gid).eq('data',data)
      .not('status','in','("cancelado","arquivado")').order('prefixo'),
    sb.from('frota').select('prefixo,modelo,ultima_lavagem').eq('garagem_id',gid).order('prefixo'),
    sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).eq('data',data),
  ]);
  
  window._lavLista=plano||[];
  const lista=window._lavLista;
  const prevSet=new Set((prevHoje||[]).map(p=>p.prefixo));
  
  const total=lista.length;
  const lavados=lista.filter(l=>l.status==='executado').length;
  const vistoriados=lista.filter(l=>l.validado_patio).length;
  const pct=total>0?Math.round(lavados/total*100):0;
  const dataFmt=new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'});

  // Cards do plano
  const cards=lista.map(r=>{
    const lavado=r.status==='executado';
    const vistoriado=r.validado_patio;
    const emPrev=prevSet.has(r.prefixo);
    
    let statusCor='var(--text3)';
    let statusTxt='⏳ Aguardando';
    let statusBg='var(--surface2)';
    if(vistoriado){statusCor='var(--green)';statusTxt='✅ Vistoriado';statusBg='#00C48C08';}
    else if(lavado){statusCor='var(--blue)';statusTxt='🚿 Lavado';statusBg='#2563EB08';}
    
    var _idx=lista.indexOf(r);
    var oc2='onclick="abrirCardLavPesada('+_idx+')"';
    return '<div class="vcard" '+oc2+' style="background:'+statusBg+';border-left:3px solid '+statusCor+'">'
      +'<div style="flex:1">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<div class="prefixo" style="color:'+statusCor+'">'+r.prefixo+'</div>'
      +(emPrev?'<span style="font-size:9px;background:#8B5CF618;border:1px solid #8B5CF640;color:#8B5CF6;border-radius:4px;padding:1px 6px;font-weight:700">PREVENTIVA</span>':'')
      +(r.tipo_lavagem==='pesada'?'<span style="font-size:9px;background:#F59E0B18;border:1px solid #F59E0B40;color:var(--amber);border-radius:4px;padding:1px 6px;font-weight:700">PESADA</span>':'')
      +'</div>'
      +'<div class="vcard-sub">'+statusTxt+(r.executado_por?' · '+r.executado_por.split(' ')[0]:'')+'</div>'
      +(r.validado_por?'<div class="vcard-sub" style="color:var(--green);font-size:10px">✅ Vistoria: '+r.validado_por.split(' ')[0]+(r.validado_em?' '+new Date(r.validado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'')+'</div>':'')
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;gap:4px">'
      +'<div style="width:36px;height:36px;border-radius:10px;border:2px solid '+statusCor+';background:'+(vistoriado?statusCor:lavado?statusCor+'18':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:16px">'
      +(vistoriado?'✅':lavado?'🚿':'○')
      +'</div></div></div>';
  }).join('');

  render(
    '<div style="padding:14px 14px 0">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<div><div style="font-weight:800;font-size:17px">🚿 Lavagem Pesada</div>'
    +'<div style="font-size:11px;color:var(--text3)">'+dataFmt+'</div></div>'
    +'<button onclick="telaLavPesada()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer">🔄</button>'
    +'</div>'
    // KPIs
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">'
    +'<div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">'
    +'<div style="font-family:\x27DM Mono\x27,monospace;font-size:20px;font-weight:800">'+total+'</div>'
    +'<div style="font-size:10px;color:var(--text3)">Planeados</div></div>'
    +'<div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">'
    +'<div style="font-family:\x27DM Mono\x27,monospace;font-size:20px;font-weight:800;color:var(--blue)">'+lavados+'</div>'
    +'<div style="font-size:10px;color:var(--text3)">Lavados</div></div>'
    +'<div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">'
    +'<div style="font-family:\x27DM Mono\x27,monospace;font-size:20px;font-weight:800;color:var(--green)">'+vistoriados+'</div>'
    +'<div style="font-size:10px;color:var(--text3)">Vistoriados</div></div>'
    +'</div>'
    // Barra
    +'<div class="prog"><div class="prog-f" style="width:'+pct+'%;background:'+(pct===100?'var(--green)':'var(--blue)')+'"></div></div>'
    +'<div style="font-size:11px;color:var(--text3);margin-top:4px;margin-bottom:10px">'+lavados+'/'+total+' lavados · '+pct+'%</div>'
    +'</div>'
    +(total?'<div class="sl">'+total+' veículo(s) no plano</div>'+cards
      :'<div class="empty"><div class="empty-ic">🚿</div><div style="font-weight:700;font-size:16px;margin-bottom:8px">Sem plano hoje</div><div style="font-size:13px">Use o + para montar o plano do dia.</div></div>')
    +(vistoriados>0?'<div style="padding:14px">'
      +'<button onclick="fecharTurnoLavagem()" style="width:100%;padding:14px;border-radius:12px;border:1px solid '+(vistoriados===total?'#00C48C40':'#F59E0B40')+';background:'+(vistoriados===total?'#00C48C18':'#F59E0B18')+';color:'+(vistoriados===total?'var(--green)':'var(--amber)')+';font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">'
      +(vistoriados===total?'✅ Fechar Turno de Lavagem':'⚠️ Fechar Turno ('+vistoriados+'/'+total+' vistoriados)')
      +'</button></div>':'')
  );
  
  document.getElementById('content').insertAdjacentHTML('beforeend',
    '<button class="fab" onclick="abrirMontarPlano()">＋</button>');
}

    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">'+
    '<div><div style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:700;color:var(--blue)">'+lista.length+'</div><div style="font-size:10px;color:var(--text3)">PLANEJADOS</div></div>'+
    '<div><div style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:700;color:var(--green)">'+lavados+'</div><div style="font-size:10px;color:var(--text3)">LAVADOS</div></div>'+
    '<div><div style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:700;color:'+( vistoriados===lista.length&&lista.length>0?'var(--green)':'var(--amber)')+'>'+ vistoriados+'</div><div style="font-size:10px;color:var(--text3)">VISTORIADOS</div></div>'+
    '</div>'+
    '<div style="margin-top:10px;text-align:center;font-family:\'DM Mono\',monospace;font-size:24px;font-weight:800;color:'+( pct>=100?'var(--green)':'var(--amber)')+'">'+pct+'%</div>'+
    '</div>'+
    '<label style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Observações do Turno</label>'+

    '<button onclick="confirmarFechamentoLavagem()" style="width:100%;padding:15px;border-radius:12px;border:none;background:'+( pct>=100?'var(--green)':'var(--amber)')+';color:'+( pct>=100?'white':'#000')+';font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">'+
    ( pct>=100?'✅ Confirmar Fechamento':'⚠️ Fechar com Pendências')+'</button>'
  );
}

async function confirmarFechamentoLavagem(){
  const gid=getGid();
  const obs=document.getElementById('obs-lav-turno')?.value?.trim()||null;

  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Fechando...';}

  // Busca plano do dia (inclui todos os status para ter o total real)
  const{data:plano,error:errPlano}=await sb.from('checklist_lavagem').select('*')
    .eq('garagem_id',gid).eq('data',_lpData);

  if(errPlano||!plano?.length){
    // Se não achar por _lpData, tenta hoje
    const{data:planoHoje}=await sb.from('checklist_lavagem').select('*')
      .eq('garagem_id',gid).eq('data',hoje());
    if(!planoHoje?.length){
      toast('❌ Nenhum plano encontrado para fechar','err');
      if(btn){btn.disabled=false;btn.textContent='Tentar novamente';}
      return;
    }
    // Usa hoje como referência
    window._lpDataReal=hoje();
  } else {
    window._lpDataReal=_lpData;
  }

  const lista=(plano?.length?plano:[]).filter(l=>l.status!=='arquivado');
  const dataRef=window._lpDataReal||_lpData;

  if(!lista.length){
    // Já foi arquivado — só avança a data
    const amanha=new Date(dataRef+'T12:00:00');
    amanha.setDate(amanha.getDate()+1);
    setLpData(amanha.toISOString().split('T')[0]);
    closeSheet(true);
    toast('ℹ️ Plano já arquivado — avançando para o próximo turno');
    telaLavPesada();
    return;
  }

  const lavados=lista.filter(l=>l.status==='executado').length;
  const vistoriados=lista.filter(l=>l.validado_patio).length;
  const pct=lista.length>0?Math.round(vistoriados/lista.length*100):0;
  const prefixosLavados=[...new Set(lista.filter(l=>l.status==='executado').map(l=>l.prefixo))];

  // PASSO 1 — Snapshot (não bloqueia se falhar)
  try{
    await sb.from('fechamento_lavagem').insert({
      garagem_id:gid, data:dataRef, turno:S.turno||'dia',
      total_planejados:lista.length, total_lavados:lavados,
      total_vistoriados:vistoriados, pct_vistoriados:pct,
      responsavel_nome:S.perfil?.nome||null, responsavel_id:S.perfil?.id||null,
      observacao:obs,
    });
  }catch(e){console.warn('[fechamento_lavagem]',e.message);}

  // PASSO 2 — Atualizar ultima_lavagem (não bloqueia se falhar)
  if(prefixosLavados.length){
    try{
      const{data:veiculos}=await sb.from('frota').select('id,prefixo')
        .eq('garagem_id',gid).in('prefixo',prefixosLavados);
      if(veiculos?.length){
        await Promise.all(veiculos.map(v=>
          sb.from('frota').update({ultima_lavagem:dataRef}).eq('id',v.id)
        ));
      }
    }catch(e){console.warn('[frota ultima_lavagem]',e.message);}
  }

  // PASSO 3 — Arquivar checklist do dia (CRÍTICO — tela deve limpar)
  const ids=lista.map(l=>l.id).filter(Boolean);
  let arquivado=false;

  // Tenta por IDs primeiro (mais preciso)
  if(ids.length){
    const{error:e1}=await sb.from('checklist_lavagem')
      .update({status:'arquivado'}).in('id',ids);
    if(!e1){ arquivado=true; console.log('[lav] arquivado por IDs:',ids.length); }
    else console.warn('[lav] update por ID falhou:',e1.message);
  }

  // Fallback: arquiva por garagem+data
  if(!arquivado){
    const{error:e2}=await sb.from('checklist_lavagem')
      .update({status:'arquivado'}).eq('garagem_id',gid).eq('data',dataRef);
    if(!e2){ arquivado=true; console.log('[lav] arquivado por data'); }
    else console.warn('[lav] arquivado por data falhou:',e2.message);
  }

  if(!arquivado){
    toast('⚠️ Não foi possível arquivar o plano — verifique permissões (RLS)','err');
  }

  // Avança a data para o próximo dia independente de erro
  const amanha=new Date(dataRef+'T12:00:00');
  amanha.setDate(amanha.getDate()+1);
  setLpData(amanha.toISOString().split('T')[0]);

  closeSheet(true);
  toast('✅ Turno fechado! '+lavados+'/'+lista.length+' lavados');
  telaLavPesada();
}

function abrirCardLavPesada(idx){

  // Guardar globalmente
  window._lavCardId=r.id;
  window._lavCardPrefixo=r.prefixo;
  
  const lavado=r.status==='executado';
  const vistoriado=r.validado_patio===true;
  const tipo=r.tipo_lavagem||'pesada';

  var statusInfo = vistoriado
    ? '<div style="background:#00C48C10;border:1px solid #00C48C30;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--green);font-weight:700">&#9989; Lavagem vistoriada e aprovada</div>'
    : lavado
      ? '<div style="background:#2563EB10;border:1px solid #2563EB30;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--blue);font-weight:700">&#128695; Lavado — aguardando vistoria</div>'
      : '<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text3)">Tipo: <strong style="color:var(--text)">'+(tipo==='pesada'?'Pesada (chassis)':'Simples')+'</strong></div>';

    ? '<button onclick="closeSheet(true);abrirVistoriaPesada(window._lavCardId,window._lavCardPrefixo)" style="padding:13px;border-radius:12px;border:1px solid #00C48C40;background:#00C48C18;color:var(--green);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">'
      +(lavado?'&#9989; Vistoriar agora':'&#9989; Já foi lavado — Vistoriar')+'</button>'

  openSheet('&#128695; '+r.prefixo,
