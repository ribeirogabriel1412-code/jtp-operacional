  const statusOpts=['aberto','em_analise','resolvido'];
  const statusLabel={aberto:'🔴 Aberto',em_analise:'🟡 Em análise',resolvido:'✅ Resolvido'};
  const dataBr=a.data_recolha?new Date(a.data_recolha+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}):'—';

  openSheet(`⚠️ ${a.prefixo} — Avaria`,`
    <div style="display:flex;flex-direction:column;gap:12px">
      <!-- Info -->
      <div style="background:var(--surface2);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:5px">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--text3)">📅 ${dataBr}</span>
          <span style="font-size:12px;color:var(--text3)">🕐 ${a.horario_real||'—'}</span>
          ${a.linha?`<span style="font-size:12px;color:var(--blue)">🚌 Linha ${a.linha}</span>`:''}
          ${a.tabela?`<span style="font-size:12px;color:var(--blue)">Tab ${a.tabela}</span>`:''}
        </div>
        ${a.motorista?`<div style="font-size:12px;color:var(--text2)">👤 ${a.motorista}</div>`:''}
        <div style="font-size:11px;color:var(--text4)">Plantão: ${a.plantao_nome||'—'}</div>
      </div>
      <!-- Visual -->
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:${a.visual_externo==='avaria'?'#EF444412':'#00C48C0A'};border:1px solid ${a.visual_externo==='avaria'?'#EF444440':'#00C48C40'};border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px">EXTERNO</div>
          <div style="font-size:13px;font-weight:700;color:${a.visual_externo==='avaria'?'var(--red)':'var(--green)'}">${a.visual_externo==='avaria'?'⚠️ Avaria':'✅ OK'}</div>
        </div>
        <div style="flex:1;background:${a.visual_interno==='avaria'?'#EF444412':'#00C48C0A'};border:1px solid ${a.visual_interno==='avaria'?'#EF444440':'#00C48C40'};border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px">INTERNO</div>
          <div style="font-size:13px;font-weight:700;color:${a.visual_interno==='avaria'?'var(--red)':'var(--green)'}">${a.visual_interno==='avaria'?'⚠️ Avaria':'✅ OK'}</div>
        </div>
      </div>
      <!-- Itens NOK -->
      ${nok.length?`<div>
        <div class="fl">Itens com Avaria (${nok.length})</div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${nok.map(it=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#EF444408;border:1px solid #EF444430;border-radius:8px">
            <span style="color:var(--red);font-size:12px">⚠️</span>
            <span style="font-size:12px">${it}</span>
          </div>`).join('')}
        </div>
      </div>`:''}
      <!-- Observação do plantão -->
      ${a.observacao?`<div>
        <div class="fl">Obs. do Plantão</div>
        <div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:12px;color:var(--text2)">${a.observacao}</div>
      </div>`:''}
      <!-- Status -->
      <div>
        <label class="fl">Status</label>
        <select class="fi2" id="av-status">
          ${statusOpts.map(s=>`<option value="${s}"${a.status===s?' selected':''}>${statusLabel[s]}</option>`).join('')}
        </select>
      </div>
      <!-- Tratativa -->
      <div>
        <label class="fl">Tratativa / Encaminhamento</label>
        <textarea class="fi2" id="av-tratativa" rows="3" placeholder="Descreva a ação tomada ou encaminhamento...">${a.tratativa||''}</textarea>
      </div>
      <button onclick="salvarAvaria(${a.id})" style="padding:14px;border-radius:12px;border:none;background:var(--green);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">💾 Salvar</button>
    </div>
  `);
}

async function salvarAvaria(id){
  const status=document.getElementById('av-status')?.value||'aberto';
  const tratativa=document.getElementById('av-tratativa')?.value?.trim()||null;
  const agora=new Date().toISOString();
  const payload={
    status,
    tratativa:tratativa||null,
    responsavel_nome:S.perfil?.nome||null,
    responsavel_id:S.perfil?.id||null,
    resolvido_em:status==='resolvido'?agora:null,
  };
  const{error}=await sb.from('avarias_recolha').update(payload).eq('id',id);
  if(error){toast('Erro: '+error.message,'err');return;}
  closeSheet(true);
  toast(status==='resolvido'?'✅ Avaria resolvida!':'💾 Salvo!');
  telaAvariasDashboard();
}

// Prompt de instalação
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // Mostra botão de instalar se disponível
  const btn = document.getElementById('btn-instalar');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  toast('✅ App instalado com sucesso!');
});
function instalarApp(){
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(r => {
      if(r.outcome === 'accepted') toast('✅ Instalando...');
      _deferredPrompt = null;
    });
  }
}
