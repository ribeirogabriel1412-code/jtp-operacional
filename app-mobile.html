<html lang="pt-BR">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A1E3F;--surface:#0F2850;--surface2:#081730;--border:#1E3A6E;--border2:#13305E;
  --blue:#4A8FDB;--green:#2C7A4B;--red:#C0392B;--amber:#E0A800;--purple:#8B5CF6;
  --gold:#C8A24A;--gold-light:#E7D19A;
  --text:#F4F6FB;--text2:#9CA3AF;--text3:#6B7280;--text4:#4B5563;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 8px)}
#navbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;z-index:200}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#1D4ED8,#2563EB);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px #2563EB30}
.fi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none}
.fi:focus{border-color:var(--gold)}
.btn-p{width:100%;background:linear-gradient(135deg,#1D4ED8,#2563EB);border:none;border-radius:12px;padding:16px;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-p:active{opacity:.85}
/* NAV */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:8px 4px;font-family:inherit}
.nav-btn.active{color:var(--blue)}
.nav-ic{font-size:22px}.nav-lb{font-size:10px;font-weight:700;letter-spacing:.5px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin:0 14px 10px}
.vcard{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin:0 14px 8px;transition:border-color .15s;cursor:pointer}
.vcard.done{border-color:#00C48C40;background:#00C48C05}
.vcard.nok{border-color:#EF444440;background:#EF444405}
.prefixo{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.vcard-sub{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.btn-ck{width:50px;height:50px;border-radius:12px;border:2px solid var(--border);background:transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-ck.ok{border-color:var(--green);background:#00C48C18}
.btn-ck.nok{border-color:var(--red);background:#EF444418}
/* OS CARD */
.os-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:14px;padding:13px 15px;margin:0 14px 8px;cursor:pointer}
.os-card.corretiva{border-left-color:var(--red)}.os-card.preventiva_pesada{border-left-color:var(--purple)}
.os-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.os-pre{font-family:'DM Mono',monospace;font-size:21px;font-weight:700;color:var(--blue)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid}
/* SHEET */
.sheet-ov{position:fixed;inset:0;background:#00000088;z-index:300;display:none;align-items:flex-end}
.sheet-ov.open{display:flex}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow:hidden;padding-bottom:calc(var(--safe-bot) + 16px);display:flex;flex-direction:column}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:12px auto}
.sheet-ttl{font-size:17px;font-weight:800;padding:4px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-body{padding:16px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* CHECKLIST */
.ck-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border2)}
.ck-row:last-child{border:none}
.ck-txt{flex:1;font-size:12px;line-height:1.4}
.ck-b{width:38px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.ck-b.von{border-color:var(--blue);background:#2563EB18;color:var(--blue)}
.ck-b.ton{border-color:var(--green);background:#00C48C18;color:var(--green)}
.ck-b.na{border-color:var(--text4);background:#47556918;color:var(--text4)}
/* UTILS */
.sl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:14px 14px 8px}
.empty{text-align:center;padding:52px 24px;color:var(--text3)}
.empty-ic{font-size:48px;margin-bottom:12px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 16px);right:18px;width:56px;height:56px;border-radius:18px;background:var(--blue);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px #2563EB50;display:flex;align-items:center;justify-content:center;z-index:90}
.fab:active{transform:scale(.92)}
.prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-f{height:100%;border-radius:99px;transition:width .3s}
.fi2{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.fi2:focus{border-color:var(--blue)}
.fl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.kpi2{background:var(--surface2);border-radius:12px;padding:12px;text-align:center}
.kpi2-v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.kpi2-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-top:2px}
#toast{position:fixed;top:calc(var(--safe-top)+60px);left:50%;transform:translateX(-50%) translateY(-20px);background:#374151;border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:14px;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-logo">🚌</div>
  <div style="text-align:center"><div style="font-size:26px;font-weight:800">JTP Operacional</div><div style="font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Acesso ao Sistema</div></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px"><label class="fl">Matrícula ou E-mail</label><input class="fi" id="le" type="text" inputmode="text" autocomplete="username" placeholder="Ex: 4521 ou seu@email.com"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px"><label class="fl">Senha</label><input class="fi" id="ls" type="password" autocomplete="current-password" placeholder="••••••"></div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">

    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:11px;color:var(--text3)" id="tbg">—</div>
      <button id="btn-instalar" onclick="instalarApp()" style="display:none;background:var(--blue);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;align-items:center;gap:4px">📲 Instalar</button>

    </div>
  </div>
  <div id="content"></div>
  <div id="navbar"></div>
</div>

<!-- SHEET -->
<div class="sheet-ov" id="shov" onclick="closeSheet(event)">
  <div class="sheet" id="sh">
    <div class="sheet-handle"></div>
    <div class="sheet-ttl" id="shttl"></div>
    <div class="sheet-body" id="shbody"></div>
  </div>
</div>

<script>
// Verificar se Supabase carregou
if(typeof supabase === 'undefined'){
  document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;background:#1F2937;color:#F9FAFB"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Sem conexão</div><div style="font-size:14px;color:#9CA3AF;margin-bottom:24px">Verifique sua internet e tente novamente.</div><button onclick="location.reload()" style="background:#2563EB;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer">🔄 Tentar Novamente</button></div>';
  throw new Error('Supabase não carregou');
}
const {createClient}=supabase;
const sb=createClient('https://yxwxcxdegkvjvwchemsm.supabase.co','sb_publishable_SvC1D0cMk94sZ_9kYv41QQ_RJVrSuUV');
const S={user:null,perfil:null,garagens:[],tela:'home',turno:'dia'};
const TZ_OPERACIONAL_PADRAO='America/Manaus';
function opNormTxt(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}
function opTimezone(gid){
  const gidRef=gid||(typeof getGid==='function'?getGid():null);
  const g=(S.garagens||[]).find(x=>x.id===gidRef);
  const txt=opNormTxt(`${g?.nome||''} ${g?.cidade||''} ${g?.sigla||''}`);
  return txt.includes('braganca')?'America/Sao_Paulo':TZ_OPERACIONAL_PADRAO;
}
function opParts(date=new Date(),tz=opTimezone()){
  const parts=new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(date);
  const o={};parts.forEach(p=>{if(p.type!=='literal')o[p.type]=p.value;});
  if(o.hour==='24')o.hour='00';
  return {y:+o.year,m:+o.month,d:+o.day,H:+o.hour,M:+o.minute,S:+o.second};
}
function opISODate(date=new Date(),tz=opTimezone()){const p=opParts(date,tz);return `${p.y}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`;}
function opAddDays(iso,days){const [y,m,d]=String(iso).split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+Number(days||0),12));return dt.toISOString().slice(0,10);}
function opDateTimeISO(data,hora,tz=opTimezone()){
  const [y,m,d]=String(data).split('-').map(Number),[H,M]=String(hora||'00:00').split(':').map(Number);
  let utc=Date.UTC(y,m-1,d,H||0,M||0,0);
  for(let i=0;i<3;i++){
    const p=opParts(new Date(utc),tz);
    const desejado=Date.UTC(y,m-1,d,H||0,M||0,0);
    const atual=Date.UTC(p.y,p.m-1,p.d,p.H,p.M,0);
    utc+=desejado-atual;
  }
  return new Date(utc).toISOString();
}
function turnoOperacionalAtual(tz=opTimezone()){const p=opParts(new Date(),tz),min=p.H*60+p.M;return (min>=20*60||min<4*60+20)?'noite':'dia';}
function dataOperacionalAtual(turno=turnoOperacionalAtual(),tz=opTimezone()){
  const data=opISODate(new Date(),tz),p=opParts(new Date(),tz),min=p.H*60+p.M;
  return turno==='noite'&&min<4*60+20?opAddDays(data,-1):data;
}
function janelaOperacional(turno=turnoOperacionalAtual(),dataRef=dataOperacionalAtual(turno),tz=opTimezone()){
  const defs={dia:{ini:'08:00',fim:'18:00',label:'Dia 08:00-18:00'},noite:{ini:'20:00',fim:'04:20',label:'Noite 20:00-04:20'},dia_completo:{ini:'08:00',fim:'08:00',label:'Dia completo 08:00-08:00',diaAnterior:true}};
  const d=defs[turno]||defs.dia;
  const dataIni=d.diaAnterior?opAddDays(dataRef,-1):dataRef;
  const dataFim=(d.fim<=d.ini)?opAddDays(dataIni,1):dataIni;
  const ini=opDateTimeISO(dataIni,d.ini,tz),fim=opDateTimeISO(dataFim,d.fim,tz);
  return {turno,dataRef,dataIni,dataFim,horaIni:d.ini,horaFim:d.fim,ini,fim,dtIni:new Date(ini),dtFim:new Date(fim),label:d.label};
}
function hoje(){return opISODate()}
function getGid(){return S.perfil?.garagem_id||S.garagens?.[0]?.id}
function fluxoCdMobileHabilitado(gid=getGid()){
  const g=S.garagens?.find(x=>x.id===gid);
  const nome=String(`${g?.nome||''} ${g?.cidade||''} ${g?.sigla||''}`)
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  return nome.includes('braganca');
}
function cargo(){return S.perfil?.cargo}
const CARGOS={diretoria:'Diretoria',gerente_garagem:'Gerente',coordenador:'Coordenador',supervisor:'Supervisor',lider_pcm:'Líder PCM',assistente_pcm:'Ass. PCM',almoxarifado:'Almoxarifado',lider_almoxarifado:'Líder Almox.',lider_operacional:'L. Operacional',lider_suprimentos:'L. Suprimentos',operacoes_seguras:'Op. Seguras',lider_oficina:'L. Oficina',lider_patio:'L. Pátio',lavador:'Lavador',manobrista:'Manobrista',frentista:'Frentista',plantao:'Plantão',lubrificador:'Lubrificador'};
function toast(msg,tipo='ok',dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(tipo==='err'?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='',dur);}
function render(html){document.getElementById('content').innerHTML=html}
function setTela(t){S.tela=t;buildNav();render('<div class="loading"><div class="sp"></div></div>');TELAS[t]&&TELAS[t]()}
function openSheet(ttl,html){document.getElementById('shttl').textContent=ttl;document.getElementById('shbody').innerHTML=html;document.getElementById('shov').classList.add('open')}
function closeSheet(e){if(e===true||e.target===document.getElementById('shov'))document.getElementById('shov').classList.remove('open')}

// LOGIN
async function doLogin(){
  const input=document.getElementById('le').value.trim();
  const senha=document.getElementById('ls').value;
  const err=document.getElementById('lerr');
  if(!input||!senha){err.textContent='Preencha matrícula/e-mail e senha.';return}
  err.textContent='Entrando...';

  // Resolve e-mail — pode ser matrícula ou e-mail direto
  let email=input;
  if(!input.includes('@')){
    // É matrícula — busca o e-mail correspondente
    const{data:perfil}=await sb.from('perfis').select('email').eq('matricula',input).single();
    if(!perfil?.email){
      err.textContent='Matrícula não encontrada. Verifique com o administrador.';
      return;
    }
    email=perfil.email;
  }

  const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){err.textContent='Matrícula/e-mail ou senha incorretos.';return}
  err.textContent='';
  S.user=data.user;await init();
}
async function init(){
  try{
  const[{data:p},{data:g}]=await Promise.all([
    sb.from('perfis').select('*').eq('id',S.user.id).single(),
    sb.from('garagens').select('*').order('nome'),
  ]);
  S.perfil=p;S.garagens=g||[];
  S.turno=turnoOperacionalAtual(opTimezone(p?.garagem_id));
  if(typeof _r33Turno!=='undefined'){_r33Turno=S.turno;_r33Data=dataOperacionalAtual(_r33Turno,opTimezone(p?.garagem_id));}
  const gar=S.garagens.find(x=>x.id===p?.garagem_id);
  document.getElementById('tbn').textContent=p?.nome?.split(' ')[0]||'—';
  document.getElementById('tbc').textContent=CARGOS[p?.cargo]||p?.cargo||'—';
  document.getElementById('tbg').textContent=(gar?.nome||'—').replace('JTP ','').replace('Garagem ','').split('—')[0].trim();
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  setTela(TELA_INICIO[cargo()]||'home');
  }catch(err){
    console.error('Init error:',err);
    const lerr=document.getElementById('lerr');
    if(lerr) lerr.textContent='Erro: '+err.message;
    // Garantir que o login aparece mesmo com erro
    const loginEl=document.getElementById('login');
    const appEl=document.getElementById('app');
    if(loginEl) loginEl.style.display='flex';
    if(appEl) appEl.style.display='none';
    // Toast de erro visível
    setTimeout(()=>toast('Erro ao carregar perfil. Tente novamente.','err'),500);
  }
}
async function doLogout(){await sb.auth.signOut();location.reload()}

// NAVBAR
const TELA_INICIO={lavador:'lavagem',lider_patio:'patio',lider_oficina:'oficina',lider_pcm:'oficina',assistente_pcm:'oficina',almoxarifado:'valet_almox',lider_almoxarifado:'valet_almox',lider_suprimentos:'valet_almox',coordenador:'fech21',supervisor:'fech21',lider_operacional:'ronda33',manobrista:'patio_man',frentista:'abastecimento',plantao:'recolha',gerente_garagem:'fech21',gerente_operacional:'fech21',lubrificador:'lubrificacao'};
const NAV={

  lider_patio:[{id:'patio',ic:'✅',lb:'Validar'},{id:'patio_man',ic:'🚗',lb:'Zona'},{id:'soltura',ic:'🚌',lb:'Soltura'},{id:'ronda33',ic:'👣',lb:'3.3'},{id:'abastecimento',ic:'⛽',lb:'Abastec.'},{id:'lav_pesada',ic:'🚿',lb:'Lavagem'},{id:'home',ic:'🏠',lb:'Início'}],

  lider_pcm:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'avarias',ic:'⚠️',lb:'Avarias'},{id:'ronda33',ic:'👣',lb:'3.3'},{id:'checklist_equip',ic:'📋',lb:'3.4'},{id:'sos218',ic:'🆘',lb:'2.18'},{id:'prev26',ic:'💰',lb:'2.6'},{id:'lubri_rel',ic:'🛢️',lb:'Lubri.'},{id:'home',ic:'🏠',lb:'Início'}],
  assistente_pcm:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'avarias',ic:'⚠️',lb:'Avarias'},{id:'checklist_equip',ic:'📋',lb:'3.4'},{id:'sos218',ic:'🆘',lb:'2.18'},{id:'prev26',ic:'💰',lb:'2.6'},{id:'home',ic:'🏠',lb:'Início'}],
  almoxarifado:[{id:'valet_almox',ic:'📦',lb:'Kits'},{id:'ronda33',ic:'👣',lb:'3.3'},{id:'home',ic:'🏠',lb:'Início'}],

function proximoSabadoISO(base=new Date()){
  const d=new Date(base.getFullYear(),base.getMonth(),base.getDate());
  const faltam=(6-d.getDay()+7)%7;
  d.setDate(d.getDate()+faltam);
  return d.toISOString().slice(0,10);
}
async function resolverDataValetMobile(gid,dataPreferida,usuarioEscolheu=false){
  if(usuarioEscolheu) return dataPreferida||proximoSabadoISO();
  const alvo=dataPreferida||proximoSabadoISO();
  try{
    const atual=await sb.from('requisicoes_compra')
      .select('data')
      .eq('garagem_id',gid)
      .is('ocorrencia_id',null)
      .neq('status','cancelado')
      .not('data','is',null)
      .eq('data',alvo)
      .limit(1);
    if((atual.data||[]).length){_valetMobData=alvo;return alvo;}
    const ult=await sb.from('requisicoes_compra')
      .select('data')
      .eq('garagem_id',gid)
      .is('ocorrencia_id',null)
      .neq('status','cancelado')
      .not('data','is',null)
      .lte('data',alvo)
      .order('data',{ascending:false})
      .limit(1);
    const encontrada=ult.data?.[0]?.data;
    if(encontrada){_valetMobData=encontrada;return encontrada;}
  }catch(e){console.warn('[VALET DATA]',e);}
  _valetMobData=alvo;
  return alvo;
}
function mobParseISO(iso){
  const [y,m,d]=String(iso||'').split('-').map(Number);
  return new Date(y||new Date().getFullYear(),(m||1)-1,d||1);
}
function mobISO(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function mobDiaMes(iso){
  const d=mobParseISO(iso);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function mobPrefKey(p){return String(p||'').replace(/\D/g,'').replace(/^0+/,'');}
function mobPrevHistKey(){
  let gid='geral';
  try{gid=getGid()||'geral';}catch(e){}
  return `jtp_prev_historicos_v1:${gid}`;
}
function mobPrevHistoricos(){
  try{
    const h=JSON.parse(localStorage.getItem(mobPrevHistKey())||'{}')||{};
    return {semanas:Array.isArray(h.semanas)?h.semanas:[],importacoes:Array.isArray(h.importacoes)?h.importacoes:[]};
  }catch(e){return {semanas:[],importacoes:[]};}
}
function mobSemanaLabel(s){return `${s?.inicioBR||'--/--'} a ${s?.fimBR||'--/--'}`;}
function mobSemanaDaData(data){
  const semanas=mobPrevHistoricos().semanas||[];
  return semanas.find(s=>s.inicio<=data&&s.fim>=data)||semanas[0]||null;
}
function mobDataValetDaSemana(semana){
  if(!semana?.inicio)return proximoSabadoISO();
  const d=mobParseISO(semana.inicio);
  d.setDate(d.getDate()-9);
  return mobISO(d);
}
function mobSemanaPeriodo(data){
  const d=mobParseISO(data);
  const ini=new Date(d);
  ini.setDate(d.getDate()-((d.getDay()+6)%7));
  const fim=new Date(ini);
  fim.setDate(ini.getDate()+4);
  return {inicio:mobISO(ini),fim:mobISO(fim),inicioBR:mobDiaMes(mobISO(ini)),fimBR:mobDiaMes(mobISO(fim))};
}
function mobDiaSemanaIdx(label){
  const s=String(label||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(s.includes('segunda'))return 1;
  if(s.includes('terca'))return 2;
  if(s.includes('quarta'))return 3;
  if(s.includes('quinta'))return 4;
  if(s.includes('sexta'))return 5;
  if(s.includes('sabado'))return 6;
  if(s.includes('domingo'))return 0;
  return null;
}
function mobNormalizarData(v,ref=hoje()){
  if(!v)return '';
  if(v instanceof Date)return mobISO(v);
  const s=String(v).trim();
  const iso=(s.match(/\d{4}-\d{2}-\d{2}/)||[])[0];
  if(iso)return iso;
  const br=s.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
  if(br){
    const y=br[3]?String(br[3]).padStart(4,'20'):String(ref).slice(0,4);
    return `${y}-${String(br[2]).padStart(2,'0')}-${String(br[1]).padStart(2,'0')}`;
  }
  return s.slice(0,10);
}
function mobProgData(row){
  return mobNormalizarData(row?.data||row?.iso||row?.data_programada||row?.data_prevista||row?.data_execucao||row?.data_os||row?.programado_para||row?.data_programacao||row?.dt||row?.created_at);
}
function mobProgPrefixo(row){
  return row?.prefixo||row?.veiculo||row?.carro||row?.prefixo_veiculo||row?.codigo_veiculo||row?.codigo||row?.placa_prefixo||'';
}
function mobProgTipo(row){
  const bruto=String(row?.tipo||row?.tipo_preventiva||row?.tipo_os||row?.categoria||row?.plano_tipo||row?.tipo_manutencao||'').toLowerCase();
  const texto=`${bruto} ${mobProgServ(row)}`.toLowerCase();
  if(/pesada|preventiva_pesada|plano\s*002|\b002\b/.test(texto))return 'pesada';
  if(/óleo|oleo/.test(texto))return 'oleo';
  if(/leve/.test(texto))return 'leve';
  return bruto;
}
function mobProgServ(row){
  return String(row?.servicos||row?.servico||row?.descricao||row?.plano_nome||row?.planoNome||row?.plano||row?.observacao||row?.obs||row?.itens_servico||'');
}
function mobDiaProgramadoReq(r){
  return (String(r?.justificativa||'').match(/Programado preventiva:\s*(\d{4}-\d{2}-\d{2})/i)||[])[1]||'';
}
function mobExpandProgRows(rows){
  const out=[];
  const push=(r,base={})=>{
    if(!r)return;
    if(Array.isArray(r)){r.forEach(x=>push(x,base));return;}
    if(typeof r==='string'){
      try{push(JSON.parse(r),base);}catch(e){}
      return;
    }
    if(typeof r!=='object')return;
    const filhos=r.itens||r.programacao||r.programacoes||r.escala||r.dados||r.carros||null;
    if(Array.isArray(filhos)){filhos.forEach(x=>push(x,{...base,...r}));}
    else out.push({...base,...r});
  };
  (rows||[]).forEach(r=>push(r));
  return out;
}
function mobProgramaFromSemanaLocal(data){
  const semana=mobSemanaDaData(data);
  if(!semana)return {semana:null,itens:[]};
  return {semana,itens:(semana.itens||[]).filter(i=>i.prefixo&&i.iso===data).map(i=>({
    prefixo:i.prefixo,iso:i.iso,tipo:i.tipo,servicos:i.servicos||i.planoNome||'',origem:'local'
  }))};
}
async function mobBuscarProgramacaoPreventivaDia(gid,data){
  const periodo=mobSemanaPeriodo(data);
  const diaIdx=mobParseISO(data).getDay();
  let itens=[];
  try{
    const marc=await sb.from('requisicoes_compra')
      .select('*')
      .eq('garagem_id',gid)
      .eq('data',data)
      .neq('status','cancelado')
      .order('prefixo',{ascending:true});
    const rows=(marc.data||[]).filter(r=>r.status==='programado_preventiva'||r.cod_sap==='__PROG_PREV__'||String(r.peca||'').includes('Programação preventiva'));
    if(rows.length){
      const vistos=new Set();
      itens=rows.filter(r=>{
        const k=mobPrefKey(r.prefixo);
        if(!k||vistos.has(k))return false;
        vistos.add(k);
        return true;
      }).map(r=>({
        raw:r,
        prefixo:r.prefixo,
        iso:data,
        tipo:'pesada',
        servicos:String(r.justificativa||'').replace(/Programação preventiva pesada\s*·?\s*/i,''),
        origem:'marcador'
      }));
      return {semana:{inicio:periodo.inicio,fim:periodo.fim,inicioBR:periodo.inicioBR,fimBR:periodo.fimBR},itens};
    }
  }catch(e){console.warn('[PREV MARCADORES]',e);}
  try{
    let res=await sb.from('programacao_preventiva').select('*').eq('garagem_id',gid).limit(1200);
    let rows=res.data||[];
    if(!rows.length){
      res=await sb.from('programacao_preventiva').select('*').limit(1200);
      rows=(res.data||[]).filter(r=>!r.garagem_id||r.garagem_id===gid||r.garagem===gid);
    }
    let exp=mobExpandProgRows(rows).map(r=>{
      let iso=mobProgData(r);
      const idxLabel=mobDiaSemanaIdx(r.dia||r.label||r.dia_semana||r.weekday);
      if((!iso||iso===String(r.dia||'').slice(0,10))&&idxLabel!==null){
        const d=mobParseISO(periodo.inicio);
        d.setDate(d.getDate()+(idxLabel===0?6:idxLabel-1));
        iso=mobISO(d);
      }
      return {
      raw:r,
      prefixo:mobProgPrefixo(r),
      iso,
      tipo:mobProgTipo(r),
      servicos:mobProgServ(r),
      criado_em:r.criado_em||r.created_at||r.atualizado_em||r.updated_at||'',
      semana_inicio:r.semana_inicio||r.inicio||periodo.inicio,
      semana_fim:r.semana_fim||r.fim||periodo.fim,
      origem:'banco'
    };}).filter(i=>i.prefixo&&i.iso>=periodo.inicio&&i.iso<=periodo.fim);
    if(exp.length){
      const loteMaisRecente=exp.map(i=>String(i.criado_em||'')).sort().pop()||'';
      const dataLote=loteMaisRecente?loteMaisRecente.slice(0,16):'';
      const recentes=dataLote?exp.filter(i=>String(i.criado_em||'').slice(0,16)===dataLote):exp;
      itens=recentes.filter(i=>i.iso===data);
    }
  }catch(e){console.warn('[PREV DIA BANCO]',e);}
  if(!itens.length){
    const loc=mobProgramaFromSemanaLocal(data);
    itens=loc.itens;
    if(!itens.length&&loc.semana?.itens?.length){
      itens=(loc.semana.itens||[]).filter(i=>i.prefixo&&mobDiaSemanaIdx(i.dia||i.label)===diaIdx)
        .map(i=>({...i,iso:data,servicos:i.servicos||i.planoNome||'',origem:'local-dia'}));
    }
  }
  return {semana:{inicio:periodo.inicio,fim:periodo.fim,inicioBR:periodo.inicioBR,fimBR:periodo.fimBR},itens};
}
async function mobBuscarReqsValetParaDia(gid,data,programados){
  const periodo=mobSemanaPeriodo(data);
  const valet=new Date(mobParseISO(periodo.inicio));
  valet.setDate(valet.getDate()-9);
  const datas=[mobISO(valet),_valetMobData,await resolverDataValetMobile(gid,_valetMobData||proximoSabadoISO(),!!_valetMobData)].filter(Boolean);
  for(const dt of [...new Set(datas)]){
    try{
      const res=await sb.from('requisicoes_compra').select('*').eq('garagem_id',gid).eq('data',dt).neq('status','cancelado').neq('status','programado_preventiva').order('prefixo',{ascending:true}).order('criado_em',{ascending:true});
      const rows=(res.data||[]).filter(r=>r.cod_sap!=='__PROG_PREV__'&&!String(r.peca||'').includes('Programação preventiva'));
      if(rows.length){
        const programKeys=new Set((programados||[]).map(p=>mobPrefKey(p.prefixo)));
        const bate=rows.some(r=>programKeys.has(mobPrefKey(r.prefixo)));
        if(bate||!programKeys.size)return {dataValet:dt,rows};
      }
    }catch(e){console.warn('[REQ VALET DIA]',e);}
  }
  try{
    const ini=new Date(mobParseISO(periodo.inicio));ini.setDate(ini.getDate()-21);
    const fim=new Date(mobParseISO(periodo.fim));fim.setDate(fim.getDate()+1);
    const res=await sb.from('requisicoes_compra').select('*').eq('garagem_id',gid).gte('data',mobISO(ini)).lte('data',mobISO(fim)).neq('status','cancelado').neq('status','programado_preventiva').order('data',{ascending:false}).order('prefixo',{ascending:true});
    const rows=(res.data||[]).filter(r=>r.cod_sap!=='__PROG_PREV__'&&!String(r.peca||'').includes('Programação preventiva'));
    const programKeys=new Set((programados||[]).map(p=>mobPrefKey(p.prefixo)));
    const candidatos=rows.filter(r=>programKeys.has(mobPrefKey(r.prefixo)));
    if(candidatos.length){
      const porData={};
      candidatos.forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      const best=Object.entries(porData).sort((a,b)=>b[1].length-a[1].length||String(b[0]).localeCompare(String(a[0])))[0];
      if(best)return {dataValet:best[0],rows:best[1]};
    }
    const tagueados=rows.filter(r=>mobDiaProgramadoReq(r)===data);
    if(tagueados.length){
      const dataVal=tagueados[0].data||datas[0]||proximoSabadoISO();
      return {dataValet:dataVal,rows:tagueados};
    }
  }catch(e){console.warn('[REQ VALET RANGE]',e);}
  return {dataValet:datas[0]||proximoSabadoISO(),rows:[]};
}

  pesada:['Lavar chassis','Lavar carroceria com detergente','Escovar balaustres e corrimão','Limpar vidros externos','Vidros internos','Pano no cockpit e painel','Teto interno limpo','Varrer e passar pano no piso','Rodas e pneus limpos','Limpeza de filtros A/C'],

let _lid='',_lck={};
async function telaLavagem(){
  const gid=getGid();
  const{data:lista}=await sb.from('checklist_lavagem').select('*').eq('garagem_id',gid).eq('data',hoje()).not('status','in','("cancelado","arquivado")').order('prefixo');
  if(!lista?.length){render(`<div class="empty"><div class="empty-ic">🚿</div><div style="font-weight:700;font-size:16px;margin-bottom:8px">Sem programação hoje</div><div style="font-size:13px">Aguardando programação do líder.</div></div>`);return}
  const exec=lista.filter(l=>l.status==='executado').length,tot=lista.length,pct=Math.round(exec/tot*100);
  const TIPO_COR={pesada:'var(--amber)',media:'var(--blue)',leve:'#10B981',simples:'#3B82F6',preventiva:'#8B5CF6'};
  const TIPO_LBL={pesada:'🟡 Pesada',media:'🔵 Média',leve:'🟢 Leve',simples:'💧 Simples',preventiva:'🟣 Preventiva'};
  const mkCard=(r)=>{
    const d=r.status==='executado',n=r.status==='nao_realizado';
    const tipo=r.tipo_lavagem||'simples';
    const cor=TIPO_COR[tipo]||'var(--blue)';
    const lbl=TIPO_LBL[tipo]||tipo;
    return`<div class="vcard ${d?'done':n?'nok':''}" onclick="abrirLav('${r.id}','${r.prefixo}','${tipo}',${d})">
      <div style="flex:1"><div class="prefixo" style="color:${d?'var(--green)':n?'var(--red)':'var(--text)'}">${r.prefixo}</div>
      <div class="vcard-sub"><span style="color:${cor}">●</span> ${lbl}${d?' · ✅'+(r.hora_executado?new Date(r.hora_executado).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''):''}${r.validado_patio?' · 🏆':''}</div></div>
      <div class="btn-ck ${d?'ok':n?'nok':''}">${d?'✅':n?'❌':'○'}</div>
    </div>`;
  };
  const pesada=lista.filter(l=>l.tipo_lavagem==='pesada'||l.tipo_lavagem==='preventiva');
  const media=lista.filter(l=>l.tipo_lavagem==='media'||l.tipo_lavagem==='simples');
  const leve=lista.filter(l=>l.tipo_lavagem==='leve');
  const leveExec=leve.filter(l=>l.status==='executado').length;
  const mkSec=(titulo,cor,arr)=>arr.length?`<div class="sl" style="color:${cor}">${titulo} <span style="color:var(--text3);font-weight:600">· ${arr.length} veículo(s)</span></div>${arr.map(mkCard).join('')}`:'';
  const secLeve=leve.length?`<div class="sl" style="color:#10B981">🟢 Leve <span style="color:var(--text3);font-weight:600">· ${leve.length} veículo(s)</span></div>
    <div style="margin:0 14px 8px;background:#10B98110;border:1px solid #10B98130;border-radius:12px;padding:14px">
      <div style="font-size:13px;font-weight:700;color:#10B981;margin-bottom:6px">Varrer + Retirar lixo</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${leveExec}/${leve.length} concluídos</div>
      ${leveExec<leve.length?`<button onclick="concLeveTudo()" style="width:100%;padding:11px;border-radius:10px;border:1px solid #10B98140;background:#10B98118;color:#10B981;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">✅ Confirmar todos (${leve.length-leveExec} pendentes)</button>`:'<div style="text-align:center;font-size:13px;font-weight:700;color:#10B981">✅ Leve concluída</div>'}
    </div>`:'';
  render(`<div style="padding:14px 14px 0"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-weight:800;font-size:17px">🚿 Lavagem</div><div style="font-family:'DM Mono',monospace;font-weight:700;color:${pct===100?'var(--green)':'var(--blue)'}">${exec}/${tot}</div></div><div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}"></div></div></div>${mkSec('🟡 Pesada','var(--amber)',pesada)}${mkSec('🔵 Média','var(--blue)',media)}${secLeve}`);
}
async function concLeveTudo(){
  const gid=getGid();
  const{data:leve}=await sb.from('checklist_lavagem').select('id').eq('garagem_id',gid).eq('data',hoje()).eq('tipo_lavagem','leve').eq('status','pendente');
  if(!leve?.length){toast('Nada pendente','err');return;}
  const{error}=await sb.from('checklist_lavagem').update({status:'executado',hora_executado:new Date().toISOString(),executado_por:S.perfil?.nome}).eq('garagem_id',gid).eq('data',hoje()).eq('tipo_lavagem','leve').eq('status','pendente');
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('✅ Leve concluída — '+leve.length+' veículos');telaLavagem();
}
function abrirLav(id,prefixo,tipo,done){
  _lid=id;
  const TIPO_LBL={pesada:'Pesada',media:'Média',leve:'Leve',simples:'Simples',preventiva:'Preventiva'};
  if(done){openSheet('🚿 '+prefixo,`<div style="text-align:center;padding:20px 0"><div style="font-size:48px">✅</div><div style="font-size:16px;font-weight:700;margin:12px 0">Concluída — ${TIPO_LBL[tipo]||tipo}</div><button onclick="desfLav('${id}');closeSheet(true)" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">↩ Desfazer</button></div>`);return}
  if(tipo==='leve'){
    openSheet('🟢 '+prefixo+' — Leve',`<div style="padding:8px 0">
      ${CK_LAV_M.leve.map(it=>`<div class="ck-row" style="opacity:0.7"><div style="width:28px;height:28px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:14px">○</div><div class="ck-txt">${it}</div></div>`).join('')}

      <button onclick="concLaveUm('${id}');closeSheet(true)" style="width:100%;margin-top:10px;padding:14px;border-radius:12px;border:1px solid #10B98140;background:#10B98118;color:#10B981;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">✅ Confirmar este veículo</button>
    </div>`);return;
  }
  const itens=CK_LAV_M[tipo]||CK_LAV_M.simples;
  _lck={};itens.forEach((_,i)=>_lck[i]=false);
  rndrLavSh(prefixo,tipo,itens);

async function concLaveUm(id){
  const{error}=await sb.from('checklist_lavagem').update({status:'executado',hora_executado:new Date().toISOString(),executado_por:S.perfil?.nome}).eq('id',id);
  if(error){toast('Erro: '+error.message,'err');return;}

const TIPO_LBL_LAV={pesada:'🟡 Pesada',media:'🔵 Média',leve:'🟢 Leve',simples:'💧 Simples',preventiva:'🟣 Preventiva'};
function rndrLavSh(p,tipo,itens){
  const ok=Object.values(_lck).every(v=>v);
  openSheet('🚿 '+p+' — '+(TIPO_LBL_LAV[tipo]||tipo),`

}

// ── SOLTURA (Líder Pátio) ─────────────────────────────────
let _sid='',_sdata=hoje(),_sLista=[],_sDatas=[],_sloFiltro='';

function selFiltroSoltura(tipo){
  // Ciclo: nenhum → pendentes → OK → nenhum
  // Primeiro toque mostra PENDENTES (não recolhidos / não abastecidos)
  if(_sloFiltro==='no'+tipo) _sloFiltro=tipo;         // norec → rec
  else if(_sloFiltro===tipo) _sloFiltro='';            // rec → ''
  else _sloFiltro='no'+tipo;                           // '' → norec

  // Limpar busca de texto
  const bs=document.getElementById('busca-sol');
  if(bs) bs.value='';

  // Atualizar visual dos painéis SEM re-renderizar a tela toda
  _atualizarPaineisFiltro();

  // Aplicar filtro nos cards já renderizados
  filtrarSoltura('');
}

function _atualizarPaineisFiltro(){
  const pr=document.getElementById('painel-rec');
  const pa=document.getElementById('painel-ab');
  const nRec=window._recMap?.size||0;
  const nAb=window._abMap?.size||0;
  const tot=_sLista?.length||0;

  if(pr){
    const ativo=_sloFiltro==='rec';
    const ativoNeg=_sloFiltro==='norec';
    pr.style.background=ativo?'#00C48C18':ativoNeg?'#EF444418':'#EF444412';
    pr.style.border='2px solid '+(ativo?'#00C48C60':ativoNeg?'#EF444460':nRec>0?'#00C48C40':'#EF444430');
    const label=pr.querySelector('div:last-child');
    if(label){
      label.textContent=ativo?'✅ mostrando recolhidos':ativoNeg?'❌ mostrando pendentes':'toque para filtrar';
      label.style.color=ativo?'var(--green)':ativoNeg?'var(--red)':'var(--text4)';
    }
  }
  if(pa){
    const ativo=_sloFiltro==='ab';
    const ativoNeg=_sloFiltro==='noab';
    pa.style.background=ativo?'#00C48C18':ativoNeg?'#EF444418':'#EF444412';
    pa.style.border='2px solid '+(ativo?'#00C48C60':ativoNeg?'#EF444460':nAb>0?'#00C48C40':'#EF444430');
    const label=pa.querySelector('div:last-child');
    if(label){
      label.textContent=ativo?'✅ mostrando abastecidos':ativoNeg?'❌ mostrando pendentes':'toque para filtrar';
      label.style.color=ativo?'var(--green)':ativoNeg?'var(--red)':'var(--text4)';
    }
  }
}

async function telaSoltura(dataFiltro=null){
  const gid=getGid();
  if(dataFiltro){_sdata=dataFiltro;_sloFiltro='';}
  else if(!_sdata) _sdata=hoje();

  // Busca datas disponíveis na escala (últimos 3 dias + próximos 3)
  const base=new Date();
  const datas=[];
  for(let i=-2;i<=3;i++){
    const d=new Date(base);d.setDate(d.getDate()+i);
    datas.push(d.toISOString().split('T')[0]);
  }
  const{data:datasDisp}=await sb.from('soltura_2_10')
    .select('data').eq('garagem_id',gid).in('data',datas);
  const datasComEscala=[...new Set((datasDisp||[]).map(r=>r.data))].sort();

  // Se a data atual não tem escala, usa hoje
  if(datasComEscala.length&&!datasComEscala.includes(_sdata)){
    _sdata=datasComEscala.includes(hoje())?hoje():datasComEscala[datasComEscala.length-1];
  }

  const{data:lista}=await sb.from('soltura_2_10').select('*')
    .eq('garagem_id',gid).eq('data',_sdata).order('horario_programado');

  // Busca recolhas e abastecimentos — direto da soltura_2_10 (campo recolhido)
  // e da tabela de abastecimento
  let recSet=new Set(), abSet=new Set();
  let recHoraMap=new Map(), abHoraMap=new Map();
  // Indicadores: lê recolhido/abastecido direto dos campos da soltura
  (lista||[]).forEach(r=>{
    if(r.recolhido===true){
      recSet.add(r.prefixo);
      if(r.recolhido_em){
        try{recHoraMap.set(r.prefixo,new Date(r.recolhido_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));}catch(e){}
      }
    }
    if(r.abastecido===true){
      abSet.add(r.prefixo);
      if(r.abastecido_em){
        try{abHoraMap.set(r.prefixo,new Date(r.abastecido_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));}catch(e){}
      }
    }
  });
  // Fallback abastecimento: lê tanto da data selecionada quanto do dia anterior
  // (frentista abastece hoje à noite para a escala de amanhã)
  try{
    const dAnterior=new Date(_sdata+'T12:00:00');dAnterior.setDate(dAnterior.getDate()-1);
    const dAnteriorStr=dAnterior.toISOString().split('T')[0];
    const{data:a}=await sb.from('abastecimento_checklist').select('prefixo,horario,data')
      .eq('garagem_id',gid).in('data',[_sdata,dAnteriorStr]);
    if(a){a.forEach(x=>{abSet.add(x.prefixo);if(x.horario&&!abHoraMap.has(x.prefixo))abHoraMap.set(x.prefixo,x.horario);});}
  }catch(e){}
  // Cruzamento direto com recolha_checklist — corrige dessincronização de data
  // (plantonista pode gravar com _diaRef diferente do _sdata que o líder visualiza)
  try{
    const dMenos1=opAddDays(_sdata,-1);
    const{data:recDireto}=await sb.from('recolha_checklist')
      .select('prefixo,horario_real,created_at')
      .eq('garagem_id',gid)
      .in('data_recolha',[_sdata,dMenos1]);
    (recDireto||[]).forEach(r=>{
      recSet.add(r.prefixo);
      if(r.horario_real&&!recHoraMap.has(r.prefixo))recHoraMap.set(r.prefixo,r.horario_real);
    });
  }catch(e){}
  window._recMap=recSet;
  window._abMap=abSet;
  window._recHoraMap=recHoraMap;
  window._abHoraMap=abHoraMap;

  _sLista=lista||[];
  _sDatas=datasComEscala;
  renderSoltura(_sLista,'',datasComEscala);

  // Atualiza automaticamente a cada 30s (zona do manobrista aparece em tempo real)
  clearInterval(window._solturaTimer);
  window._solturaTimer=setInterval(async()=>{
    if(S.tela!=='soltura') return clearInterval(window._solturaTimer);
    const{data:atualizado}=await sb.from('soltura_2_10').select('*')
      .eq('garagem_id',gid).eq('data',_sdata).order('horario_programado');
    if(atualizado){
      _sLista=atualizado;
      const busca=document.getElementById('busca-sol')?.value||'';
      filtrarSoltura(busca);
    }
  },30000);
}

          ${zonaObj?`<span style="font-size:9px;font-weight:700;border:1px solid ${zonaObj.cor}40;background:${zonaObj.cor}18;color:${zonaObj.cor};border-radius:4px;padding:1px 6px">${zonaObj.nome}</span>`:
          `<span style="font-size:9px;color:var(--red);font-weight:700;border:1px solid #EF444430;background:#EF444410;border-radius:4px;padding:1px 6px">Sem zona</span>`}
        </div>

          ${r.motorista_fim&&r.motorista_fim!==r.motorista

          }

      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">

// Navegação de data — recalcula dinamicamente
function navData(dir){
  const base = new Date(_sdata+'T12:00:00');
  if(dir===0){ _sdata=hoje(); }
  else { base.setDate(base.getDate()+dir); _sdata=base.toISOString().split('T')[0]; }
  telaSoltura(_sdata);
}

// Busca sem re-renderizar tudo — só atualiza os cards
function filtrarSoltura(busca){
  const lista=_sLista||[];
  // Pendentes primeiro, validados no final
  const ordenada=[...lista].sort((a,b)=>{
    const pa=a.saiu===true?2:a.saiu===false?1:0;
    const pb=b.saiu===true?2:b.saiu===false?1:0;
    if(pa!==pb) return pa-pb;
    return (a.horario_programado||'').localeCompare(b.horario_programado||'');
  });
  const filtrada=busca
    ?ordenada.filter(r=>r.prefixo?.includes(busca.toUpperCase())||r.horario_programado?.includes(busca)||r.motorista?.toLowerCase().includes(busca.toLowerCase()))

  const TIPO_C={simples:'#3B82F6',pesada:'#10B981'};
  const cards=filtrada.map(r=>{
    const d=r.saiu===true,n=r.saiu===false;

    const zonaObj=r.zona_patio?ZONAS.find(z=>z.z===r.zona_patio):null;
    return`<div class="vcard ${d?'done':n?'nok':''}" onclick="abrirSol('${r.id}','${r.prefixo}','${r.horario_programado||''}','${r.linha||''}','${(r.motorista||'').replace(/'/g,'')}')">

          ${zonaObj?`<span style="font-size:9px;font-weight:700;border:1px solid ${zonaObj.cor}40;background:${zonaObj.cor}18;color:${zonaObj.cor};border-radius:4px;padding:1px 6px">${zonaObj.nome}</span>`:''}
        </div>
        <div class="vcard-sub">${r.horario_programado||'—'} · ${r.linha||'—'}</div>
        <div class="vcard-sub" style="display:flex;gap:8px">
          <span>${r.motorista?.split(' ').slice(0,2).join(' ')||'—'}${d&&r.horario_real?' · ✅'+r.horario_real:''}</span>
          ${r.manobrista?`<span style="color:var(--text4)">🚗 ${r.manobrista.split(' ')[0]}</span>`:''}
        </div>
      </div>
      <div class="btn-ck ${d?'ok':n?'nok':''}">${d?'✅':n?'❌':'○'}</div>
    </div>`;
  }).join('');

  const el=document.getElementById('cards-sol');
  const ct=document.getElementById('sl-count');
  if(el) el.innerHTML=cards||'<div style="padding:20px;text-align:center;color:var(--text3)">Nenhum resultado</div>';
  if(ct) ct.textContent=filtrada.length+(busca?' resultado(s)':' veículo(s)');
}

async function confirmarTrocaMotorista(motoristaAnterior){
  const solId=window._trocaMotId;
  const prefixo=window._trocaMot_prefixo;
  const novoMotorista=document.getElementById('tm-matricula')?.value?.trim();
  const motivo=document.getElementById('tm-motivo')?.value||'Outro';

  if(!novoMotorista){toast('Informe a matrícula ou nome do motorista','err');return;}

  // Grava o motivo e novo motorista — mantém motorista original no campo principal
  // motorista_fim = quem efetivamente saiu (o substituto)
  // motorista = quem estava escalado originalmente (não altera)
  const obs=`Troca motorista (${motivo}): ${motoristaAnterior||'—'} → ${novoMotorista}`;
  await sb.from('soltura_2_10').update({
    motorista_fim: novoMotorista,   // substituto que saiu de fato
    motivo_troca: motivo,           // falta / atraso / acidente / outro
    observacao: obs,
    // motorista (original) NÃO é alterado — fica registrado quem era o escalado
  }).eq('id',solId);

  closeSheet(true);
  toast(`👤 Troca registrada: ${novoMotorista} (${motivo})`);
  telaSoltura();
}

async function confirmarFechamento(){
  const btn=document.querySelector('#shbody button[onclick="confirmarFechamento()"]');
  if(btn){btn.textContent='Salvando...';btn.disabled=true;}

  const obs=document.getElementById('obs-turno')?.value?.trim();
  const saiu=_sLista.filter(r=>r.saiu===true).length;
  const pct=_sLista.length?Math.round(saiu/_sLista.length*100):0;
  const gid=getGid();

  // Tenta gravar — responsavel_id opcional para evitar FK error
  const payload={
    garagem_id:gid,
    turno:S.turno||'dia',
    data:_sdata,
    responsavel_nome:S.perfil?.nome||'—',
    status_geral:pct>=99?'ok':pct>=90?'parcial':'nok',
    op_soltura:saiu,
    op_obs:obs||null,
  };

  // Tenta com responsavel_id primeiro
  let{error}=await sb.from('fechamento_turno_garagem').insert({...payload,responsavel_id:S.perfil?.id});
  // Se falhar por FK, tenta sem
  if(error?.message?.includes('responsavel_id')||error?.message?.includes('foreign key')){
    const r2=await sb.from('fechamento_turno_garagem').insert(payload);
    error=r2.error;
  }

  if(error){
    toast('Erro: '+error.message,'err');
    if(btn){btn.textContent='⚠️ Tentar Novamente';btn.disabled=false;}
    return;
  }

  closeSheet(true);
  toast('✅ Turno fechado!');
  telaSoltura(_sdata);
}

async function confirmarFechamentoAbastecimento(){
  const gid=getGid();
  // Pega a data do campo editável no sheet
  const dataGravar=document.getElementById('fa-data')?.value||hoje();
  const obs=document.getElementById('obs-abast')?.value?.trim()||null;

  // Bloquear botão — busca pelo id
  const btn=document.getElementById('btn-fechar-ab');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  try{
    const{data:abast,error:errBusca}=await sb.from('abastecimento_checklist')
      .select('*').eq('garagem_id',gid).eq('data',dataGravar);
    if(errBusca) throw errBusca;

    const lista=abast||[];
    const totLitros=lista.reduce((s,a)=>s+(parseFloat(a.litros)||0),0);
    const totArla=lista.filter(a=>a.arla).reduce((s,a)=>s+(parseFloat(a.arla_litros)||0),0);

    const{error}=await sb.from('fechamento_abastecimento').insert({
      garagem_id:gid,
      data:dataGravar,
      total_veiculos:lista.length,
      total_litros:totLitros,
      total_arla:totArla||null,
      total_frota:_abFrotaLista.length||null,
      pct_frota:_abFrotaLista.length?Math.round((lista.length/_abFrotaLista.length)*100):null,
      responsavel_nome:S.perfil?.nome||null,
      responsavel_id:S.perfil?.id||null,
      observacao:obs,
      detalhes:lista,
    });
    if(error) throw error;

    // Limpa todos os registros de hoje após arquivar
    // Deleta pelos IDs exatos que foram arquivados — mais seguro que filtro de data
    const ids=lista.map(a=>a.id).filter(Boolean);
    if(ids.length){
      const{error:errDel}=await sb.from('abastecimento_checklist')
        .delete().in('id',ids);
      if(errDel) throw new Error('Arquivado mas erro ao limpar: '+errDel.message);
    }

    closeSheet(true);
    toast(`✅ Arquivado! ${lista.length} veículos · ${totLitros.toLocaleString('pt-BR',{minimumFractionDigits:1})}L — Gerando relatório...`);

    // Gerar e enviar relatório de fechamento (recolha + abastecimento)
    await gerarRelatorioFechamento(gid, dataGravar, lista);
    telaAbastecimento();
  }catch(e){
    toast('❌ '+e.message,'err');
    if(btn){btn.disabled=false;btn.textContent='💾 Arquivar Turno de Abastecimento';}
  }
}

    return;
  }
  var SC={em_manutencao:{c:'var(--amber)',l:'Manutenção'},aguardando_peca:{c:'var(--red)',l:'Ag. Peça'},aguardando_aprovacao:{c:'var(--purple)',l:'Ag. Aprovação'},liberado:{c:'var(--green)',l:'Fechada'}};

  }
  ocs.forEach(function(o){
    var st=SC[o.status]||{c:'var(--text3)',l:o.status};
    var lib=libMap[o.prefixo];
    var baseData=new Date(o.hora_entrada||o.created_at||o.updated_at);

      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+

        '<span style="background:'+(lib?'#00C48C18':st.c+'18')+';border:1px solid '+(lib?'#00C48C50':st.c+'40')+';color:'+(lib?'var(--green)':st.c)+';border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700">'+(lib?'Liberação feita':st.l)+'</span>'+

  document.getElementById('content').addEventListener('click', function handler(e){

var _OS={id:'',aba:'qual',dados38:{},oc:null,ckl:[]};

async function garantirChecklistLibMobile(oc){
  if(!oc||!oc.id) return [];
  var gid=getGid();
  var tipo=oc.tipo||'corretiva';
  var base=(CHECKLIST_LIB_ITEMS[tipo]||CHECKLIST_LIB_ITEMS.corretiva||[]);
  var r=await sb.from('checklist_liberacao').select('*').eq('ocorrencia_id',oc.id).order('ordem');
  var items=r.data||[];
  if(r.error){toast('Erro checklist: '+r.error.message,'err');return items;}
  if(base.length&&items.length!==base.length){
    var antigoPorItem={};
    items.forEach(function(i){antigoPorItem[i.item]=i;});
    if(items.length){
      var del=await sb.from('checklist_liberacao').delete().eq('ocorrencia_id',oc.id);
      if(del.error){toast('Erro ao atualizar checklist: '+del.error.message,'err');return items;}
    }
    var lote=base.map(function(it){
      var ant=antigoPorItem[it.item]||{};
      return {
        ocorrencia_id:oc.id,garagem_id:gid,tipo:tipo,item:it.item,ordem:it.ordem,
        concluido:!!ant.concluido,verificado:!!ant.verificado,trocado:!!ant.trocado,nao_se_aplica:!!ant.nao_se_aplica,
        verificado_por:ant.verificado_por||null,verificado_em:ant.verificado_em||null,
        trocado_por:ant.trocado_por||null,trocado_em:ant.trocado_em||null,
        observacao_item:ant.observacao_item||null
      };
    });
    for(var i=0;i<lote.length;i+=50){
      var ins=await sb.from('checklist_liberacao').insert(lote.slice(i,i+50));
      if(ins.error){toast('Erro ao criar checklist: '+ins.error.message,'err');break;}
    }
    var novo=await sb.from('checklist_liberacao').select('*').eq('ocorrencia_id',oc.id).order('ordem');
    items=novo.data||[];
  }
  return items;
}

      await _renderSetor(ocId, el.dataset.setor);
    }
    else if(action==='enviar-pcm'){
      if(!confirm('Enviar checklist de liberação para aprovação do PCM?')) return;
      await sb.from('checklist_liberacao').update({submetido:true,submetido_por:S.perfil&&S.perfil.nome,submetido_em:new Date().toISOString()}).eq('ocorrencia_id',ocId);

function setOS38(sec,item,val){

}

function renderOS38Oficina(){
  var oc=_OS38.oc;

    sec.itens.forEach(function(it){

      if(v==='nao') nao++;

  var secoes=SECS38.map(function(sec){
    var done=sec.itens.filter(function(it){return dados[sec.sec+'_'+it.id];}).length;
    var rows=sec.itens.map(function(it){
      var key=sec.sec+'_'+it.id;
      var val=dados[key]||'';

      return '<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border2)">'+
        '<div style="flex:1;font-size:12px;line-height:1.35;color:'+(naoSel?'var(--red)':simSel?'var(--text)':'var(--text3)')+'">'+it.txt+'</div>'+
        '<button onclick="setOS38(\''+sec.sec.replace(/'/g,'\\u0027')+'\',\''+it.id+'\',\'sim\')" style="width:54px;height:36px;border-radius:9px;border:2px solid '+(simSel?'var(--green)':'var(--border)')+';background:'+(simSel?'#00C48C18':'transparent')+';color:'+(simSel?'var(--green)':'var(--text3)')+';font-size:12px;font-weight:800;font-family:inherit">SIM</button>'+
        '<button onclick="setOS38(\''+sec.sec.replace(/'/g,'\\u0027')+'\',\''+it.id+'\',\'nao\')" style="width:54px;height:36px;border-radius:9px;border:2px solid '+(naoSel?'var(--red)':'var(--border)')+';background:'+(naoSel?'#EF444418':'transparent')+';color:'+(naoSel?'var(--red)':'var(--text3)')+';font-size:12px;font-weight:800;font-family:inherit">NÃO</button>'+
      '</div>';
    }).join('');
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px">'+
      '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:6px"><div style="font-size:12px;font-weight:900;color:var(--blue)">'+sec.sec+'</div><div style="font-family:\'DM Mono\',monospace;font-size:12px;color:'+(done===sec.itens.length?'var(--green)':'var(--amber)')+'">'+done+'/'+sec.itens.length+'</div></div>'+
      rows+
    '</div>';

  var status='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'+
    '<div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center"><div style="font-family:\'DM Mono\',monospace;font-size:18px;color:var(--blue);font-weight:900">'+preench+'/'+total+'</div><div style="font-size:10px;color:var(--text3);font-weight:800">VERIFICADOS</div></div>'+
    '<div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center"><div style="font-family:\'DM Mono\',monospace;font-size:18px;color:var(--green);font-weight:900">'+sim+'</div><div style="font-size:10px;color:var(--text3);font-weight:800">SIM</div></div>'+
    '<div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center"><div style="font-family:\'DM Mono\',monospace;font-size:18px;color:'+(nao?'var(--red)':'var(--text4)')+';font-weight:900">'+nao+'</div><div style="font-size:10px;color:var(--text3);font-weight:800">NÃO</div></div>'+
  '</div>'+
  '<div style="background:var(--border);border-radius:99px;height:6px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:'+pct+'%;background:'+(pct===100?'var(--green)':'var(--blue)')+'"></div></div>'+
  '<button onclick="abrirQual38Oficina()" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:800;font-family:inherit;margin-bottom:12px">🔧 Qualificação da OS</button>';
  openSheet(oc.prefixo+' — Checklist 3.8',status+secoes+
    '<button onclick="salvarOS38Oficina()" style="width:100%;padding:15px;border-radius:12px;border:none;background:'+(pct===100?'var(--green)':'var(--blue)')+';color:#fff;font-size:15px;font-weight:800;font-family:inherit;margin-top:4px">'+(pct===100?'Salvar e exportar PDF':'Salvar checklist 3.8 ('+pct+'%)')+'</button>');

      '<span>'+sg.ic+' '+sg.key+'</span><span>'+done+'/'+its.length+'</span></button>';

    '<div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:12px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12px;color:var(--text3);font-weight:800">QUALIFICAÇÃO</span><b style="color:'+(pct===100?'var(--green)':'var(--blue)')+'">'+qual+'/'+tot+'</b></div>'+
      '<div style="background:var(--border);height:6px;border-radius:99px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(pct===100?'var(--green)':'var(--blue)')+'"></div></div>'+

  var ckl=_OS38.qual||[];

function togQual38(idx,tipo,setor){
  var it=_OS38.qual&&_OS38.qual[idx];
  if(!it) return;
  var n,p={};
  if(tipo==='v'){
    n=!it.verificado;
    p={verificado:n,verificado_por:n?(S.perfil&&S.perfil.nome):null,verificado_em:n?new Date().toISOString():null};
    it.verificado=n; it.verificado_por=p.verificado_por; it.verificado_em=p.verificado_em;
    if(!n){p.trocado=false;it.trocado=false;}
  } else if(tipo==='t'){
    if(!it.verificado) return;
    n=!it.trocado;
    p={trocado:n,trocado_por:n?(S.perfil&&S.perfil.nome):null,trocado_em:n?new Date().toISOString():null};
    it.trocado=n; it.trocado_por=p.trocado_por; it.trocado_em=p.trocado_em;
  } else if(tipo==='nsa'){
    n=!it.nao_se_aplica;
    p={nao_se_aplica:n,verificado:n,trocado:n,verificado_por:n?(S.perfil&&S.perfil.nome):null,trocado_por:n?(S.perfil&&S.perfil.nome):null,verificado_em:n?new Date().toISOString():null,trocado_em:n?new Date().toISOString():null};
    it.nao_se_aplica=n; it.verificado=n; it.trocado=n; it.verificado_por=p.verificado_por; it.trocado_por=p.trocado_por; it.verificado_em=p.verificado_em; it.trocado_em=p.trocado_em;
  }
  _OS38.qualDirty[it.id]=p;
  refreshQual38Linha(idx,setor);
}

function refreshQual38Linha(idx,setor){
  var it=_OS38.qual&&_OS38.qual[idx];
  if(!it) return;
  var nsa=!!it.nao_se_aplica;
  var txt=document.getElementById('qtxt_'+idx);
  if(txt) txt.style.color=it.trocado?'var(--green)':it.verificado?'var(--text)':'var(--text3)';
  var bv=document.getElementById('qbtn_'+idx+'_v');
  var bt=document.getElementById('qbtn_'+idx+'_t');
  var bn=document.getElementById('qbtn_'+idx+'_nsa');
  if(bv){bv.className='ck-b '+(it.verificado?'von':'');bv.disabled=nsa;}
  if(bt){bt.className='ck-b '+(it.trocado?'ton':'');bt.disabled=!it.verificado||nsa;}
  if(bn){bn.className='ck-b '+(nsa?'na':'');}
  var sg=SETORES_M.find(function(s){return s.key===setor;});
  var itens=(_OS38.qual||[]).filter(function(i){var m=i.item&&i.item.match(/^\[([^\]]+)\]/);return (sg&&sg.gr||[]).includes(m?m[1]:'GERAL');});
  var done=itens.filter(function(i){return i.trocado||i.nao_se_aplica;}).length;
  var cnt=document.getElementById('qcnt_setor');
  if(cnt){cnt.textContent=done+'/'+itens.length;cnt.style.color=done===itens.length?'var(--green)':'var(--amber)';}
}

async function salvarQual38Oficina(silencioso){
  var ids=Object.keys(_OS38.qualDirty||{});
  if(!ids.length){if(!silencioso) toast('Nada novo para salvar');return true;}
  for(var i=0;i<ids.length;i++){
    var res=await sb.from('checklist_liberacao').update(_OS38.qualDirty[ids[i]]).eq('id',ids[i]);
    if(res.error){toast('Erro ao salvar qualificação: '+res.error.message,'err');return false;}
  }
  _OS38.qualDirty={};
  if(!silencioso) toast('✅ Qualificação salva');
  return true;
}

async function salvarOS38Oficina(){
  var oc=_OS38.oc;
  if(!oc) return;
  var gid=getGid();
  var dados=_OS38.dados||{};
  var preench=Object.values(dados).filter(Boolean).length;
  if(preench<TOTAL_38){
    if(!confirm('Checklist 3.8 ainda não está 100%. Deseja salvar mesmo assim?')) return;
  }
  var payload={
    garagem_id:gid,
    prefixo:oc.prefixo,
    data:hoje(),
    hora_liberacao:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Manaus'}),
    dados:dados,
    total_itens:TOTAL_38,
    total_verificados:preench,
    criado_por:S.perfil&&S.perfil.nome||null,
    criado_em:new Date().toISOString()
  };
  var res;
  if(_OS38.libId){
    res=await sb.from('checklist_38').update(payload).eq('id',_OS38.libId);
  } else {
    res=await sb.from('checklist_38').insert(payload).select('id').single();
    if(res.data&&res.data.id)_OS38.libId=res.data.id;
  }
  if(res.error){toast('Erro ao salvar 3.8: '+res.error.message,'err');return;}
  if(_OS38.qual&&Object.keys(_OS38.qualDirty||{}).length){
    var okQual=await salvarQual38Oficina(true);
    if(!okQual) return;
  }
  _OS.dados38[oc.id]=dados;
  toast('✅ 3.8 salvo. Gerando PDF...');
  closeSheet(true);
  await _exportarOS(oc.id);
  telaOficina();
}

async function _renderSetor(ocId,setor){
  var shbody=document.getElementById('shbody');
  var shttl=document.getElementById('shttl');
  if(shbody) shbody.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">Carregando...</div>';

  var sg=SETORES_M.find(function(s){return s.key===setor;});
  var r1=await sb.from('checklist_liberacao').select('*').eq('ocorrencia_id',ocId).order('ordem');
  var r2=await sb.from('ocorrencias_22').select('prefixo').eq('id',ocId).single();
  var ckl=r1.data||[];
  var itens=ckl.filter(function(i){var m=i.item&&i.item.match(/^\[([^\]]+)\]/);return (sg&&sg.gr||[]).includes(m?m[1]:'GERAL');});
  var subm=ckl.some(function(i){return i.submetido;});
  var aprov=ckl.some(function(i){return i.aprovado;});
  var podeEd=['lider_oficina','lider_pcm','assistente_pcm'].includes(cargo())&&!subm&&!aprov;
  var vTot=itens.filter(function(i){return i.verificado||i.nao_se_aplica;}).length;
  var tTot=itens.filter(function(i){return i.trocado||i.nao_se_aplica;}).length;

  var rows='';
  itens.forEach(function(it){
    var nsa=it.nao_se_aplica;
    var txt=(it.item||'').replace(/^\[[^\]]+\]\s*/,'');
    var cor=it.trocado?'var(--green)':it.verificado?'var(--text)':'var(--text3)';
    rows+='<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border2)">';
    rows+='<div style="flex:1;font-size:12px;line-height:1.4;color:'+cor+'">'+txt+'</div>';
    if(podeEd){
      // data-itemid, data-tipo — sem nenhum valor dinâmico no atributo onclick
      rows+='<button data-action="tog" data-itemid="'+it.id+'" data-tipo="v" data-setor="'+setor+'" '+(nsa?'disabled':'')+' class="ck-b '+(it.verificado?'von':'')+'" style="touch-action:manipulation">V</button>';
      rows+='<button data-action="tog" data-itemid="'+it.id+'" data-tipo="t" data-setor="'+setor+'" '+(!it.verificado||nsa?'disabled':'')+' class="ck-b '+(it.trocado?'ton':'')+'" style="touch-action:manipulation">T</button>';
      rows+='<button data-action="tog" data-itemid="'+it.id+'" data-tipo="nsa" data-setor="'+setor+'" class="ck-b '+(nsa?'na':'')+'" style="touch-action:manipulation">N/A</button>';
    } else {
      rows+='<span style="font-size:11px;color:'+(it.trocado?'var(--green)':it.verificado?'var(--blue)':'var(--text4)')+'">'+( it.trocado?'T✓':it.verificado?'V✓':nsa?'N/A':'—')+'</span>';
    }
    rows+='</div>';
  });

  if(shttl) shttl.textContent=(sg&&sg.ic||'')+' '+setor+' — '+(r2.data&&r2.data.prefixo||'');
  if(shbody){
    shbody.innerHTML=
      '<button data-action="voltar-qual" style="background:transparent;border:none;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:0 0 12px;display:block">← Voltar</button>'+
      '<div style="background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;font-size:12px">'+
        '<span>V: <b style="color:var(--blue)">'+vTot+'/'+itens.length+'</b></span>'+
        '<span>T: <b style="color:'+(tTot===itens.length?'var(--green)':'var(--amber)')+'">'+tTot+'/'+itens.length+'</b></span>'+
      '</div>'+
      '<div style="max-height:65vh;overflow-y:auto">'+rows+'</div>';

    // Event delegation no setor
    shbody.onclick=async function(e){
      var el=e.target.closest('[data-action]');
      if(!el) return;
      shbody.onclick=null;

      if(el.dataset.action==='voltar-qual'){
        _OS.aba='qual';
        await _renderOS();
      }
      else if(el.dataset.action==='tog'){
        var itemId=el.dataset.itemid;
        var tipo=el.dataset.tipo;
        var setorTog=el.dataset.setor;
        // Feedback visual imediato
        el.style.opacity='0.5';
        var r=await sb.from('checklist_liberacao').select('*').eq('id',itemId).single();
        var it=r.data;
        if(!it){toast('Erro: item não encontrado','err');await _renderSetor(ocId,setorTog);return;}
        var p={};
        if(tipo==='v'){var n=!it.verificado;p={verificado:n,verificado_por:n?(S.perfil&&S.perfil.nome):null,verificado_em:n?new Date().toISOString():null};if(!n)p.trocado=false;}
        else if(tipo==='t'){if(!it.verificado) return;var n=!it.trocado;p={trocado:n,trocado_por:n?(S.perfil&&S.perfil.nome):null,trocado_em:n?new Date().toISOString():null};}
        else if(tipo==='nsa'){var n=!it.nao_se_aplica;p={nao_se_aplica:n,verificado:n,trocado:n,verificado_por:n?(S.perfil&&S.perfil.nome):null,trocado_por:n?(S.perfil&&S.perfil.nome):null,verificado_em:n?new Date().toISOString():null,trocado_em:n?new Date().toISOString():null};}
        var res=await sb.from('checklist_liberacao').update(p).eq('id',itemId);
        if(res.error){toast('Erro: '+res.error.message,'err');}
        await _renderSetor(ocId,setorTog);
      }
    };
  }
}

let _valetMobData=null;
function parseItensValetTexto(txt){
  return String(txt||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(l=>{
    let qtd=1,peca=l;
    let m=l.match(/^(\d+)\s*[-xX ]\s*(.+)$/);
    if(m){qtd=parseInt(m[1],10)||1;peca=m[2].trim();}
    else{
      m=l.match(/^(.+?)\s*(?:x|qtd\.?|quant\.?)\s*(\d+)$/i);
      if(m){peca=m[1].trim();qtd=parseInt(m[2],10)||1;}
    }
    return {peca,qtd};
  });
}

async function submeterSetor33Mobile(setor,rodada){
  const setorDef=R33_SETORES.find(s=>s.id===setor);
  if(!setorDef){toast('Setor inválido','err');return;}
  const rec=await r33Registro(rodada);
  if(!rec?.id){toast('Preencha os itens antes de submeter','err');return;}
  const respostas=rec.dados?.respostas||{};
  const itensDaRodada=setorDef.itens.filter(i=>i[2]===rodada);
  const semResposta=itensDaRodada.filter(i=>!respostas[i[0]]?.status);
  if(semResposta.length>0){toast(`Preencha todos os itens (${semResposta.length} pendente(s))`,'err');return;}
  const dados=rec.dados||{respostas:{},resumos:{}};
  dados.setores_concluidos=dados.setores_concluidos||{};
  dados.setores_concluidos[setor]={ok:true,por:S.perfil?.nome||null,em:new Date().toISOString()};
  const res=await sb.from('checklist_33').update({dados,preenchido_em:new Date().toISOString()}).eq('id',rec.id);
  if(res.error){toast('Erro: '+res.error.message,'err');return;}
  toast(`✅ ${setorDef.nome} submetido!`);
  _r33Cache={};telaRonda33();
}

function selCarPatio(prefixo, el){

function filtrarCarrosPatio(busca){
  const lista=document.querySelectorAll('#lista-carros-patio [data-prefixo]');
  lista.forEach(el=>{

  const inp=document.getElementById('mp-prefixo');
  if(inp&&busca.length>=4) inp.value=busca.toUpperCase();

// ── DIA DE REFERÊNCIA (plantão, abastecimento, líder de pátio) ───────────
// O operador escolhe só o DIA — faixa 19:00 → dia+1 07:20 calculada automaticamente

function _diaRefDefault(){
  const p=opParts(new Date(),opTimezone()),min=p.H*60+p.M;
  return min<7*60+20?opAddDays(hoje(),-1):hoje();
}

if(!window._diaRef) window._diaRef=_diaRefDefault();

function _faixaIniISO(){ return opDateTimeISO(window._diaRef,'19:00'); }
function _faixaFimISO(){
  return opDateTimeISO(opAddDays(window._diaRef,1),'07:20');
}
function _diaSoltura(){
  return opAddDays(window._diaRef,1);
}
function _diaRefLabel(){
  return new Date(window._diaRef+'T12:00:00').toLocaleDateString('pt-BR',{
    timeZone:'America/Manaus',weekday:'short',day:'2-digit',month:'2-digit'
  });
}
function _faixaLabel(){
  const ini=new Date(window._diaRef+'T19:00:00').toLocaleString('pt-BR',{timeZone:'America/Manaus',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  const d=new Date(window._diaRef+'T12:00:00');d.setDate(d.getDate()+1);
  const fim=new Date(d.toISOString().slice(0,10)+'T07:20:00').toLocaleString('pt-BR',{timeZone:'America/Manaus',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  return ini+' → '+fim;
}
function _mergePorPrefixo(...listas){
  const map={};
  listas.flat().filter(Boolean).forEach(r=>{
    if(!r.prefixo) return;
    const atual=map[r.prefixo];
    const dtR=new Date(r.created_at||r.horario||0).getTime()||0;
    const dtA=atual?new Date(atual.created_at||atual.horario||0).getTime()||0:-1;
    if(!atual||dtR>=dtA) map[r.prefixo]=r;
  });
  return Object.values(map);
}
// Compatibilidade com código legado que usa window._faixa
if(!window._faixa) window._faixa={
  get dIni(){ return window._diaRef; },
  get hIni(){ return '19:00'; },
  get dFim(){ return opAddDays(window._diaRef,1); },
  get hFim(){ return '07:20'; },
  turno:'noite'
};

  openSheet('📅 Dia de Referência',`

        <input type="date" id="fx-dia-ref" value="${dRef}"
          oninput="document.getElementById('fx-preview').innerHTML=_previewDiaRef(this.value)"

      </div>

        ${_previewDiaRef(dRef)}
      </div>

      <button onclick="confirmarDiaRef()" style="padding:15px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">

      </button>

  `);

function _previewDiaRef(dRef){
  if(!dRef) return '';
  const d=new Date(dRef+'T12:00:00');
  const dNext=new Date(dRef+'T12:00:00');dNext.setDate(d.getDate()+1);
  const fmt=(dt,h,m)=>dt.toLocaleDateString('pt-BR',{timeZone:'America/Manaus',weekday:'short',day:'2-digit',month:'2-digit'})+' '+h+':'+m;
  return`<div style="font-size:11px;color:var(--text3)">
    <div style="margin-bottom:6px;font-weight:700;color:var(--text)">Dados que serão computados:</div>
    <div>🔑 Plantão/⛽ Abastecimento: <strong style="color:var(--blue)">${fmt(d,'19','00')} → ${fmt(dNext,'07','20')}</strong></div>
    <div style="margin-top:4px">🚌 Soltura do Líder de Pátio: <strong style="color:var(--green)">${dNext.toLocaleDateString('pt-BR',{timeZone:'America/Manaus',weekday:'short',day:'2-digit',month:'2-digit'})}</strong></div>
  </div>`;
}

function confirmarDiaRef(){
  const dRef=document.getElementById('fx-dia-ref')?.value;

  window._faixa={dIni:dRef,hIni:'19:00',dFim:opAddDays(dRef,1),hFim:'07:20',turno:'noite'};
  closeSheet(true);
  toast('✅ Dia de referência: '+_diaRefLabel());
  if(window._faixaCallback) window._faixaCallback();
}

async function telaRecolha(dataFiltro=null){
  const gid=getGid();
  setMain('<div class="loading"><div class="sp"></div></div>');

  const f=window._faixa;
  const iniISO=_faixaIniISO();
  const fimISO=_faixaFimISO();

  // Busca frota completa
  let frotaRaw=[];
  try{
    const{data:fr}=await sb.from('frota').select('prefixo,modelo,tipo').eq('garagem_id',gid).order('prefixo');
    if(fr?.length) frotaRaw=fr;
  }catch(e){}
  // Fallback: prefixos únicos dos últimos 30 dias
  if(!frotaRaw.length){
    try{
      const d30=new Date();d30.setDate(d30.getDate()-30);
      const{data:sol}=await sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).gte('data',d30.toISOString().slice(0,10));
      frotaRaw=[...new Set((sol||[]).map(s=>s.prefixo))].sort().map(p=>({prefixo:p}));
    }catch(e){}
  }

  // Recolhas dentro da faixa horária
  let recolhas=[];
  try{
    const{data:rDia}=await sb.from('recolha_checklist').select('*')
      .eq('garagem_id',gid)
      .eq('data_recolha',window._diaRef)
      .order('created_at',{ascending:false});
    const{data:r}=await sb.from('recolha_checklist').select('*')
      .eq('garagem_id',gid)
      .gte('created_at',iniISO)
      .lte('created_at',fimISO)
      .order('created_at',{ascending:false});
    recolhas=_mergePorPrefixo(rDia||[],r||[]);
  }catch(e){}

  // Abastecimentos dentro da faixa
  let abastMap={};
  try{
    const{data:abDia}=await sb.from('abastecimento_checklist').select('prefixo,litros,arla_litros,horario,created_at,data')
      .eq('garagem_id',gid)
      .eq('data',window._diaRef);
    const{data:ab}=await sb.from('abastecimento_checklist').select('prefixo,litros,arla_litros,horario,created_at,data')
      .eq('garagem_id',gid)
      .gte('created_at',iniISO)
      .lte('created_at',fimISO);
    _mergePorPrefixo(abDia||[],ab||[]).forEach(a=>{abastMap[a.prefixo]=a;});
  }catch(e){}

  const recMap={};recolhas.forEach(r=>{recMap[r.prefixo]=r;});
  _rcEscalaLista=frotaRaw;

  // Busca escala D+1 para mostrar linha/tabela/horário previsto nos cards
  let escalaMap={};
  try{
    const{data:esc}=await sb.from('soltura_2_10')
      .select('prefixo,linha,posicao,horario_fim,motorista')
      .eq('garagem_id',gid)
      .eq('data',_diaSoltura());
    (esc||[]).forEach(e=>{escalaMap[e.prefixo]=e;});
  }catch(e){}

  const tot=Object.keys(recMap).length;
  const totFrota=frotaRaw.length;
  const totDisp=frotaRaw.filter(e=>recMap[e.prefixo]&&abastMap[e.prefixo]).length;
  const pct=totFrota>0?Math.round((tot/totFrota)*100):0;

  // Helper: delta em minutos entre horario_real e horario_previsto
  function _calcDelta(horReal,horPrev){
    if(!horReal||!horPrev)return null;
    const [ph,pm]=horPrev.split(':').map(Number);
    const [rh,rm]=horReal.split(':').map(Number);
    if(isNaN(ph)||isNaN(rh))return null;
    let d=(rh*60+rm)-(ph*60+pm);
    if(d>600)d-=1440; // virada de meia-noite
    if(d<-600)d+=1440;
    if(Math.abs(d)>600)return null;
    return d;
  }

  const cards=frotaRaw.map(e=>{
    const rec=recMap[e.prefixo];
    const ab=abastMap[e.prefixo];
    const esc=escalaMap[e.prefixo]||{};
    const recOk=!!rec;
    const abOk=!!ab;
    const dispOk=recOk&&abOk;
    const linhaTxt=rec?.linha||esc.linha||'';
    const tabelaTxt=rec?.tabela||esc.posicao||'';
    const horPrev=rec?.horario_previsto||esc.horario_fim||'';
    const horReal=rec?.horario_real||'';
    const motoristaEsc=(esc.motorista||'').replace(/'/g,'');
    const km=rec?.km_hodometro;

    // Badge de pontualidade
    const delta=_calcDelta(horReal,horPrev);
    const deltaBadge=delta===null?'':delta>5
      ?`<span style="color:var(--red);font-size:9px;font-weight:700">⚠️ +${delta}min</span>`
      :delta<-5
        ?`<span style="color:var(--green);font-size:9px;font-weight:700">✅ −${Math.abs(delta)}min</span>`
        :`<span style="color:var(--green);font-size:9px;font-weight:700">✅ Pontual</span>`;

    return`<div class="vcard ${dispOk?'done':rec?.status==='avaria'?'nok':''}" onclick="abrirRecolha('${e.prefixo}','${linhaTxt}','${motoristaEsc}','${horPrev}','${tabelaTxt}')">
      <div style="flex:1;min-width:0">
        <div class="prefixo" style="color:${dispOk?'var(--green)':rec?.status==='avaria'?'var(--red)':recOk?'var(--amber)':'var(--text)'}">${e.prefixo}</div>
        ${(linhaTxt||tabelaTxt)?`<div class="vcard-sub" style="font-size:10px;color:var(--blue)">🚌 ${linhaTxt?'L.'+linhaTxt:''}${tabelaTxt?' · Tab '+tabelaTxt:''}</div>`:''}
        ${e.modelo?`<div class="vcard-sub" style="color:var(--text4)">${e.modelo}</div>`:''}
        ${!recOk&&horPrev?`<div class="vcard-sub" style="font-size:9px;color:var(--text4)">⏱ Prev. ${horPrev}</div>`:''}
        ${recOk?`<div class="vcard-sub" style="color:var(--amber);font-size:10px">🔑 ${horReal||'✓'}${km?' · '+Number(km).toLocaleString()+'km':''} ${deltaBadge}</div>`:''}
        ${ab?`<div class="vcard-sub" style="color:var(--green);font-size:10px">⛽ ${ab.litros}L${ab.arla_litros?' · ARLA '+ab.arla_litros+'L':''}</div>`:''}
      </div>
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;margin-left:8px">
        <div style="width:62px;height:20px;border-radius:5px;border:2px solid ${recOk?(rec?.status==='avaria'?'var(--red)':'var(--amber)'):'var(--border)'};background:${recOk?(rec?.status==='avaria'?'#EF444418':'#F59E0B18'):'transparent'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${recOk?(rec?.status==='avaria'?'var(--red)':'var(--amber)'):'var(--text4)'}">🔑 ${rec?.status==='avaria'?'⚠️ Avaria':'Recolha'}</div>
        <div style="width:62px;height:20px;border-radius:5px;border:2px solid ${abOk?'var(--green)':'var(--border)'};background:${abOk?'#00C48C18':'transparent'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${abOk?'var(--green)':'var(--text4)'}">⛽ Abast.</div>
        ${dispOk?`<div style="font-size:8px;font-weight:800;color:var(--green)">✅ Pronto</div>`:`<div style="font-size:8px;color:var(--text4)">—</div>`}
      </div>
    </div>`;
  }).join('');

  render(`
    <div style="padding:14px 14px 0">
      <!-- Cabeçalho -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-weight:800;font-size:17px">🔑 Plantão / Recolha</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${tot}/${totFrota} recolhidos · ✅ ${totDisp} prontos p/ soltura</div>
        </div>
        <button onclick="telaRecolha()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer">🔄</button>
      </div>

      <!-- Dia de referência -->
      <div onclick="abrirSeletorFaixa(()=>telaRecolha())"
        style="background:var(--surface2);border:1px solid var(--blue);border-radius:10px;padding:10px 14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px">📅 Dia de Referência</div>
          <div style="font-size:14px;font-weight:800;color:var(--text);margin-top:2px">${_diaRefLabel()}</div>
          <div style="font-size:10px;color:var(--text4);margin-top:1px">${_faixaLabel()}</div>
        </div>
        <span style="font-size:11px;color:var(--blue);font-weight:700">Alterar →</span>
      </div>

      <!-- Progresso -->
      <div style="background:var(--border);border-radius:99px;height:6px;overflow:hidden;margin-bottom:6px">

      </div>

}



function filtrarCards(containerId, campo, busca){
  document.querySelectorAll('#'+containerId+' .vcard').forEach(el=>{
    const txt=el.querySelector('.'+campo)?.textContent||'';
    el.style.display=!busca||txt.toLowerCase().includes(busca.toLowerCase())?'flex':'none';
  });
}
function mudarEscalaRef(data){_rcEscalaData=data;telaRecolha();}

function filtrarRecolha(busca){
  const lista=_rcEscalaLista||[];
  const filtrada=busca?lista.filter(r=>r.prefixo?.includes(busca.toUpperCase())||r.linha?.toLowerCase().includes(busca.toLowerCase())||r.motorista?.toLowerCase().includes(busca.toLowerCase())):lista;
  // Só atualiza o contador — a lista é static após render
  const sl=document.getElementById('sl-recolha');
  if(sl) sl.textContent=filtrada.length+' veículo(s)';
  // Filtra os cards
  document.querySelectorAll('#cards-recolha .vcard').forEach((el,i)=>{
    const prefixo=el.querySelector('.prefixo')?.textContent||'';
    const sub=el.querySelectorAll('.vcard-sub');
    const linha=sub[0]?.textContent||'';
    const mot=sub[1]?.textContent||'';
    const show=!busca||prefixo.includes(busca.toUpperCase())||linha.toLowerCase().includes(busca.toLowerCase())||mot.toLowerCase().includes(busca.toLowerCase());
    el.style.display=show?'flex':'none';
  });
}
