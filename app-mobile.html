<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F1E">
<title>JTP Operacional</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="JTP">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0F1E;--surface:#111827;--surface2:#1A2236;--border:#1E2D45;--border2:#1A2535;
  --blue:#2563EB;--green:#00C48C;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;
  --text:#F1F5F9;--text2:#CBD5E1;--text3:#64748B;--text4:#334155;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 8px)}
#navbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;z-index:200}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#1D4ED8,#2563EB);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px #2563EB30}
.fi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none}
.fi:focus{border-color:var(--blue)}
.btn-p{width:100%;background:linear-gradient(135deg,#1D4ED8,#2563EB);border:none;border-radius:12px;padding:16px;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-p:active{opacity:.85}
/* NAV */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:8px 4px;font-family:inherit}
.nav-btn.active{color:var(--blue)}
.nav-ic{font-size:22px}.nav-lb{font-size:10px;font-weight:700;letter-spacing:.5px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin:0 14px 10px}
.vcard{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin:0 14px 8px;transition:border-color .15s;cursor:pointer}
.vcard.done{border-color:#00C48C40;background:#00C48C05}
.vcard.nok{border-color:#EF444440;background:#EF444405}
.prefixo{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.vcard-sub{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.btn-ck{width:50px;height:50px;border-radius:12px;border:2px solid var(--border);background:transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-ck.ok{border-color:var(--green);background:#00C48C18}
.btn-ck.nok{border-color:var(--red);background:#EF444418}
/* OS CARD */
.os-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:14px;padding:13px 15px;margin:0 14px 8px;cursor:pointer}
.os-card.corretiva{border-left-color:var(--red)}.os-card.preventiva_pesada{border-left-color:var(--purple)}
.os-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.os-pre{font-family:'DM Mono',monospace;font-size:21px;font-weight:700;color:var(--blue)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid}
/* SHEET */
.sheet-ov{position:fixed;inset:0;background:#00000088;z-index:300;display:none;align-items:flex-end}
.sheet-ov.open{display:flex}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(var(--safe-bot) + 16px)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:12px auto}
.sheet-ttl{font-size:17px;font-weight:800;padding:4px 20px 14px;border-bottom:1px solid var(--border)}
.sheet-body{padding:16px 20px}
/* CHECKLIST */
.ck-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border2)}
.ck-row:last-child{border:none}
.ck-txt{flex:1;font-size:12px;line-height:1.4}
.ck-b{width:38px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.ck-b.von{border-color:var(--blue);background:#2563EB18;color:var(--blue)}
.ck-b.ton{border-color:var(--green);background:#00C48C18;color:var(--green)}
.ck-b.na{border-color:var(--text4);background:#47556918;color:var(--text4)}
/* UTILS */
.sl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:14px 14px 8px}
.empty{text-align:center;padding:52px 24px;color:var(--text3)}
.empty-ic{font-size:48px;margin-bottom:12px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 16px);right:18px;width:56px;height:56px;border-radius:18px;background:var(--blue);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px #2563EB50;display:flex;align-items:center;justify-content:center;z-index:90}
.fab:active{transform:scale(.92)}
.prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-f{height:100%;border-radius:99px;transition:width .3s}
.fi2{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.fi2:focus{border-color:var(--blue)}
.fl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.kpi2{background:var(--surface2);border-radius:12px;padding:12px;text-align:center}
.kpi2-v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.kpi2-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-top:2px}
#toast{position:fixed;top:calc(var(--safe-top)+60px);left:50%;transform:translateX(-50%) translateY(-20px);background:#1E293B;border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:14px;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-logo">🚌</div>
  <div style="text-align:center"><div style="font-size:26px;font-weight:800">JTP Operacional</div><div style="font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Acesso ao Sistema</div></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px"><label class="fl">E-mail</label><input class="fi" id="le" type="email" inputmode="email" autocomplete="email" placeholder="seu@email.com"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px"><label class="fl">Senha</label><input class="fi" id="ls" type="password" autocomplete="current-password" placeholder="••••••"></div>
  <div id="lerr" style="color:var(--red);font-size:13px;text-align:center;min-height:20px"></div>
  <button class="btn-p" onclick="doLogin()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">🚌</span>
      <div><div style="font-size:14px;font-weight:800" id="tbn">—</div><div style="font-size:10px;color:var(--text3)" id="tbc">—</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:11px;color:var(--text3)" id="tbg">—</div>
      <button id="btn-instalar" onclick="instalarApp()" style="display:none;background:var(--blue);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;align-items:center;gap:4px">📲 Instalar</button>
      <button onclick="doLogout()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text3);font-size:11px;font-family:inherit;cursor:pointer">Sair</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="navbar"></div>
</div>

<!-- SHEET -->
<div class="sheet-ov" id="shov" onclick="closeSheet(event)">
  <div class="sheet" id="sh">
    <div class="sheet-handle"></div>
    <div class="sheet-ttl" id="shttl"></div>
    <div class="sheet-body" id="shbody"></div>
  </div>
</div>

<script>
const {createClient}=supabase;
const sb=createClient('https://jboclubugfxmurvhcxgr.supabase.co','sb_publishable_hasmgR_BbXcJC6Xko6DzaA_N7kl7rNT');
const S={user:null,perfil:null,garagens:[],tela:'home',turno:'dia'};
function hoje(){return new Date().toISOString().split('T')[0]}
function getGid(){return S.perfil?.garagem_id||S.garagens?.[0]?.id}
function cargo(){return S.perfil?.cargo}
const CARGOS={diretoria:'Diretoria',gerente_garagem:'Gerente',lider_pcm:'Líder PCM',assistente_pcm:'Ass. PCM',almoxarifado:'Almoxarifado',lider_operacional:'L. Operacional',lider_suprimentos:'L. Suprimentos',operacoes_seguras:'Op. Seguras',lider_oficina:'L. Oficina',lider_patio:'L. Pátio',lavador:'Lavador',manobrista:'Manobrista',frentista:'Frentista'};
function toast(msg,tipo='ok',dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(tipo==='err'?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='',dur);}
function render(html){document.getElementById('content').innerHTML=html}
function setTela(t){S.tela=t;buildNav();render('<div class="loading"><div class="sp"></div></div>');TELAS[t]&&TELAS[t]()}
function openSheet(ttl,html){document.getElementById('shttl').textContent=ttl;document.getElementById('shbody').innerHTML=html;document.getElementById('shov').classList.add('open')}
function closeSheet(e){if(e===true||e.target===document.getElementById('shov'))document.getElementById('shov').classList.remove('open')}

// LOGIN
async function doLogin(){
  const email=document.getElementById('le').value.trim();
  const senha=document.getElementById('ls').value;
  const err=document.getElementById('lerr');
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';return}
  err.textContent='';
  const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){err.textContent='E-mail ou senha incorretos.';return}
  S.user=data.user;await init();
}
async function init(){
  const[{data:p},{data:g}]=await Promise.all([
    sb.from('perfis').select('*').eq('id',S.user.id).single(),
    sb.from('garagens').select('*').order('nome'),
  ]);
  S.perfil=p;S.garagens=g||[];
  const gar=S.garagens.find(x=>x.id===p?.garagem_id);
  document.getElementById('tbn').textContent=p?.nome?.split(' ')[0]||'—';
  document.getElementById('tbc').textContent=CARGOS[p?.cargo]||p?.cargo||'—';
  document.getElementById('tbg').textContent=(gar?.nome||'—').replace('JTP ','').replace('Garagem ','').split('—')[0].trim();
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  setTela(TELA_INICIO[cargo()]||'home');
}
async function doLogout(){await sb.auth.signOut();location.reload()}

// NAVBAR
const TELA_INICIO={lavador:'lavagem',lider_patio:'patio',lider_oficina:'oficina',lider_pcm:'oficina',assistente_pcm:'oficina',manobrista:'patio',frentista:'home'};
const NAV={
  lavador:[{id:'lavagem',ic:'🚿',lb:'Lavagem'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_patio:[{id:'patio',ic:'✅',lb:'Validar'},{id:'soltura',ic:'📋',lb:'Soltura'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_oficina:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'home',ic:'🏠',lb:'Início'}],
  lider_pcm:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'prev26',ic:'💰',lb:'2.6'},{id:'home',ic:'🏠',lb:'Início'}],
  assistente_pcm:[{id:'oficina',ic:'🔧',lb:'OS'},{id:'prev26',ic:'💰',lb:'2.6'},{id:'home',ic:'🏠',lb:'Início'}],
  manobrista:[{id:'patio',ic:'🚗',lb:'Pátio'},{id:'home',ic:'🏠',lb:'Início'}],
  frentista:[{id:'home',ic:'🏠',lb:'Início'}],
};
const NAV_DEF=[{id:'home',ic:'🏠',lb:'Início'}];
function buildNav(){
  const itens=NAV[cargo()]||NAV_DEF;
  document.getElementById('navbar').innerHTML=itens.map(n=>`<button class="nav-btn${S.tela===n.id?' active':''}" onclick="setTela('${n.id}')"><span class="nav-ic">${n.ic}</span><span class="nav-lb">${n.lb}</span></button>`).join('');
}

// ── HOME ─────────────────────────────────────────────────
async function telaHome(){
  const gid=getGid();const agora=new Date();const data=hoje();
  const[{data:fr},{data:oc},{data:sol},{data:lav}]=await Promise.all([
    sb.from('frota').select('status').eq('garagem_id',gid),
    sb.from('ocorrencias_22').select('id').eq('garagem_id',gid).neq('status','liberado'),
    sb.from('soltura_2_10').select('saiu').eq('garagem_id',gid).eq('data',data),
    sb.from('checklist_lavagem').select('status').eq('garagem_id',gid).eq('data',data),
  ]);
  const tot=(fr||[]).length,ind=(oc||[]).length;
  const pctD=tot>0?(((tot-ind)/tot)*100).toFixed(0):100;
  const saiu=(sol||[]).filter(r=>r.saiu===true).length,sTot=(sol||[]).length;
  const pctS=sTot>0?((saiu/sTot)*100).toFixed(0):null;
  const lavE=(lav||[]).filter(l=>l.status==='executado').length,lavT=(lav||[]).length;
  render(`
    <div class="sl">📊 Painel do Dia</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px;margin-bottom:8px">
      <div class="kpi2"><div class="kpi2-v" style="color:${parseFloat(pctD)>=95?'var(--green)':'var(--red)'}">${pctD}%</div><div class="kpi2-l">Disponível</div></div>
      <div class="kpi2"><div class="kpi2-v" style="color:${ind>0?'var(--red)':'var(--green)'}">${ind}</div><div class="kpi2-l">Em Manut.</div></div>
      <div class="kpi2"><div class="kpi2-v" style="color:${pctS&&parseFloat(pctS)>=99?'var(--green)':'var(--amber)'}">${pctS?pctS+'%':'—'}</div><div class="kpi2-l">Soltura</div></div>
      <div class="kpi2"><div class="kpi2-v" style="color:${lavE===lavT&&lavT>0?'var(--green)':'var(--blue)'}">${lavT>0?lavE+'/'+lavT:'—'}</div><div class="kpi2-l">Lavagem</div></div>
    </div>
    <div class="card">
      <div style="font-size:12px;color:var(--text3)">${agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Manaus'})} · ${agora.toLocaleDateString('pt-BR',{weekday:'long',timeZone:'America/Manaus'})}</div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button onclick="S.turno='dia';telaHome()" style="flex:1;padding:8px;border-radius:8px;border:1px solid ${S.turno==='dia'?'var(--blue)':'var(--border)'};background:${S.turno==='dia'?'#2563EB18':'transparent'};color:${S.turno==='dia'?'var(--blue)':'var(--text3)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">☀️ Dia</button>
        <button onclick="S.turno='noite';telaHome()" style="flex:1;padding:8px;border-radius:8px;border:1px solid ${S.turno==='noite'?'var(--blue)':'var(--border)'};background:${S.turno==='noite'?'#2563EB18':'transparent'};color:${S.turno==='noite'?'var(--blue)':'var(--text3)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">🌙 Noite</button>
      </div>
    </div>`);
}

// ── LAVAGEM (Lavador) ─────────────────────────────────────
const CK_LAV_M={
  simples:['Varrer interior','Secar carroceria','Limpar vidros externos','Pano no cockpit','Limpar balaustre'],
  pesada:['Varrer interior','Secar carroceria','Limpar vidros externos','Pano no cockpit','Limpar balaustre','Lavar chassis','Vidros internos','Teto interno'],
};
let _lid='',_lck={};
async function telaLavagem(){
  const gid=getGid();
  const{data:lista}=await sb.from('checklist_lavagem').select('*').eq('garagem_id',gid).eq('data',hoje()).order('prefixo');
  if(!lista?.length){render(`<div class="empty"><div class="empty-ic">🚿</div><div style="font-weight:700;font-size:16px;margin-bottom:8px">Sem programação hoje</div><div style="font-size:13px">Aguardando programação do L. Operacional.</div></div>`);return}
  const exec=lista.filter(l=>l.status==='executado').length,tot=lista.length,pct=Math.round(exec/tot*100);
  const cards=lista.map(r=>{
    const d=r.status==='executado',n=r.status==='nao_realizado';
    return`<div class="vcard ${d?'done':n?'nok':''}" onclick="abrirLav('${r.id}','${r.prefixo}','${r.tipo_lavagem||'simples'}',${d})">
      <div style="flex:1"><div class="prefixo" style="color:${d?'var(--green)':n?'var(--red)':'var(--text)'}">${r.prefixo}</div>
      <div class="vcard-sub"><span style="color:${r.tipo_lavagem==='pesada'?'#10B981':'#3B82F6'}">●</span> ${r.tipo_lavagem==='pesada'?'Pesada':'Simples'}${d?' · ✅'+( r.hora_executado?new Date(r.hora_executado).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''):''}${r.validado_patio?' · 🏆':''}</div></div>
      <div class="btn-ck ${d?'ok':n?'nok':''}">${d?'✅':n?'❌':'○'}</div>
    </div>`;
  }).join('');
  render(`<div style="padding:14px 14px 0"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-weight:800;font-size:17px">🚿 Lavagem</div><div style="font-family:'DM Mono',monospace;font-weight:700;color:${pct===100?'var(--green)':'var(--blue)'}">${exec}/${tot}</div></div><div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}"></div></div></div><div class="sl">${tot} veículo(s)</div>${cards}`);
}
function abrirLav(id,prefixo,tipo,done){
  _lid=id;
  if(done){openSheet('🚿 '+prefixo,`<div style="text-align:center;padding:20px 0"><div style="font-size:48px">✅</div><div style="font-size:16px;font-weight:700;margin:12px 0">Concluída</div><button onclick="desfLav('${id}');closeSheet(true)" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">↩ Desfazer</button></div>`);return}
  const itens=CK_LAV_M[tipo]||CK_LAV_M.simples;
  _lck={};itens.forEach((_,i)=>_lck[i]=false);
  rndrLavSh(prefixo,tipo,itens);
}
function rndrLavSh(p,tipo,itens){
  const ok=Object.values(_lck).every(v=>v);
  openSheet('🚿 '+p+' — '+(tipo==='pesada'?'Pesada':'Simples'),`
    ${itens.map((it,i)=>`<div class="ck-row" onclick="togLavCk(${i},'${p}','${tipo}',${JSON.stringify(itens).replace(/'/g,'&#39;')})">
      <div style="width:28px;height:28px;border-radius:8px;border:2px solid ${_lck[i]?'var(--green)':'var(--border)'};background:${_lck[i]?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white;font-size:14px">${_lck[i]?'✓':''}</div>
      <div class="ck-txt" style="color:${_lck[i]?'var(--text)':'var(--text2)'}">${it}</div>
    </div>`).join('')}

let _pid='',_pck={};
async function telaPatio(){

function abrirPat(id,prefixo,tipo){

async function aprPat(){await sb.from('checklist_lavagem').update({validado_patio:true,validado_por:S.perfil?.nome,validado_em:new Date().toISOString()}).eq('id',_pid);closeSheet(true);toast('✅ Validado!');telaPatio()}

// ── SOLTURA (Líder Pátio) ─────────────────────────────────
let _sid='',_sdata=hoje(),_sLista=[];

async function telaSoltura(dataFiltro=null){
  const gid=getGid();
  if(dataFiltro) _sdata=dataFiltro;
  else if(!_sdata) _sdata=hoje();

  const{data:lista}=await sb.from('soltura_2_10').select('*')
    .eq('garagem_id',gid).eq('data',_sdata).order('horario_programado');

  _sLista=lista||[];
  renderSoltura(_sLista,'');
}

function renderSoltura(lista, busca){
  const filtrada=busca
    ?lista.filter(r=>r.prefixo?.includes(busca.toUpperCase())||r.horario_programado?.includes(busca)||r.motorista?.toLowerCase().includes(busca.toLowerCase()))
    :lista;

  if(!lista.length){
    render(`<div class="empty"><div class="empty-ic">📋</div><div style="font-weight:700;font-size:16px;margin-bottom:8px">Sem escala</div><div style="font-size:13px">Nenhuma escala para ${_sdata}</div></div>`);
    return;
  }

  const saiu=lista.filter(r=>r.saiu===true).length;
  const nao=lista.filter(r=>r.saiu===false).length;
  const pend=lista.filter(r=>r.saiu==null).length;
  const pct=lista.length?Math.round(saiu/lista.length*100):0;
  const dataFmt=new Date(_sdata+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});

  const cards=filtrada.map(r=>{
    const d=r.saiu===true,n=r.saiu===false;
    const reserva=r.observacao?.startsWith('Reserva:');
    return`<div class="vcard ${d?'done':n?'nok':''}" onclick="abrirSol('${r.id}','${r.prefixo}','${r.horario_programado||''}','${r.linha||''}','${r.motorista||''}')">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="prefixo">${r.prefixo}</div>
          ${reserva?`<span style="font-size:9px;color:var(--purple);font-weight:700;border:1px solid #8B5CF640;background:#8B5CF618;border-radius:4px;padding:1px 5px">RESERVA</span>`:''}
        </div>
        <div class="vcard-sub">${r.horario_programado||'—'} · ${r.linha||'—'}</div>
        <div class="vcard-sub">${r.motorista?.split(' ').slice(0,2).join(' ')||'—'}${d&&r.horario_real?' · ✅'+r.horario_real:''}</div>
      </div>
      <div class="btn-ck ${d?'ok':n?'nok':''}">${d?'✅':n?'❌':'○'}</div>
    </div>`;
  }).join('');

  render(`
    <div style="padding:14px 14px 0">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-weight:800;font-size:17px">📋 Soltura</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-size:11px;color:var(--text3)">${dataFmt}</div>
          <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:${pct>=99?'var(--green)':'var(--amber)'}">${pct}%</div>
        </div>
      </div>
      <!-- Seletor de data -->
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button onclick="telaSoltura('${new Date(new Date(_sdata).getTime()-86400000).toISOString().split('T')[0]}')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer">◀ Ontem</button>
        <button onclick="telaSoltura('${hoje()}')" style="flex:1;padding:6px;border-radius:8px;border:1px solid ${_sdata===hoje()?'var(--blue)':'var(--border)'};background:${_sdata===hoje()?'#2563EB18':'transparent'};color:${_sdata===hoje()?'var(--blue)':'var(--text3)'};font-size:12px;font-family:inherit;cursor:pointer">Hoje</button>
        <button onclick="telaSoltura('${new Date(new Date(_sdata).getTime()+86400000).toISOString().split('T')[0]}')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer">Amanhã ▶</button>
      </div>
      <!-- Barra de progresso -->
      <div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct>=99?'var(--green)':'var(--amber)'}"></div></div>
      <div style="display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text3)">
        <span>✅ ${saiu}</span><span>❌ ${nao}</span><span>○ ${pend}</span><span style="margin-left:auto">${lista.length} veíc.</span>
      </div>
      <!-- Busca -->
      <div style="position:relative;margin-top:10px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>
        <input type="text" id="busca-sol" placeholder="Prefixo, horário ou motorista..." oninput="renderSoltura(_sLista,this.value)"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 10px 10px 32px;color:var(--text);font-size:13px;font-family:inherit;outline:none">
      </div>
    </div>
    <div class="sl">${filtrada.length}${busca?' resultado(s)':' veículo(s)'}</div>
    ${cards}
    <!-- Botão fechar turno -->
    ${pct>0?`<div style="padding:14px">
      <button onclick="fecharTurnoSoltura()" style="width:100%;padding:14px;border-radius:12px;border:1px solid ${pct>=99?'#00C48C40':'#F59E0B40'};background:${pct>=99?'#00C48C18':'#F59E0B18'};color:${pct>=99?'var(--green)':'var(--amber)'};font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">
        ${pct>=99?'✅ Fechar Turno':'⚠️ Fechar Turno ('+pend+' pendentes)'}
      </button>
    </div>`:''}
  `);
}

function abrirSol(id,prefixo,horario,linha,motorista){
  _sid=id;
  openSheet('📋 '+prefixo+' — '+horario,`
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">${linha||'—'} · ${motorista?.split(' ').slice(0,2).join(' ')||'—'}</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      <button onclick="cfmSol(true)" style="padding:15px;border-radius:12px;border:1px solid #00C48C40;background:#00C48C18;color:var(--green);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">✅ Saiu</button>
      <button onclick="mostrarNaoSaiu()" style="padding:15px;border-radius:12px;border:1px solid #EF444440;background:#EF444418;color:var(--red);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">❌ Não saiu</button>
      <button onclick="mostrarTrocaCarro('${prefixo}')" style="padding:13px;border-radius:12px;border:1px solid #8B5CF640;background:#8B5CF618;color:var(--purple);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">🔄 Trocar Carro</button>
      <button onclick="cfmSol(null)" style="padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">↩ Pendente</button>
    </div>
  `);
}

function mostrarNaoSaiu(){
  document.getElementById('shbody').innerHTML=`
    <div style="font-size:13px;color:var(--text3);margin-bottom:10px">Informe o motivo:</div>
    <textarea id="mot-nao" placeholder="Ex: Veículo em manutenção, motorista faltou..." rows="3"
      style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;margin-bottom:12px"></textarea>
    <button onclick="cfmSolMotivo(false,document.getElementById('mot-nao').value)" style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">❌ Confirmar Não Saiu</button>
    <button onclick="abrirSol('${_sid}','','','')" style="width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer;margin-top:8px">← Voltar</button>
  `;
}

async function mostrarTrocaCarro(prefixoOriginal){
  const gid=getGid();
  // Busca carros disponíveis não escalados
  const{data:escalados}=await sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).eq('data',_sdata);
  const prefixosEsc=(escalados||[]).map(e=>e.prefixo);
  const{data:frota}=await sb.from('frota').select('prefixo,modelo').eq('garagem_id',gid).eq('status','disponivel');
  const disponiveis=(frota||[]).filter(v=>!prefixosEsc.includes(v.prefixo));

  document.getElementById('shbody').innerHTML=`
    <div style="font-size:13px;color:var(--text3);margin-bottom:10px">Substituindo: <strong style="color:var(--text)">${prefixoOriginal}</strong></div>
    <input type="text" id="busca-reserva" placeholder="Buscar prefixo..." oninput="filtrarReservas(this.value)"
      style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;outline:none;margin-bottom:10px">
    <div id="lista-reservas" style="max-height:40vh;overflow-y:auto">
      ${disponiveis.map(v=>`
        <div onclick="confirmarTroca('${v.prefixo}','${prefixoOriginal}')" style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer">
          <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--blue)">${v.prefixo}</div>
          <div style="font-size:12px;color:var(--text3)">${v.modelo||'—'}</div>
          <div style="margin-left:auto;font-size:11px;color:var(--green);font-weight:700">DISPONÍVEL</div>
        </div>`).join('')||'<div style="text-align:center;color:var(--text3);padding:20px">Nenhum carro disponível</div>'}
    </div>
    <button onclick="abrirSol('${_sid}','${prefixoOriginal}','','')" style="width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer;margin-top:8px">← Voltar</button>
  `;
  window._reservasLista=disponiveis;
}

function filtrarReservas(busca){
  const lista=window._reservasLista||[];
  const filtrada=busca?lista.filter(v=>v.prefixo.includes(busca.toUpperCase())):lista;
  document.getElementById('lista-reservas').innerHTML=filtrada.map(v=>`
    <div onclick="confirmarTroca('${v.prefixo}','')" style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer">
      <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--blue)">${v.prefixo}</div>
      <div style="font-size:12px;color:var(--text3)">${v.modelo||'—'}</div>
      <div style="margin-left:auto;font-size:11px;color:var(--green);font-weight:700">DISPONÍVEL</div>
    </div>`).join('')||'<div style="text-align:center;color:var(--text3);padding:20px">Nenhum resultado</div>';
}

      style="width:100%;margin-top:6px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;margin-bottom:14px"></textarea>

  const obs=document.getElementById('obs-turno')?.value?.trim();
  const saiu=_sLista.filter(r=>r.saiu===true).length;
  const nao=_sLista.filter(r=>r.saiu===false).length;

async function telaOficina(){

    if(['lider_pcm','assistente_pcm'].includes(cargo())) document.getElementById('content').insertAdjacentHTML('beforeend','<button class="fab" onclick="abrirNovaOS()">＋</button>');
    return}
  const agora=new Date();
  const SC={em_manutencao:{c:'var(--amber)',l:'Manutenção'},aguardando_peca:{c:'var(--red)',l:'Ag. Peça'},aguardando_aprovacao:{c:'var(--purple)',l:'Ag. Aprovação'}};
  const cards=ocs.map(o=>{
    const st=SC[o.status]||{c:'var(--text3)',l:o.status};
    const min=Math.round((agora-new Date(o.hora_entrada))/60000);
    const h=Math.floor(min/60),m=min%60;
    const venc=o.hora_previsao&&new Date(o.hora_previsao)<agora;
    return`<div class="os-card ${o.tipo||''}" onclick="abrirOS('${o.id}')">
      <div class="os-hdr"><div class="os-pre">${o.prefixo}</div><span class="badge" style="color:${st.c};border-color:${st.c}40;background:${st.c}12">${st.l}</span></div>
      <div style="font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap">
        <span>${o.tipo?.replace('_',' ')||'—'}</span>
        <span>⏱ ${h>0?h+'h'+m+'min':m+'min'}</span>
        ${o.mecanico?`<span>👤 ${o.mecanico.split(' ')[0]}</span>`:''}
        ${venc?'<span style="color:var(--red)">🔴 Vencida</span>':''}
      </div>
    </div>`;
  }).join('');
  render(`<div class="sl">${ocs.length} OS em aberto</div>${cards}`);
  if(['lider_pcm','assistente_pcm','lider_oficina'].includes(cargo()))
    document.getElementById('content').insertAdjacentHTML('beforeend','<button class="fab" onclick="abrirNovaOS()">＋</button>');
}

const SETORES_M=[
  {key:'MECÂNICA',ic:'🔧',gr:['MOTOR','CÂMBIO','TRANSMISSÃO','EMBREAGEM','DIFERENCIAL','EIXO TRASEIRO','EIXO DIANTEIRO','CHASSIS','ARREFECIMENTO','ALIMENTAÇÃO','PÓS TRATAMENTO','SUSPENSÃO','FREIO','DIREÇÃO','TAPEÇARIA','ELEVADOR','GERAL']},
  {key:'ELÉTRICA',ic:'⚡',gr:['ELÉTRICA','PREDITIVA']},
  {key:'BORRACHARIA',ic:'⭕',gr:['BORRACHARIA','PNEUMÁTICO']},
  {key:'AR COND.',ic:'❄️',gr:['AR COND.']},
  {key:'FUNILARIA',ic:'🔨',gr:['CARROCERIA','PINTURA']},
];
async function abrirOS(ocId){
  const{data:oc}=await sb.from('ocorrencias_22').select('*').eq('id',ocId).single();
  if(!oc) return;
  const{data:ckl}=await sb.from('checklist_liberacao').select('id,verificado,trocado,nao_se_aplica,item').eq('ocorrencia_id',ocId);
  const tot=(ckl||[]).length,v=(ckl||[]).filter(i=>i.verificado||i.nao_se_aplica).length,t=(ckl||[]).filter(i=>i.trocado||i.nao_se_aplica).length;
  const pctV=tot>0?Math.round(v/tot*100):0,pctT=tot>0?Math.round(t/tot*100):0;
  const subm=(ckl||[]).some(i=>i.submetido),aprov=(ckl||[]).some(i=>i.aprovado);
  const podeEd=['lider_oficina','lider_pcm','assistente_pcm'].includes(cargo())&&!subm&&!aprov;
  const setores=SETORES_M.map(sg=>{
    const its=(ckl||[]).filter(i=>{const m=i.item?.match(/^\[([^\]]+)\]/);return sg.gr.includes(m?m[1]:'GERAL');});
    if(!its.length) return '';
    const vS=its.filter(i=>i.verificado||i.nao_se_aplica).length,tS=its.filter(i=>i.trocado||i.nao_se_aplica).length;
    const ok=vS===its.length&&tS===its.length,part=vS===its.length&&tS<its.length;
    return`<div onclick="abrirSetor('${ocId}','${sg.key}')" style="display:inline-flex;align-items:center;gap:4px;background:${ok?'#00C48C12':part?'#F59E0B12':'var(--surface2)'};border:1px solid ${ok?'#00C48C40':part?'#F59E0B40':'var(--border)'};border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;margin:3px;color:${ok?'var(--green)':part?'var(--amber)':'var(--text2)'}">${sg.ic} ${sg.key} ${ok?'✅':vS+'/'+its.length}</div>`;
  }).join('');
  const ST={em_manutencao:'🔧 Manutenção',aguardando_peca:'📦 Ag. Peça',aguardando_aprovacao:'⏳ Ag. Aprovação',liberado:'✅ Liberado'};
  openSheet(oc.prefixo+' — '+(oc.tipo?.replace('_',' ')||'—'),`
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="flex:1;background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--blue)">${v}/${tot}</div>
        <div style="font-size:10px;color:var(--text3);font-weight:700">V DIAGNÓSTICO</div>
        <div class="prog" style="margin-top:4px"><div class="prog-f" style="width:${pctV}%;background:var(--blue)"></div></div>
      </div>
      <div style="flex:1;background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--green)">${t}/${tot}</div>
        <div style="font-size:10px;color:var(--text3);font-weight:700">T QUALIFICAÇÃO</div>
        <div class="prog" style="margin-top:4px"><div class="prog-f" style="width:${pctT}%;background:var(--green)"></div></div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${ST[oc.status]||oc.status} · ${oc.mecanico||'—'}</div>
    <div style="margin-bottom:12px;line-height:1">${setores||'<div style="color:var(--text4);font-size:12px">Abra no desktop para criar o checklist.</div>'}</div>
    ${podeEd?`<div style="display:flex;gap:8px">
      <select id="sel-st" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:inherit;outline:none">
        <option value="em_manutencao" ${oc.status==='em_manutencao'?'selected':''}>🔧 Em Manutenção</option>
        <option value="aguardando_peca" ${oc.status==='aguardando_peca'?'selected':''}>📦 Ag. Peça</option>
        <option value="aguardando_aprovacao" ${oc.status==='aguardando_aprovacao'?'selected':''}>⏳ Ag. Aprovação</option>
        <option value="liberado">✅ Liberado</option>
      </select>
      <button onclick="salvarSt('${ocId}')" style="padding:12px 16px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">OK</button>
    </div>`:''}
  `);
}
async function salvarSt(ocId){
  const st=document.getElementById('sel-st')?.value;
  if(!st) return;
  await sb.from('ocorrencias_22').update({status:st,updated_at:new Date().toISOString()}).eq('id',ocId);
  if(st==='liberado'){const{data:oc}=await sb.from('ocorrencias_22').select('veiculo_id').eq('id',ocId).single();if(oc?.veiculo_id)await sb.from('frota').update({status:'disponivel'}).eq('id',oc.veiculo_id);}
  closeSheet(true);toast(st==='liberado'?'✅ Liberado!':'✅ Atualizado!');telaOficina();
}
async function abrirSetor(ocId,setor){
  closeSheet(true);
  setTimeout(async()=>{
    const sg=SETORES_M.find(s=>s.key===setor);
    const{data:ckl}=await sb.from('checklist_liberacao').select('*').eq('ocorrencia_id',ocId).order('ordem');
    const{data:oc}=await sb.from('ocorrencias_22').select('prefixo,status').eq('id',ocId).single();
    const itens=(ckl||[]).filter(i=>{const m=i.item?.match(/^\[([^\]]+)\]/);return (sg?.gr||[]).includes(m?m[1]:'GERAL');});
    const subm=(ckl||[]).some(i=>i.submetido),aprov=(ckl||[]).some(i=>i.aprovado);
    const podeEd=['lider_oficina','lider_pcm','assistente_pcm'].includes(cargo())&&!subm&&!aprov;
    const vTot=itens.filter(i=>i.verificado||i.nao_se_aplica).length;
    const faseV=vTot<itens.length;
    openSheet((sg?.ic||'')+' '+setor+' — '+oc?.prefixo,`
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${itens.length} itens · V:${vTot}/${itens.length}</div>
      <div style="max-height:58vh;overflow-y:auto">
        ${itens.map(it=>{
          const nsa=it.nao_se_aplica;
          const txt=(it.item||'').replace(/^\[[^\]]+\]\s*/,'');
          return`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border2);opacity:${nsa?.5:1}">
            <div style="flex:1;font-size:12px;line-height:1.4;color:${it.trocado?'var(--green)':it.verificado?'var(--text)':'var(--text3)'}">${txt}</div>
            ${podeEd?`
              <button onclick="togCk('${it.id}','v','${ocId}','${setor}')" class="ck-b ${it.verificado?'von':''}" ${nsa?'disabled':''}>V</button>
              <button onclick="togCk('${it.id}','t','${ocId}','${setor}')" class="ck-b ${it.trocado?'ton':''}" ${!it.verificado||nsa||faseV?'disabled':''}>T</button>
              <button onclick="togCk('${it.id}','nsa','${ocId}','${setor}')" class="ck-b ${nsa?'na':''}">N/A</button>
            `:`<span style="font-size:11px;color:${it.trocado?'var(--green)':it.verificado?'var(--blue)':'var(--text4)'}">${it.trocado?'T✓':it.verificado?'V✓':nsa?'N/A':'—'}</span>`}
          </div>`;
        }).join('')}
      </div>
    `);
  },200);
}
async function togCk(itemId,tipo,ocId,setor){
  const{data:it}=await sb.from('checklist_liberacao').select('*').eq('id',itemId).single();
  if(!it) return;
  let p={};
  if(tipo==='v'){const n=!it.verificado;p={verificado:n,verificado_por:n?S.perfil?.nome:null,verificado_em:n?new Date().toISOString():null};if(!n)p={...p,trocado:false};}
  else if(tipo==='t'){if(!it.verificado)return;const n=!it.trocado;p={trocado:n,trocado_por:n?S.perfil?.nome:null,trocado_em:n?new Date().toISOString():null};}
  else if(tipo==='nsa'){const n=!it.nao_se_aplica;p={nao_se_aplica:n,verificado:n,trocado:n,verificado_por:n?S.perfil?.nome:null,trocado_por:n?S.perfil?.nome:null,verificado_em:n?new Date().toISOString():null,trocado_em:n?new Date().toISOString():null};}
  await sb.from('checklist_liberacao').update(p).eq('id',itemId);
  abrirSetor(ocId,setor);
}
function abrirNovaOS(){
  openSheet('＋ Nova OS',`
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><label class="fl">Prefixo</label><input class="fi2" id="np" type="text" placeholder="02.015" style="font-family:'DM Mono',monospace;font-size:20px"></div>
      <div><label class="fl">Tipo</label><select class="fi2" id="nt">
        <option value="preventiva_leve">🟡 Preventiva Leve</option>
        <option value="preventiva_pesada">🟣 Preventiva Pesada</option>
        <option value="corretiva">🔴 Corretiva</option>
        <option value="eletrica">⚡ Elétrica</option>
        <option value="funilaria">🔨 Funilaria</option>
        <option value="pneu">⭕ Pneu</option>
        <option value="sinistro">⚠️ Sinistro</option>
      </select></div>
      <div><label class="fl">Mecânico</label><input class="fi2" id="nm" type="text" placeholder="Nome do mecânico"></div>
      <button onclick="criarOS()" style="padding:16px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px">Abrir OS</button>
    </div>`);
}
async function criarOS(){
  const prefixo=document.getElementById('np')?.value?.trim().toUpperCase();
  const tipo=document.getElementById('nt')?.value;
  const mecanico=document.getElementById('nm')?.value?.trim();
  const gid=getGid();if(!prefixo){toast('Informe o prefixo','err');return}
  const{data:vei}=await sb.from('frota').select('id').eq('garagem_id',gid).eq('prefixo',prefixo).single();
  const a=new Date();
  const sigla=(S.garagens.find(x=>x.id===gid)?.sigla||'JTP').slice(0,3);
  const num=`2.2/${String(a.getDate()).padStart(2,'0')}${String(a.getMonth()+1).padStart(2,'0')}${String(a.getFullYear()).slice(2)}-${String(a.getHours()).padStart(2,'0')}${String(a.getMinutes()).padStart(2,'0')}/${sigla}`;
  const{error}=await sb.from('ocorrencias_22').insert({garagem_id:gid,veiculo_id:vei?.id||null,prefixo,tipo,mecanico:mecanico||null,numero:num,status:'em_manutencao',hora_entrada:new Date().toISOString(),aberto_por:S.perfil?.id,aberto_por_nome:S.perfil?.nome});
  if(error){toast('Erro: '+error.message,'err');return}
  if(vei?.id) await sb.from('frota').update({status:'manutencao'}).eq('id',vei.id);
  closeSheet(true);toast('✅ OS aberta!');telaOficina();
}

// ── 2.6 PREVISIBILIDADE ───────────────────────────────────
let _pids=[],_pgid='',_pdata='';
async function telaPrev26(){
  const gid=getGid();const data=hoje();
  const[{data:ocs},{data:custos}]=await Promise.all([
    sb.from('ocorrencias_22').select('*').eq('garagem_id',gid).neq('status','liberado').order('hora_entrada'),
    sb.from('previsibilidade_26').select('*').eq('garagem_id',gid).eq('data',data),
  ]);
  const cm={};(custos||[]).forEach(c=>{cm[c.ocorrencia_id]={prev:c.custo_prev,real:c.custo_real,obs:c.obs}});
  if(!ocs?.length){render(`<div class="empty"><div class="empty-ic">💰</div><div style="font-weight:700;font-size:16px;margin-bottom:8px">Nenhuma OS aberta</div></div>`);return}
  _pids=ocs.map(o=>o.id);_pgid=gid;_pdata=data;
  let tp=0,tr=0;(custos||[]).forEach(c=>{tp+=parseFloat(c.custo_prev||0);tr+=parseFloat(c.custo_real||0)});
  const cards=ocs.map(o=>{
    const c=cm[o.id]||{};
    return`<div class="card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="prefixo" style="font-size:18px;color:var(--blue)">${o.prefixo}</div>
        <div style="font-size:11px;color:var(--text3)">${o.tipo?.replace('_',' ')||'—'}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label class="fl" style="color:var(--amber)">PREVISTO R$</label><input type="number" id="pv-${o.id}" placeholder="0" value="${c.prev||''}" min="0" step="0.01" onchange="recTot()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:16px;font-family:'DM Mono',monospace;outline:none"></div>
        <div><label class="fl" style="color:var(--blue)">REAL R$</label><input type="number" id="rl-${o.id}" placeholder="0" value="${c.real||''}" min="0" step="0.01" onchange="recTot()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:16px;font-family:'DM Mono',monospace;outline:none"></div>
      </div>
      <input type="text" id="ob-${o.id}" placeholder="Peças, serviços..." value="${c.obs||''}" style="width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:12px;padding:4px;outline:none;font-family:inherit">
    </div>`;
  }).join('');
  render(`
    <div style="padding:14px 14px 0;display:flex;align-items:center;justify-content:space-between">
      <div style="font-weight:800;font-size:17px">💰 2.6 Previsibilidade</div>
      <button onclick="salv26()" style="background:var(--blue);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">Salvar</button>
    </div>
    <div style="display:flex;gap:8px;padding:10px 14px">
      <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--amber)" id="tot-p">R$ ${tp.toFixed(2)}</div>
        <div style="font-size:10px;color:var(--text3)">Previsto</div>
      </div>
      <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--blue)" id="tot-r">R$ ${tr.toFixed(2)}</div>
        <div style="font-size:10px;color:var(--text3)">Real</div>
      </div>
    </div>
    <div class="sl">${ocs.length} veículo(s)</div>
    ${cards}`);
}
function recTot(){
  let p=0,r=0;
  _pids.forEach(id=>{p+=parseFloat(document.getElementById('pv-'+id)?.value||0)||0;r+=parseFloat(document.getElementById('rl-'+id)?.value||0)||0;});
  const ep=document.getElementById('tot-p');const er=document.getElementById('tot-r');
  if(ep)ep.textContent='R$ '+p.toFixed(2);if(er)er.textContent='R$ '+r.toFixed(2);
}
async function salv26(){
  await sb.from('previsibilidade_26').delete().eq('garagem_id',_pgid).eq('data',_pdata);
  const rows=_pids.map(id=>({garagem_id:_pgid,ocorrencia_id:id,data:_pdata,custo_prev:parseFloat(document.getElementById('pv-'+id)?.value||0)||null,custo_real:parseFloat(document.getElementById('rl-'+id)?.value||0)||null,obs:document.getElementById('ob-'+id)?.value?.trim()||null,registrado_por:S.perfil?.nome})).filter(r=>r.custo_prev||r.custo_real||r.obs);
  if(rows.length) await sb.from('previsibilidade_26').insert(rows);
  toast('✅ Salvo!');
}

// Prompt de instalação
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // Mostra botão de instalar se disponível
  const btn = document.getElementById('btn-instalar');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  toast('✅ App instalado com sucesso!');
});
function instalarApp(){
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(r => {
      if(r.outcome === 'accepted') toast('✅ Instalando...');
      _deferredPrompt = null;
    });
  }
}
