<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020817">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JTP">
<title>JTP Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020817;--surface:#0F172A;--surface2:#0A0F1E;
  --border:#1E293B;--text:#F1F5F9;--text2:#94A3B8;--text3:#475569;--text4:#334155;
  --blue:#2563EB;--green:#00C48C;--amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;
  --bottom:env(safe-area-inset-bottom,0px);
  --top:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;touch-action:manipulation}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:1000}
.login-logo{text-align:center;margin-bottom:32px}
.login-icon{width:72px;height:72px;background:#1E3A5F;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;border:1px solid #2563EB30;box-shadow:0 0 40px #2563EB20}
.login-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.login-sub{color:var(--text3);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 24px}
.fl{display:block;color:var(--text3);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.btn-login{width:100%;background:linear-gradient(135deg,#1D4ED8,#2563EB);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px}
.btn-login:active{opacity:.85;transform:scale(.98)}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;display:none;flex-direction:column}
#app.on{display:flex}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:calc(56px + var(--top));padding-top:var(--top);display:flex;align-items:center;padding-left:16px;padding-right:16px;gap:12px;flex-shrink:0;position:relative;z-index:100}
.burger{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:8px;margin-left:-8px;display:flex;align-items:center;justify-content:center}
.topbar-title{font-weight:800;font-size:16px;flex:1}
.topbar-badge{background:var(--blue);color:#fff;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:#00000070;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--surface);border-right:1px solid var(--border);z-index:201;transition:left .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding-top:var(--top)}
.drawer.open{left:0}
.drawer-header{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.drawer-user{display:flex;align-items:center;gap:12px}
.drawer-avatar{width:44px;height:44px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.drawer-name{font-size:15px;font-weight:700}
.drawer-role{color:var(--text3);font-size:12px;margin-top:2px}
.drawer-garagem{color:var(--text4);font-size:11px;margin-top:2px}
.drawer-nav{flex:1;overflow-y:auto;padding:12px 8px}
.drawer-section{color:var(--text4);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 10px 6px}
.drawer-btn{width:100%;display:flex;align-items:center;gap:12px;background:none;border:1px solid transparent;border-radius:10px;padding:12px 10px;cursor:pointer;color:var(--text2);font-size:14px;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;margin-bottom:2px}
.drawer-btn:active{background:var(--border)}
.drawer-btn.active{background:var(--border);border-color:#1D4ED825;color:var(--text);font-weight:600}
.drawer-icon{font-size:18px;width:24px;text-align:center}
.drawer-footer{padding:16px;border-top:1px solid var(--border)}
.btn-sair{width:100%;background:none;border:1px solid var(--border);color:var(--text3);border-radius:10px;padding:12px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-sair:active{border-color:var(--red);color:var(--red)}

/* TURNO SWITCHER */
.turno-sw{display:flex;gap:6px;padding:0 16px 12px}
.turno-opt{flex:1;background:var(--border);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text3);transition:all .2s;text-align:center}
.turno-opt.dia{background:#F59E0B18;color:var(--amber)}
.turno-opt.noite{background:#3B82F618;color:#3B82F6}

/* MAIN SCROLL */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(16px + var(--bottom))}
.main.no-pad{padding:0;padding-bottom:var(--bottom)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card.clickable{cursor:pointer;transition:all .15s}
.card.clickable:active{transform:scale(.98);opacity:.9}
.card-title{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.card-val{font-family:'DM Mono',monospace;font-size:32px;font-weight:700;color:var(--text)}
.card-unit{font-size:14px;color:var(--text4);font-weight:400}
.card-meta{font-size:12px;font-weight:600;margin-top:4px}
.card-meta.ok{color:var(--green)}.card-meta.nok{color:var(--red)}
.card.ok{border-left:3px solid var(--green)}.card.nok{border-left:3px solid var(--red)}.card.neu{border-left:3px solid #475569}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;border-left-width:3px}
.kpi-sm.ok{border-left-color:var(--green)}.kpi-sm.nok{border-left-color:var(--red)}.kpi-sm.neu{border-left-color:#475569}
.kpi-sm-label{color:var(--text3);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.kpi-sm-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--text);margin-top:4px}
.kpi-sm-meta{font-size:10px;font-weight:600;margin-top:3px}
.kpi-sm-meta.ok{color:var(--green)}.kpi-sm-meta.nok{color:var(--red)}

/* LISTA 2.10 */
.escala-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.escala-card:active{transform:scale(.98)}
.escala-card.pend{border-left:3px solid var(--amber)}
.escala-card.done{border-left:3px solid var(--green)}
.escala-data{font-size:16px;font-weight:700}
.escala-num{font-family:'DM Mono',monospace;color:var(--blue);font-size:11px;margin-top:2px}
.escala-prog{display:flex;align-items:center;gap:10px;margin-top:10px}
.prog-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:99px;background:var(--green);transition:width .5s}
.escala-pct{font-family:'DM Mono',monospace;font-size:13px;font-weight:700}

/* LISTA VEÍCULOS 2.10 */
.veiculo-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.veiculo-row.saiu{border-left:3px solid var(--green)}
.veiculo-row.nao{border-left:3px solid var(--red)}
.veiculo-row.pend{border-left:3px solid var(--border)}
.veiculo-prefixo{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;min-width:56px}
.veiculo-info{flex:1}
.veiculo-hora{color:var(--amber);font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.veiculo-linha{color:var(--text3);font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.veiculo-motorista{color:var(--text4);font-size:10px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.btn-confirmar{border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid;white-space:nowrap;flex-shrink:0}
.btn-conf-sim{color:var(--green);background:#00C48C18;border-color:#00C48C40}
.btn-conf-nao{color:var(--red);background:#EF444418;border-color:#EF444440}
.btn-conf-pend{color:var(--text3);background:#47556918;border-color:#47556940}

/* MODAL BOTTOM SHEET */
.sheet-overlay{position:fixed;inset:0;background:#00000070;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:-100%;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:301;padding:12px 20px 20px;transition:bottom .3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto;padding-bottom:calc(20px + var(--bottom))}
.sheet.open{bottom:0}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}
.sheet-opt{width:100%;display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .15s}
.sheet-opt:active{transform:scale(.98)}
.sheet-opt.selected{border-color:var(--blue);background:#2563EB15;color:var(--blue)}
.sheet-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
.sheet-input:focus{border-color:var(--blue)}
.sheet-label{color:var(--text3);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.btn-sheet-confirm{width:100%;background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px}
.btn-sheet-confirm:active{opacity:.85}
.btn-sheet-cancel{width:100%;background:var(--border);color:var(--text2);border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px}

/* FROTA GRID MOBILE */
.frota-grid-m{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.frota-card-m{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s}
.frota-card-m:active{transform:scale(.97)}
.badge-m{display:inline-block;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;border:1px solid;text-transform:uppercase;margin-top:6px}

/* SEÇÃO TITLE */
.stitle{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* TOAST */
.toast-m{position:fixed;bottom:calc(20px + var(--bottom));left:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:14px;font-weight:600;color:var(--text);box-shadow:0 8px 32px #00000060;z-index:400;animation:slideUp .3s ease;display:flex;align-items:center;gap:10px}
.toast-m.ok{border-left:3px solid var(--green)}.toast-m.err{border-left:3px solid var(--red)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* PAINEL HERO */
.hero{background:linear-gradient(135deg,var(--surface),#1A2540);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px}
.hero-title{color:var(--text2);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.hero-date{font-size:18px;font-weight:700;text-transform:capitalize}
.hero-sub{color:var(--text3);font-size:12px;margin-top:3px}
.hero-counters{display:flex;gap:8px;margin-top:14px}
.hero-fc{flex:1;text-align:center;border-radius:10px;padding:10px 6px;border:1px solid}
.hero-fc-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;display:block}
.hero-fc-label{font-size:9px;font-weight:600;letter-spacing:.5px;opacity:.8}

/* LOADING */
.loading-m{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text3);font-size:14px;flex-direction:column}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-m{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-m-icon{font-size:48px;margin-bottom:12px}

/* SCROLL FIX */
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-logo">
    <div class="login-icon">🚌</div>
    <div class="login-title">JTP Mobile</div>
    <div class="login-sub">Sistema Operacional</div>
  </div>
  <div class="login-card">
    <label class="fl">E-mail</label>
    <input class="fi" id="l-email" type="email" placeholder="seu@email.com" autocomplete="email">
    <label class="fl">Senha</label>
    <input class="fi" id="l-senha" type="password" placeholder="••••••••" autocomplete="current-password">
    <div id="l-erro" style="color:var(--red);font-size:13px;text-align:center;margin-bottom:10px;display:none"></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div style="text-align:center;margin-top:16px;color:var(--text4);font-size:11px">🔒 Grupo JTP</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <button class="burger" onclick="openDrawer()">☰</button>
    <div class="topbar-title" id="tb-title">JTP</div>
    <div class="topbar-badge" id="tb-badge" style="display:none"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="loading-m"><div class="spinner"></div></div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-ov" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-user">
      <div class="drawer-avatar" id="d-av">?</div>
      <div>
        <div class="drawer-name" id="d-nome">—</div>
        <div class="drawer-role" id="d-role">—</div>
        <div class="drawer-garagem" id="d-garagem">—</div>
      </div>
    </div>
    <div class="turno-sw" style="margin-top:14px;padding:0">
      <button class="turno-opt dia" id="m-dia" onclick="setTurno('dia')">☀️ Dia</button>
      <button class="turno-opt" id="m-noite" onclick="setTurno('noite')">🌙 Noite</button>
    </div>
  </div>
  <div class="drawer-nav" id="drawer-nav"></div>
  <div class="drawer-footer">
    <button class="btn-sair" onclick="doLogout()">Sair do Sistema</button>
  </div>
</div>

<!-- SHEET MODAL (bottom sheet) -->
<div class="sheet-overlay" id="sheet-ov" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<script>
const{createClient}=supabase;
const sb=createClient('https://jboclubugfxmurvhcxgr.supabase.co','sb_publishable_hasmgR_BbXcJC6Xko6DzaA_N7kl7rNT');

const S={user:null,perfil:null,tela:'painel',turno:'dia',garagens:[],frota:[],soltura210:[],editSaidaId:null,data210:null};
const CARGOS={diretoria:'Diretoria',gerente_garagem:'Gerente de Garagem',pcm:'PCM',almoxarifado:'Almoxarifado',lider_operacional:'Líder Operacional',lider_suprimentos:'Líder de Suprimentos',operacoes_seguras:'Operações Seguras',lider_oficina:'Líder de Oficina',lider_patio:'Líder de Pátio'};
const ST={disponivel:{l:'Disponível',c:'#00C48C'},em_linha:{l:'Em Linha',c:'#3B82F6'},manutencao:{l:'Manutenção',c:'#F59E0B'},aguardando_peca:{l:'Ag. Peça',c:'#EF4444'},sinistro:{l:'Sinistro',c:'#8B5CF6'}};

function hoje(){return new Date().toISOString().split('T')[0]}
function amanha(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0]}
function hojeF(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
function formatData(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`}
function fmt(n){return Number(n||0).toLocaleString('pt-BR')}

function setMain(html){document.getElementById('main').innerHTML=html}
function setTitle(t,badge=''){
  document.getElementById('tb-title').textContent=t;
  const b=document.getElementById('tb-badge');
  if(badge){b.textContent=badge;b.style.display='block'}else b.style.display='none';
}

function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast-m ${type}`;
  el.innerHTML=`<span>${type==='ok'?'✅':'❌'}</span> ${msg}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ── DRAWER ────────────────────────────────────
function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-ov').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-ov').classList.remove('open');
}

// ── SHEET ─────────────────────────────────────
function openSheet(html){
  document.getElementById('sheet-content').innerHTML=html;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-ov').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-ov').classList.remove('open');
}

// ── TURNO ─────────────────────────────────────
function setTurno(t){
  S.turno=t;
  document.getElementById('m-dia').className='turno-opt'+(t==='dia'?' dia':'');
  document.getElementById('m-noite').className='turno-opt'+(t==='noite'?' noite':'');
  navTo(S.tela);
}

      {id:'painel',icon:'🏠',label:'Painel'},

      {id:'frota',icon:'🚌',label:'Frota'},
    ],
    diretoria:[
      {id:'painel',icon:'🏠',label:'Painel'},
      {id:'indicadores',icon:'📊',label:'Indicadores'},
      {id:'frota',icon:'🚌',label:'Frota'},
    ],
  };
  const items=isAdmin?[
    {id:'painel',icon:'🏠',label:'Painel'},
    {id:'soltura',icon:'📋',label:'2.10 Soltura'},
    {id:'frota',icon:'🚌',label:'Frota'},
    {id:'indicadores',icon:'📊',label:'Indicadores'},
  ]:menus[cargo]||menus.gerente_garagem;

  const nav=document.getElementById('drawer-nav');

    <button class="drawer-btn${S.tela===m.id?' active':''}" onclick="navTo('${m.id}');closeDrawer()">
      <span class="drawer-icon">${m.icon}</span>${m.label}
    </button>`).join('');
}

function navTo(tela){
  S.tela=tela;
  buildMenu();
  const renders={painel:renderPainel,soltura:renderSoltura,frota:renderFrota,indicadores:renderIndicadores,manutencao:renderManutencao,estoque:renderEstoque};
  if(renders[tela]) renders[tela]();
}

// ── AUTH ──────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const senha=document.getElementById('l-senha').value;
  const erro=document.getElementById('l-erro');
  if(!email||!senha){erro.textContent='Preencha e-mail e senha';erro.style.display='block';return}
  erro.style.display='none';
  const btn=document.getElementById('btn-login');btn.textContent='Entrando...';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){erro.textContent=error.message.includes('Invalid')?'E-mail ou senha incorretos':error.message;erro.style.display='block';btn.textContent='Entrar';btn.disabled=false;return}
  const{data:perfil}=await sb.from('perfis').select('*').eq('id',data.user.id).single();
  if(!perfil||!perfil.ativo){erro.textContent='Acesso negado. Contate o administrador.';erro.style.display='block';await sb.auth.signOut();btn.textContent='Entrar';btn.disabled=false;return}
  S.user=data.user;S.perfil=perfil;
  const{data:gs}=await sb.from('garagens').select('*').eq('ativa',true).order('nome');
  S.garagens=gs||[];
  const g=S.garagens.find(x=>x.id===perfil.garagem_id);
  document.getElementById('d-av').textContent=perfil.nome[0].toUpperCase();
  document.getElementById('d-nome').textContent=perfil.nome;
  document.getElementById('d-role').textContent=CARGOS[perfil.cargo]||perfil.cargo;
  document.getElementById('d-garagem').textContent=g?`📍 ${g.nome} — ${g.uf}`:'🏢 Todas as Garagens';
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  buildMenu();
  navTo('painel');
}

async function doLogout(){
  await sb.auth.signOut();
  S.user=null;S.perfil=null;
  document.getElementById('login').style.display='flex';
  document.getElementById('app').classList.remove('on');
  document.getElementById('l-email').value='';document.getElementById('l-senha').value='';
  closeDrawer();
}

// ── SOLTURA 2.10 ──────────────────────────────
async function renderSoltura(dataFiltro=null){
  setTitle('2.10 Soltura');
  setMain(`<div class="loading-m"><div class="spinner"></div></div>`);
  const gid=S.perfil.garagem_id||(S.garagens[0]?.id);

  if(!dataFiltro){
    // Dashboard de escalas
    const d7=new Date();d7.setDate(d7.getDate()-7);
    const d2=new Date();d2.setDate(d2.getDate()+2);
    const{data:esc}=await sb.from('soltura_2_10').select('data,turno,numero_relatorio')
      .eq('garagem_id',gid).gte('data',d7.toISOString().split('T')[0]).lte('data',d2.toISOString().split('T')[0]).order('data',{ascending:false});
    const grupos={};
    (esc||[]).forEach(r=>{const k=`${r.data}_${r.turno}`;if(!grupos[k])grupos[k]={data:r.data,turno:r.turno,num:r.numero_relatorio,total:0,conf:0,nao:0};grupos[k].total++;});
    const{data:conf}=await sb.from('soltura_2_10').select('data,turno').eq('garagem_id',gid).eq('saiu',true).gte('data',d7.toISOString().split('T')[0]);
    (conf||[]).forEach(r=>{const k=`${r.data}_${r.turno}`;if(grupos[k])grupos[k].conf++;});
    const{data:naoS}=await sb.from('soltura_2_10').select('data,turno').eq('garagem_id',gid).eq('saiu',false).gte('data',d7.toISOString().split('T')[0]);
    (naoS||[]).forEach(r=>{const k=`${r.data}_${r.turno}`;if(grupos[k])grupos[k].nao++;});
    const items=Object.values(grupos).sort((a,b)=>b.data.localeCompare(a.data)||b.turno.localeCompare(a.turno));
    const pend=items.filter(g=>g.conf+g.nao<g.total);
    const done=items.filter(g=>g.conf+g.nao>=g.total&&g.total>0);

    if(items.length===0){
      setMain(`<div class="empty-m"><div class="empty-m-icon">📋</div><div style="color:var(--text2);font-weight:600;margin-bottom:8px">Nenhuma escala importada</div><p style="font-size:13px">O escalante precisa importar o PDF da escala</p></div>`);
      return;
    }

    const card=g=>{
      const pct=g.total>0?Math.round(((g.conf+g.nao)/g.total)*100):0;
      const pColor=pct>=99?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
      return`<div class="escala-card ${pct>=99?'done':'pend'}" onclick="renderSoltura('${g.data}_${g.turno}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="escala-data">${formatData(g.data)} · ${g.turno==='dia'?'☀️ Dia':'🌙 Noite'}</div>
            <div class="escala-num">${g.num||'—'}</div>
          </div>
          <span style="color:${pColor};font-size:11px;font-weight:700">${pct>=99?'✅ OK':'⏳ Pendente'}</span>
        </div>
        <div class="escala-prog">
          <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%;background:${pColor}"></div></div>
          <span class="escala-pct" style="color:${pColor}">${pct}%</span>
          <span style="color:var(--text4);font-size:11px">${g.conf+g.nao}/${g.total}</span>
        </div>
      </div>`;
    };

    setMain(`
      ${pend.length>0?`<div class="stitle">⏳ Pendentes (${pend.length})</div>${pend.map(card).join('')}`:''}
      ${done.length>0?`<div class="stitle">✅ Preenchidos (${done.length})</div>${done.map(card).join('')}`:''}
    `);
    return;
  }

  // Detalhe de uma escala
  const[dataConsulta,turnoConsulta]=dataFiltro.split('_');
  if(turnoConsulta) S.turno=turnoConsulta;
  S.data210=dataConsulta;
  const{data:sol}=await sb.from('soltura_2_10').select('*')
    .eq('garagem_id',gid).eq('data',dataConsulta).eq('turno',S.turno).order('horario_programado');
  S.soltura210=sol||[];
  const sSaiu=S.soltura210.filter(r=>r.saiu===true).length;
  const sNao=S.soltura210.filter(r=>r.saiu===false).length;
  const sPend=S.soltura210.filter(r=>r.saiu===null).length;
  const total=S.soltura210.length;
  const pct=total>0?((sSaiu/total)*100).toFixed(1):0;
  const pColor=parseFloat(pct)>=99.5?'var(--green)':parseFloat(pct)>=95?'var(--amber)':'var(--red)';
  setTitle(`Soltura ${formatData(dataConsulta)}`,`${pct}%`);

  const rows=S.soltura210.map(r=>{
    const cls=r.saiu===true?'saiu':r.saiu===false?'nao':'pend';
    const btnCls=r.saiu===true?'btn-conf-sim':r.saiu===false?'btn-conf-nao':'btn-conf-pend';
    const btnTxt=r.saiu===true?`✅ ${r.horario_real||'Saiu'}`:r.saiu===false?'❌ Não saiu':'○ Confirmar';
    return`<div class="veiculo-row ${cls}">
      <div class="veiculo-prefixo">${r.prefixo}</div>
      <div class="veiculo-info">
        <div class="veiculo-hora">${r.horario_programado||'—'}</div>
        <div class="veiculo-linha">${r.linha||'—'}</div>
        <div class="veiculo-motorista">${r.motorista||'—'}</div>
      </div>
      <button class="btn-confirmar ${btnCls}" onclick="openSaidaSheet('${r.id}','${r.prefixo}','${r.horario_programado}')">${btnTxt}</button>
    </div>`;
  }).join('');

  setMain(`
    <button onclick="renderSoltura()" style="background:none;border:none;color:var(--blue);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;padding:0 0 12px;display:flex;align-items:center;gap:6px">← Minhas Escalas</button>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="color:var(--text3);font-size:11px;font-weight:700">SOLTURA ${S.turno==='dia'?'☀️ DIA':'🌙 NOITE'} · ${formatData(dataConsulta)}</span>
        <span style="color:${pColor};font-family:'DM Mono',monospace;font-size:13px;font-weight:700">${pct}%</span>
      </div>
      <div style="background:var(--border);border-radius:99px;height:7px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pColor};border-radius:99px"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px">
        <span style="color:var(--green);font-size:11px;font-weight:600">✅ ${sSaiu}</span>
        <span style="color:var(--red);font-size:11px;font-weight:600">❌ ${sNao}</span>
        <span style="color:var(--amber);font-size:11px;font-weight:600">⏳ ${sPend}</span>
      </div>
    </div>
    ${rows}
  `);
}

      <label class="sheet-label">Motivo</label>
      <select class="sheet-input" id="sel-motivo" style="appearance:none">
        <option value="">Selecione...</option>
        <option value="problema_mecanico">🔧 Problema mecânico</option>
        <option value="sem_motorista">👤 Sem motorista</option>

        <option value="outro">📝 Outro</option>
      </select>
    </div>

      <label class="sheet-label">Horário Real</label>

      <label class="sheet-label">Pontual?</label>
      <select class="sheet-input" id="sel-pont" style="appearance:none">

      </select>

      <input class="sheet-input" placeholder="Informações adicionais..." id="inp-obs">

    <button class="btn-sheet-cancel" onclick="closeSheet()">Cancelar</button>
  `);

let _optSel='sim';
function selectOpt(opt){
  _optSel=opt;
  ['sim','res','nao'].forEach(o=>{
    const el=document.getElementById(`opt-${o}`);
    if(el) el.className='sheet-opt'+(o===opt?' selected':'');
  });
  document.getElementById('wrap-res').style.display=opt==='res'?'block':'none';
  document.getElementById('wrap-nao').style.display=opt==='nao'?'block':'none';
}

async function confirmarSaida(){
  const saiu=_optSel!=='nao';
  const usouRes=_optSel==='res';
  const reserva=document.getElementById('sel-reserva')?.value||'';
  const motivo=document.getElementById('sel-motivo')?.value||'';
  const hora=document.getElementById('hora-real').value;
  const pont=document.getElementById('sel-pont').value;
  let obs=document.getElementById('inp-obs').value||'';
  if(usouRes&&reserva) obs=`Reserva: ${reserva}${obs?' | '+obs:''}`;
  if(!saiu&&motivo) obs=`Motivo: ${motivo}${obs?' | '+obs:''}`;

  const{error}=await sb.from('soltura_2_10').update({
    saiu,horario_real:hora||null,
    pontual:pont===''?null:pont==='true',
    observacao:obs||null,
  }).eq('id',S.editSaidaId);

  if(error){toast('Erro: '+error.message,'err');return}
  toast(saiu?(usouRes?`🔄 Reserva ${reserva}!`:'✅ Saída confirmada!'):'❌ Não saída registrada');
  closeSheet();
  renderSoltura(S.data210+'_'+S.turno);
}

  const s=sol||[];const sProg=s.length,sSaiu=s.filter(r=>r.saiu===true).length,sNao=s.filter(r=>r.saiu===false).length,sRes=s.filter(r=>r.observacao?.startsWith('Reserva:')).length,sPont=s.filter(r=>r.pontual===true).length;
  const pctS=sProg>0?((sSaiu/sProg)*100).toFixed(1):null;
  function kpiCard(label,val,meta,unit='%',inv=false){
    const n=parseFloat(val);const ok=meta===undefined?null:inv?n<=meta:n>=meta;
    const color=ok===null?'#475569':ok?'var(--green)':'var(--red)';
    return`<div class="kpi-sm ${ok===null?'neu':ok?'ok':'nok'}">
      <div class="kpi-sm-label">${label}</div>
      <div class="kpi-sm-val">${val??'—'}<span style="font-size:12px;color:var(--text4)"> ${unit}</span></div>
      ${meta!==undefined?`<div class="kpi-sm-meta ${ok?'ok':'nok'}">${ok?'✓ OK':'✗ NOK'} meta ${meta}${unit}</div>`:''}
    </div>`;
  }
  setMain(`
    <div class="stitle">⚙️ Operação</div>
    <div class="kpi-row">
      ${kpiCard('Disponibilidade',pctD,95)}
      ${kpiCard('Manutenção',manut,0,'',true)}
    </div>
    <div class="kpi-row">
      ${kpiCard('Total Frota',total,undefined,'')}
      ${kpiCard('Ag. Peça',agp,0,'',true)}
    </div>

    <div class="stitle">🚌 Soltura — ${S.turno==='dia'?'☀️ Dia':'🌙 Noite'}</div>
    <div class="card ${pctS===null?'neu':parseFloat(pctS)>=99.5?'ok':'nok'} clickable" onclick="navTo('soltura')">
      <div class="card-title">% Soltura do Dia</div>
      <div class="card-val">${pctS??'—'}<span class="card-unit"> %</span></div>
      <div class="card-meta ${pctS===null?'':parseFloat(pctS)>=99.5?'ok':'nok'}">${pctS===null?'Aguardando escala':parseFloat(pctS)>=99.5?'✓ OK — Meta 99,5%':'✗ NOK — Meta 99,5%'}</div>
      ${sProg>0?`<div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
        ${[{l:'Saíram',v:sSaiu,c:'var(--green)'},{l:'Não saíram',v:sNao,c:'var(--red)'},{l:'Reservas',v:sRes,c:'var(--purple)'},{l:'Pontuais',v:sPont,c:'var(--green)'}]
          .map(b=>`<div style="text-align:center"><div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:${b.c}">${b.v}</div><div style="font-size:10px;color:${b.c};opacity:.7">${b.l}</div></div>`).join('')}
      </div>`:''}
    </div>

    <div class="stitle">🔧 Manutenção</div>
    <div class="kpi-row">
      ${kpiCard('CPK','—',undefined,' R$/km')}
      ${kpiCard('OS Abertas','—',undefined,'')}
    </div>
    <div class="card neu" style="text-align:center;color:var(--text3);font-size:13px;padding:20px">🔗 Manutenção e Suprimentos em breve</div>
  `);
}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    const{data:perfil}=await sb.from('perfis').select('*').eq('id',session.user.id).single();
    if(perfil&&perfil.ativo){
      S.user=session.user;S.perfil=perfil;
      const{data:gs}=await sb.from('garagens').select('*').eq('ativa',true).order('nome');
      S.garagens=gs||[];
      const g=S.garagens.find(x=>x.id===perfil.garagem_id);
      document.getElementById('d-av').textContent=perfil.nome[0].toUpperCase();
      document.getElementById('d-nome').textContent=perfil.nome;
      document.getElementById('d-role').textContent=CARGOS[perfil.cargo]||perfil.cargo;
      document.getElementById('d-garagem').textContent=g?`📍 ${g.nome} — ${g.uf}`:'🏢 Todas';
      document.getElementById('login').style.display='none';
      document.getElementById('app').classList.add('on');
      buildMenu();navTo('painel');
    }
  }
})();
</script>
