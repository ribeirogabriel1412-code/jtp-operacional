    +'<button onclick="closeSheet(true)" style="padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">&#8592; Voltar</button>'
    +'</div>');
}

async function abrirVistoriaPesada(id, prefixo){
  const gid=getGid();
  let vck={};
  CK_VISTORIA_PESADA.forEach((_,i)=>vck[i]=false);

  // Buscar histórico de vistorias anteriores deste carro
  let historico=[];
  try{
    const{data:hist}=await sb.from('vistoria_lavagem').select('*')
      .eq('garagem_id',gid).eq('prefixo',prefixo)
      .order('created_at',{ascending:false}).limit(5);
    historico=hist||[];
  }catch(e){}

  window._vckHistorico=historico;
  rndrVistoriaSh(id,prefixo,vck);
}

function rndrVistoriaSh(id,prefixo,vck){
  const ok=Object.values(vck).every(v=>v);
  const feitos=Object.values(vck).filter(v=>v).length;
  const total=CK_VISTORIA_PESADA.length;
  const pctV=total>0?Math.round(feitos/total*100):0;

  const rows=CK_VISTORIA_PESADA.map((it,i)=>{
    return '<div class="ck-row" onclick="togVistoria(window._vckId,window._vckPrefixo,'+i+')">'
      +'<div style="width:28px;height:28px;border-radius:8px;border:2px solid '+(vck[i]?'var(--green)':'var(--border)')+';background:'+(vck[i]?'var(--green)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white;font-size:14px">'+(vck[i]?'✓':'')+'</div>'
      +'<div class="ck-txt" style="color:'+(vck[i]?'var(--text)':'var(--text2)')+'">'+it+'</div>'
      +'</div>';
  }).join('');

  // Histórico de vistorias anteriores
  const hist=window._vckHistorico||[];
  const histHtml=hist.length
    ?'<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">'
      +'<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">&#128203; Últimas vistorias</div>'
      +hist.map(h=>{
        const dt=new Date(h.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
        const aprov=h.reprovado_itens===0;
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:4px">'
          +'<span style="font-size:16px">'+(aprov?'&#9989;':'&#9888;')+'</span>'
          +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--text2)">'+dt+'</div>'
          +'<div style="font-size:10px;color:var(--text3)">'+(h.vistoriado_por||'—')+' · '+h.itens_ok+'/'+h.itens_total+'</div></div>'
          +(h.obs?'<div style="font-size:10px;color:var(--amber);max-width:100px;text-align:right;word-break:break-word">'+h.obs+'</div>':'')
          +'</div>';
      }).join('')
      +'</div>'
    :'';

  openSheet('&#9989; Vistoria — '+prefixo+' ('+feitos+'/'+total+')',
    '<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px">'
    +'<div style="flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden">'
    +'<div style="height:100%;width:'+pctV+'%;background:'+(ok?'var(--green)':'var(--blue)')+';border-radius:99px;transition:width .2s"></div>'
    +'</div>'
    +'<span style="font-size:12px;font-weight:700;color:'+(ok?'var(--green)':'var(--text3)')+'">'+feitos+'/'+total+'</span>'
    +'</div>'
    +rows
    +'<div style="margin-top:12px">'
    +'<label style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">&#128172; Observação (opcional)</label>'
    +'<textarea id="vis-obs" placeholder="Ex: Vidro com mancha, chassis ok..." rows="2" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none"></textarea>'
    +'</div>'
    +'<button id="btn-aprovar-vis" onclick="confirmarVistoriaPesada(window._vckId)" '+(ok?'':'disabled ')
    +'style="width:100%;margin-top:10px;padding:15px;border-radius:12px;border:none;background:'+(ok?'var(--green)':'var(--surface2)')+';color:'+(ok?'white':'var(--text4)')+';font-size:15px;font-weight:700;font-family:inherit;cursor:'+(ok?'pointer':'not-allowed')+';">'
    +(ok?'&#9989; Aprovar Vistoria':'Marque todos os itens ('+feitos+'/'+total+')')
    +'</button>'
    +'<button onclick="reprovarVistoriaPesada(window._vckId)" '+(ok?'':'disabled ')
    +'style="width:100%;margin-top:8px;padding:12px;border-radius:12px;border:1px solid #EF444440;background:transparent;color:var(--red);font-size:13px;font-weight:700;font-family:inherit;cursor:'+(ok?'pointer':'not-allowed')+';">'
    +'&#10060; Reprovar — devolver para relavar'
    +'</button>'
    +'<button onclick="closeSheet(true)" style="width:100%;margin-top:8px;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">&#8592; Voltar</button>'
    +histHtml
  );
  window._vck=vck;
  window._vckId=id;
  window._vckPrefixo=prefixo;
}

function togVistoria(id,prefixo,i){
  window._vck[i]=!window._vck[i];
  rndrVistoriaSh(id,prefixo,window._vck);
}

async function confirmarVistoriaPesada(id){
  const gid=getGid();
  const obs=document.getElementById('vis-obs')?.value?.trim()||null;
  const btn=document.querySelector('#shbody button:first-of-type');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  // 1. Atualizar checklist_lavagem
  await sb.from('checklist_lavagem').update({
    validado_patio:true,
    validado_por:S.perfil?.nome,
    validado_em:new Date().toISOString(),
    status:'executado',
  }).eq('id',id);

  // 2. Gravar histórico de vistoria
  try{
    const itens_ok=CK_VISTORIA_PESADA.filter((_,i)=>window._vck[i]).length;
    await sb.from('vistoria_lavagem').insert({
      garagem_id:gid,
      checklist_id:id,
      prefixo:window._vckPrefixo,
      data:_lpData||hoje(),
      itens_total:CK_VISTORIA_PESADA.length,
      itens_ok,
      reprovado_itens:0,
      aprovado:true,
      obs:obs||null,
      vistoriado_por:S.perfil?.nome,
      vistoriado_por_id:S.perfil?.id,
    });
  }catch(e){console.warn('vistoria_lavagem:',e.message);}

  closeSheet(true);
  toast('✅ Vistoria aprovada!'+(obs?' · obs salva':''));
  telaLavPesada();
}

async function reprovarVistoriaPesada(id){
  const gid=getGid();
  const obs=document.getElementById('vis-obs')?.value?.trim()||'Reprovado — relavar';

  // Devolver para pendente
  await sb.from('checklist_lavagem').update({
    status:'pendente',
    validado_patio:false,
    validado_por:null,
    validado_em:null,
  }).eq('id',id);

  // Gravar reprovação no histórico
  try{
    await sb.from('vistoria_lavagem').insert({
      garagem_id:gid,
      checklist_id:id,
      prefixo:window._vckPrefixo,
      data:_lpData||hoje(),
      itens_total:CK_VISTORIA_PESADA.length,
      itens_ok:CK_VISTORIA_PESADA.filter((_,i)=>window._vck[i]).length,
      reprovado_itens:CK_VISTORIA_PESADA.filter((_,i)=>!window._vck[i]).length,
      aprovado:false,
      obs,
      vistoriado_por:S.perfil?.nome,
      vistoriado_por_id:S.perfil?.id,
    });
  }catch(e){console.warn('vistoria_lavagem:',e.message);}

  closeSheet(true);
  toast('⚠️ Reprovado — carro voltou para lavar');
  telaLavPesada();
}

async function removerDoPlano(){
  const idReal=window._lavCardId;
  if(!idReal||idReal==='undefined'){toast('ID invalido','err');return;}
  
  closeSheet(true);

  // Tentar delete direto
  const{error}=await sb.from('checklist_lavagem').delete().eq('id',idReal);
  
  if(error){
    toast('Erro: '+error.message,'err');
    return;
  }

  // Verificar se foi removido
  const{data:check}=await sb.from('checklist_lavagem').select('id').eq('id',idReal).maybeSingle();
  
  if(check){
    // Ainda existe — RLS bloqueou o delete. Marcar como 'cancelado' como fallback
    await sb.from('checklist_lavagem').update({status:'cancelado'}).eq('id',idReal);
    toast('Removido do plano!');
  } else {
    toast('Removido do plano!');
  }
  
  telaLavPesada();
}

async function abrirMontarPlano(){
  const gid=getGid();
  // Frota completa
  const{data:frota}=await sb.from('frota').select('prefixo,modelo,ultima_lavagem').eq('garagem_id',gid).order('prefixo');
  // Já no plano hoje
  const{data:jaNoPlano}=await sb.from('checklist_lavagem').select('prefixo').eq('garagem_id',gid).eq('data',_lpData);
  const jaSet=new Set((jaNoPlano||[]).map(p=>p.prefixo));
  // Preventivas do dia
  const{data:prevHoje}=await sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).eq('data',_lpData);
  const prevSet=new Set((prevHoje||[]).map(p=>p.prefixo));

  // Mapa de última lavagem: prioridade frota.ultima_lavagem, fallback checklist_lavagem histórico
  const ultMap={};
  // 1. Da tabela frota (mais confiável após fechamento do turno)
  (frota||[]).forEach(v=>{if(v.ultima_lavagem)ultMap[v.prefixo]=v.ultima_lavagem;});
  // 2. Complementar com checklist_lavagem histórico para carros sem registro na frota
  try{
    const{data:ultLav}=await sb.from('checklist_lavagem').select('prefixo,data').eq('garagem_id',gid)
      .eq('tipo_lavagem','pesada').order('data',{ascending:false}).limit(500);
    (ultLav||[]).forEach(l=>{if(!ultMap[l.prefixo])ultMap[l.prefixo]=l.data;});
  }catch(e){}

  const disponiveis=(frota||[]).filter(v=>!jaSet.has(v.prefixo));
  
  // Ordenar: mais antigas primeiro (prioridade de lavagem)
  disponiveis.sort((a,b)=>{
    const dA=ultMap[a.prefixo]||'2000-01-01';
    const dB=ultMap[b.prefixo]||'2000-01-01';
    return dA.localeCompare(dB);
  });

  window._planoSel=new Set();
  
  const renderLista=()=>{
    const rows=disponiveis.map(v=>{
      const sel=window._planoSel.has(v.prefixo);
      const ultD=ultMap[v.prefixo];
      const diasSem=ultD?Math.round((new Date()-new Date(ultD+'T12:00:00'))/(86400000)):999;
      const emPrev=prevSet.has(v.prefixo);
      const urgente=diasSem>=6;
      var tipoStr=emPrev?'preventiva':'pesada';
      return '<div onclick="togSel(\x27'+v.prefixo+'\x27)" data-prefixo="'+v.prefixo+'" data-tipo="'+tipoStr+'" style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:'+(sel?'#2563EB18':'var(--surface2)')+';border:1px solid '+(sel?'#2563EB60':urgente?'#F59E0B30':'var(--border)')+';border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s">'
        +'<div style="width:24px;height:24px;border-radius:6px;border:2px solid '+(sel?'var(--blue)':'var(--border)')+';background:'+(sel?'var(--blue)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white;font-size:12px">'+(sel?'✓':'')+'</div>'
        +'<div style="flex:1">'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-family:\x27DM Mono\x27,monospace;font-weight:700;font-size:15px;color:var(--blue)">'+v.prefixo+'</span>'
        +(emPrev?'<span style="font-size:9px;background:#8B5CF618;border:1px solid #8B5CF640;color:#8B5CF6;border-radius:4px;padding:1px 5px;font-weight:700">PREV</span>':'')
        +(urgente?'<span style="font-size:9px;background:#F59E0B18;border:1px solid #F59E0B40;color:var(--amber);border-radius:4px;padding:1px 5px;font-weight:700">URGENTE</span>':'')
        +'</div>'
        +'<div style="font-size:10px;color:var(--text3)">'+( ultD?diasSem+'d sem lavar':'Nunca lavado')+'</div>'
        +'</div>'
        +'</div>';
    }).join('');
    
    const sel=window._planoSel.size;
    document.getElementById('lista-plano').innerHTML=rows;
    const btnConf=document.getElementById('btn-conf-plano');
    if(btnConf){
      btnConf.textContent='✅ Adicionar '+sel+' carro'+(sel!==1?'s':'')+' ao plano';
      btnConf.disabled=sel===0;
      btnConf.style.opacity=sel===0?'0.5':'1';
    }
  };
  
  window._renderListaPlano=renderLista;
  
  openSheet('🚿 Montar Plano do Dia',
    '<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Tipo de lavagem dos carros selecionados:</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<button id="fp-prev" onclick="setTipoPlano(\'preventiva\')" style="padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">&#128995; Preventiva<br><span style=\"font-size:10px;font-weight:400\">lavagem completa</span></button>'
    +'<button id="fp-pes" onclick="setTipoPlano(\'pesada\')" style="padding:10px;border-radius:10px;border:2px solid var(--blue);background:#2563EB18;color:var(--blue);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">&#128998; Pesada<br><span style=\"font-size:10px;font-weight:400\">chassis + completa</span></button>'
    +'</div></div>'
    +'<div style="position:relative;margin-bottom:8px">'
    +'<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>'
    +'<input type="text" id="busca-plano" placeholder="Buscar prefixo..." oninput="this.value=this.value.toUpperCase();filtrarPlano(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 10px 10px 32px;color:var(--text);font-size:14px;font-family:\'DM Mono\',monospace;outline:none;text-transform:uppercase">'
    +'</div>'
    +'<div id="lista-plano" style="max-height:46vh;overflow-y:auto;margin-bottom:10px"></div>'
    +'<button id="btn-conf-plano" onclick="confirmarPlano()" disabled style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;opacity:0.5">&#9989; Adicionar 0 carros ao plano</button>'
  );
  window._tipoPlano='pesada'; window._filtroPlano='todos';window._planoDisponiveis=disponiveis;
  renderLista();
}

function togSel(prefixo){
  if(window._planoSel.has(prefixo)) window._planoSel.delete(prefixo);
  else window._planoSel.add(prefixo);
  window._renderListaPlano&&window._renderListaPlano();
}

function setTipoPlano(tipo){
  window._tipoPlano=tipo;
  ['prev','pes'].forEach(id=>{
    const btn=document.getElementById('fp-'+id);
    if(!btn)return;
    const ativo=(id==='prev'&&tipo==='preventiva')||(id==='pes'&&tipo==='pesada');
    btn.style.border=ativo?'2px solid var(--blue)':'1px solid var(--border)';
    btn.style.background=ativo?'#2563EB18':'transparent';
    btn.style.color=ativo?'var(--blue)':'var(--text3)';
  });
}

function setFiltroPlano(tipo){
  window._filtroPlano=tipo;
  // Atualizar visual dos botões
  ['todos','prev','pes'].forEach(id=>{
    const btn=document.getElementById('fp-'+id);
    if(!btn)return;
    const ativo=(id==='todos'&&tipo==='todos')||(id==='prev'&&tipo==='preventiva')||(id==='pes'&&tipo==='pesada');
    btn.style.border=ativo?'2px solid var(--blue)':'1px solid var(--border)';
    btn.style.background=ativo?'#2563EB18':'transparent';
    btn.style.color=ativo?'var(--blue)':'var(--text3)';
  });
  // Limpar busca
  const bs=document.getElementById('busca-plano');
  if(bs) bs.value='';
  filtrarPlano('');
}

function filtrarPlano(busca){
  const filtro=window._filtroPlano||'todos';
  document.querySelectorAll('#lista-plano [data-prefixo]').forEach(el=>{
    const prefixo=el.dataset.prefixo||'';
    const tipo=el.dataset.tipo||'';
    const matchBusca=!busca||prefixo.includes(busca.toUpperCase());
    const matchTipo=filtro==='todos'||tipo===filtro;
    el.style.display=matchBusca&&matchTipo?'flex':'none';
  });
}

async function confirmarPlano(){
  const gid=getGid();
  const prefixos=[...window._planoSel];
  if(!prefixos.length) return;
  
  const btn=document.getElementById('btn-conf-plano');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  
  // Preventivas do dia = lavagem pesada automaticamente
  const{data:prevHoje}=await sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).eq('data',_lpData);
  const prevSet=new Set((prevHoje||[]).map(p=>p.prefixo));
  
  const rows=prefixos.map(prefixo=>({
    garagem_id:gid,
    prefixo,
    data:_lpData,
    tipo_lavagem:window._tipoPlano||'pesada',
    status:'pendente',
    turno:S.turno||'dia',
  }));
  
  // upsert: se já existir registro para o mesmo (garagem_id, prefixo, data), não duplica
  const{error}=await sb.from('checklist_lavagem').upsert(rows,{onConflict:'garagem_id,prefixo,data',ignoreDuplicates:true});
  if(error){toast('Erro: '+error.message,'err');if(btn){btn.disabled=false;btn.textContent='Tentar novamente';}return;}
  
  closeSheet(true);
  toast('✅ '+prefixos.length+' carro'+(prefixos.length!==1?'s':'')+' adicionado'+(prefixos.length!==1?'s':'')+' ao plano!');
  telaLavPesada();
}

//

// ── Helper: Gerar e compartilhar PDF ──────────────────────────────────
// Estratégia: Web Share API (compartilha arquivo real) → fallback download
async function downloadPDF(html, nomeArquivo){
  const nomePDF = nomeArquivo.replace('.html','').replace('.pdf','')+'.pdf';

  // HTML final com título e print automático
  const htmlFinal = html
    .replace('<head>',
      '<head>'
      +'<title>'+nomePDF+'</title>'
      +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    )
    .replace('</body>',
      '<script>'
      +'window.addEventListener("load",function(){'
      +'  setTimeout(function(){window.print();},800);'
      +'});'
      +'<\/script>'
      +'</body>'
    );

  const blob = new Blob([htmlFinal], {type:'text/html;charset=utf-8'});

  // Tentar Web Share API (Android Chrome — compartilha como arquivo real)
  if(navigator.share && navigator.canShare){
    try{
      const file = new File([blob], nomePDF.replace('.pdf','.html'), {type:'text/html'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({
          title: nomePDF,
          files: [file],
        });
        toast('✅ Relatório compartilhado!');
        return;
      }
    }catch(e){
      if(e.name!=='AbortError') console.warn('[share]',e.message);
      else return; // usuário cancelou — não faz nada
    }
  }

  // Fallback: abre nova aba com o relatório (Blob URL — só funciona no browser atual)
  const url = URL.createObjectURL(blob);
  const aba = window.open(url,'_blank');
  if(aba){
    setTimeout(()=>URL.revokeObjectURL(url), 60000);
    toast('📄 Aberto! Use "⋮ Menu > Imprimir > Salvar como PDF"');
  } else {
    // Último fallback: download do arquivo HTML
    const a = document.createElement('a');
    a.href = url;
    a.download = nomePDF.replace('.pdf','.html');
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },3000);
    toast('📥 Arquivo baixado!');
  }
}

async function gerarRelatorioSoltura(){
  const data=document.getElementById('rs-data')?.value;
  if(!data){toast('Selecione a data','err');return;}
  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Buscando...';}

  const gid=getGid();

  // 1. Buscar escala do dia
  const{data:escala,error:errEsc}=await sb.from('soltura_2_10').select('*')
    .eq('garagem_id',gid).eq('data',data).order('horario_programado');

  if(errEsc||!escala?.length){
    toast('Nenhum dado de escala para esta data','err');
    if(btn){btn.disabled=false;btn.textContent='🚌 Gerar Relatório';}
    return;
  }

  // 2. Buscar última lavagem de cada prefixo na tabela frota
  const prefixos=[...new Set(escala.map(r=>r.prefixo))];
  const{data:frota}=await sb.from('frota').select('prefixo,ultima_lavagem')
    .eq('garagem_id',gid).in('prefixo',prefixos);
  const lavagemMap={};
  (frota||[]).forEach(v=>{lavagemMap[v.prefixo]=v.ultima_lavagem;});

  closeSheet(true);
  toast(`📋 Gerando: ${escala.length} veículos...`);
  await gerarPDFSoltura(gid, data, escala, lavagemMap);
}

async function gerarPDFSoltura(gid, data, escala, lavagemMap){

  const pendente=escala.filter(r=>r.saiu==null).length;
  const trocaMotorista=escala.filter(r=>r.observacao?.toLowerCase().includes('falta')||r.observacao?.toLowerCase().includes('atraso')||r.observacao?.toLowerCase().includes('troca')||r.motorista_fim&&r.motorista_fim!==r.motorista).length;
  const trocaCarro=escala.filter(r=>r.observacao?.toLowerCase().includes('reserva:')).length;

  const rows=escala.map(r=>{
    // Detectar troca
    const temTrocaMotorista=r.observacao?.toLowerCase().includes('falta')||r.observacao?.toLowerCase().includes('atraso')||r.observacao?.toLowerCase().includes('acidente')||(r.motorista_fim&&r.motorista_fim!==r.motorista);
    const temTrocaCarro=r.observacao?.toLowerCase().includes('reserva:');
    const obs=r.observacao||'';

    // Última lavagem — dias atrás
    const ultLav=lavagemMap[r.prefixo];
    let diasSemLavar='—';
    if(ultLav){
      const diff=Math.floor((new Date(data+'T12:00:00')-new Date(ultLav+'T12:00:00'))/(1000*60*60*24));

      </td>
      <td style="${B}padding:3px 5px;text-align:center;font-size:10px;color:${ultLav?'#166534':'#999'}">${diasSemLavar}</td>
    </tr>`;
  }).join('');

  // Totais por status

    <td style="${B}padding:3px 5px;font-size:10px" colspan="5">TOTAL</td>

    .gte('created_at',tsInicio).lte('created_at',tsFim)
    .order('prefixo');

  // Buscar também do fechamento_abastecimento arquivado (caso já tenha sido fechado)
  let listaAbast=abast||[];
  if(!listaAbast.length){
    // Fallback: busca por data diretamente (se já arquivado)
    const{data:fech}=await sb.from('fechamento_abastecimento').select('detalhes')
      .eq('garagem_id',gid).eq('data',data).order('created_at',{ascending:false}).limit(1);
    if(fech?.[0]?.detalhes) listaAbast=fech[0].detalhes;
  }

  // Buscar recolhas na mesma janela de horário do abastecimento (created_at)
  const{data:recolhas}=await sb.from('recolha_checklist').select('*')
    .eq('garagem_id',gid)
    .gte('created_at',tsInicio).lte('created_at',tsFim)
    .order('prefixo');

  closeSheet(true);

  if(!listaAbast.length&&!recolhas?.length){
    toast('Nenhum dado encontrado para esse período','err');
    return;
  }

  toast(`📄 Gerando: ${listaAbast.length} abast. · ${(recolhas||[]).length} recolhas`);
  await gerarRelatorioFechamento(gid, data, listaAbast, recolhas||[], turno);
}


// Gerado e enviado via WhatsApp ao fechar o turno de abastecimento
// ══════════════════════════════════════════════════════════
async function gerarRelatorioFechamento(gid, data, listaAbast, recolhasExternas, turnoRef){
  try{
    // 1. Buscar dados de recolha (usa externas se fornecidas, senão busca pela janela ou data)
    let recolhas=recolhasExternas;
    if(!recolhas){
      // Janela noturna padrão: 19h do dia anterior até 08h da data
      const ant=new Date(data+'T19:00:00');ant.setDate(ant.getDate()-1);
      const tsIni=ant.toISOString();
      const tsFi=new Date(data+'T08:00:00').toISOString();
      const{data:r}=await sb.from('recolha_checklist').select('*')
        .eq('garagem_id',gid)
        .gte('created_at',tsIni).lte('created_at',tsFi)
        .order('prefixo');
      // Fallback: se não achar por horário, busca pela data
      if(r?.length){recolhas=r;}else{
        const{data:r2}=await sb.from('recolha_checklist').select('*')
          .eq('garagem_id',gid).eq('data_recolha',data).order('prefixo');
        recolhas=r2||[];
      }
    }

    // 2. Buscar nome da garagem
    const garagem=S.garagens?.find(g=>g.id===gid);
    const garaGemNome=garagem?.nome||'Porto Velho';
    const dataFmt=data.split('-').reverse().join('/');
    const turnoNome=(turnoRef||S.turno)==='dia'?'☀️ Dia':'🌙 Noite';

    // 3. Montar mapa por prefixo
    const recMap={};
    (recolhas||[]).forEach(r=>{recMap[r.prefixo]=r;});
    const abastMap={};
    (listaAbast||[]).forEach(a=>{abastMap[a.prefixo]=a;});

    // 4. União de todos os prefixos (recolhidos + abastecidos)
    const todosPrefix=[...new Set([
      ...Object.keys(recMap),
      ...Object.keys(abastMap),
    ])].sort();

    // 5. Totalizadores
    const totLitros=listaAbast.reduce((s,a)=>s+(parseFloat(a.litros)||0),0);
    const totArla=listaAbast.filter(a=>a.arla).reduce((s,a)=>s+(parseFloat(a.arla_litros)||0),0);
    const totAvarias=(recolhas||[]).filter(r=>r.status==='avaria').length;
    const totRecolhidos=(recolhas||[]).length;
    const totAbast=listaAbast.length;

    // ── MENSAGEM WHATSAPP (texto) ──────────────────────────
    const linhasTab=todosPrefix.map(p=>{
      const r=recMap[p];
      const a=abastMap[p];
      const kmRec=r?.km_hodometro?r.km_hodometro.toLocaleString('pt-BR'):'—';
      const kmAb=a?.km_hodometro?a.km_hodometro.toLocaleString('pt-BR'):'—';
      const diff=(r?.km_hodometro&&a?.km_hodometro)?
        (a.km_hodometro-r.km_hodometro).toLocaleString('pt-BR'):'—';
      const av=r?.status==='avaria'?'⚠️':'✅';
      const litros=a?a.litros.toLocaleString('pt-BR',{minimumFractionDigits:1})+'L':'—';
      const arla=(a?.arla&&a?.arla_litros)?a.arla_litros.toLocaleString('pt-BR',{minimumFractionDigits:1})+'L':'—';
      return`${av} *${p}* | KM rec: ${kmRec} | KM ab: ${kmAb} | Δ: ${diff} | ${litros}${arla!=='—'?' ARLA:'+arla:''}`;
    }).join('\n');

    const msgWpp=
`⛽ *FECHAMENTO ABASTECIMENTO — JTP*
📍 ${garaGemNome} · ${dataFmt} · ${turnoNome}

📊 *Resumo:*
• Recolhidos: ${totRecolhidos} veículos
• Abastecidos: ${totAbast} veículos
• Total Diesel: ${totLitros.toLocaleString('pt-BR',{minimumFractionDigits:1})} L${totArla>0?'\n• Total ARLA: '+totArla.toLocaleString('pt-BR',{minimumFractionDigits:1})+' L':''}${totAvarias>0?'\n⚠️ Avarias na recolha: '+totAvarias:''}

📋 *Detalhamento por prefixo:*
${linhasTab}

_Responsável: ${S.perfil?.nome||'Líder de Pátio'}_`;

    // Envio via Evolution API
    const EVOL_URL='https://evolution-api-production-8d56.up.railway.app/message/sendText/jtp-garagem';
    const EVOL_KEY='4289AC11F437-43AD-96D7-9F27C2735696';
    const WPP_GROUP='120363427489152994@g.us';

    let wppOk=false;
    try{
      const r=await fetch(EVOL_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':EVOL_KEY},
        body:JSON.stringify({number:WPP_GROUP,options:{delay:0},textMessage:{text:msgWpp}}),
      });
      wppOk=r.ok;
    }catch(e){console.warn('[wpp fechamento]',e);}

    // ── GERAR PDF ──────────────────────────────────────────
    await gerarPDFFechamento(gid, garaGemNome, data, dataFmt, turnoNome, todosPrefix, recMap, abastMap, totLitros, totArla, totAvarias, wppOk);

  }catch(e){
    console.error('[gerarRelatorioFechamento]',e);
    toast('⚠️ Relatório não gerado: '+e.message,'err');
  }
}

          <div style="height:100%;width:${pct}%;background:${noks>0?'var(--red)':pct===100?'var(--green)':'var(--blue)'};border-radius:99px;transition:width .3s"></div>
        </div>
      </div>

      <!-- Seção Oficina -->
      <div style="font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:5px 8px;background:#2563EB10;border-radius:7px;border-left:3px solid var(--blue)">
        🔧 Equipamentos da Oficina
      </div>
      ${EQUIP_OFICINA_34.map(e=>cardEquip(e,'of')).join('')}

      <!-- Seção Pátio -->
      <div style="font-size:11px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:16px;padding:5px 8px;background:#F59E0B10;border-radius:7px;border-left:3px solid var(--amber)">
        🚌 Equipamentos de Pátio
      </div>
      ${EQUIP_PATIO_34.map(e=>cardEquip(e,'pt')).join('')}

      <!-- Botão salvar fixo -->
      <div style="position:fixed;bottom:0;left:0;right:0;padding:12px 14px;background:var(--bg);border-top:1px solid var(--border);z-index:50">
        <button onclick="salvarChecklist34()" style="width:100%;padding:15px;border-radius:12px;border:none;background:${pct===100?'var(--green)':'var(--blue)'};color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">
          ${pct===100?'✅ Concluir e Enviar':'💾 Salvar Progresso ('+pct+'%)'}
        </button>
      </div>
    </div>
  `);
}

function setCk34(secao, id, campo, valor){
  const key=secao+'_'+id;
  if(!window._ck34[key]) window._ck34[key]={status:'',manut:'',obs:''};
  window._ck34[key][campo]=valor;
  telaChecklistEquip();
}

async function salvarChecklist34(){
  const gid=getGid();
  const turno=S.turno||'dia';
  const agora=new Date();
  const dataHoje=hoje();

  // Montar lista de NOKs para o WPP
  const noks=[];
  const dados=window._ck34;
  [...EQUIP_OFICINA_34,...EQUIP_PATIO_34].forEach(eq=>{
    const secao=EQUIP_OFICINA_34.includes(eq)?'of':'pt';
    const v=dados[secao+'_'+eq.id]||{};
    if(v.status==='nok') noks.push({nome:eq.nome,obs:v.obs||'',manut:v.manut});
  });

  // Total preenchidos
  const totalItens=EQUIP_OFICINA_34.length+EQUIP_PATIO_34.length;
  const preenchidos=Object.values(dados).filter(v=>v.status).length;

  if(preenchidos===0){ toast('Preencha pelo menos um item','err'); return; }

  const btn=document.querySelector('#content button:last-child');
  if(btn){ btn.disabled=true; btn.textContent='Salvando...'; }

  // Salvar no banco
  const{error}=await sb.from('checklist_equipamentos').insert({
    garagem_id:gid,
    data:dataHoje,
    turno,
    dados:dados,
    total_itens:totalItens,
    total_ok:Object.values(dados).filter(v=>v.status==='ok').length,
    total_nok:noks.length,
    criado_por:S.perfil?.nome||null,
    criado_por_id:S.perfil?.id||null,
    criado_em:agora.toISOString(),
  });

  if(error){
    toast('Erro ao salvar: '+error.message,'err');
    if(btn){ btn.disabled=false; btn.textContent='Tentar novamente'; }
    return;
  }

  // Montar e enviar mensagem WhatsApp
  const garagem=S.garagens?.find(g=>g.id===gid);
  const dtFmt=agora.toLocaleDateString('pt-BR',{timeZone:'America/Manaus'});
  const hrFmt=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Manaus'});
  const emoji=noks.length===0?'✅':'⚠️';

  const linhasNok=noks.map(n=>`❌ *${n.nome}*${n.obs?' — '+n.obs:''}${n.manut==='sim'?' → Manutenção necessária':''}`).join('\n');

  const msg=`${emoji} *CHECKLIST DE EQUIPAMENTOS 3.4 — JTP*
📍 ${garagem?.nome||'Porto Velho'} · ${turno==='dia'?'☀️ Dia':'🌙 Noite'}
📅 ${dtFmt} · ${hrFmt}
👤 ${S.perfil?.nome||'Assistente PCM'}

📊 *Resultado:*
• Verificados: ${preenchidos}/${totalItens}
• ✅ OK: ${preenchidos-noks.length}
• ❌ NOK: ${noks.length}

${noks.length>0?`⚠️ *Equipamentos com problema:*\n${linhasNok}`:'✅ Todos os equipamentos em condições normais de operação'}

_Checklist 3.4 · Grupo JTP_`;

  try{
    await fetch('https://evolution-api-production-8d56.up.railway.app/message/sendText/jtp-garagem',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':'4289AC11F437-43AD-96D7-9F27C2735696'},
      body:JSON.stringify({number:'120363427489152994@g.us',options:{delay:0},textMessage:{text:msg}}),
    });
  }catch(e){ console.warn('[WPP 3.4]',e.message); }

  // Gerar PDF automaticamente após salvar
  await gerarPDF34Mobile(gid, dataHoje, turno, dados, noks, garagem, dtFmt, hrFmt);

  toast(noks.length===0?'✅ Checklist enviado — Tudo OK!':'⚠️ Checklist enviado — '+noks.length+' NOK(s)');
  window._ck34={}; // limpar para próximo uso
}

let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // Mostra botão de instalar se disponível
  const btn = document.getElementById('btn-instalar');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  toast('✅ App instalado com sucesso!');
});
function instalarApp(){
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(r => {
      if(r.outcome === 'accepted') toast('✅ Instalando...');
      _deferredPrompt = null;
    });
  }
}
