async function salvarRecolha(horarioRef=''){
  const prefixo=document.getElementById('rc-prefixo')?.value?.trim().toUpperCase();
  const km=parseInt(document.getElementById('rc-km')?.value||'0')||null;
  const linha=document.getElementById('rc-linha')?.value?.trim()||null;
  const tabela=document.getElementById('rc-tabela')?.value?.trim()||null;
  const motorista=document.getElementById('rc-motorista')?.value?.trim()||null;
  const externo=document.getElementById('rc-ext')?.value||'ok';
  const interno=document.getElementById('rc-int')?.value||'ok';
  const obs=document.getElementById('rc-obs')?.value?.trim()||null;
  const avaria_itens=Object.keys(_rcAvariaItens).length>0?{..._rcAvariaItens}:null;
  const gid=getGid();

  if(!prefixo){toast('Informe o prefixo','err');return;}

  const agora=new Date();
  const horarioReal=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const status=externo==='avaria'||interno==='avaria'?'avaria':'recebido';
  const dataGravar=window._diaRef||hoje();
  const dataSoltura=_diaSoltura();

  // Dedup: evita duplo registro do mesmo veículo na mesma data
  try{
    const{data:exist}=await sb.from('recolha_checklist').select('id')
      .eq('garagem_id',gid).eq('prefixo',prefixo).eq('data_recolha',dataGravar).limit(1);
    if(exist?.length){toast(`⚠️ ${prefixo} já registrado nesta data`,'err');closeSheet(true);return;}
  }catch(e){}

  // Busca veiculo_id
  let veiId=null;
  try{
    const{data:vei}=await sb.from('frota').select('id').eq('garagem_id',gid).eq('prefixo',prefixo).maybeSingle();
    veiId=vei?.id||null;
  }catch(e){}

  // Insere na recolha_checklist (retorna id para linkagem)
  const _payload={
    garagem_id:gid,
    prefixo,
    veiculo_id:veiId,
    data_recolha:dataGravar,
    horario_real:horarioReal,
    horario_previsto:horarioRef||null,
    motorista:motorista||null,
    linha:linha||null,
    tabela:tabela||null,
    km_hodometro:km||null,
    visual_externo:externo,
    visual_interno:interno,
    observacao:obs||null,
    avaria_itens:avaria_itens||null,
    status,
    plantao_nome:S.perfil?.nome||null,
    plantao_id:S.perfil?.id||null,
  };
  let{data:rcRows,error}=await sb.from('recolha_checklist').insert(_payload).select('id');
  // Se falhou por coluna inexistente, tenta sem os campos novos (banco desatualizado)
  if(error&&(error.message?.includes('tabela')||error.message?.includes('avaria_itens')||error.message?.includes('linha')||error.message?.includes('motorista'))){
    const{data:rcRows2,error:e2}=await sb.from('recolha_checklist').insert({
      garagem_id:gid,prefixo,veiculo_id:veiId,data_recolha:dataGravar,
      horario_real:horarioReal,horario_previsto:horarioRef||null,
      km_hodometro:km||null,visual_externo:externo,visual_interno:interno,
      observacao:obs||null,status,plantao_nome:S.perfil?.nome||null,plantao_id:S.perfil?.id||null,
    }).select('id');
    rcRows=rcRows2; error=e2;
  }
  if(error){
    toast('Erro ao salvar: '+error.message,'err',8000);
    const btn=document.querySelector('#shbody button[onclick*="salvarRecolha"]');
    if(btn){btn.textContent='❌ '+error.message;btn.style.background='var(--red)';}
    return;
  }

  // Se avaria, registra no dashboard de avarias
  if(status==='avaria'){
    const recolhaId=rcRows?.[0]?.id||null;
    const itensNok=avaria_itens?Object.entries(avaria_itens).filter(([,v])=>v==='nok').map(([k])=>k):[];
    const{error:avErr}=await sb.from('avarias_recolha').insert({
      garagem_id:gid,
      recolha_id:recolhaId,
      prefixo,
      data_recolha:dataGravar,
      horario_real:horarioReal,
      motorista:motorista||null,
      linha:linha||null,
      tabela:tabela||null,
      visual_externo:externo,
      visual_interno:interno,
      itens_nok:itensNok.length>0?itensNok:null,
      observacao:obs||null,
      status:'aberto',
      plantao_nome:S.perfil?.nome||null,
    });
    if(avErr) toast('⚠️ Avaria salva mas erro no dashboard: '+avErr.message,'err');
  }

  _rcAvariaItens={};

  // Marca frota disponível se OK
  if(status==='recebido'&&veiId){
    await sb.from('frota').update({status:'disponivel'}).eq('id',veiId);
  }

  // Marca recolhido na soltura_2_10 da data de soltura
  if(dataGravar){
    await sb.from('soltura_2_10').update({
      recolhido:true,
      recolhido_em:agora.toISOString(),
      recolhido_por:S.perfil?.nome,
      km_recolha:km||null,
    }).eq('garagem_id',gid).eq('prefixo',prefixo).eq('data',dataSoltura);
  }

  closeSheet(true);
  toast(status==='recebido'?`✅ ${prefixo} recolhido!`:`⚠️ ${prefixo} com avaria`);
  telaRecolha();
}

let _abFrotaLista=[], _abBuscaAtiva='';

async function telaAbastecimento(){
  const gid=getGid();

  // Frentista: lista TODA a frota — sem escala, sem chips de data
  const hojeStrAb=hoje();

  // Busca toda a frota da garagem
  let frotaRaw=[];

    const{data:f1}=await sb.from('frota').select('prefixo,modelo,tipo,status')
      .eq('garagem_id',gid).order('prefixo');
    if(f1?.length) frotaRaw=f1;
  }catch(e){}

  // Fallback: se frota vazia, monta lista a partir da soltura_2_10 (últimos 30 dias)
  if(!frotaRaw.length){
    try{
      const d30=new Date();d30.setDate(d30.getDate()-30);
      const d30str=d30.toISOString().split('T')[0];

  }

        ${pct>=99?'✅ Fechar & Arquivar Abastecimento':'💾 Salvar & Arquivar ('+tot+' abastecidos)'}
      </button>
    </div>`:''}
    ${tot>0&&!['lider_patio','supervisor','lider_oficina','coordenador'].includes(cargo())?`<div style="padding:0 14px"><div style="font-size:11px;color:var(--text3);background:var(--surface2);border-radius:8px;padding:8px 10px;text-align:center">⏳ Arquivamento pelo Líder de Pátio</div></div>`:''}

async function salvarAbastecimento(){
  // Coleta campos
  const prefixo=(document.getElementById('ab-prefixo')?.value||'').trim().toUpperCase();
  const litrosRaw=document.getElementById('ab-litros')?.value||'';
  const kmRaw=document.getElementById('ab-km')?.value||'';
  const arlaVal=document.getElementById('ab-arla')?.value||'nao';
  const arlaLitrosRaw=document.getElementById('ab-arla-litros')?.value||'';

  const litros=litrosRaw?parseFloat(litrosRaw):null;
  const km=kmRaw?parseInt(kmRaw):null;
  const arla=arlaVal==='sim';
  const arlaLitros=arla&&arlaLitrosRaw?parseFloat(arlaLitrosRaw):null;

  const gid=getGid();

  // Validações com feedback claro
  if(!gid){toast('❌ Erro: garagem não identificada','err');return;}
  if(!prefixo){toast('❌ Informe o prefixo do veículo','err');return;}
  if(!litros||litros<=0){toast('❌ Informe os litros abastecidos','err');return;}

  // Bloquear duplo clique
  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  const agora=new Date();
  const horario=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const dataGravar=window._diaRef||hoje();

  // Busca veiculo_id (não bloqueia se não achar)
  let veiId=null;
  try{
    const{data:vei}=await sb.from('frota').select('id')
      .eq('garagem_id',gid).eq('prefixo',prefixo).maybeSingle();
    veiId=vei?.id||null;
  }catch(e){}

  // Insere na tabela
  const{error}=await sb.from('abastecimento_checklist').insert({
    garagem_id:gid,
    prefixo,
    veiculo_id:veiId,
    data:dataGravar,
    litros,
    arla,
    arla_litros:arlaLitros,
    km_hodometro:km,
    frentista_nome:S.perfil?.nome||null,
    frentista_id:S.perfil?.id||null,
    horario,
  });

  if(error){
    toast('❌ '+error.message,'err');
    console.error('[abastecimento]',error);
    if(btn){btn.disabled=false;btn.textContent='⛽ Confirmar Abastecimento';}
    return;
  }

  // Tenta marcar flag abastecido na soltura_2_10 —
  // Turno noturno: abastecimento do dia 14 abastece carros que saem no dia 15.
  // Buscamos a escala MAIS PRÓXIMA: hoje ou amanhã (janela de 2 dias).
  try{
    const d0=window._diaRef||hoje(); // dia do ciclo
    const d1str=_diaSoltura(); // escala D+1
    const datasAlvo=[d0,d1str];
    const{data:proxSoltura}=await sb.from('soltura_2_10').select('data')
      .eq('garagem_id',gid).eq('prefixo',prefixo).in('data',datasAlvo)
      .order('data').limit(1);
    if(proxSoltura?.[0]?.data){
      await sb.from('soltura_2_10').update({
        abastecido:true,
        abastecido_em:agora.toISOString(),
        abastecido_por:S.perfil?.nome,
      }).eq('garagem_id',gid).eq('prefixo',prefixo).eq('data',proxSoltura[0].data);
    }
  }catch(e){console.warn('[soltura flag abastecido]',e);}

  closeSheet(true);
  toast(`✅ ${prefixo} — ${litros}L${arla&&arlaLitros?' + ARLA '+arlaLitros+'L':''}${km?' · '+km.toLocaleString()+'km':''}`);
  telaAbastecimento();
}

// Busca dados da escala ao digitar prefixo
let _rcTimer=null;
async function buscarEscalaRecolha(prefixo){
  if(prefixo.length<4) return;
  clearTimeout(_rcTimer);
  _rcTimer=setTimeout(async()=>{
    const gid=getGid();
    // Busca na escala do dia de soltura (D+1) — bug fix: antes buscava hoje()
    const{data:esc}=await sb.from('soltura_2_10').select('prefixo,linha,posicao,horario_fim,horario_programado,motorista,saiu,horario_real')
      .eq('garagem_id',gid).eq('prefixo',prefixo).eq('data',_diaSoltura())
      .order('horario_programado',{ascending:false}).limit(1);
    if(esc?.length){
      const e=esc[0];
      // Pré-preenche campos do form se ainda vazios
      const fLinha=document.getElementById('rc-linha');
      const fMot=document.getElementById('rc-motorista');
      if(fLinha&&!fLinha.value) fLinha.value=e.linha||'';
      if(fMot&&!fMot.value) fMot.value=e.motorista?.split(' ').slice(0,2).join(' ')||'';
      if(e.posicao){
        const h=document.getElementById('rc-tabela');
        if(h&&!h.value){
          h.value=e.posicao;
          document.querySelectorAll('[data-tab]').forEach(b=>{
            const ativo=b.dataset.tab===e.posicao;
            b.style.background=ativo?'#2563EB18':'transparent';
            b.style.borderColor=ativo?'var(--blue)':'var(--border)';
            b.style.color=ativo?'var(--blue)':'var(--text3)';
          });
        }
      }
      window._rcEscala={motorista:e.motorista,linha:e.linha,horario_previsto:e.horario_fim||e.horario_programado,tabela:e.posicao};
    } else {
      window._rcEscala=null;
    }
  },600);
}

// LAVAGEM PESADA (Líder Pátio)
// Fluxo: Líder monta plano → Lavador confirma → Líder vistoria
// ══════════════════════════════════════════════════════════
let _lpData=(()=>{try{return sessionStorage.getItem('jtp_lpData')||hoje();}catch(e){return hoje();}})();
let _lpFiltro='todos';
function setLpData(d){_lpData=d;try{sessionStorage.setItem('jtp_lpData',d);}catch(e){}}

async function telaLavPesada(){
  const gid=getGid();
  const data=_lpData;
  const baseSemana=new Date(data+'T12:00:00');
  const dow=baseSemana.getDay();
  const offset=(dow+6)%7; // segunda-feira como início
  const semanaIni=new Date(baseSemana);semanaIni.setDate(baseSemana.getDate()-offset);
  const semanaFim=new Date(semanaIni);semanaFim.setDate(semanaIni.getDate()+7);
  const semanaIniStr=semanaIni.toISOString().split('T')[0];
  const semanaFimStr=semanaFim.toISOString().split('T')[0];
  
  // Carregar plano do dia + frota (com ultima_lavagem) + preventivas do dia
  // Filtra cancelado/arquivado diretamente na query — não depende de filtro JS
  const[{data:plano},{data:frota},{data:prevHoje},{data:vistoriasSemana}]=await Promise.all([
    sb.from('checklist_lavagem').select('*').eq('garagem_id',gid).eq('data',data)
      .not('status','in','("cancelado","arquivado")').order('prefixo'),
    sb.from('frota').select('prefixo,modelo,ultima_lavagem').eq('garagem_id',gid).order('prefixo'),
    sb.from('soltura_2_10').select('prefixo').eq('garagem_id',gid).eq('data',data),
    sb.from('vistoria_lavagem').select('prefixo,created_at,aprovado').eq('garagem_id',gid).eq('aprovado',true)
      .gte('created_at',semanaIni.toISOString()).lt('created_at',semanaFim.toISOString()),
  ]);
  
  window._lavLista=plano||[];
  const lista=window._lavLista;
  const prevSet=new Set((prevHoje||[]).map(p=>p.prefixo));
  
  const total=lista.length;
  const lavados=lista.filter(l=>l.status==='executado').length;
  const vistoriados=lista.filter(l=>l.validado_patio).length;
  const pendentes=lista.filter(l=>l.status!=='executado').length;
  const aguardandoVistoria=lista.filter(l=>l.status==='executado'&&!l.validado_patio).length;
  const nPesada=lista.filter(l=>l.tipo_lavagem==='pesada'||l.tipo_lavagem==='preventiva').length;
  const nMedia=lista.filter(l=>l.tipo_lavagem==='media'||l.tipo_lavagem==='simples').length;
  const nLeve=lista.filter(l=>l.tipo_lavagem==='leve').length;
  const nPesadaOk=lista.filter(l=>(l.tipo_lavagem==='pesada'||l.tipo_lavagem==='preventiva')&&l.status==='executado').length;
  const nMediaOk=lista.filter(l=>(l.tipo_lavagem==='media'||l.tipo_lavagem==='simples')&&l.status==='executado').length;
  const nLeveOk=lista.filter(l=>l.tipo_lavagem==='leve'&&l.status==='executado').length;
  const pct=total>0?Math.round(lavados/total*100):0;
  const dataFmt=new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'});
  const frotaMap={};
  (frota||[]).forEach(v=>{frotaMap[v.prefixo]=v;});
  const totalFrota=(frota||[]).length;
  const lavadosSemanaSet=new Set();
  (frota||[]).forEach(v=>{
    if(v.ultima_lavagem&&v.ultima_lavagem>=semanaIniStr&&v.ultima_lavagem<semanaFimStr) lavadosSemanaSet.add(v.prefixo);
  });
  lista.forEach(l=>{if(l.status==='executado'||l.validado_patio)lavadosSemanaSet.add(l.prefixo);});
  const vistoriadosSemanaSet=new Set();
  (vistoriasSemana||[]).forEach(v=>{if(v.prefixo)vistoriadosSemanaSet.add(v.prefixo);});
  lista.forEach(l=>{if(l.validado_patio)vistoriadosSemanaSet.add(l.prefixo);});
  const lavadosSemana=lavadosSemanaSet.size;
  const vistoriadosSemana=vistoriadosSemanaSet.size;
  const planoMap={};
  lista.forEach(l=>{planoMap[l.prefixo]=l;});
  const naoLavadosSemana=(frota||[]).filter(v=>!lavadosSemanaSet.has(v.prefixo));
  const faltamLavar=Math.max(0,totalFrota-lavadosSemana);
  const faltamVistoriar=Math.max(0,totalFrota-vistoriadosSemana);
  const pctSemLav=totalFrota?Math.round(lavadosSemana/totalFrota*100):0;
  const pctSemVis=totalFrota?Math.round(vistoriadosSemana/totalFrota*100):0;
  const semanaLbl=semanaIni.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' a '+new Date(semanaFim.getTime()-86400000).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});

  // Cards do plano
  const mkCardLav=function(r){
    const lavado=r.status==='executado';
    const vistoriado=r.validado_patio;
    const emPrev=prevSet.has(r.prefixo);
    const ultLav=frotaMap[r.prefixo]?.ultima_lavagem;
    const diasSem=ultLav?Math.max(0,Math.round((new Date(data+'T12:00:00')-new Date(ultLav+'T12:00:00'))/86400000)):null;
    const ultTxt=vistoriado?'Limpo hoje':ultLav?(diasSem===0?'Lavado hoje':diasSem===1?'Última lavagem: 1 dia':'Última lavagem: '+diasSem+' dias'):'Sem histórico';
    
    let statusCor='var(--text3)';
    let statusTxt='⏳ Aguardando';
    let statusBg='var(--surface2)';
    let selo='PROGRAMADO';
    if(vistoriado){statusCor='var(--green)';statusTxt='✅ Limpo e vistoriado';statusBg='#00C48C08';selo='LIMPO';}
    else if(lavado){statusCor='var(--blue)';statusTxt='🚿 Lavado — falta vistoria';statusBg='#2563EB08';selo='AGUARD. VISTORIA';}
    
    var _idx=lista.indexOf(r);
    var oc2='onclick="abrirCardLavPesada('+_idx+')"';
    return '<div class="vcard" '+oc2+' style="background:'+statusBg+';border-left:3px solid '+statusCor+'">'
      +'<div style="flex:1">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<div class="prefixo" style="color:'+statusCor+'">'+r.prefixo+'</div>'
      +'<span style="font-size:9px;background:'+statusCor+'18;border:1px solid '+statusCor+'40;color:'+statusCor+';border-radius:4px;padding:1px 6px;font-weight:800">'+selo+'</span>'
      +(emPrev?'<span style="font-size:9px;background:#8B5CF618;border:1px solid #8B5CF640;color:#8B5CF6;border-radius:4px;padding:1px 6px;font-weight:700">PREVENTIVA</span>':'')
      +(r.tipo_lavagem==='pesada'?'<span style="font-size:9px;background:#F59E0B18;border:1px solid #F59E0B40;color:var(--amber);border-radius:4px;padding:1px 6px;font-weight:700">PESADA</span>'
        :r.tipo_lavagem==='media'?'<span style="font-size:9px;background:#2563EB18;border:1px solid #2563EB40;color:var(--blue);border-radius:4px;padding:1px 6px;font-weight:700">MÉDIA</span>'
        :r.tipo_lavagem==='leve'?'<span style="font-size:9px;background:#10B98118;border:1px solid #10B98140;color:#10B981;border-radius:4px;padding:1px 6px;font-weight:700">LEVE</span>'
        :r.tipo_lavagem==='simples'?'<span style="font-size:9px;background:#3B82F618;border:1px solid #3B82F640;color:var(--blue);border-radius:4px;padding:1px 6px;font-weight:700">SIMPLES</span>':'')
      +'</div>'

async function addLavagemSemana(prefixo){
  const gid=getGid();
  const {error}=await sb.from('checklist_lavagem').upsert([{
    garagem_id:gid,
    prefixo:prefixo,
    data:_lpData,
    tipo_lavagem:'pesada',
    status:'pendente',
    turno:S.turno||'dia',
  }],{onConflict:'garagem_id,prefixo,data',ignoreDuplicates:true});
  if(error){toast('Erro ao programar: '+error.message,'err');return;}
  toast('✅ '+prefixo+' programado para lavar');
  telaLavPesada();
}

  const nFMok=lista.filter(l=>(l.tipo_lavagem==='media'||l.tipo_lavagem==='simples')&&l.status==='executado').length;

async function confirmarFechamentoLavagem(){
  const gid=getGid();
  const obs=document.getElementById('obs-lav-turno')?.value?.trim()||null;

  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Fechando...';}

  // Busca plano do dia (inclui todos os status para ter o total real)
  const{data:plano,error:errPlano}=await sb.from('checklist_lavagem').select('*')
    .eq('garagem_id',gid).eq('data',_lpData);

  if(errPlano||!plano?.length){
    // Se não achar por _lpData, tenta hoje
    const{data:planoHoje}=await sb.from('checklist_lavagem').select('*')
      .eq('garagem_id',gid).eq('data',hoje());
    if(!planoHoje?.length){
      toast('❌ Nenhum plano encontrado para fechar','err');
      if(btn){btn.disabled=false;btn.textContent='Tentar novamente';}
      return;
    }
    // Usa hoje como referência
    window._lpDataReal=hoje();
  } else {
    window._lpDataReal=_lpData;
  }

  const lista=(plano?.length?plano:[]).filter(l=>l.status!=='arquivado');
  const dataRef=window._lpDataReal||_lpData;

  if(!lista.length){
    // Já foi arquivado — só avança a data
    const amanha=new Date(dataRef+'T12:00:00');
    amanha.setDate(amanha.getDate()+1);
    setLpData(amanha.toISOString().split('T')[0]);
    closeSheet(true);
    toast('ℹ️ Plano já arquivado — avançando para o próximo turno');
    telaLavPesada();
    return;
  }

  const lavados=lista.filter(l=>l.status==='executado').length;
  const vistoriados=lista.filter(l=>l.validado_patio).length;
  const pct=lista.length>0?Math.round(vistoriados/lista.length*100):0;
  const prefixosLavados=[...new Set(lista.filter(l=>l.status==='executado').map(l=>l.prefixo))];

  // PASSO 1 — Snapshot (não bloqueia se falhar)
  try{
    await sb.from('fechamento_lavagem').insert({
      garagem_id:gid, data:dataRef, turno:S.turno||'dia',
      total_planejados:lista.length, total_lavados:lavados,
      total_vistoriados:vistoriados, pct_vistoriados:pct,
      responsavel_nome:S.perfil?.nome||null, responsavel_id:S.perfil?.id||null,
      observacao:obs,
    });
  }catch(e){console.warn('[fechamento_lavagem]',e.message);}

  // PASSO 2 — Atualizar ultima_lavagem (não bloqueia se falhar)
  if(prefixosLavados.length){
    try{
      const{data:veiculos}=await sb.from('frota').select('id,prefixo')
        .eq('garagem_id',gid).in('prefixo',prefixosLavados);
      if(veiculos?.length){
        await Promise.all(veiculos.map(v=>
          sb.from('frota').update({ultima_lavagem:dataRef}).eq('id',v.id)
        ));
      }
    }catch(e){console.warn('[frota ultima_lavagem]',e.message);}
  }

  // PASSO 3 — Arquivar checklist do dia (CRÍTICO — tela deve limpar)
  const ids=lista.map(l=>l.id).filter(Boolean);
  let arquivado=false;

  // Tenta por IDs primeiro (mais preciso)
  if(ids.length){
    const{error:e1}=await sb.from('checklist_lavagem')
      .update({status:'arquivado'}).in('id',ids);
    if(!e1){ arquivado=true; }
    else console.warn('[lav] update por ID falhou:',e1.message);
  }

  // Fallback: arquiva por garagem+data
  if(!arquivado){
    const{error:e2}=await sb.from('checklist_lavagem')
      .update({status:'arquivado'}).eq('garagem_id',gid).eq('data',dataRef);
    if(!e2){ arquivado=true; }
    else console.warn('[lav] arquivado por data falhou:',e2.message);
  }

  if(!arquivado){
    toast('⚠️ Não foi possível arquivar o plano — verifique permissões (RLS)','err');
  }

  // Avança a data para o próximo dia independente de erro
  const amanha=new Date(dataRef+'T12:00:00');
  amanha.setDate(amanha.getDate()+1);
  setLpData(amanha.toISOString().split('T')[0]);

  closeSheet(true);
  toast('✅ Turno fechado! '+lavados+'/'+lista.length+' lavados');
  telaLavPesada();
}

  const r=window._lavLista&&window._lavLista[idx];
  if(!r){toast('Erro ao abrir card','err');return;}
  
  // Guardar globalmente
  window._lavCardId=r.id;
  window._lavCardPrefixo=r.prefixo;
  
  const lavado=r.status==='executado';
  const vistoriado=r.validado_patio===true;
  const tipo=r.tipo_lavagem||'pesada';

  const TIPO_DESC={pesada:'🟡 Pesada — chassis + completa + A/C',media:'🔵 Média — rodo, esfregão, sem chassis',leve:'🟢 Leve — varrer + lixo',simples:'💧 Simples',preventiva:'🟣 Preventiva — completa'};
  var statusInfo = vistoriado
    ? '<div style="background:#00C48C10;border:1px solid #00C48C30;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--green);font-weight:700">&#9989; Lavagem vistoriada e aprovada</div>'
    : lavado
      ? '<div style="background:#2563EB10;border:1px solid #2563EB30;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--blue);font-weight:700">&#128695; Lavado — aguardando vistoria</div>'
      : '<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text3)">Tipo: <strong style="color:var(--text)">'+(TIPO_DESC[tipo]||tipo)+'</strong></div>';

  const podeVistoriar=tipo!=='leve';
  var btnVistoriar = (!vistoriado&&podeVistoriar)
    ? '<button onclick="closeSheet(true);abrirVistoriaPesada(window._lavCardId,window._lavCardPrefixo)" style="padding:13px;border-radius:12px;border:1px solid #00C48C40;background:#00C48C18;color:var(--green);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">'
      +(lavado?'&#9989; Vistoriar agora':'&#9989; Já foi lavado — Vistoriar')+'</button>'
    : '';

  openSheet('&#128695; '+r.prefixo,
    '<div style="display:flex;flex-direction:column;gap:8px">'
    +statusInfo
    +btnVistoriar
    +'<button onclick="removerDoPlano()" style="padding:12px;border-radius:12px;border:1px solid #EF444440;background:transparent;color:var(--red);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">&#128465;&#65039; Remover do plano</button>'
    +'<button onclick="closeSheet(true)" style="padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">&#8592; Voltar</button>'
    +'</div>');
}

async function abrirVistoriaPesada(id, prefixo){
  const gid=getGid();
  let vck={};
  CK_VISTORIA_PESADA.forEach((_,i)=>vck[i]=false);

  // Buscar histórico de vistorias anteriores deste carro
  let historico=[];
  try{
    const{data:hist}=await sb.from('vistoria_lavagem').select('*')
      .eq('garagem_id',gid).eq('prefixo',prefixo)
      .order('created_at',{ascending:false}).limit(5);
    historico=hist||[];
  }catch(e){}

  window._vckHistorico=historico;
  rndrVistoriaSh(id,prefixo,vck);
}

function rndrVistoriaSh(id,prefixo,vck){
  const ok=Object.values(vck).every(v=>v);
  const feitos=Object.values(vck).filter(v=>v).length;
  const total=CK_VISTORIA_PESADA.length;
  const pctV=total>0?Math.round(feitos/total*100):0;

  const rows=CK_VISTORIA_PESADA.map((it,i)=>{
    return '<div class="ck-row" onclick="togVistoria(window._vckId,window._vckPrefixo,'+i+')">'
      +'<div style="width:28px;height:28px;border-radius:8px;border:2px solid '+(vck[i]?'var(--green)':'var(--border)')+';background:'+(vck[i]?'var(--green)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white;font-size:14px">'+(vck[i]?'✓':'')+'</div>'
      +'<div class="ck-txt" style="color:'+(vck[i]?'var(--text)':'var(--text2)')+'">'+it+'</div>'
      +'</div>';
  }).join('');

  // Histórico de vistorias anteriores
  const hist=window._vckHistorico||[];
  const histHtml=hist.length
    ?'<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">'
      +'<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">&#128203; Últimas vistorias</div>'
      +hist.map(h=>{
        const dt=new Date(h.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
        const aprov=h.reprovado_itens===0;
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:4px">'
          +'<span style="font-size:16px">'+(aprov?'&#9989;':'&#9888;')+'</span>'
          +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--text2)">'+dt+'</div>'
          +'<div style="font-size:10px;color:var(--text3)">'+(h.vistoriado_por||'—')+' · '+h.itens_ok+'/'+h.itens_total+'</div></div>'
          +(h.obs?'<div style="font-size:10px;color:var(--amber);max-width:100px;text-align:right;word-break:break-word">'+h.obs+'</div>':'')
          +'</div>';
      }).join('')
      +'</div>'
    :'';

  openSheet('&#9989; Vistoria — '+prefixo+' ('+feitos+'/'+total+')',
    '<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px">'
    +'<div style="flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden">'
    +'<div style="height:100%;width:'+pctV+'%;background:'+(ok?'var(--green)':'var(--blue)')+';border-radius:99px;transition:width .2s"></div>'
    +'</div>'
    +'<span style="font-size:12px;font-weight:700;color:'+(ok?'var(--green)':'var(--text3)')+'">'+feitos+'/'+total+'</span>'
    +'</div>'
    +rows
    +'<div style="margin-top:12px">'
    +'<label style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">&#128172; Observação (opcional)</label>'
    +'<textarea id="vis-obs" placeholder="Ex: Vidro com mancha, chassis ok..." rows="2" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none"></textarea>'
    +'</div>'
    +'<button id="btn-aprovar-vis" onclick="confirmarVistoriaPesada(window._vckId)" '+(ok?'':'disabled ')
    +'style="width:100%;margin-top:10px;padding:15px;border-radius:12px;border:none;background:'+(ok?'var(--green)':'var(--surface2)')+';color:'+(ok?'white':'var(--text4)')+';font-size:15px;font-weight:700;font-family:inherit;cursor:'+(ok?'pointer':'not-allowed')+';">'
    +(ok?'&#9989; Aprovar Vistoria':'Marque todos os itens ('+feitos+'/'+total+')')
    +'</button>'
    +'<button onclick="reprovarVistoriaPesada(window._vckId)" '+(ok?'':'disabled ')
    +'style="width:100%;margin-top:8px;padding:12px;border-radius:12px;border:1px solid #EF444440;background:transparent;color:var(--red);font-size:13px;font-weight:700;font-family:inherit;cursor:'+(ok?'pointer':'not-allowed')+';">'
    +'&#10060; Reprovar — devolver para relavar'
    +'</button>'
    +'<button onclick="closeSheet(true)" style="width:100%;margin-top:8px;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;font-family:inherit;cursor:pointer">&#8592; Voltar</button>'
    +histHtml
  );
  window._vck=vck;
  window._vckId=id;
  window._vckPrefixo=prefixo;
}

function togVistoria(id,prefixo,i){
  window._vck[i]=!window._vck[i];
  rndrVistoriaSh(id,prefixo,window._vck);
}

async function confirmarVistoriaPesada(id){
  const gid=getGid();
  const obs=document.getElementById('vis-obs')?.value?.trim()||null;
  const btn=document.querySelector('#shbody button:first-of-type');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  // 1. Atualizar checklist_lavagem
  await sb.from('checklist_lavagem').update({
    validado_patio:true,
    validado_por:S.perfil?.nome,
    validado_em:new Date().toISOString(),
    status:'executado',
  }).eq('id',id);

  // 2. Gravar histórico de vistoria
  try{
    const itens_ok=CK_VISTORIA_PESADA.filter((_,i)=>window._vck[i]).length;
    await sb.from('vistoria_lavagem').insert({
      garagem_id:gid,
      checklist_id:id,
      prefixo:window._vckPrefixo,
      data:_lpData||hoje(),
      itens_total:CK_VISTORIA_PESADA.length,
      itens_ok,
      reprovado_itens:0,
      aprovado:true,
      obs:obs||null,
      vistoriado_por:S.perfil?.nome,
      vistoriado_por_id:S.perfil?.id,
    });
  }catch(e){console.warn('vistoria_lavagem:',e.message);}

  closeSheet(true);
  toast('✅ Vistoria aprovada!'+(obs?' · obs salva':''));
  telaLavPesada();
}

async function reprovarVistoriaPesada(id){
  const gid=getGid();
  const obs=document.getElementById('vis-obs')?.value?.trim()||'Reprovado — relavar';

  // Devolver para pendente
  await sb.from('checklist_lavagem').update({
    status:'pendente',
    validado_patio:false,
    validado_por:null,
    validado_em:null,
  }).eq('id',id);

  // Gravar reprovação no histórico
  try{
    await sb.from('vistoria_lavagem').insert({
      garagem_id:gid,
      checklist_id:id,
      prefixo:window._vckPrefixo,
      data:_lpData||hoje(),
      itens_total:CK_VISTORIA_PESADA.length,
      itens_ok:CK_VISTORIA_PESADA.filter((_,i)=>window._vck[i]).length,
      reprovado_itens:CK_VISTORIA_PESADA.filter((_,i)=>!window._vck[i]).length,
      aprovado:false,
      obs,
      vistoriado_por:S.perfil?.nome,
      vistoriado_por_id:S.perfil?.id,
    });
  }catch(e){console.warn('vistoria_lavagem:',e.message);}

  closeSheet(true);
  toast('⚠️ Reprovado — carro voltou para lavar');
  telaLavPesada();
}

async function removerDoPlano(){
  const idReal=window._lavCardId;
  if(!idReal||idReal==='undefined'){toast('ID invalido','err');return;}
  
  closeSheet(true);

  // Tentar delete direto
  const{error}=await sb.from('checklist_lavagem').delete().eq('id',idReal);
  
  if(error){
    toast('Erro: '+error.message,'err');
    return;
  }

  // Verificar se foi removido
  const{data:check}=await sb.from('checklist_lavagem').select('id').eq('id',idReal).maybeSingle();
  
  if(check){
    // Ainda existe — RLS bloqueou o delete. Marcar como 'cancelado' como fallback
    await sb.from('checklist_lavagem').update({status:'cancelado'}).eq('id',idReal);
    toast('Removido do plano!');
  } else {
    toast('Removido do plano!');
  }
  
  telaLavPesada();
}

async function abrirMontarPlano(){
  const gid=getGid();
  const [frotaRes,jaNoPlanoRes,prevRes,ultMediaRes]=await Promise.all([
    sb.from('frota').select('prefixo,modelo,ultima_lavagem').eq('garagem_id',gid).order('prefixo'),
    sb.from('checklist_lavagem').select('prefixo,tipo_lavagem').eq('garagem_id',gid).eq('data',_lpData).not('status','in','("cancelado","arquivado")'),
    sb.from('programacao_preventiva').select('prefixo').eq('garagem_id',gid).eq('data_programada',_lpData).neq('status','concluido'),
    sb.from('checklist_lavagem').select('prefixo,data,tipo_lavagem').eq('garagem_id',gid).in('tipo_lavagem',['media','simples']).order('data',{ascending:false}).limit(800),
  ]);
  const frota=frotaRes.data||[];
  const jaMap={};(jaNoPlanoRes.data||[]).forEach(r=>jaMap[r.prefixo]=r.tipo_lavagem);
  const prevSet=new Set((prevRes.data||[]).map(p=>p.prefixo));
  const ultMediaMap={};
  (ultMediaRes.data||[]).forEach(h=>{if(!ultMediaMap[h.prefixo])ultMediaMap[h.prefixo]=h.data;});

  const frota_livre=frota.filter(v=>!jaMap[v.prefixo]);
  // PESADA: do preventiva do dia
  const pesadaSug=frota_livre.filter(v=>prevSet.has(v.prefixo));
  // MÉDIA: sugestão baseada em mais tempo sem lavagem média, excluindo pesada
  const candidatosMedia=frota_livre.filter(v=>!prevSet.has(v.prefixo)).sort((a,b)=>{
    const dA=ultMediaMap[a.prefixo]||'2000-01-01';
    const dB=ultMediaMap[b.prefixo]||'2000-01-01';
    return dA.localeCompare(dB);
  });
  const META_MEDIA=18;
  const mediaSug=candidatosMedia.slice(0,META_MEDIA);
  // LEVE: todos os restantes não selecionados
  const pesadaSet=new Set(pesadaSug.map(v=>v.prefixo));
  const mediaSet=new Set(mediaSug.map(v=>v.prefixo));
  const leveAuto=frota_livre.filter(v=>!pesadaSet.has(v.prefixo)&&!mediaSet.has(v.prefixo));

  window._planoPesada=new Set(pesadaSet);
  window._planoMedia=new Set(mediaSet);
  window._planoFrota=frota_livre;
  window._planoJaMap=jaMap;
  window._planoPrevSet=prevSet;
  window._planoUltMedia=ultMediaMap;

  const mkItemPlano=(v,tipo)=>{
    const set=tipo==='pesada'?window._planoPesada:window._planoMedia;
    const sel=set.has(v.prefixo);
    const emPrev=window._planoPrevSet.has(v.prefixo);
    const ultD=window._planoUltMedia[v.prefixo];
    const diasMedia=ultD?Math.round((new Date()-new Date(ultD+'T12:00:00'))/86400000):999;
    const cor=tipo==='pesada'?'var(--amber)':'var(--blue)';
    const tagPrev=emPrev?'<span style="font-size:9px;background:#8B5CF618;border:1px solid #8B5CF640;color:#8B5CF6;border-radius:4px;padding:1px 5px;font-weight:700">PREV</span>':'';
    const tagDias=tipo==='media'?'<span style="font-size:9px;background:var(--surface);border:1px solid var(--border);color:var(--text3);border-radius:4px;padding:1px 5px">'+( diasMedia===999?'s/ histórico':diasMedia+'d s/ média')+'</span>':'';
    return '<div onclick="togPlano(\x27'+v.prefixo+'\x27,\x27'+tipo+'\x27)" data-prefixo="'+v.prefixo+'" data-tipo="'+tipo+'" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:'+(sel?cor+'18':'var(--surface2)')+';border:1px solid '+(sel?cor+'50':'var(--border)')+';border-radius:10px;margin-bottom:6px;cursor:pointer">'
      +'<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(sel?cor:'var(--border)')+';background:'+(sel?cor:'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white;font-size:11px">'+(sel?'✓':'')+'</div>'
      +'<div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font-family:\'DM Mono\',monospace;font-weight:700;font-size:15px;color:'+(sel?cor:'var(--text)')+'">'+v.prefixo+'</span>'+tagPrev+tagDias+'</div></div>'
      +'</div>';
  };

  const renderPlano=()=>{
    const nP=window._planoPesada.size,nM=window._planoMedia.size;
    const nL=window._planoFrota.filter(v=>!window._planoPesada.has(v.prefixo)&&!window._planoMedia.has(v.prefixo)&&!window._planoJaMap[v.prefixo]).length;
    const frotaP=window._planoFrota.filter(v=>prevSet.has(v.prefixo));
    const frotaM=window._planoFrota.filter(v=>!prevSet.has(v.prefixo));
    const busca=(document.getElementById('busca-plano-p')?.value||'').toUpperCase();
    const buscaM=(document.getElementById('busca-plano-m')?.value||'').toUpperCase();
    const rowsP=frotaP.filter(v=>!busca||v.prefixo.includes(busca)).map(v=>mkItemPlano(v,'pesada')).join('');
    const rowsM=frotaM.filter(v=>!buscaM||v.prefixo.includes(buscaM)).map(v=>mkItemPlano(v,'media')).join('');
    document.getElementById('lista-p').innerHTML=rowsP||'<div style="font-size:12px;color:var(--text3);text-align:center;padding:10px">Nenhuma preventiva para hoje</div>';
    document.getElementById('lista-m').innerHTML=rowsM;
    document.getElementById('kpi-p').textContent=nP+' selecionado(s)';
    document.getElementById('kpi-m').textContent=nM+'/'+META_MEDIA+' selecionado(s)';
    document.getElementById('kpi-l').textContent=nL+' automático(s)';
    const btn=document.getElementById('btn-conf-plano');
    if(btn){
      const tot=nP+nM+nL;
      btn.textContent='✅ Confirmar plano — '+tot+' veículo(s)';
      btn.disabled=tot===0;btn.style.opacity=tot===0?'0.5':'1';
    }
  };
  window._renderListaPlano=renderPlano;

  openSheet('🚿 Montar Plano do Dia',
    '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--amber);margin-bottom:4px">🟡 Pesada — do preventiva</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Veículos com preventiva hoje são lavagem pesada completa (chassis + A/C)</div>'
    +'<div id="kpi-p" style="font-size:11px;color:var(--amber);font-weight:700;margin-bottom:6px"></div>'
    +'<div style="position:relative;margin-bottom:6px"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px">🔍</span>'
    +'<input type="text" id="busca-plano-p" placeholder="Filtrar prefixo..." oninput="this.value=this.value.toUpperCase();window._renderListaPlano&&window._renderListaPlano()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 8px 8px 30px;color:var(--text);font-size:13px;font-family:\'DM Mono\',monospace;outline:none"></div>'
    +'<div id="lista-p" style="max-height:28vh;overflow-y:auto;margin-bottom:12px"></div>'
    +'<div style="height:1px;background:var(--border);margin-bottom:12px"></div>'
    +'<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:4px">🔵 Média — rotação semanal</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Sistema sugere os '+META_MEDIA+' veículos há mais tempo sem lavagem média. Selecione/deselecione conforme necessário.</div>'
    +'<div id="kpi-m" style="font-size:11px;color:var(--blue);font-weight:700;margin-bottom:6px"></div>'
    +'<div style="position:relative;margin-bottom:6px"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px">🔍</span>'
    +'<input type="text" id="busca-plano-m" placeholder="Filtrar prefixo..." oninput="this.value=this.value.toUpperCase();window._renderListaPlano&&window._renderListaPlano()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 8px 8px 30px;color:var(--text);font-size:13px;font-family:\'DM Mono\',monospace;outline:none"></div>'
    +'<div id="lista-m" style="max-height:28vh;overflow-y:auto;margin-bottom:12px"></div>'
    +'<div style="height:1px;background:var(--border);margin-bottom:12px"></div>'
    +'<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#10B981;margin-bottom:4px">🟢 Leve — automático</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:4px">Todos os demais veículos recebem leve (varrer + lixo) automaticamente ao confirmar.</div>'
    +'<div id="kpi-l" style="font-size:11px;color:#10B981;font-weight:700;margin-bottom:14px"></div>'
    +'<button id="btn-conf-plano" onclick="confirmarPlano()" disabled style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;opacity:0.5">✅ Confirmar plano</button>'
  );
  renderPlano();
}

function togPlano(prefixo,tipo){
  const set=tipo==='pesada'?window._planoPesada:window._planoMedia;
  if(set.has(prefixo)) set.delete(prefixo); else set.add(prefixo);
  window._renderListaPlano&&window._renderListaPlano();
}


async function confirmarPlano(){
  const gid=getGid();
  const btn=document.getElementById('btn-conf-plano');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  const pesadaList=[...window._planoPesada];
  const mediaList=[...window._planoMedia];
  const jaMap=window._planoJaMap||{};
  const frotaLivre=window._planoFrota||[];
  const leveList=frotaLivre
    .filter(v=>!window._planoPesada.has(v.prefixo)&&!window._planoMedia.has(v.prefixo)&&!jaMap[v.prefixo])
    .map(v=>v.prefixo);

  const rows=[
    ...pesadaList.map(prefixo=>({garagem_id:gid,prefixo,data:_lpData,tipo_lavagem:'pesada',status:'pendente',turno:S.turno||'dia'})),
    ...mediaList.map(prefixo=>({garagem_id:gid,prefixo,data:_lpData,tipo_lavagem:'media',status:'pendente',turno:S.turno||'dia'})),
    ...leveList.map(prefixo=>({garagem_id:gid,prefixo,data:_lpData,tipo_lavagem:'leve',status:'pendente',turno:S.turno||'dia'})),
  ];

  if(!rows.length){toast('Nenhum veículo para salvar','err');if(btn){btn.disabled=false;btn.textContent='Confirmar plano';}return;}

  const{error}=await sb.from('checklist_lavagem').upsert(rows,{onConflict:'garagem_id,prefixo,data',ignoreDuplicates:true});
  if(error){toast('Erro: '+error.message,'err');if(btn){btn.disabled=false;btn.textContent='Tentar novamente';}return;}

  closeSheet(true);
  toast('✅ Plano montado — '+pesadaList.length+' pesada · '+mediaList.length+' média · '+leveList.length+' leve');
  telaLavPesada();
}

// NUNCA usar: window.open(), document.write(), w.print(), iframe.print()
//
// FLUXO:
//   1. Montar o HTML do relatório (string) com cabeçalho JTP padrão
//   2. Chamar: await downloadPDF(html, 'JTP_NomeRelatorio_YYYYMMDD_Garagem.pdf')
//
// NOME DO ARQUIVO — padrão obrigatório:
//   JTP_{TipoRelatorio}_{YYYYMMDD}_{NomeGaragem}.pdf
//   Ex: JTP_Soltura_20260514_Garagem_Porto_Velho.pdf
//       JTP_Fechamento_Abast_20260514_Garagem_Porto_Velho.pdf
//       JTP_Lavagem_20260514_Garagem_Porto_Velho.pdf
//
// COMPORTAMENTO POR DISPOSITIVO:
//   Android Chrome  → Web Share API: abre seletor nativo (WPP, Drive, e-mail...)
//   iOS Safari      → Fallback nova aba: menu compartilhar → Salvar em Arquivos
//   Desktop         → Fallback nova aba: Ctrl+P → Salvar como PDF
//   Popup bloqueado → Download do arquivo .html com print automático
//
// ESTRUTURA DO HTML DO RELATÓRIO:
//   <!DOCTYPE html><html><head><meta charset="UTF-8">
//   <style>
//     body{font-family:Arial,sans-serif;font-size:10px;color:#000;margin:0;padding:10px}
//     @media print{.no-print{display:none!important}body{padding:0}@page{margin:8mm;size:A4 landscape}}
//     table{border-collapse:collapse;width:100%}
//   </style></head><body>
//   <div class="no-print" style="..."> ← barra de ação (some no print)
//     <button onclick="window.print()">🖨️ Salvar PDF</button>
//   </div>
//   <!-- CABEÇALHO PADRÃO JTP -->
//   <div style="text-align:center;border:2.5px solid #000;padding:6px;margin-bottom:5px">
//     <div style="font-size:13px;font-weight:900">GRUPO JTP │ OPERAÇÃO GARAGEM │ {Título}</div>

// ── Helper: Gerar e compartilhar PDF ──────────────────────────────────
// Estratégia: Web Share API (compartilha arquivo real) → fallback download
async function downloadPDF(html, nomeArquivo){
  const nomePDF = nomeArquivo.replace('.html','').replace('.pdf','')+'.pdf';

  // HTML final com título e print automático
  const htmlFinal = html
    .replace('<head>',
      '<head>'
      +'<title>'+nomePDF+'</title>'
      +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    )
    .replace('</body>',
      '<scr'+'ipt>'
      +'window.addEventListener("load",function(){'
      +'  setTimeout(function(){window.print();},800);'
      +'});'
      +'<\/script>'
      +'</body>'
    );

  const blob = new Blob([htmlFinal], {type:'text/html;charset=utf-8'});

  // Tentar Web Share API (Android Chrome — compartilha como arquivo real)
  if(navigator.share && navigator.canShare){
    try{
      const file = new File([blob], nomePDF.replace('.pdf','.html'), {type:'text/html'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({
          title: nomePDF,
          files: [file],
        });
        toast('✅ Relatório compartilhado!');
        return;
      }
    }catch(e){
      if(e.name!=='AbortError') console.warn('[share]',e.message);
      else return; // usuário cancelou — não faz nada
    }
  }

  // Fallback: abre nova aba com o relatório (Blob URL — só funciona no browser atual)
  const url = URL.createObjectURL(blob);
  const aba = window.open(url,'_blank');
  if(aba){
    setTimeout(()=>URL.revokeObjectURL(url), 60000);
    toast('📄 Aberto! Use "⋮ Menu > Imprimir > Salvar como PDF"');
  } else {
    // Último fallback: download do arquivo HTML
    const a = document.createElement('a');
    a.href = url;
    a.download = nomePDF.replace('.pdf','.html');
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },3000);
    toast('📥 Arquivo baixado!');
  }
}

function abrirRelatorioSoltura(){
  const hojeStr=hoje();
  openSheet('🚌 Relatório de Soltura',`
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="background:var(--surface2);border-radius:10px;padding:12px;font-size:12px;color:var(--text3)">
        Selecione o <strong style="color:var(--text)">dia de referência</strong>.<br>
        O relatório mostrará todos os veículos da escala com:<br>
        prefixo · linha · motorista · horário · trocas · última lavagem
      </div>

      <div>
        <label class="fl">Dia da escala</label>
        <input type="date" id="rs-data" value="${hojeStr}"
          style="width:100%;box-sizing:border-box;padding:11px 12px;border-radius:10px;border:1px solid var(--blue);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px">
      </div>

      <button onclick="gerarRelatorioSoltura()" style="padding:15px;border-radius:12px;border:none;background:#8B5CF6;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer">
        🚌 Gerar Relatório
      </button>
    </div>
  `);
}

async function gerarRelatorioSoltura(){
  const data=document.getElementById('rs-data')?.value;
  if(!data){toast('Selecione a data','err');return;}
  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Buscando...';}

  const gid=getGid();

  // 1. Buscar escala do dia
  const{data:escala,error:errEsc}=await sb.from('soltura_2_10').select('*')
    .eq('garagem_id',gid).eq('data',data).order('horario_programado');

  if(errEsc||!escala?.length){
    toast('Nenhum dado de escala para esta data','err');
    if(btn){btn.disabled=false;btn.textContent='🚌 Gerar Relatório';}
    return;
  }

  // 2. Buscar última lavagem de cada prefixo na tabela frota
  const prefixos=[...new Set(escala.map(r=>r.prefixo))];
  const{data:frota}=await sb.from('frota').select('prefixo,ultima_lavagem')
    .eq('garagem_id',gid).in('prefixo',prefixos);
  const lavagemMap={};
  (frota||[]).forEach(v=>{lavagemMap[v.prefixo]=v.ultima_lavagem;});

  closeSheet(true);
  toast(`📋 Gerando: ${escala.length} veículos...`);
  await gerarPDFSoltura(gid, data, escala, lavagemMap);
}

async function gerarPDFSoltura(gid, data, escala, lavagemMap){
  const dataFmt=data.split('-').reverse().join('/');
  const garagem=S.garagens?.find(g=>g.id===gid);
  const garaGemNome=garagem?.nome||'Porto Velho';

  const B='border:1px solid #333;';
  const BH='border:1px solid #333;background:#555;color:#fff;font-weight:900;';

  // Totalizadores
  const saiu=escala.filter(r=>r.saiu===true).length;
  const naoSaiu=escala.filter(r=>r.saiu===false).length;
  const pendente=escala.filter(r=>r.saiu==null).length;
  const isTrocaMotFalta=function(r){
    const txt=((r.motivo_troca||'')+' '+(r.observacao||'')).toLowerCase();
    return !!(r.motorista_fim&&r.motorista_fim!==r.motorista&&txt.includes('falta'));
  };
  const trocaMotorista=escala.filter(isTrocaMotFalta).length;
  const trocaCarro=escala.filter(r=>r.observacao?.toLowerCase().includes('reserva:')).length;

  const rows=escala.map(r=>{
    // Detectar troca
    const temTrocaMotorista=isTrocaMotFalta(r);
    const temTrocaCarro=r.observacao?.toLowerCase().includes('reserva:');
    const obs=r.observacao||'';
    const obsPartes=obs.split('|').map(p=>p.trim()).filter(Boolean);
    const reservaInfo=temTrocaCarro?obsPartes.join(' · '):'';

    // Última lavagem — dias atrás
    const ultLav=lavagemMap[r.prefixo];
    let diasSemLavar='—';
    if(ultLav){
      const diff=Math.floor((new Date(data+'T12:00:00')-new Date(ultLav+'T12:00:00'))/(1000*60*60*24));
      diasSemLavar=diff===0?'Hoje':diff===1?'1 dia':`${diff} dias`;
    }

    // Status
    const statusCor=r.saiu===true?'#166534':r.saiu===false?'#991b1b':'#92400e';
    const statusBg=r.saiu===true?'#f0fdf4':r.saiu===false?'#fef2f2':'#fffbeb';
    const statusTxt=r.saiu===true?'✅ Saiu':r.saiu===false?'❌ Não saiu':'⏳ Pend.';

    // Motorista — mostra troca somente quando foi por falta
    const motoristaTxt=temTrocaMotorista&&r.motorista_fim&&r.motorista_fim!==r.motorista
      ?`${r.motorista||'—'} → ${r.motorista_fim}`
      :(r.motorista||'—');

    // Prefixo sempre original; reserva fica somente na observação
    const prefixoTxt=r.prefixo;

    const rowBg=temTrocaMotorista||temTrocaCarro?'background:#fffbeb;':'';
    return`<tr style="${rowBg}">
      <td style="${B}padding:3px 5px;font-family:monospace;font-weight:700;font-size:10px">${prefixoTxt}</td>
      <td style="${B}padding:3px 5px;font-size:10px">${r.linha||'—'}</td>
      <td style="${B}padding:3px 5px;font-size:10px">${motoristaTxt}</td>
      <td style="${B}padding:3px 5px;text-align:center;font-family:monospace;font-size:10px">${r.horario_programado||'—'}</td>
      <td style="${B}padding:3px 5px;text-align:center;font-family:monospace;font-size:10px;font-weight:${r.horario_real?'700':'400'};color:${r.horario_real?'#166534':'#666'}">${r.horario_real||'—'}</td>
      <td style="${B}padding:3px 5px;text-align:center;background:${statusBg};color:${statusCor};font-size:10px;font-weight:700">${statusTxt}</td>
      <td style="${B}padding:3px 5px;font-size:9px;color:${temTrocaMotorista?'#b45309':temTrocaCarro?'#b45309':'#555'};font-weight:${temTrocaMotorista||temTrocaCarro?'700':'400'}">
        ${temTrocaCarro?'🔄 '+reservaInfo:''}
        ${temTrocaMotorista&&!temTrocaCarro?'👤 Troca motorista (Falta): '+(r.motorista_fim||'—'):''}
        ${!temTrocaMotorista&&!temTrocaCarro&&obs?obs.substring(0,40):''}
      </td>
      <td style="${B}padding:3px 5px;text-align:center;font-size:10px;color:${ultLav?'#166534':'#999'}">${diasSemLavar}</td>
    </tr>`;
  }).join('');

  // Totais por status
  const rowTotais=`<tr style="background:#ddd;font-weight:900">
    <td style="${B}padding:3px 5px;font-size:10px" colspan="5">TOTAL</td>
    <td style="${B}padding:3px 5px;text-align:center;font-size:10px">
      ✅${saiu} ❌${naoSaiu} ⏳${pendente}
    </td>
    <td style="${B}padding:3px 5px;font-size:10px">🔄${trocaCarro} troca carro · 👤${trocaMotorista} troca mot.</td>
    <td style="${B}padding:3px 5px"></td>
  </tr>`;

  const html=`<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body{font-family:Arial,sans-serif;font-size:10px;color:#000;margin:0;padding:10px}
  @media print{
    .no-print{display:none!important}
    body{padding:0;margin:0}
    @page{margin:8mm;size:A4 landscape}
  }
  table{border-collapse:collapse;width:100%}
  th,td{font-size:10px}
  tr:nth-child(even){background:#f9f9f9}
</style></head><body>
<div class="no-print" style="position:sticky;top:0;background:#1e293b;padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:999;margin:-10px -10px 10px -10px">
  <span style="color:#fff;font-size:12px;font-weight:700">📄 JTP — Relatório de Soltura</span>
  <button onclick="window.print()" style="margin-left:auto;padding:6px 16px;background:#3B82F6;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">🖨️ Salvar PDF</button>
</div>

  <!-- CABEÇALHO -->
  <div style="text-align:center;border:2.5px solid #000;padding:6px;margin-bottom:5px;background:#fff">
    <div style="font-size:13px;font-weight:900;letter-spacing:1px">GRUPO JTP  │  OPERAÇÃO GARAGEM  │  Relatório de Soltura de Frota</div>
  </div>

  <!-- INFO -->
  <table style="margin-bottom:4px">
    <tr>
      <td style="${B}padding:3px 6px"><strong>Data:</strong> ${dataFmt}</td>
      <td style="${B}padding:3px 6px"><strong>Garagem:</strong> ${garaGemNome}</td>
      <td style="${B}padding:3px 6px"><strong>Total escala:</strong> ${escala.length}</td>
      <td style="${B}padding:3px 6px"><strong>Responsável:</strong> ${S.perfil?.nome||'—'}</td>
    </tr>
  </table>

  <!-- TOTAIS -->
  <div style="font-weight:900;background:#555;color:#fff;border:1.5px solid #111;padding:3px 8px;margin-bottom:2px">■ RESUMO DO DIA</div>
  <table style="margin-bottom:6px">
    <tr>
      <td style="${B}padding:4px 8px;background:#f0fdf4"><strong>✅ Saíram:</strong> <span style="font-family:monospace;font-size:12px;font-weight:900">${saiu}</span></td>
      <td style="${B}padding:4px 8px;background:#fef2f2"><strong>❌ Não saíram:</strong> <span style="font-family:monospace;font-size:12px;font-weight:900;color:#991b1b">${naoSaiu}</span></td>
      <td style="${B}padding:4px 8px;background:#fffbeb"><strong>⏳ Pendentes:</strong> <span style="font-family:monospace;font-size:12px;font-weight:900;color:#92400e">${pendente}</span></td>
      <td style="${B}padding:4px 8px;background:#fffbeb"><strong>🔄 Troca carro:</strong> <span style="font-family:monospace;font-size:12px;font-weight:900">${trocaCarro}</span></td>
      <td style="${B}padding:4px 8px;background:#fffbeb"><strong>👤 Troca motorista:</strong> <span style="font-family:monospace;font-size:12px;font-weight:900">${trocaMotorista}</span></td>
    </tr>
  </table>

  <!-- TABELA PRINCIPAL -->
  <div style="font-weight:900;background:#555;color:#fff;border:1.5px solid #111;padding:3px 8px;margin-bottom:2px">■ DETALHAMENTO POR VEÍCULO</div>
  <table>
    <thead>
      <tr>
        <th style="${BH}padding:3px;width:55px">PREFIXO</th>
        <th style="${BH}padding:3px;text-align:left">LINHA</th>
        <th style="${BH}padding:3px;text-align:left">MOTORISTA</th>
        <th style="${BH}padding:3px;text-align:center;width:55px">HOR.<br>PREV.</th>
        <th style="${BH}padding:3px;text-align:center;width:55px">HOR.<br>REAL</th>
        <th style="${BH}padding:3px;text-align:center;width:60px">STATUS</th>
        <th style="${BH}padding:3px;text-align:left">TROCA / OBSERVAÇÃO</th>
        <th style="${BH}padding:3px;text-align:center;width:60px">ÚLT.<br>LAVAGEM</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
    <tfoot>${rowTotais}</tfoot>
  </table>

  <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:9px;color:#666">
    <span>Gerado em: ${new Date().toLocaleString('pt-BR',{timeZone:'America/Manaus'})}</span>
    <span>JTP Transportes · Operação Garagem</span>
  </div>
</body></html>`;

  // Enviar WPP — resumo em texto
  try{
    const linhas=escala.slice(0,20).map(r=>{
      const st=r.saiu===true?'✅':r.saiu===false?'❌':'⏳';
      const troca=r.observacao?.toLowerCase().includes('reserva:')||isTrocaMotFalta(r)?'🔄':'';
      return`${st}${troca} *${r.prefixo}* | ${r.linha||'—'} | ${r.motorista?.split(' ').slice(0,2).join(' ')||'—'} | ${r.horario_programado||'—'}→${r.horario_real||'—'}`;
    }).join('\n');

    const msg=`🚌 *SOLTURA DE FROTA — JTP*\n📍 ${garaGemNome} · ${dataFmt}\n\n✅ ${saiu} saíram · ❌ ${naoSaiu} não saíram · ⏳ ${pendente} pendentes\n🔄 ${trocaCarro} troca carro · 👤 ${trocaMotorista} troca motorista\n\n${linhas}${escala.length>20?`\n_...e mais ${escala.length-20} veículos_`:''}\n\n_${S.perfil?.nome||'Líder de Pátio'}_`;

    await fetch('https://evolution-api-production-8d56.up.railway.app/message/sendText/jtp-garagem',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':'4289AC11F437-43AD-96D7-9F27C2735696'},
      body:JSON.stringify({number:'120363427489152994@g.us',options:{delay:0},textMessage:{text:msg}}),
    });
  }catch(e){console.warn('[wpp soltura]',e.message);} // falha silenciosa — não bloqueia o PDF

  // Download direto do PDF (sem popup)
  const nomeSoltura = 'JTP_Soltura_'+data.replace(/-/g,'')+'_'+garaGemNome.replace(/\s/g,'_')+'.pdf';
  downloadPDF(html, nomeSoltura);

function abrirRelatorioManual(){

function selRelTurno(turno,btn){
  document.getElementById('rel-turno').value=turno;
  ['dia','noite'].forEach(t=>{
    const b=document.getElementById('rel-btn-'+t);
    if(!b)return;
    const ativo=t===turno;
    b.style.border=ativo?'2px solid var(--blue)':'1px solid var(--border)';
    b.style.background=ativo?'#2563EB18':'transparent';
    b.style.color=ativo?'var(--blue)':'var(--text3)';
  });
  atualizarJanelaRel();
}

function atualizarJanelaRel(){
  const data=document.getElementById('rel-data')?.value;
  const turno=document.getElementById('rel-turno')?.value||'noite';
  const txt=document.getElementById('rel-janela-txt');
  if(!data||!txt)return;

  if(turno==='noite'){
    // 19h do dia anterior até 08h do dia selecionado
    const ant=new Date(data+'T12:00:00');ant.setDate(ant.getDate()-1);
    const antStr=ant.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    const dataFmt=new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    txt.textContent=antStr+' às 19:00 → '+dataFmt+' às 08:00';
  }else{
    const dataFmt=new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    txt.textContent=dataFmt+' às 07:00 → '+dataFmt+' às 17:00';
  }
}

async function confirmarRelatorioManual(){
  const data=document.getElementById('rel-data')?.value;
  const turno=document.getElementById('rel-turno')?.value||'noite';
  if(!data){toast('Selecione a data','err');return;}

  const btn=document.querySelector('#shbody button:last-child');
  if(btn){btn.disabled=true;btn.textContent='Buscando...';}

  const gid=getGid();

  // Calcular janela de timestamps
  let tsInicio,tsFim;
  if(turno==='noite'){
    // 19h do dia anterior até 08h do dia selecionado
    const ant=new Date(data+'T19:00:00');ant.setDate(ant.getDate()-1);
    tsInicio=ant.toISOString();
    tsFim=new Date(data+'T08:00:00').toISOString();
  }else{
    tsInicio=new Date(data+'T07:00:00').toISOString();
    tsFim=new Date(data+'T17:00:00').toISOString();
  }

  // Buscar abastecimentos na janela (por created_at)
  const{data:abast}=await sb.from('abastecimento_checklist').select('*')
    .eq('garagem_id',gid)
    .gte('created_at',tsInicio).lte('created_at',tsFim)
    .order('prefixo');

  // Buscar também do fechamento_abastecimento arquivado (caso já tenha sido fechado)
  let listaAbast=abast||[];
  if(!listaAbast.length){
    // Fallback: busca por data diretamente (se já arquivado)
    const{data:fech}=await sb.from('fechamento_abastecimento').select('detalhes')
      .eq('garagem_id',gid).eq('data',data).order('created_at',{ascending:false}).limit(1);
    if(fech?.[0]?.detalhes) listaAbast=fech[0].detalhes;
  }

  // Buscar recolhas na mesma janela de horário do abastecimento (created_at)
  const{data:recolhas}=await sb.from('recolha_checklist').select('*')
    .eq('garagem_id',gid)
    .gte('created_at',tsInicio).lte('created_at',tsFim)
    .order('prefixo');

  closeSheet(true);

  if(!listaAbast.length&&!recolhas?.length){
    toast('Nenhum dado encontrado para esse período','err');
    return;
  }

  toast(`📄 Gerando: ${listaAbast.length} abast. · ${(recolhas||[]).length} recolhas`);
  await gerarRelatorioFechamento(gid, data, listaAbast, recolhas||[], turno);
}


// Gerado e enviado via WhatsApp ao fechar o turno de abastecimento
// ══════════════════════════════════════════════════════════
async function gerarRelatorioFechamento(gid, data, listaAbast, recolhasExternas, turnoRef){
  try{
    // 1. Buscar dados de recolha (usa externas se fornecidas, senão busca pela janela ou data)
    let recolhas=recolhasExternas;
    if(!recolhas){
      // Janela noturna padrão: 19h do dia anterior até 08h da data
      const ant=new Date(data+'T19:00:00');ant.setDate(ant.getDate()-1);
      const tsIni=ant.toISOString();
      const tsFi=new Date(data+'T08:00:00').toISOString();
      const{data:r}=await sb.from('recolha_checklist').select('*')
        .eq('garagem_id',gid)
        .gte('created_at',tsIni).lte('created_at',tsFi)
        .order('prefixo');
      // Fallback: se não achar por horário, busca pela data
      if(r?.length){recolhas=r;}else{
        const{data:r2}=await sb.from('recolha_checklist').select('*')
          .eq('garagem_id',gid).eq('data_recolha',data).order('prefixo');
        recolhas=r2||[];
      }
    }

    // 2. Buscar nome da garagem
    const garagem=S.garagens?.find(g=>g.id===gid);
    const garaGemNome=garagem?.nome||'Porto Velho';
    const dataFmt=data.split('-').reverse().join('/');
    const turnoNome=(turnoRef||S.turno)==='dia'?'☀️ Dia':'🌙 Noite';

    // 3. Montar mapa por prefixo
    const recMap={};
    (recolhas||[]).forEach(r=>{recMap[r.prefixo]=r;});
    const abastMap={};
    (listaAbast||[]).forEach(a=>{abastMap[a.prefixo]=a;});

    // 4. União de todos os prefixos (recolhidos + abastecidos)
    const todosPrefix=[...new Set([
      ...Object.keys(recMap),
      ...Object.keys(abastMap),
    ])].sort();

    // 5. Totalizadores
    const totLitros=listaAbast.reduce((s,a)=>s+(parseFloat(a.litros)||0),0);
    const totArla=listaAbast.filter(a=>a.arla).reduce((s,a)=>s+(parseFloat(a.arla_litros)||0),0);
    const totAvarias=(recolhas||[]).filter(r=>r.status==='avaria').length;
    const totRecolhidos=(recolhas||[]).length;
    const totAbast=listaAbast.length;

    // ── MENSAGEM WHATSAPP (texto) ──────────────────────────
    const linhasTab=todosPrefix.map(p=>{
      const r=recMap[p];
      const a=abastMap[p];
      const kmRec=r?.km_hodometro?r.km_hodometro.toLocaleString('pt-BR'):'—';
      const kmAb=a?.km_hodometro?a.km_hodometro.toLocaleString('pt-BR'):'—';
      const diff=(r?.km_hodometro&&a?.km_hodometro)?
        (a.km_hodometro-r.km_hodometro).toLocaleString('pt-BR'):'—';
      const av=r?.status==='avaria'?'⚠️':'✅';
      const litros=a?a.litros.toLocaleString('pt-BR',{minimumFractionDigits:1})+'L':'—';
      const arla=(a?.arla&&a?.arla_litros)?a.arla_litros.toLocaleString('pt-BR',{minimumFractionDigits:1})+'L':'—';
      return`${av} *${p}* | KM rec: ${kmRec} | KM ab: ${kmAb} | Δ: ${diff} | ${litros}${arla!=='—'?' ARLA:'+arla:''}`;
    }).join('\n');

    const msgWpp=
`⛽ *FECHAMENTO ABASTECIMENTO — JTP*
📍 ${garaGemNome} · ${dataFmt} · ${turnoNome}

📊 *Resumo:*
• Recolhidos: ${totRecolhidos} veículos
• Abastecidos: ${totAbast} veículos
• Total Diesel: ${totLitros.toLocaleString('pt-BR',{minimumFractionDigits:1})} L${totArla>0?'\n• Total ARLA: '+totArla.toLocaleString('pt-BR',{minimumFractionDigits:1})+' L':''}${totAvarias>0?'\n⚠️ Avarias na recolha: '+totAvarias:''}

📋 *Detalhamento por prefixo:*
${linhasTab}

_Responsável: ${S.perfil?.nome||'Líder de Pátio'}_`;

    // Envio via Evolution API
    const EVOL_URL='https://evolution-api-production-8d56.up.railway.app/message/sendText/jtp-garagem';
    const EVOL_KEY='4289AC11F437-43AD-96D7-9F27C2735696';
    const WPP_GROUP='120363427489152994@g.us';

    let wppOk=false;
    try{
      const r=await fetch(EVOL_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':EVOL_KEY},
        body:JSON.stringify({number:WPP_GROUP,options:{delay:0},textMessage:{text:msgWpp}}),
      });
      wppOk=r.ok;
    }catch(e){console.warn('[wpp fechamento]',e);}

    // ── GERAR PDF ──────────────────────────────────────────
    await gerarPDFFechamento(gid, garaGemNome, data, dataFmt, turnoNome, todosPrefix, recMap, abastMap, totLitros, totArla, totAvarias, wppOk);

  }catch(e){
    console.error('[gerarRelatorioFechamento]',e);
    toast('⚠️ Relatório não gerado: '+e.message,'err');
  }
}

// ── TURNOS DO PCM ─────────────────────────────────────────────────────────
// Dias úteis (seg-sex): Manhã 05:00-13:20 | Tarde 13:00-20:20 | Noite 20:00-04:20
// Fins de semana: Dia 08:00-16:20 | Noite 20:00-04:20

const TURNOS_PCM = {
  util: [
    {id:'manha', label:'☀️ Manhã',  ini:'05:00', fim:'13:20'},
    {id:'tarde', label:'🌤️ Tarde',  ini:'13:00', fim:'20:20'},
    {id:'noite', label:'🌙 Noite',  ini:'20:00', fim:'04:20'},
  ],
  fds: [
    {id:'dia',   label:'☀️ Dia',    ini:'08:00', fim:'16:20'},
    {id:'noite', label:'🌙 Noite',  ini:'20:00', fim:'04:20'},
  ]
};

function _turnosHoje(){
  const dow = new Date().getDay(); // 0=dom, 6=sab
  return (dow===0||dow===6) ? TURNOS_PCM.fds : TURNOS_PCM.util;
}

function _turnoAtualPCM(){
  const agora = new Date();
  const h = agora.getHours();
  const min = agora.getMinutes();
  const hAtual = h + min/60;
  const turnos = _turnosHoje();

  for(const t of turnos){
    const [hi,mi] = t.ini.split(':').map(Number);
    const [hf,mf] = t.fim.split(':').map(Number);
    const ini = hi + mi/60;
    let fim = hf + mf/60;
    if(fim < ini) fim += 24; // cruza meia-noite
    let h2 = hAtual; if(h2 < ini && fim > 20) h2 += 24;
    if(h2 >= ini && h2 < fim) return t;
  }
  return turnos[0]; // fallback
}

function setCk34(secao, id, campo, valor){
  const key=secao+'_'+id;
  if(!window._ck34[key]) window._ck34[key]={status:'',manut:'',obs:''};
  const antes=window._ck34[key].status;
  window._ck34[key][campo]=valor;
  if(campo==='status'&&valor==='ok'){
    window._ck34[key].manut='';
    window._ck34[key].obs='';
  }
  if(campo==='status'&&valor==='nok'&&antes!=='nok'&&!window._ck34[key].acionado){
    window._ck34[key].acionado=true;
    acionarLiderPCM34(secao,id);
  }
  telaChecklistEquip();
}

function setCk34SemRender(secao,id,campo,valor){
  const key=secao+'_'+id;
  if(!window._ck34[key]) window._ck34[key]={status:'',manut:'',obs:''};
  window._ck34[key][campo]=valor;
}

async function salvarChecklist34(){
  const gid=getGid();
  const turno=S.turno||'dia';
  const agora=new Date();
  const dataHoje=hoje();

  // Montar lista de NOKs para o WPP
  const noks=[];
  const dados=window._ck34;
  TODOS_EQUIP_34.forEach(eq=>{
    const secao=eq.secao;
    const v=dados[secao+'_'+eq.id]||{};
    if(v.status==='nok') noks.push({nome:eq.nome,criterio:eq.criterio,obs:v.obs||'',manut:v.manut,secao});
  });

  // Total preenchidos
  const totalItens=TODOS_EQUIP_34.length;
  const preenchidos=Object.values(dados).filter(v=>v.status).length;

  if(preenchidos===0){ toast('Preencha pelo menos um item','err'); return; }
  const nokSemTratativa=noks.filter(n=>!n.obs.trim()||!n.manut);
  if(nokSemTratativa.length){
    toast('Todo NOK precisa de tratativa e ação definida','err');
    return;
  }

  const btn=document.querySelector('#content button:last-child');
  if(btn){ btn.disabled=true; btn.textContent='Salvando...'; }

  // Salvar no banco
  const turnoId=window._turnoPCM||_turnoAtualPCM()?.id||'manha';
  const{error}=await sb.from('checklist_equipamentos').insert({
    garagem_id:gid,
    data:dataHoje,
    turno:turnoId,
    dados:dados,
    total_itens:totalItens,
    total_ok:Object.values(dados).filter(v=>v.status==='ok').length,
    total_nok:noks.length,
    criado_por:S.perfil?.nome||null,
    criado_por_id:S.perfil?.id||null,
    criado_em:agora.toISOString(),
  });

  if(error){
    toast('Erro ao salvar: '+error.message,'err');

📍 ${garagem?.nome||'Porto Velho'} · ${turno==='dia'?'☀️ Dia':'🌙 Noite'}

• ❌ NOK: ${noks.length}

${noks.length>0?`🚨 *Líder PCM acionado imediatamente.*\n⚠️ *Equipamentos com problema:*\n${linhasNok}`:'✅ Todos os equipamentos em condições normais de operação'}

_Checklist 3.4 · Grupo JTP_`;

  try{
    await fetch('https://evolution-api-production-8d56.up.railway.app/message/sendText/jtp-garagem',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':'4289AC11F437-43AD-96D7-9F27C2735696'},
      body:JSON.stringify({number:'120363427489152994@g.us',options:{delay:0},textMessage:{text:msg}}),
    });

  const data=window._s218Data||hoje(), gid=getGid();

    if(r.error) throw r.error;
    regs=r.data||[];
  }catch(e){erro='<div class="card" style="border-color:var(--red);color:var(--red)">Tabela 2.18 não criada no banco. Rode o SQL para salvar.</div>'}
  window._s218Regs=regs;
  render(`<div class="sl">🆘 2.18 SOS - Recolha</div>

      </div>

function f21PodeBloco(b){

function f21ProgBloco(b,state){

function salvarBloco21(blocoId){

async function enviarFech21(){

  }
  const sc=estadoBase.setores_concluidos;
  const todosSetores=['operacao','pcm'].every(s=>sc[s]?.ok);
  estadoBase.status=todosSetores?'fechado':'em_andamento';
  estadoBase.preenchidoPor=S.perfil?.nome||'';
  const numero=`2.1-${_f21Data}-${_f21Turno}`;

  let existenteId=null;
  try{
    const{data:rows}=await sb.from('fechamento_turno_garagem').select('id').eq('garagem_id',gid).eq('data',_f21Data).eq('turno',_f21Turno).order('created_at',{ascending:false}).limit(1);
    existenteId=rows?.[0]?.id||null;
  }catch(e){}

function lbrSemanaAtual(){
  const tz=opTimezone();
  const p=opParts(new Date(),tz);
  // Usa data local (Manaus/PV) para calcular dia da semana
  const loc=new Date(Date.UTC(p.y,p.m-1,p.d,12));
  const dow=loc.getUTCDay();
  const seg=new Date(loc);seg.setUTCDate(loc.getUTCDate()-(dow===0?6:dow-1));
  return Array.from({length:5},(_,i)=>{const d=new Date(seg);d.setUTCDate(seg.getUTCDate()+i);return d.toISOString().slice(0,10)});
}

async function telaLubrificacao(){

  const vw=frota.filter(v=>isVW(v.modelo));
  const outros=frota.filter(v=>!isVW(v.modelo));
  const tam=Math.ceil(outros.length/5);
  const grupos=Array.from({length:5},(_,gi)=>outros.slice(gi*tam,Math.min(gi*tam+tam,outros.length)));
  const semana=lbrSemanaAtual();

      const lbl=execD===totalD&&totalD>0?'✅ Completo':execD>0?`⏳ ${execD}/${totalD} feitos`:`○ ${totalD} veículos`;
      const dtFmt=data.slice(8)+'/'+data.slice(5,7);
      const listaVW=aberto?`<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px">🔵 VW — ${vw.length} veículos</div>${vw.map(v=>{const f=feitos.has(v.prefixo);return`<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${f?'var(--green)':'var(--text)'};min-width:60px">${v.prefixo}</span><span style="font-size:12px;color:var(--text3);flex:1">${v.modelo||'—'}</span><span style="font-size:13px">${f?'✅':'○'}</span></div>`;}).join('')}</div>`:'';
      const listaRot=aberto?`<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px">📅 Rotação — ${grp.length} veículos</div>${grp.map(v=>{const f=feitos.has(v.prefixo);return`<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${f?'var(--green)':'var(--text)'};min-width:60px">${v.prefixo}</span><span style="font-size:12px;color:var(--text3);flex:1">${v.modelo||'—'}</span><span style="font-size:13px">${f?'✅':'○'}</span></div>`;}).join('')}</div>`:'';
      return`<div style="margin:0 14px 10px;border-radius:12px;border:${isHoje?'2px solid var(--blue)':'1px solid var(--border)'};background:var(--surface2);overflow:hidden"><div onclick="toggleLubrDia(${gi})" style="padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:800;color:${isHoje?'var(--blue)':'var(--text)'}">${diasLabel[gi]}</span><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${dtFmt}</span>${isHoje?`<span style="font-size:10px;background:var(--blue);color:white;padding:1px 6px;border-radius:10px;font-weight:700">HOJE</span>`:''}</div><div style="font-size:12px;color:${cor};margin-top:3px">${lbl}</div></div><div style="font-size:18px;color:var(--text3)">${aberto?'▲':'▼'}</div></div>${aberto?`<div style="padding:0 14px 14px">${pctD>0?`<div class="prog" style="margin-bottom:10px"><div class="prog-f" style="width:${pctD}%;background:${pctD===100?'var(--green)':'var(--blue)'}"></div></div>`:''} ${listaVW}${listaRot}</div>`:''}</div>`;

      const listaFDS=aFDS?pendSemana.map(v=>`<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--amber);min-width:60px">${v.prefixo}</span><span style="font-size:12px;color:var(--text3);flex:1">${v.modelo||'—'}</span><span style="font-size:10px;background:#F59E0B20;color:var(--amber);padding:2px 6px;border-radius:6px;font-weight:700">${['Seg','Ter','Qua','Qui','Sex'][v.diaPrev]}</span></div>`).join(''):'';

  const mk=v=>{

function toggleLubrDia(gi){if(_lbrDiasAbertos.has(gi))_lbrDiasAbertos.delete(gi);else _lbrDiasAbertos.add(gi);telaLubrificacao()}
async function abrirLubriExtra(){
  const gid=getGid();
  const{data:frota}=await sb.from('frota').select('prefixo,modelo').eq('garagem_id',gid).neq('status','sinistro').order('prefixo');
  const hojeStr=dataOperacionalAtual();
  const{data:feitos}=await sb.from('checklist_lubrificacao').select('prefixo').eq('garagem_id',gid).eq('data',hojeStr);
  const feitosSet=new Set((feitos||[]).map(f=>f.prefixo));
  const pendentes=(frota||[]).filter(v=>!feitosSet.has(v.prefixo));
  const isVW=m=>{const u=(m||'').toUpperCase();return u.includes('VOLKSWAGEN')||u.includes('VOLKSBUS')||u.startsWith('VW ')||/^\d/.test(u);};
  if(!pendentes.length){openSheet('➕ Adicionar Veículo','<div style="text-align:center;padding:20px;color:var(--green);font-weight:700">✅ Todos os veículos já foram lubrificados hoje!</div>');return;}
  const busca=`<input id="lubri-extra-busca" type="text" placeholder="Buscar prefixo ou modelo..." oninput="filtrarLubriExtra()" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:10px">`;
  const lista=pendentes.map(v=>{
    const mdl=(v.modelo||'').replace(/'/g,'').replace(/"/g,'');
    return`<div class="vcard" data-pref="${v.prefixo}" data-mdl="${mdl}" onclick="closeSheet();abrirLubri('${v.prefixo}','${mdl}',${isVW(v.modelo)})"><div style="flex:1"><div class="prefixo">${v.prefixo}</div><div class="vcard-sub">${v.modelo||'—'}</div></div><div style="font-size:20px;color:var(--blue)">›</div></div>`;
  }).join('');
  openSheet(`➕ Adicionar Veículo (${pendentes.length} disponíveis)`,`${busca}<div id="lubri-extra-lista">${lista}</div>`);
}
function filtrarLubriExtra(){
  const q=(document.getElementById('lubri-extra-busca')?.value||'').toLowerCase();
  document.querySelectorAll('#lubri-extra-lista .vcard').forEach(el=>{
    const pref=(el.dataset.pref||'').toLowerCase(),mdl=(el.dataset.mdl||'').toLowerCase();
    el.style.display=(pref.includes(q)||mdl.includes(q))?'':'none';
  });
}
function abrirLubri(prefixo,modelo,isVW){
  _lbrPrefixo=prefixo;_lbrModelo=modelo;_lbrIsVW=isVW;
  _lbrOm={st:'',lt:''};_lbrAd={st:'',lt:''};_lbrOd={st:'',lt:''};
  rndrLubriSh();
}
function rndrLubriSh(){
  const obsVal=document.getElementById('lubri-obs')?.value||'';
  const mi=(label,key,st,lt)=>{
    const ok=st==='ok',comp=st==='completou';
    return`<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px">${label}</div><div style="display:flex;gap:8px"><button onclick="setLbr('${key}','ok')" style="flex:1;padding:10px;border-radius:10px;border:2px solid ${ok?'var(--green)':'var(--border)'};background:${ok?'#10B98115':'var(--surface2)'};color:${ok?'var(--green)':'var(--text)'};font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">✅ OK</button><button onclick="setLbr('${key}','completou')" style="flex:1;padding:10px;border-radius:10px;border:2px solid ${comp?'var(--blue)':'var(--border)'};background:${comp?'#3B82F615':'var(--surface2)'};color:${comp?'var(--blue)':'var(--text)'};font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">➕ Completou</button></div>${comp?`<div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span style="font-size:12px;color:var(--text3)">Litros:</span><input type="number" id="lt_${key}" min="0" step="0.1" value="${lt||''}" placeholder="0.0" oninput="updLbrLt('${key}',this.value)" style="width:80px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:13px"><span style="font-size:12px;color:var(--text3)">L</span></div>`:''}</div>`;
  };
  const pronto=_lbrOm.st&&_lbrAd.st&&_lbrOd.st;
  openSheet('🛢️ '+_lbrPrefixo+' — '+_lbrModelo,`${mi('Óleo Motor','Om',_lbrOm.st,_lbrOm.lt)}${mi('Aditivo','Ad',_lbrAd.st,_lbrAd.lt)}${mi('Óleo Direção','Od',_lbrOd.st,_lbrOd.lt)}<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px">Observação (opcional)</div><textarea id="lubri-obs" placeholder="..." style="width:100%;box-sizing:border-box;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;resize:none;height:64px">${obsVal}</textarea></div><button onclick="salvarLubri()" ${!pronto?'disabled':''} style="width:100%;padding:15px;border-radius:12px;border:none;background:${pronto?'var(--green)':'var(--surface2)'};color:${pronto?'white':'var(--text4)'};font-size:15px;font-weight:700;font-family:inherit;cursor:${pronto?'pointer':'not-allowed'}">${pronto?'✅ Salvar':'Preencha todos os itens'}</button>`);
}
function setLbr(key,st){const m={Om:_lbrOm,Ad:_lbrAd,Od:_lbrOd};m[key].st=st;if(st==='ok')m[key].lt='';rndrLubriSh()}
function updLbrLt(key,v){const m={Om:_lbrOm,Ad:_lbrAd,Od:_lbrOd};m[key].lt=v}
async function salvarLubri(){
  if(!_lbrOm.st||!_lbrAd.st||!_lbrOd.st){toast('❌ Preencha todos os itens','err');return}
  const gid=getGid();
  const obs=document.getElementById('lubri-obs')?.value?.trim()||null;
  const{error}=await sb.from('checklist_lubrificacao').insert({
    garagem_id:gid,prefixo:_lbrPrefixo,modelo:_lbrModelo,data:hoje(),is_vw:_lbrIsVW,
    oleo_motor_st:_lbrOm.st,oleo_motor_lt:_lbrOm.lt?parseFloat(_lbrOm.lt):null,
    aditivo_st:_lbrAd.st,aditivo_lt:_lbrAd.lt?parseFloat(_lbrAd.lt):null,
    oleo_direcao_st:_lbrOd.st,oleo_direcao_lt:_lbrOd.lt?parseFloat(_lbrOd.lt):null,
    observacao:obs,executado_por:S.perfil?.nome||null,executado_por_id:S.perfil?.id||null,
  });
  if(error){toast('❌ Erro: '+error.message,'err');console.error('[salvarLubri]',error);return}
  closeSheet(true);toast('✅ Lubrificação registrada!');telaLubrificacao();
}
