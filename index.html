<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTP — Sistema Operacional de Garagem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020817;--surface:#0F172A;--surface2:#080D1A;
  --border:#1E293B;--border2:#0F1929;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;--text4:#334155;
  --blue:#2563EB;--blue-d:#1D4ED8;
  --green:#00C48C;--amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;
  --sidebar:220px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.login-glow{position:fixed;top:10%;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,#1D4ED808 0%,transparent 65%);pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:380px;box-shadow:0 30px 80px #00000090;animation:fadeUp .5s ease both;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:32px}
.login-icon{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:#1E3A5F;border-radius:16px;font-size:26px;margin-bottom:14px;border:1px solid #2563EB30}
.fl{display:block;color:var(--text3);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:14px;appearance:none}
.fi:focus,.fs:focus{border-color:var(--blue)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}

/* ── SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column}
#app.on{display:flex}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:300;flex-shrink:0}
.tb-brand{font-weight:800;font-size:15px;letter-spacing:-.3px}
.tb-brand span{font-weight:400;color:var(--text3)}
.tb-right{display:flex;align-items:center;gap:10px}
.avatar{background:var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:1px solid var(--border)}
.btn-out{background:none;border:1px solid var(--border);color:var(--text3);border-radius:6px;padding:5px 12px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-out:hover{border-color:var(--red);color:var(--red)}

/* BODY */
.app-body{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface2);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}

/* NAV ITEMS */
.nav-section{color:var(--text4);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:16px 10px 6px;margin-top:4px}
.nav-section:first-child{padding-top:4px}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;background:none;border:1px solid transparent;border-radius:8px;padding:9px 10px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:400;font-family:'DM Sans',sans-serif;margin-bottom:2px;text-align:left;transition:all .15s;position:relative}
.nav-btn:hover{background:var(--border2);color:var(--text2)}
.nav-btn.active{background:var(--border);border-color:#1D4ED825;color:var(--text);font-weight:600}
.nav-btn .nav-icon{font-size:15px;flex-shrink:0}
.nav-btn .nav-badge{margin-left:auto;background:var(--blue);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700}
.nav-btn .nav-badge.green{background:var(--green)}
.nav-btn .nav-badge.amber{background:var(--amber);color:#000}

/* SUBMENU */
.submenu{overflow:hidden;max-height:0;transition:max-height .3s ease}
.submenu.open{max-height:400px}
.sub-btn{width:100%;display:flex;align-items:center;gap:8px;background:none;border:none;border-left:2px solid var(--border);margin-left:18px;padding:7px 10px;cursor:pointer;color:var(--text3);font-size:12px;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;border-radius:0 6px 6px 0}
.sub-btn:hover{color:var(--text2);border-left-color:var(--text3)}
.sub-btn.active{color:var(--blue);border-left-color:var(--blue);font-weight:600}

/* TURNO */
.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.turno-label{color:var(--text4);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.turno-btns{display:flex;gap:6px}
.turno-btn{flex:1;background:var(--border);border:1px solid var(--border);color:var(--text3);border-radius:7px;padding:7px 4px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;text-align:center}
.turno-btn.dia{background:#F59E0B18;border-color:#F59E0B40;color:var(--amber)}
.turno-btn.noite{background:#3B82F618;border-color:#3B82F640;color:#3B82F6}

/* MAIN */
.main{flex:1;padding:28px;overflow-y:auto;animation:fadeIn .25s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:translateX(0)}}

/* COMPONENTS */
.sec-title{display:flex;align-items:center;gap:10px;margin:0 0 16px}
.sec-title+.sec-title{margin-top:28px}
.st-icon{font-size:16px}
.st-text{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.st-line{flex:1;height:1px;background:var(--border)}

.badge{border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border:1px solid}
.b-disp{color:#00C48C;background:#00C48C18;border-color:#00C48C40}
.b-linha{color:#3B82F6;background:#3B82F618;border-color:#3B82F640}
.b-manut{color:#F59E0B;background:#F59E0B18;border-color:#F59E0B40}
.b-agpeca{color:#EF4444;background:#EF444418;border-color:#EF444440}
.b-sinistro{color:#8B5CF6;background:#8B5CF618;border-color:#8B5CF640}
.b-ok{color:#00C48C;background:#00C48C18;border-color:#00C48C40}
.b-nok{color:#EF4444;background:#EF444418;border-color:#EF444440}
.b-ativo{color:#00C48C;background:#00C48C18;border-color:#00C48C40}
.b-breve{color:#475569;background:#47556918;border-color:#47556940}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:4px}
.kpi{background:var(--surface);border-radius:11px;padding:14px 16px;border:1px solid var(--border);border-left-width:3px;display:flex;flex-direction:column;gap:4px}
.kpi.ok{border-left-color:var(--green)}.kpi.nok{border-left-color:var(--red)}.kpi.neu{border-left-color:#475569}
.kpi-label{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.kpi-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:600;color:var(--text);display:flex;align-items:baseline;gap:4px}
.kpi-unit{font-size:12px;color:var(--text4);font-weight:400}
.kpi-meta{font-size:11px;font-weight:600}
.kpi-meta.ok{color:var(--green)}.kpi-meta.nok{color:var(--red)}

.painel-hero{background:linear-gradient(135deg,var(--surface),#1A2540);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.fc-row{display:flex;gap:10px}
.fc{border-radius:10px;padding:10px 16px;text-align:center;border:1px solid}
.fc-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;display:block}
.fc-label{font-size:10px;font-weight:600;letter-spacing:.5px;opacity:.7}

.frota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.frota-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s;cursor:pointer}
.frota-card:hover{border-color:#2563EB40}
.fp{font-family:'DM Mono',monospace;font-size:15px;font-weight:600}
.fm{color:var(--text3);font-size:11px;margin-top:2px}
.fk{color:var(--text4);font-size:10px;margin-top:2px;font-family:'DM Mono',monospace}

.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filtro-btn{background:var(--surface);border:1px solid var(--border);color:var(--text3);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.filtro-btn:hover{color:var(--text)}
.filtro-btn.active{background:var(--blue-d);border-color:var(--blue);color:#fff}

.btn-add{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s}
.btn-add:hover{opacity:.85}

.os-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px}

/* FERRAMENTAS */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px}
.tool-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 24px #00000040}
.tool-icon{font-size:28px}
.tool-name{font-size:14px;font-weight:700;color:var(--text)}
.tool-desc{font-size:12px;color:var(--text3);line-height:1.5}

/* RELATÓRIOS */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.rel-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;transition:all .18s}
.rel-card.ativo{cursor:pointer}.rel-card.ativo:hover{border-color:#2563EB60;transform:translateY(-1px);box-shadow:0 8px 24px #00000040}
.rel-icon-wrap{background:var(--border);border-radius:9px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rel-cod{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:1px}
.rel-nome{color:var(--text);font-size:13px;font-weight:600;margin-top:3px;line-height:1.35}
.rel-meta{color:var(--text4);font-size:11px;margin-top:6px}

/* TOOL CONTENT */
.tool-content{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-top:16px}
.tool-content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.btn-back{background:var(--border);border:none;color:var(--text2);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-back:hover{color:var(--text)}

/* IMPORT */
.import-zone{border:2px dashed var(--border);border-radius:14px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.import-zone:hover,.import-zone.drag{border-color:var(--blue);background:#1E293B}
.btn-import{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#F5620F,#D4510B);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px}
.btn-import:disabled{opacity:.5;cursor:not-allowed}
.prog-wrap{background:var(--border);border-radius:99px;height:7px;overflow:hidden;margin-top:10px}
.prog-bar{height:100%;border-radius:99px;background:var(--blue);transition:width .3s}

/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-head{background:var(--surface2);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #0A0F1A;font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#0F172A80}

/* STATUS BTNS */
.status-btn{border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.sb-sim{color:var(--green);background:#00C48C18;border-color:#00C48C40}
.sb-nao{color:var(--red);background:#EF444418;border-color:#EF444440}
.sb-pend{color:var(--text3);background:#47556918;border-color:#47556940}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:#00000090;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:460px;box-shadow:0 30px 80px #00000090}
.modal-title{color:var(--text);font-size:16px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.btn-modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer}
.btn-modal-close:hover{color:var(--red)}
.btn-success{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-sec{background:var(--border);color:var(--text2);border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 10px 40px #00000060;z-index:999;animation:fadeUp .3s ease;display:flex;align-items:center;gap:10px;max-width:320px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}

.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text3);font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.info-banner{border-radius:10px;padding:14px 18px;font-size:12px;border:1px solid;margin-top:14px}
.info-blue{background:var(--surface);border-color:#1D4ED830;color:#3B82F6}
.info-amber{background:var(--surface);border-color:#F59E0B30;color:var(--amber)}
.info-green{background:var(--surface);border-color:#00C48C30;color:var(--green)}

@media(max-width:768px){
  :root{--sidebar:0px}
  .sidebar{display:none}
  .main{padding:16px}
  .fc-row{gap:6px}
  .fc{padding:8px 10px}
  .fc-val{font-size:18px}
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">🚌</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-.5px">JTP Transportes</div>
      <div style="color:var(--text3);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:4px">Sistema Operacional de Garagem</div>
    </div>
    <label class="fl">E-mail</label>
    <input class="fi" id="l-email" type="email" placeholder="seu@email.com">
    <label class="fl">Senha</label>
    <input class="fi" id="l-senha" type="password" placeholder="••••••••">
    <label class="fl">Cargo</label>
    <select class="fs" id="l-cargo" onchange="toggleGaragem()">
      <option value="gerente_garagem">Gerente de Garagem</option>
      <option value="pcm">PCM</option>
      <option value="almoxarifado">Almoxarifado</option>
      <option value="lider_operacional">Líder Operacional</option>
      <option value="lider_suprimentos">Líder de Suprimentos</option>
      <option value="operacoes_seguras">Operações Seguras</option>
      <option value="lider_oficina">Líder de Oficina</option>
      <option value="diretoria">Diretoria</option>
    </select>
    <div id="garagem-field">
      <label class="fl">Garagem</label>
      <select class="fs" id="l-garagem"></select>
    </div>
    <div id="l-erro" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar no Sistema</button>
    <div style="text-align:center;margin-top:20px;color:var(--text4);font-size:11px">🔒 Acesso restrito — Grupo JTP</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:20px">🚌</span>
      <div class="tb-brand">JTP <span>Operacional</span></div>
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <span style="color:var(--text3);font-size:12px" id="tb-loc">—</span>
    </div>
    <div class="tb-right">
      <span style="color:var(--text3);font-size:12px" id="tb-role">—</span>
      <div class="avatar" id="tb-av">?</div>
      <button class="btn-out" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- PRINCIPAL -->
      <div class="nav-section">Principal</div>
      <button class="nav-btn active" data-tela="painel" onclick="navTo('painel',this)">
        <span class="nav-icon">🏠</span> Painel do Dia
      </button>
      <button class="nav-btn" data-tela="frota" onclick="navTo('frota',this)">
        <span class="nav-icon">🚌</span> Frota
        <span class="nav-badge green" id="badge-frota">—</span>
      </button>
      <button class="nav-btn" data-tela="indicadores" onclick="navTo('indicadores',this)">
        <span class="nav-icon">📊</span> Indicadores
      </button>
      <button class="nav-btn" data-tela="manutencao" onclick="navTo('manutencao',this)">
        <span class="nav-icon">🔧</span> Manutenção
      </button>
      <button class="nav-btn" data-tela="almoxarifado" onclick="navTo('almoxarifado',this)">
        <span class="nav-icon">📦</span> Almoxarifado
      </button>

      <!-- FERRAMENTAS -->
      <div class="nav-section">Ferramentas</div>
      <button class="nav-btn" onclick="toggleSubmenu('sub-ferramentas',this)" data-tela="ferramentas">
        <span class="nav-icon">🛠️</span> Ferramentas
        <span style="margin-left:auto;font-size:10px;color:var(--text4)" id="arr-ferr">▶</span>
      </button>
      <div class="submenu" id="sub-ferramentas">
        <button class="sub-btn" onclick="navToSub('ferr-soltura210','sub-ferramentas')">📋 2.10 Soltura de Frota</button>
        <button class="sub-btn" onclick="navToSub('ferr-lavagem','sub-ferramentas')">🧼 Programação Lavagem</button>

// ── HELPERS ────────────────────────────────
function hoje(){return new Date().toISOString().split('T')[0]}
function hojeF(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
function fmt(n){return Number(n||0).toLocaleString('pt-BR')}
function badge(s){const c=ST_CFG[s]||{l:s,cls:''};return`<span class="badge ${c.cls}">${c.l}</span>`}
function toast(msg,type='ok'){const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<span>${type==='ok'?'✅':'❌'}</span> ${msg}`;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function setMain(html){const m=document.getElementById('main');m.style.animation='none';m.offsetHeight;m.style.animation='fadeIn .25s ease both';m.innerHTML=html}
function secTitle(icon,text,action=''){return`<div class="sec-title"><span class="st-icon">${icon}</span><span class="st-text">${text}</span><div class="st-line"></div>${action}</div>`}
function kpi(label,val,meta,unit='%',inv=false,dec=1){
  const n=parseFloat(val);let st='neu',stH='';
  if(meta!==undefined){st=inv?(n<=meta?'ok':'nok'):(n>=meta?'ok':'nok');stH=`<div class="kpi-meta ${st}">${st==='ok'?'✓ OK':'✗ NOK'} — Meta: ${meta}${unit}</div>`}
  const dsp=typeof val==='number'?val.toFixed(dec):val??'—';
  return`<div class="kpi ${st}"><div class="kpi-label">${label}</div><div class="kpi-val">${dsp}<span class="kpi-unit">${unit}</span></div>${stH}</div>`
}

// ── NAVIGATION ─────────────────────────────
function navTo(tela,el){
  S.tela=tela;S.subtela=null;

  if(el) el.classList.add('active');
  const renders={painel:renderPainel,frota:renderFrota,indicadores:renderIndicadores,manutencao:renderManutencao,almoxarifado:renderAlmoxarifado,diretoria:renderDiretoria};
  if(renders[tela]) renders[tela]();
  else if(tela==='ferramentas') renderFerramentas();
  else if(tela==='relatorios') renderRelatorios();
}

function navToSub(sub,menuId){
  S.subtela=sub;
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  const btns=document.querySelectorAll(`#${menuId}~* .sub-btn, #${menuId} .sub-btn`);
  btns.forEach(b=>{if(b.getAttribute('onclick')?.includes(sub)) b.classList.add('active')});
  const renders={
    'ferr-soltura210':renderFerr210,
    'ferr-lavagem':renderFerrLavagem,
    'ferr-controle':renderFerrControle,
    'rel-todos':renderRelatorios,
  };
  if(renders[sub]) renders[sub]();
}

function toggleSubmenu(id,btn){
  const el=document.getElementById(id);
  const open=el.classList.contains('open');
  document.querySelectorAll('.submenu').forEach(s=>{s.classList.remove('open')});
  document.querySelectorAll('#arr-ferr,#arr-rel').forEach(a=>{a.textContent='▶'});
  if(!open){
    el.classList.add('open');
    const arr=id==='sub-ferramentas'?'arr-ferr':'arr-rel';
    document.getElementById(arr).textContent='▾';
  }
  S.tela=id==='sub-ferramentas'?'ferramentas':'relatorios';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(!open){
    if(id==='sub-ferramentas') renderFerramentas();
    else renderRelatorios();
  }
}

async function loadFrota(){

  let q=sb.from('frota').select('*').order('prefixo');

  S.frota=data||[];
  const disp=S.frota.filter(v=>v.status==='disponivel').length;
  const el=document.getElementById('badge-frota');
  if(el) el.textContent=S.frota.length;

  const labels={todos:'Todos',disponivel:'Disponíveis',em_linha:'Em Linha',manutencao:'Manutenção',aguardando_peca:'Ag. Peça',sinistro:'Sinistro'};
  const lista=S.filtroFrota==='todos'?S.frota:S.frota.filter(v=>v.status===S.filtroFrota);

}

// ── PDF 2.10 ───────────────────────────────
function handleDrop210(e){e.preventDefault();document.getElementById('drop210').classList.remove('drag');handle210(e.dataTransfer.files[0])}
async function handle210(file){
  if(!file?.name.endsWith('.pdf')){document.getElementById('err210').style.display='block';document.getElementById('err210').textContent='Selecione um PDF válido';return}
  const btn=document.getElementById('btn210');btn.disabled=true;btn.textContent='⏳ Processando...';
  document.getElementById('err210').style.display='none';
  const prog=(msg,pct)=>{document.getElementById('prog210wrap').style.display='block';document.getElementById('prog210msg').textContent=msg;const b=document.getElementById('prog210bar');b.style.width=pct+'%';b.style.background=pct>=100?'var(--green)':'var(--blue)'};
  try{
    prog('Lendo PDF...',10);
    const raw=await parsePDF210(file);
    if(!raw.length) throw new Error('Nenhum dado extraído do PDF');
    prog('Filtrando Turno A...',60);
    const map={};
    for(const r of raw){if(!r.posicao.endsWith('A')) continue;if(!map[r.veiculo]||r.inicio<map[r.veiculo].inicio) map[r.veiculo]=r}
    const data=Object.values(map).sort((a,b)=>a.inicio.localeCompare(b.inicio));
    if(!data.length) throw new Error('Nenhum registro Turno A encontrado');
    prog('Salvando '+data.length+' veículos...',80);
    await sb.from('soltura_2_10').delete().eq('garagem_id',S.user.garagem_id).eq('data',hoje()).eq('turno',S.turno);
    const{data:fr}=await sb.from('frota').select('id,prefixo').eq('garagem_id',S.user.garagem_id);
    const fMap=Object.fromEntries((fr||[]).map(v=>[v.prefixo,v.id]));
    const ins=data.map(r=>({garagem_id:S.user.garagem_id,data:hoje(),turno:S.turno,prefixo:r.veiculo,veiculo_id:fMap[r.veiculo]||null,linha:r.linha,horario_programado:r.inicio,motorista:r.motorista,saiu:null}));
    const{error}=await sb.from('soltura_2_10').insert(ins);
    if(error) throw new Error('Erro ao salvar: '+error.message);
    prog('✔ '+data.length+' veículos importados!',100);
    toast('✅ '+data.length+' veículos importados!');
    S.soltura210=ins.map((r,i)=>({...r,id:'temp'+i}));
    setTimeout(()=>renderFerr210('painel'),1200);
  }catch(err){
    document.getElementById('err210').style.display='block';document.getElementById('err210').textContent='ERRO: '+err.message;
    prog('',0);document.getElementById('prog210wrap').style.display='none';
  }
  btn.disabled=false;btn.textContent='📄 Selecionar outro PDF';
}

// ── LAVAGEM IMPORT ─────────────────────────
function handleDropLav(e){e.preventDefault();document.getElementById('drop-lav').classList.remove('drag');handleFileLav(e.dataTransfer.files[0])}
function handleFileLav(file){
  if(!file?.name.endsWith('.xlsx')){document.getElementById('err-lav').style.display='block';document.getElementById('err-lav').textContent='Selecione um arquivo .xlsx';return}
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let hi=-1;
      for(let i=0;i<rows.length;i++){if(rows[i].map(c=>String(c).toUpperCase()).includes('PREFIXO')){hi=i;break}}
      if(hi===-1){document.getElementById('err-lav').style.display='block';document.getElementById('err-lav').textContent='Coluna PREFIXO não encontrada';return}
      const hdrs=rows[hi].map(c=>String(c).toUpperCase().trim());
      const ip=hdrs.indexOf('PREFIXO'),it=hdrs.findIndex(h=>h.includes('TIPO')||h.includes('LAVAGEM'));
      if(ip===-1||it===-1){document.getElementById('err-lav').style.display='block';document.getElementById('err-lav').textContent='Colunas PREFIXO e TIPO LAVAGEM obrigatórias';return}
      const dados=[];
      for(let i=hi+1;i<rows.length;i++){
        const p=String(rows[i][ip]||'').trim(),t=String(rows[i][it]||'').trim().toLowerCase();
        if(!p||!['simples','escovao','pesada'].includes(t)) continue;
        dados.push({prefixo:p,tipo_lavagem:t,observacao:String(rows[i][2]||'').trim()});
      }
      if(!dados.length){document.getElementById('err-lav').style.display='block';document.getElementById('err-lav').textContent='Nenhuma linha válida encontrada';return}
      const lavBadge=t=>({simples:'💧 Simples',escovao:'🪣 Escovão',pesada:'🔴 Pesada'}[t]||t);
      const prvw=dados.slice(0,8).map(d=>`<tr><td style="font-family:'DM Mono',monospace;font-weight:600">${d.prefixo}</td><td>${lavBadge(d.tipo_lavagem)}</td><td style="color:var(--text3);font-size:12px">${d.observacao||'—'}</td></tr>`).join('');
      document.getElementById('preview-lav').innerHTML=`
        <div class="tbl-wrap" style="margin-top:16px">
          <div class="tbl-head"><div style="font-size:13px;font-weight:700">Preview — ${dados.length} veículos</div>
          <button class="btn-success" onclick="confirmarLavagem(${JSON.stringify(dados).replace(/"/g,'&quot;')})">✅ Confirmar Importação</button></div>
          <table><thead><tr><th>Prefixo</th><th>Tipo</th><th>Obs.</th></tr></thead><tbody>${prvw}${dados.length>8?`<tr><td colspan="3" style="color:var(--text4);font-size:11px;text-align:center">... e mais ${dados.length-8} veículos</td></tr>`:''}</tbody></table>
        </div>`;
    }catch(err){document.getElementById('err-lav').style.display='block';document.getElementById('err-lav').textContent='Erro ao ler arquivo: '+err.message}
  };
  reader.readAsArrayBuffer(file);
}
async function confirmarLavagem(dados){
  await sb.from('programacao_lavagem').delete().eq('garagem_id',S.user.garagem_id).eq('data',hoje()).eq('turno',S.turno);
  const{data:fr}=await sb.from('frota').select('id,prefixo').eq('garagem_id',S.user.garagem_id);
  const fMap=Object.fromEntries((fr||[]).map(v=>[v.prefixo,v.id]));
  const ins=dados.map(d=>({garagem_id:S.user.garagem_id,data:hoje(),turno:S.turno,prefixo:d.prefixo,tipo_lavagem:d.tipo_lavagem,observacao:d.observacao||null,veiculo_id:fMap[d.prefixo]||null,status:'pendente'}));
  const{error}=await sb.from('programacao_lavagem').insert(ins);
  if(error){toast('Erro: '+error.message,'err');return}
  toast(`✅ ${ins.length} veículos importados!`);renderFerrLavagem();
}

// ── PDF PARSER (original algorithm) ────────
async function parsePDF210(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const all=[];
  for(let p=1;p<=pdf.numPages;p++){
    const pg=await pdf.getPage(p);const tc=await pg.getTextContent();const vp=pg.getViewport({scale:1});
    const items=tc.items.map(it=>({t:it.str.trim(),x:Math.round(it.transform[4]),y:Math.round(vp.height-it.transform[5])})).filter(it=>it.t.length>0);
    all.push(...groupRows210(items));
  }
  return extractData210(all);
}
function groupRows210(items){
  if(!items.length) return[];
  items.sort((a,b)=>a.y!==b.y?a.y-b.y:a.x-b.x);
  const rows=[];let cur=[items[0]],baseY=items[0].y;
  for(let i=1;i<items.length;i++){if(Math.abs(items[i].y-baseY)<=3)cur.push(items[i]);else{rows.push(cur.sort((a,b)=>a.x-b.x));cur=[items[i]];baseY=items[i].y;}}
  if(cur.length) rows.push(cur.sort((a,b)=>a.x-b.x));
  return rows;
}
function extractData210(rows){
  const data=[];let linha='';
  const rPos=/^\d\d[AB]$/,rVeh=/^\d\d\.\d\d\d$/,rTime=/^\d\d:\d\d$/;
  const rHdr=/^(\d\d\d[A-Z]?(?:\.\d)?)\s*[-–]\s*(.+)$/;
  const skip=['Relat','Quinta','Segunda','Terç','Quarta','Sexta','Sáb','Dom','Posiç','Empresa','Motorista','Filtros','Veíc','Início','Fim','JTP','COOL'];
  for(const row of rows){
    const ts=row.map(r=>r.t).filter(t=>t.length>0);
    if(!ts.length) continue;const ft=ts.join(' ');
    if(ts.length<2&&ts[0].length<5) continue;
    if(skip.some(w=>ft.startsWith(w))) continue;
    if(/^\d+\s*[-–]\s*\d+$/.test(ft)) continue;
    if(/\d\d\/\d\d\/\d\d\d\d/.test(ft)) continue;
    if(/\d\d:\d\d:\d\d/.test(ft)) continue;
    if(rHdr.test(ft)&&!rPos.test(ts[0])){linha=ft.trim();continue;}
    if(!rPos.test(ts[0])||!rVeh.test(ts[1])||ts.length<4) continue;
    let fi=-1,ii=-1;
    for(let i=ts.length-1;i>=2;i--){if(rTime.test(ts[i])){if(fi===-1)fi=i;else if(ii===-1){ii=i;break;}}}
    if(ii<0||fi<0) continue;
    const mot=ts.slice(2,ii).join(' ').trim();
    if(!mot||!linha) continue;
    data.push({linha,posicao:ts[0],veiculo:ts[1],motorista:mot,inicio:ts[ii]});
  }
  return data;
}
