<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTP — Sistema Operacional de Garagem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#020817; --surface:#0F172A; --surface2:#0A0F1E;
    --border:#1E293B; --border2:#0F1929;
    --text:#F1F5F9; --text2:#94A3B8; --text3:#475569; --text4:#334155;
    --blue:#2563EB; --blue-dark:#1D4ED8;
    --green:#00C48C; --amber:#F59E0B; --red:#EF4444; --purple:#8B5CF6;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* ── LOGIN ── */
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-glow { position:fixed; top:20%; left:50%; transform:translateX(-50%); width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,#1D4ED810 0%,transparent 65%); pointer-events:none; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 36px; width:380px; box-shadow:0 30px 80px #00000090; animation:fadeUp .5s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-icon { display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:#1E3A5F; border-radius:16px; font-size:26px; margin-bottom:14px; border:1px solid #2563EB30; box-shadow:0 0 30px #2563EB20; }
  .login-title { font-size:22px; font-weight:800; color:var(--text); letter-spacing:-.5px; }
  .login-sub { color:var(--text3); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
  .field-label { display:block; color:var(--text3); font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .field-input,.field-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; margin-bottom:14px; appearance:none; }
  .field-input:focus,.field-select:focus { border-color:var(--blue); }
  .btn-primary { width:100%; background:linear-gradient(135deg,#1D4ED8,#2563EB); color:#fff; border:none; border-radius:12px; padding:13px; font-size:14px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; letter-spacing:.5px; transition:opacity .2s,transform .1s; }
  .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
  .login-footer { text-align:center; margin-top:20px; color:var(--text4); font-size:11px; }

  /* ── SHELL ── */
  #app-shell { display:none; min-height:100vh; flex-direction:column; }
  #app-shell.visible { display:flex; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:200; flex-shrink:0; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-brand { font-weight:800; font-size:15px; color:var(--text); }
  .topbar-brand span { font-weight:400; color:var(--text3); }
  .topbar-divider { width:1px; height:20px; background:var(--border); }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .avatar { background:#1E293B; border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:13px; font-weight:700; border:1px solid var(--border); }
  .btn-sair { background:none; border:1px solid var(--border); color:var(--text3); border-radius:6px; padding:5px 12px; font-size:11px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .2s; }
  .btn-sair:hover { border-color:var(--red); color:var(--red); }
  .app-body { display:flex; flex:1; min-height:0; }

  /* ── SIDEBAR ── */
  .sidebar { width:210px; background:var(--surface2); border-right:1px solid var(--border); padding:16px 10px; display:flex; flex-direction:column; position:sticky; top:56px; height:calc(100vh - 56px); overflow-y:auto; flex-shrink:0; }
  .nav-btn { width:100%; display:flex; align-items:center; gap:10px; background:none; border:1px solid transparent; border-radius:9px; padding:10px 12px; cursor:pointer; color:var(--text3); font-size:13px; font-weight:400; font-family:'DM Sans',sans-serif; margin-bottom:3px; text-align:left; transition:all .15s; }
  .nav-btn:hover { background:var(--border2); color:var(--text2); }
  .nav-btn.active { background:var(--border); border-color:#1D4ED830; color:var(--text); font-weight:600; }
  .sidebar-bottom { margin-top:auto; padding-top:16px; border-top:1px solid var(--border); }
  .turno-label { color:var(--text4); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
  .turno-btns { display:flex; gap:6px; }
  .turno-btn { flex:1; background:var(--border); border:1px solid var(--border); color:var(--text3); border-radius:7px; padding:7px 4px; font-size:11px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .2s; }
  .turno-btn.dia { background:#F59E0B18; border-color:#F59E0B40; color:var(--amber); }
  .turno-btn.noite { background:#3B82F618; border-color:#3B82F640; color:#3B82F6; }

  /* ── MAIN ── */
  .main-content { flex:1; padding:28px; overflow-y:auto; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }

  /* ── COMPONENTS ── */
  .section-title { display:flex; align-items:center; gap:10px; margin:24px 0 14px; }
  .section-title:first-child { margin-top:0; }
  .st-text { color:var(--text3); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  .st-line { flex:1; height:1px; background:var(--border); }

  .badge { border-radius:6px; padding:2px 10px; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; border-width:1px; border-style:solid; }
  .b-disponivel  { color:#00C48C; background:#00C48C18; border-color:#00C48C40; }
  .b-em_linha    { color:#3B82F6; background:#3B82F618; border-color:#3B82F640; }
  .b-manutencao  { color:#F59E0B; background:#F59E0B18; border-color:#F59E0B40; }
  .b-aguardando_peca { color:#EF4444; background:#EF444418; border-color:#EF444440; }
  .b-sinistro    { color:#8B5CF6; background:#8B5CF618; border-color:#8B5CF640; }

  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:4px; }
  .kpi-card { background:var(--surface); border-radius:11px; padding:14px 16px; border:1px solid var(--border); border-left-width:3px; display:flex; flex-direction:column; gap:4px; }
  .kpi-card.ok { border-left-color:var(--green); }
  .kpi-card.nok { border-left-color:var(--red); }
  .kpi-card.neu { border-left-color:#475569; }
  .kpi-label { color:var(--text3); font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; }
  .kpi-value { font-family:'DM Mono',monospace; font-size:22px; font-weight:600; color:var(--text); display:flex; align-items:baseline; gap:4px; }
  .kpi-unit { font-size:12px; color:var(--text4); font-weight:400; }
  .kpi-meta { font-size:11px; font-weight:600; }
  .kpi-meta.ok { color:var(--green); } .kpi-meta.nok { color:var(--red); }

  .painel-header { background:linear-gradient(135deg,var(--surface),#1A2540); border:1px solid var(--border); border-radius:14px; padding:20px 24px; margin-bottom:22px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
  .frota-counters { display:flex; gap:10px; }
  .fc { border-radius:10px; padding:10px 16px; text-align:center; border-width:1px; border-style:solid; }
  .fc-val { font-family:'DM Mono',monospace; font-size:24px; font-weight:700; display:block; }
  .fc-label { font-size:10px; font-weight:600; letter-spacing:.5px; opacity:.8; }

  .frota-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:9px; }
  .frota-card { background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; transition:border-color .2s; cursor:pointer; }
  .frota-card:hover { border-color:#2563EB50; }
  .fp { font-family:'DM Mono',monospace; font-size:16px; font-weight:600; color:var(--text); }
  .fm { color:var(--text3); font-size:11px; margin-top:2px; }
  .fk { color:var(--text4); font-size:10px; margin-top:3px; font-family:'DM Mono',monospace; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:#00000090; z-index:500; display:flex; align-items:center; justify-content:center; padding:16px; animation:fadeIn .2s ease; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:480px; box-shadow:0 30px 80px #00000080; }
  .modal-title { color:var(--text); font-size:17px; font-weight:700; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
  .modal-close { background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; padding:0 4px; }
  .modal-close:hover { color:var(--red); }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-grid .full { grid-column:1/-1; }
  .btn-success { background:linear-gradient(135deg,#059669,#10B981); color:#fff; border:none; border-radius:10px; padding:12px 20px; font-size:14px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; transition:opacity .2s; }
  .btn-success:hover { opacity:.85; }
  .btn-danger { background:linear-gradient(135deg,#DC2626,#EF4444); color:#fff; border:none; border-radius:10px; padding:8px 16px; font-size:12px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; }
  .btn-secondary { background:var(--border); color:var(--text2); border:none; border-radius:10px; padding:12px 20px; font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; font-size:13px; font-weight:600; color:var(--text); box-shadow:0 10px 40px #00000060; z-index:999; animation:fadeUp .3s ease; display:flex; align-items:center; gap:10px; }
  .toast.ok { border-left:3px solid var(--green); }
  .toast.err { border-left:3px solid var(--red); }

  /* Loading */
  .loading { display:flex; align-items:center; justify-content:center; padding:60px; gap:12px; color:var(--text3); font-size:14px; }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-title { font-size:16px; font-weight:600; color:var(--text2); margin-bottom:6px; }

  .filtros { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filtro-btn { background:var(--surface); border:1px solid var(--border); color:var(--text3); border-radius:8px; padding:6px 14px; font-size:12px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .15s; }
  .filtro-btn:hover { color:var(--text); }
  .filtro-btn.active { background:var(--blue-dark); border-color:var(--blue); color:#fff; }

  .btn-add { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,#1D4ED8,#2563EB); color:#fff; border:none; border-radius:10px; padding:9px 18px; font-size:13px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; transition:opacity .2s; }
  .btn-add:hover { opacity:.85; }

  .info-banner { border-radius:10px; padding:14px 18px; margin-top:16px; font-size:12px; border-width:1px; border-style:solid; }
  .info-blue { background:var(--surface); border-color:#1D4ED830; color:#3B82F6; }

  .relatorios-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(275px,1fr)); gap:10px; }
  .rel-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start; cursor:pointer; transition:all .18s; }
  .rel-card:hover { border-color:#2563EB60; transform:translateY(-1px); box-shadow:0 8px 24px #00000040; }
  .rel-icon { background:var(--border); border-radius:9px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }

  @media(max-width:768px){
    .sidebar{display:none}
    .main-content{padding:16px}
    .frota-counters{gap:6px}
    .fc{padding:8px 10px}
    .fc-val{font-size:18px}
    .modal-grid{grid-template-columns:1fr}
  }
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">🚌</div>
      <div class="login-title">JTP Transportes</div>
      <div class="login-sub">Sistema Operacional de Garagem</div>
    </div>
    <label class="field-label">E-mail</label>
    <input class="field-input" id="inp-email" type="email" placeholder="seu@email.com">
    <label class="field-label">Senha</label>
    <input class="field-input" id="inp-senha" type="password" placeholder="••••••••">
    <label class="field-label">Cargo</label>
    <select class="field-select" id="inp-cargo" onchange="toggleGaragem()">
      <option value="gerente_garagem">Gerente de Garagem</option>
      <option value="pcm">PCM</option>
      <option value="almoxarifado">Almoxarifado</option>
      <option value="lider_operacional">Líder Operacional</option>
      <option value="lider_suprimentos">Líder de Suprimentos</option>
      <option value="operacoes_seguras">Operações Seguras</option>
      <option value="lider_oficina">Líder de Oficina</option>
      <option value="diretoria">Diretoria</option>
    </select>
    <div id="garagem-field">
      <label class="field-label">Garagem</label>
      <select class="field-select" id="inp-garagem"></select>
    </div>
    <div id="login-erro" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
    <button class="btn-primary" onclick="doLogin()" id="btn-login">Entrar no Sistema</button>
    <div class="login-footer">🔒 Acesso restrito — Grupo JTP</div>
  </div>
</div>

<!-- APP -->
<div id="app-shell">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">🚌</span>
      <div class="topbar-brand">JTP <span>Operacional</span></div>
      <div class="topbar-divider"></div>
      <span style="color:var(--text3);font-size:12px" id="tb-loc">—</span>
    </div>
    <div class="topbar-right">
      <span style="color:var(--text3);font-size:12px" id="tb-role">—</span>
      <div class="avatar" id="tb-av">?</div>
      <button class="btn-sair" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <button class="nav-btn active" onclick="navTo('painel',this)">🏠 Painel do Dia</button>
      <button class="nav-btn" onclick="navTo('frota',this)">🚌 Frota</button>
      <button class="nav-btn" onclick="navTo('indicadores',this)">📊 Indicadores</button>
      <button class="nav-btn" onclick="navTo('relatorios',this)">📋 Relatórios</button>
      <button class="nav-btn" onclick="navTo('manutencao',this)">🔧 Manutenção</button>
      <button class="nav-btn" onclick="navTo('almoxarifado',this)">📦 Almoxarifado</button>
      <button class="nav-btn dir-only" onclick="navTo('diretoria',this)" style="display:none">🏢 Diretoria</button>
      <div class="sidebar-bottom">
        <div class="turno-label">Turno Ativo</div>
        <div class="turno-btns">
          <button class="turno-btn dia" id="btn-dia" onclick="setTurno('dia')">☀️ Dia</button>
          <button class="turno-btn" id="btn-noite" onclick="setTurno('noite')">🌙 Noite</button>
        </div>
      </div>
    </div>
    <div class="main-content" id="main"></div>
  </div>
</div>

<!-- MODAL CADASTRO VEÍCULO -->
<div class="modal-overlay" id="modal-veiculo" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-veiculo-titulo">Cadastrar Veículo</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-grid">
      <div>
        <label class="field-label">Prefixo *</label>
        <input class="field-input" id="v-prefixo" placeholder="Ex: 2100" style="margin-bottom:0">
      </div>
      <div>
        <label class="field-label">Status *</label>
        <select class="field-select" id="v-status" style="margin-bottom:0">
          <option value="disponivel">Disponível</option>
          <option value="em_linha">Em Linha</option>
          <option value="manutencao">Manutenção</option>
          <option value="aguardando_peca">Aguardando Peça</option>
          <option value="sinistro">Sinistro</option>
        </select>
      </div>
      <div class="full">
        <label class="field-label">Modelo</label>
        <input class="field-input" id="v-modelo" placeholder="Ex: Volvo B270F" style="margin-bottom:0">
      </div>
      <div>
        <label class="field-label">Ano</label>
        <input class="field-input" id="v-ano" type="number" placeholder="2020" style="margin-bottom:0">
      </div>
      <div>
        <label class="field-label">KM Atual</label>
        <input class="field-input" id="v-km" type="number" placeholder="150000" style="margin-bottom:0">
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-success" onclick="salvarVeiculo()" id="btn-salvar-v">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL STATUS RÁPIDO -->
<div class="modal-overlay" id="modal-status" style="display:none" onclick="if(event.target===this)closeModalStatus()">
  <div class="modal" style="max-width:360px">
    <div class="modal-title">
      <span>Atualizar Status — <span id="ms-prefixo" style="font-family:'DM Mono',monospace;color:var(--blue)"></span></span>
      <button class="modal-close" onclick="closeModalStatus()">✕</button>
    </div>
    <label class="field-label">Novo Status</label>
    <select class="field-select" id="ms-status">
      <option value="disponivel">✅ Disponível</option>
      <option value="em_linha">🔵 Em Linha</option>
      <option value="manutencao">🟡 Manutenção</option>
      <option value="aguardando_peca">🔴 Aguardando Peça</option>
      <option value="sinistro">🟣 Sinistro</option>
    </select>
    <label class="field-label">Observação</label>
    <input class="field-input" id="ms-obs" placeholder="Opcional..." style="margin-bottom:20px">
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-secondary" onclick="closeModalStatus()">Cancelar</button>
      <button class="btn-success" onclick="confirmarStatus()">✓ Confirmar</button>
    </div>
  </div>
</div>

<script>
// ══ SUPABASE ═══════════════════════════════════
const { createClient } = supabase;
const sb = createClient(
  'https://jboclubugfxmurvhcxgr.supabase.co',
  'sb_publishable_hasmgR_BbXcJC6Xko6DzaA_N7kl7rNT'
);

// ══ STATE ══════════════════════════════════════
const S = {
  user: null, tela: 'painel', turno: 'dia',
  garagens: [], frota: [], filtroFrota: 'todos',
  editVeiculo: null, statusVeiculoId: null,
};

const CARGOS = {
  diretoria:'Diretoria', gerente_garagem:'Gerente de Garagem',
  pcm:'PCM', almoxarifado:'Almoxarifado',
  lider_operacional:'Líder Operacional', lider_suprimentos:'Líder de Suprimentos',
  operacoes_seguras:'Operações Seguras', lider_oficina:'Líder de Oficina',
};

const STATUS_CFG = {
  disponivel:     {label:'Disponível',  cls:'b-disponivel'},
  em_linha:       {label:'Em Linha',    cls:'b-em_linha'},
  manutencao:     {label:'Manutenção',  cls:'b-manutencao'},
  aguardando_peca:{label:'Ag. Peça',    cls:'b-aguardando_peca'},
  sinistro:       {label:'Sinistro',    cls:'b-sinistro'},
};

// ══ HELPERS ════════════════════════════════════
function badge(status) {
  const c = STATUS_CFG[status] || {label:status, cls:''};
  return `<span class="badge ${c.cls}">${c.label}</span>`;
}

function secTitle(icon, text, action='') {
  return `<div class="section-title">
    <span style="font-size:17px">${icon}</span>
    <span class="st-text">${text}</span>
    <div class="st-line"></div>
    ${action}
  </div>`;
}

function fmt(n) { return Number(n||0).toLocaleString('pt-BR'); }

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='ok'?'✅':'❌'}</span> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function loading() {
  return `<div class="loading"><div class="spinner"></div> Carregando dados...</div>`;
}

  const m = document.getElementById('main');
  m.style.animation = 'none'; m.offsetHeight;

}

async function loadGaragens() {
  const { data } = await sb.from('garagens').select('*').eq('ativa', true).order('nome');
  S.garagens = data || [];
  const sel = document.getElementById('inp-garagem');

function toggleGaragem() {
  const cargo = document.getElementById('inp-cargo').value;

}

async function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const cargo = document.getElementById('inp-cargo').value;
  const gid   = document.getElementById('inp-garagem')?.value;

  const erro = document.getElementById('login-erro');
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; erro.style.display='block'; return; }
  erro.style.display = 'none';

  const btn = document.getElementById('btn-login');
  btn.textContent = 'Entrando...'; btn.disabled = true;

  // Demo login (substituir por sb.auth.signInWithPassword em produção)
  await new Promise(r => setTimeout(r, 600));

  const garagem = S.garagens.find(g => g.id === gid);
  S.user = { nome: email.split('@')[0], email, cargo, garagem_id: gid, garagem };

  btn.textContent = 'Entrar no Sistema'; btn.disabled = false;

  document.getElementById('tb-loc').textContent =
    cargo === 'diretoria' ? '🏢 Todas as Garagens' : `📍 ${garagem?.nome || '—'} — ${garagem?.uf || ''}`;
  document.getElementById('tb-role').textContent = CARGOS[cargo];
  document.getElementById('tb-av').textContent = email[0].toUpperCase();

  document.querySelectorAll('.dir-only').forEach(el =>
    el.style.display = cargo === 'diretoria' ? 'flex' : 'none');

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';

  navTo('painel', document.querySelector('.nav-btn'));
}

function doLogout() {
  S.user = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';

// ══ FROTA — BANCO REAL ════════════════════════
async function loadFrota() {
  if (!S.user) return [];
  let q = sb.from('frota').select('*').order('prefixo');
  if (S.user.cargo !== 'diretoria' && S.user.garagem_id) {
    q = q.eq('garagem_id', S.user.garagem_id);
  }
  const { data, error } = await q;
  if (error) { toast('Erro ao carregar frota: ' + error.message, 'err'); return []; }
  S.frota = data || [];
  return S.frota;
}

async function renderFrota() {
  setMain(loading());
  const frota = await loadFrota();

  const filtros = ['todos','disponivel','em_linha','manutencao','aguardando_peca','sinistro'];
  const labels  = {todos:'Todos', disponivel:'Disponíveis', em_linha:'Em Linha', manutencao:'Manutenção', aguardando_peca:'Ag. Peça', sinistro:'Sinistro'};

  const lista = S.filtroFrota === 'todos' ? frota : frota.filter(v => v.status === S.filtroFrota);

  const filtrosHTML = filtros.map(f => {
    const count = f === 'todos' ? frota.length : frota.filter(v=>v.status===f).length;
    return `<button class="filtro-btn${S.filtroFrota===f?' active':''}" onclick="setFiltroFrota('${f}')">
      ${labels[f]} <span style="opacity:.6;font-size:10px">(${count})</span>
    </button>`;
  }).join('');

  const cardsHTML = lista.length === 0
    ? `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🚌</div>
        <div class="empty-title">Nenhum veículo encontrado</div>
        <p style="font-size:12px;margin-top:4px">Cadastre o primeiro veículo clicando em "+ Novo Veículo"</p>
      </div>`
    : lista.map(v => `
        <div class="frota-card" onclick="openModalStatus('${v.id}','${v.prefixo}','${v.status}')">
          <div>
            <div class="fp">${v.prefixo}</div>
            <div class="fm">${v.modelo || '—'}</div>
            <div class="fk">${fmt(v.km_atual)} km</div>
          </div>
          ${badge(v.status)}
        </div>`).join('');

  const addBtn = `<button class="btn-add" onclick="openModalVeiculo()">+ Novo Veículo</button>`;

  setMain(`
    ${secTitle('🚌', `Gestão de Frota — ${frota.length} veículo(s)`, addBtn)}
    <div class="filtros">${filtrosHTML}</div>
    <div class="frota-grid">${cardsHTML}</div>
    <div class="info-blue info-banner">
      💡 Clique em qualquer veículo para atualizar o status em tempo real.
    </div>
  `);
}

function setFiltroFrota(f) {
  S.filtroFrota = f;
  renderFrota();
}

function openModalVeiculo(veiculo = null) {
  S.editVeiculo = veiculo;
  document.getElementById('modal-veiculo-titulo').textContent = veiculo ? 'Editar Veículo' : 'Cadastrar Veículo';
  document.getElementById('v-prefixo').value  = veiculo?.prefixo || '';
  document.getElementById('v-status').value   = veiculo?.status  || 'disponivel';
  document.getElementById('v-modelo').value   = veiculo?.modelo  || '';
  document.getElementById('v-ano').value      = veiculo?.ano     || '';
  document.getElementById('v-km').value       = veiculo?.km_atual|| '';
  document.getElementById('modal-veiculo').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-veiculo').style.display = 'none';
}

async function salvarVeiculo() {
  const prefixo = document.getElementById('v-prefixo').value.trim();
  const status  = document.getElementById('v-status').value;
  const modelo  = document.getElementById('v-modelo').value.trim();
  const ano     = parseInt(document.getElementById('v-ano').value) || null;
  const km      = parseInt(document.getElementById('v-km').value)  || 0;

  if (!prefixo) { toast('Prefixo é obrigatório!', 'err'); return; }

  const btn = document.getElementById('btn-salvar-v');
  btn.textContent = 'Salvando...'; btn.disabled = true;

  const payload = {
    garagem_id: S.user.garagem_id,
    prefixo, status, modelo, ano,
    km_atual: km,
    updated_at: new Date().toISOString(),
  };

  let error;
  if (S.editVeiculo) {
    ({ error } = await sb.from('frota').update(payload).eq('id', S.editVeiculo.id));
  } else {
    ({ error } = await sb.from('frota').insert(payload));
  }

  btn.textContent = '💾 Salvar'; btn.disabled = false;

  if (error) { toast('Erro: ' + error.message, 'err'); return; }

  toast(S.editVeiculo ? 'Veículo atualizado!' : 'Veículo cadastrado!');
  closeModal();
  renderFrota();
}

}

// ══ INDICADORES ════════════════════════════════
async function renderIndicadores() {
  setMain(loading());
  const frota = await loadFrota();
  const total = frota.length;
  const disp  = frota.filter(v => v.status==='disponivel').length;
  const linha = frota.filter(v => v.status==='em_linha').length;
  const manut = frota.filter(v => v.status==='manutencao').length;
  const agPeca= frota.filter(v => v.status==='aguardando_peca').length;
  const pctD  = total > 0 ? ((disp+linha)/total*100).toFixed(1) : 0;

  function kpi(label, val, meta, unit='%', inv=false, dec=1) {
    const n = parseFloat(val);
    let st = 'neu';
    let stHTML = '';
    if (meta !== undefined) {
      st = inv ? (n<=meta?'ok':'nok') : (n>=meta?'ok':'nok');
      stHTML = `<div class="kpi-meta ${st}">${st==='ok'?'✓ OK':'✗ NOK'} — Meta: ${meta}${unit}</div>`;
    }
    const display = typeof val==='number' ? val.toFixed(dec) : val ?? '—';
    return `<div class="kpi-card ${st}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${display}<span class="kpi-unit">${unit}</span></div>
      ${stHTML}
    </div>`;
  }

  setMain(`
    ${secTitle('⚙️','Operação — Dados Reais do Banco')}
    <div class="kpi-grid">
      ${kpi('Disponibilidade', parseFloat(pctD), 95)}
      ${kpi('Total Frota', total, undefined, ' veíc.', false, 0)}
      ${kpi('Em Linha', linha, undefined, ' veíc.', false, 0)}
      ${kpi('Manutenção', manut, 0, ' veíc.', true, 0)}
      ${kpi('Ag. Peça', agPeca, 0, ' veíc.', true, 0)}
    </div>

    ${secTitle('🔧','Manutenção')}
    <div class="kpi-grid">
      ${kpi('CPK R$/km', '—', undefined, ' R$/km', false, 2)}
      ${kpi('Prev. Geral', '—', 100)}
      ${kpi('OS Abertas', '—', undefined, '', false, 0)}
      ${kpi('OS Fechadas', '—', undefined, '', false, 0)}
    </div>

    ${secTitle('📦','Suprimentos')}
    <div class="kpi-grid">
      ${kpi('Valor Estoque', '—', undefined, ' R$', false, 0)}
      ${kpi('Acurácia Inv.', '—', 98)}
      ${kpi('Ped. Críticos', '—', 0, '', true, 0)}
    </div>

    <div class="info-blue info-banner">
      🔗 Manutenção e Suprimentos serão conectados ao banco na próxima fase.
    </div>
  `);
}

      📊 Dados em tempo real do banco Supabase. Indicadores de manutenção e suprimentos serão adicionados na próxima fase.
    </div>
  `);
}
